        \ <updated>2026-07-06T19:49:14Z</updated>\n  <link href=\"https://arxiv.org/api/query?search_query=all:transformer+OR+(all:language+OR+all:models)&amp;start=0&amp;max_results=3&amp;id_list=\"
        type=\"application/atom+xml\"/>\n  <opensearch:itemsPerPage>3</opensearch:itemsPerPage>\n
        \ <opensearch:totalResults>1321395</opensearch:totalResults>\n  <opensearch:startIndex>0</opensearch:startIndex>\n
        \ <entry>\n    <id>http://arxiv.org/abs/2107.03844v3</id>\n    <title>A Review
        of Bangla Natural Language Processing Tasks and the Utility of Transformer
        Models</title>\n    <updated>2021-07-25T05:41:15Z</updated>\n    <link href=\"https://arxiv.org/abs/2107.03844v3\"
        rel=\"alternate\" type=\"text/html\"/>\n    <link href=\"https://arxiv.org/pdf/2107.03844v3\"
        rel=\"related\" type=\"application/pdf\" title=\"pdf\"/>\n    <summary>Bangla
        -- ranked as the 6th most widely spoken language across the world (https://www.ethnologue.com/guides/ethnologue200),
        with 230 million native speakers -- is still considered as a low-resource
        language in the natural language processing (NLP) community. With three decades
        of research, Bangla NLP (BNLP) is still lagging behind mainly due to the scarcity
        of resources and the challenges that come with it. There is sparse work in
        different areas of BNLP; however, a thorough survey reporting previous work
        and recent advances is yet to be done. In this study, we first provide a review
        of Bangla NLP tasks, resources, and tools available to the research community;
        we benchmark datasets collected from various platforms for nine NLP tasks
        using current state-of-the-art algorithms (i.e., transformer-based models).
        We provide comparative results for the studied NLP tasks by comparing monolingual
        vs. multilingual models of varying sizes. We report our results using both
        individual and consolidated datasets and provide data splits for future research.
        We reviewed a total of 108 papers and conducted 175 sets of experiments. Our
        results show promising performance using transformer-based models while highlighting
        the trade-off with computational costs. We hope that such a comprehensive
        survey will motivate the community to build on and further advance the research
        on Bangla NLP.</summary>\n    <category term=\"cs.CL\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <category term=\"cs.AI\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <category term=\"cs.IR\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <category term=\"cs.LG\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <published>2021-07-08T13:49:46Z</published>\n    <arxiv:comment>Under
        Review, Bangla language processing, text classification, sequence tagging,
        datasets, benchmarks, transformer models</arxiv:comment>\n    <arxiv:primary_category
        term=\"cs.CL\"/>\n    <author>\n      <name>Firoj Alam</name>\n    </author>\n
        \   <author>\n      <name>Arid Hasan</name>\n    </author>\n    <author>\n
        \     <name>Tanvirul Alam</name>\n    </author>\n    <author>\n      <name>Akib
        Khan</name>\n    </author>\n    <author>\n      <name>Janntatul Tajrin</name>\n
        \   </author>\n    <author>\n      <name>Naira Khan</name>\n    </author>\n
        \   <author>\n      <name>Shammur Absar Chowdhury</name>\n    </author>\n
        \ </entry>\n  <entry>\n    <id>http://arxiv.org/abs/2110.08975v2</id>\n    <title>Deep
        Transfer Learning &amp; Beyond: Transformer Language Models in Information
        Systems Research</title>\n    <updated>2021-10-23T13:10:08Z</updated>\n    <link
        href=\"https://arxiv.org/abs/2110.08975v2\" rel=\"alternate\" type=\"text/html\"/>\n
        \   <link href=\"https://arxiv.org/pdf/2110.08975v2\" rel=\"related\" type=\"application/pdf\"
        title=\"pdf\"/>\n    <summary>AI is widely thought to be poised to transform
        business, yet current perceptions of the scope of this transformation may
        be myopic. Recent progress in natural language processing involving transformer
        language models (TLMs) offers a potential avenue for AI-driven business and
        societal transformation that is beyond the scope of what most currently foresee.
        We review this recent progress as well as recent literature utilizing text
        mining in top IS journals to develop an outline for how future IS research
        can benefit from these new techniques. Our review of existing IS literature
        reveals that suboptimal text mining techniques are prevalent and that the
        more advanced TLMs could be applied to enhance and increase IS research involving
        text data, and to enable new IS research topics, thus creating more value
        for the research community. This is possible because these techniques make
        it easier to develop very powerful custom systems and their performance is
        superior to existing methods for a wide range of tasks and applications. Further,
        multilingual language models make possible higher quality text analytics for
        research in multiple languages. We also identify new avenues for IS research,
        like language user interfaces, that may offer even greater potential for future
        IS research.</summary>\n    <category term=\"cs.CL\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <category term=\"cs.AI\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <published>2021-10-18T02:01:39Z</published>\n    <arxiv:comment>Under
        review (revised once). Section 2, the literature review on deep transfer learning
        and transformer language models, is a valuable introduction for a broad audience
        (not just information systems researchers). 33 pages plus 13-page appendix</arxiv:comment>\n
        \   <arxiv:primary_category term=\"cs.CL\"/>\n    <author>\n      <name>Ross
        Gruetzemacher</name>\n    </author>\n    <author>\n      <name>David Paradice</name>\n
        \   </author>\n  </entry>\n  <entry>\n    <id>http://arxiv.org/abs/2302.05406v1</id>\n
        \   <title>Adversarial Transformer Language Models for Contextual Commonsense
        Inference</title>\n    <updated>2023-02-10T18:21:13Z</updated>\n    <link
        href=\"https://arxiv.org/abs/2302.05406v1\" rel=\"alternate\" type=\"text/html\"/>\n
        \   <link href=\"https://arxiv.org/pdf/2302.05406v1\" rel=\"related\" type=\"application/pdf\"
        title=\"pdf\"/>\n    <summary>Contextualized or discourse aware commonsense
        inference is the task of generating coherent commonsense assertions (i.e.,
        facts) from a given story, and a particular sentence from that story. Some
        problems with the task are: lack of controllability for topics of the inferred
        facts; lack of commonsense knowledge during training; and, possibly, hallucinated
        or false facts. In this work, we utilize a transformer model for this task
        and develop techniques to address the aforementioned problems in the task.
        We control the inference by introducing a new technique we call \"hinting\".
        Hinting is a kind of language model prompting, that utilizes both hard prompts
        (specific words) and soft prompts (virtual learnable templates). This serves
        as a control signal to advise the language model \"what to talk about\". Next,
        we establish a methodology for performing joint inference with multiple commonsense
        knowledge bases. Joint inference of commonsense requires care, because it
        is imprecise and the level of generality is more flexible. You want to be
        sure that the results \"still make sense\" for the context. To this end, we
        align the textual version of assertions from three knowledge graphs (ConceptNet,
        ATOMIC2020, and GLUCOSE) with a story and a target sentence. This combination
        allows us to train a single model to perform joint inference with multiple
        knowledge graphs. We show experimental results for the three knowledge graphs
        on joint inference. Our final contribution is exploring a GAN architecture
        that generates the contextualized commonsense assertions and scores them as
        to their plausibility through a discriminator. The result is an integrated
        system for contextual commonsense inference in stories, that can controllably
        generate plausible commonsense assertions, and takes advantage of joint inference
        between multiple commonsense knowledge bases.</summary>\n    <category term=\"cs.CL\"
        scheme=\"http://arxiv.org/schemas/atom\"/>\n    <published>2023-02-10T18:21:13Z</published>\n
        \   <arxiv:comment>Submitted to Semantic Web Journal special edition. https://semantic-web-journal.org/content/adversarial-transformer-language-models-contextual-commonsense-inference-1</arxiv:comment>\n
        \   <arxiv:primary_category term=\"cs.CL\"/>\n    <author>\n      <name>Pedro
        Colon-Hernandez</name>\n    </author>\n    <author>\n      <name>Henry Lieberman</name>\n
        \   </author>\n    <author>\n      <name>Yida Xin</name>\n    </author>\n
        \   <author>\n      <name>Claire Yin</name>\n    </author>\n    <author>\n
        \     <name>Cynthia Breazeal</name>\n    </author>\n    <author>\n      <name>Peter
        Chin</name>\n    </author>\n  </entry>\n</feed>\n"
