        Query: search_query=&amp;id_list=quant-ph/9508027&amp;start=0&amp;max_results=1</title>\n
        \ <updated>2026-07-06T19:49:13Z</updated>\n  <link href=\"https://arxiv.org/api/query?search_query=&amp;start=0&amp;max_results=1&amp;id_list=quant-ph/9508027\"
        type=\"application/atom+xml\"/>\n  <opensearch:itemsPerPage>1</opensearch:itemsPerPage>\n
        \ <opensearch:totalResults>1</opensearch:totalResults>\n  <opensearch:startIndex>0</opensearch:startIndex>\n
        \ <entry>\n    <id>http://arxiv.org/abs/quant-ph/9508027v2</id>\n    <title>Polynomial-Time
        Algorithms for Prime Factorization and Discrete Logarithms on a Quantum Computer</title>\n
        \   <updated>1996-01-25T22:55:00Z</updated>\n    <link href=\"https://arxiv.org/abs/quant-ph/9508027v2\"
        rel=\"alternate\" type=\"text/html\"/>\n    <link href=\"https://arxiv.org/pdf/quant-ph/9508027v2\"
        rel=\"related\" type=\"application/pdf\" title=\"pdf\"/>\n    <summary>  A
        digital computer is generally believed to be an efficient universal computing
        device; that is, it is believed able to simulate any physical computing device
        with an increase in computation time of at most a polynomial factor. This
        may not be true when quantum mechanics is taken into consideration. This paper
        considers factoring integers and finding discrete logarithms, two problems
        which are generally thought to be hard on a classical computer and have been
        used as the basis of several proposed cryptosystems. Efficient randomized
        algorithms are given for these two problems on a hypothetical quantum computer.
        These algorithms take a number of steps polynomial in the input size, e.g.,
        the number of digits of the integer to be factored.</summary>\n    <category
        term=\"quant-ph\" scheme=\"http://arxiv.org/schemas/atom\"/>\n    <published>1995-08-30T14:11:00Z</published>\n
        \   <arxiv:comment>28 pages, LaTeX. This is an expanded version of a paper
        that appeared in the Proceedings of the 35th Annual Symposium on Foundations
        of Computer Science, Santa Fe, NM, Nov. 20--22, 1994. Minor revisions made
        January, 1996</arxiv:comment>\n    <arxiv:primary_category term=\"quant-ph\"/>\n
        \   <arxiv:journal_ref>SIAM J.Sci.Statist.Comput. 26 (1997) 1484</arxiv:journal_ref>\n
        \   <author>\n      <name>Peter W. Shor</name>\n      <arxiv:affiliation>AT&amp;T
        Research</arxiv:affiliation>\n    </author>\n    <arxiv:doi>10.1137/S0097539795293172</arxiv:doi>\n
        \   <link rel=\"related\" href=\"https://doi.org/10.1137/S0097539795293172\"
        title=\"doi\"/>\n  </entry>\n</feed>\n"
