        1: </span>Special functions</figcaption>\n</figure>\n</section>\n<section
        id=\"S3.SS3\" class=\"ltx_subsection\">\n<h3 class=\"ltx_title ltx_title_subsection\">\n<span
        class=\"ltx_tag ltx_tag_subsection\">3.3 </span>Feynman datasets</h3>\n\n<div
        id=\"S3.SS3.p1\" class=\"ltx_para\">\n<p id=\"S3.SS3.p1.1\" class=\"ltx_p\">The
        setup in Section\_<a href=\"#S3.SS1\" title=\"3.1 Toy datasets \u2023 3 KANs
        are accurate \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">3.1</span></a> is when we clearly know \u201Ctrue\u201D
        KAN shapes. The setup in Section\_<a href=\"#S3.SS2\" title=\"3.2 Special
        functions \u2023 3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">3.2</span></a> is when
        we clearly do <span id=\"S3.SS3.p1.1.1\" class=\"ltx_text ltx_font_bold\">not</span>
        know \u201Ctrue\u201D KAN shapes. This part investigates a setup lying in
        the middle: Given the structure of the dataset, we may construct KANs by hand,
        but we are not sure if they are optimal. In this regime, it is interesting
        to compare human-constructed KANs and auto-discovered KANs via pruning (techniques
        in Section\_<a href=\"#S2.SS5.SSS1\" title=\"2.5.1 Simplification techniques
        \u2023 2.5 For Interpretability: Simplifying KANs and Making them interactive
        \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.5.1</span></a>).</p>\n</div>\n<figure
        id=\"S3.T2\" class=\"ltx_table\">\n<div id=\"S3.T2.190\" class=\"ltx_inline-block
        ltx_align_center ltx_transformed_outer\" style=\"width:433.6pt;height:165.6pt;vertical-align:-81.8pt;\"><span
