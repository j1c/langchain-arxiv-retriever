        \ <opensearch:totalResults>1</opensearch:totalResults>\n  <opensearch:startIndex>0</opensearch:startIndex>\n
        \ <entry>\n    <id>http://arxiv.org/abs/2404.19756v5</id>\n    <title>KAN:
        Kolmogorov-Arnold Networks</title>\n    <updated>2025-02-09T21:09:09Z</updated>\n
        \   <link href=\"https://arxiv.org/abs/2404.19756v5\" rel=\"alternate\" type=\"text/html\"/>\n
        \   <link href=\"https://arxiv.org/pdf/2404.19756v5\" rel=\"related\" type=\"application/pdf\"
        title=\"pdf\"/>\n    <summary>Inspired by the Kolmogorov-Arnold representation
        theorem, we propose Kolmogorov-Arnold Networks (KANs) as promising alternatives
        to Multi-Layer Perceptrons (MLPs). While MLPs have fixed activation functions
        on nodes (\"neurons\"), KANs have learnable activation functions on edges
        (\"weights\"). KANs have no linear weights at all -- every weight parameter
        is replaced by a univariate function parametrized as a spline. We show that
        this seemingly simple change makes KANs outperform MLPs in terms of accuracy
        and interpretability. For accuracy, much smaller KANs can achieve comparable
        or better accuracy than much larger MLPs in data fitting and PDE solving.
        Theoretically and empirically, KANs possess faster neural scaling laws than
        MLPs. For interpretability, KANs can be intuitively visualized and can easily
        interact with human users. Through two examples in mathematics and physics,
        KANs are shown to be useful collaborators helping scientists (re)discover
        mathematical and physical laws. In summary, KANs are promising alternatives
        for MLPs, opening opportunities for further improving today's deep learning
        models which rely heavily on MLPs.</summary>\n    <category term=\"cs.LG\"
        scheme=\"http://arxiv.org/schemas/atom\"/>\n    <category term=\"cond-mat.dis-nn\"
        scheme=\"http://arxiv.org/schemas/atom\"/>\n    <category term=\"cs.AI\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <category term=\"stat.ML\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
