        [cs.LG] 09 Feb 2025</div>\n</div><div class=\"ltx_page_content\">\n<article
        class=\"ltx_document ltx_authors_1line\">\n<h1 class=\"ltx_title ltx_title_document\">KAN:
        Kolmogorov\u2013Arnold Networks</h1>\n<div class=\"ltx_authors\">\n<span class=\"ltx_creator
        ltx_role_author\">\n<span class=\"ltx_personname\">Ziming Liu<sup id=\"id13.13.id1\"
        class=\"ltx_sup\"><span id=\"id13.13.id1.1\" class=\"ltx_text ltx_font_italic\">1,4</span></sup>
        \u2003Yixuan Wang<sup id=\"id14.14.id2\" class=\"ltx_sup\"><span id=\"id14.14.id2.1\"
        class=\"ltx_text ltx_font_italic\">2</span></sup> \u2003Sachin Vaidya<sup
        id=\"id15.15.id3\" class=\"ltx_sup\"><span id=\"id15.15.id3.1\" class=\"ltx_text
        ltx_font_italic\">1</span></sup> \u2003Fabian Ruehle<sup id=\"id16.16.id4\"
        class=\"ltx_sup\"><span id=\"id16.16.id4.1\" class=\"ltx_text ltx_font_italic\">3,4</span></sup>
        \n<br class=\"ltx_break\">\u2003<span id=\"id5.5.1\" class=\"ltx_text ltx_font_bold\">James
        Halverson<sup id=\"id5.5.1.1\" class=\"ltx_sup\"><span id=\"id5.5.1.1.1\"
        class=\"ltx_text ltx_font_medium ltx_font_italic\">3,4</span></sup></span>
        \u2003<span id=\"id6.6.2\" class=\"ltx_text ltx_font_bold\">Marin Solja\u010Di\u0107<sup
        id=\"id6.6.2.1\" class=\"ltx_sup\"><span id=\"id6.6.2.1.1\" class=\"ltx_text
        ltx_font_medium ltx_font_italic\">1,4</span></sup></span> \u2003<span id=\"id7.7.3\"
        class=\"ltx_text ltx_font_bold\">Thomas Y. Hou<sup id=\"id7.7.3.1\" class=\"ltx_sup\"><span
        id=\"id7.7.3.1.1\" class=\"ltx_text ltx_font_medium\">2</span></sup></span>
        \u2003<span id=\"id8.8.4\" class=\"ltx_text ltx_font_bold\">Max Tegmark<sup
        id=\"id8.8.4.1\" class=\"ltx_sup\"><span id=\"id8.8.4.1.1\" class=\"ltx_text
        ltx_font_medium ltx_font_italic\">1,4</span></sup></span> \n<br class=\"ltx_break\"><sup
        id=\"id17.17.id5\" class=\"ltx_sup\">1</sup> Massachusetts Institute of Technology\n<br
        class=\"ltx_break\"><sup id=\"id18.18.id6\" class=\"ltx_sup\">2</sup> California
        Institute of Technology\n<br class=\"ltx_break\"><sup id=\"id19.19.id7\" class=\"ltx_sup\">3</sup>
        Northeastern University\n<br class=\"ltx_break\"><sup id=\"id20.20.id8\" class=\"ltx_sup\">4</sup>
        The NSF Institute for Artificial Intelligence and Fundamental Interactions\n</span><span
        class=\"ltx_author_notes\">zmliu@mit.edu</span></span>\n</div>\n\n<div id=\"abstract1\"
        class=\"ltx_abstract\">\n<h6 class=\"ltx_title ltx_title_abstract\">Abstract</h6>\n<p
        class=\"ltx_p\"><span class=\"ltx_text\" style=\"font-size:90%;\">Inspired
        by the Kolmogorov-Arnold representation theorem, we propose Kolmogorov-Arnold
        Networks (KANs) as promising alternatives to Multi-Layer Perceptrons (MLPs).
        While MLPs have <span class=\"ltx_text ltx_font_italic\">fixed</span> activation
        functions on <span class=\"ltx_text ltx_font_italic\">nodes</span> (\u201Cneurons\u201D),
        KANs have <span class=\"ltx_text ltx_font_italic\">learnable</span> activation
        functions on <span class=\"ltx_text ltx_font_italic\">edges</span> (\u201Cweights\u201D).
        KANs have no linear weights at all \u2013 every weight parameter is replaced
        by a univariate function parametrized as a spline. We show that this seemingly
        simple change makes KANs outperform MLPs in terms of accuracy and interpretability,
        on small-scale AI + Science tasks. For accuracy, smaller KANs can achieve
        comparable or better accuracy than larger MLPs in function fitting tasks.
        Theoretically and empirically, KANs possess faster neural scaling laws than
        MLPs. For interpretability, KANs can be intuitively visualized and can easily
        interact with human users. Through two examples in mathematics and physics,
        KANs are shown to be useful \u201Ccollaborators\u201D helping scientists (re)discover
        mathematical and physical laws. In summary, KANs are promising alternatives
        for MLPs, opening opportunities for further improving today\u2019s deep learning
        models which rely heavily on MLPs.</span></p>\n<figure class=\"ltx_figure\"><img
        src=\"2404.19756v5/x1.png\" class=\"ltx_graphics ltx_centering ltx_img_landscape\"
        width=\"747\" height=\"420\" alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption
        ltx_centering\" style=\"font-size:90%;\"><span class=\"ltx_tag ltx_tag_figure\">Figure
        0.1: </span>Multi-Layer Perceptrons (MLPs) vs. Kolmogorov-Arnold Networks
        (KANs)</figcaption>\n</figure>\n</div>\n<section id=\"S1\" class=\"ltx_section\">\n<h2
        class=\"ltx_title ltx_title_section\">\n<span class=\"ltx_tag ltx_tag_section\">1
        </span>Introduction</h2>\n\n<div id=\"S1.p1\" class=\"ltx_para\">\n<p id=\"S1.p1.1\"
        class=\"ltx_p\">Multi-layer perceptrons (MLPs)\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib1\" title=\"\" class=\"ltx_ref\">1</a>, <a href=\"#bib.bib2\"
        title=\"\" class=\"ltx_ref\">2</a>, <a href=\"#bib.bib3\" title=\"\" class=\"ltx_ref\">3</a>]</cite>,
        also known as fully-connected feedforward neural networks, are foundational
        building blocks of today\u2019s deep learning models. The importance of MLPs
        can never be overstated, since they are the default models in machine learning
        for approximating nonlinear functions, due to their expressive power guaranteed
        by the universal approximation theorem\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib3\" title=\"\" class=\"ltx_ref\">3</a>]</cite>. However, are
        MLPs the best nonlinear regressors we can build? Despite the prevalent use
        of MLPs, they have significant drawbacks. In transformers\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib4\" title=\"\" class=\"ltx_ref\">4</a>]</cite>
        for example, MLPs consume almost all non-embedding parameters and are typically
        less interpretable (relative to attention layers) without post-analysis tools\_<cite
        class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib5\" title=\"\" class=\"ltx_ref\">5</a>]</cite>.</p>\n</div>\n<div
        id=\"S1.p2\" class=\"ltx_para\">\n<p id=\"S1.p2.1\" class=\"ltx_p\">We propose
        a promising alternative to MLPs, called Kolmogorov-Arnold Networks (KANs).
        Whereas MLPs are inspired by the universal approximation theorem, KANs are
        inspired by the Kolmogorov-Arnold representation theorem\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib6\" title=\"\" class=\"ltx_ref\">6</a>,
        <a href=\"#bib.bib7\" title=\"\" class=\"ltx_ref\">7</a>, <a href=\"#bib.bib8\"
        title=\"\" class=\"ltx_ref\">8</a>]</cite>. Like MLPs, KANs have fully-connected
        structures. However, while MLPs place fixed activation functions on <span
        id=\"S1.p2.1.1\" class=\"ltx_text ltx_font_italic\">nodes</span> (\u201Cneurons\u201D),
        KANs place learnable activation functions on <span id=\"S1.p2.1.2\" class=\"ltx_text
        ltx_font_italic\">edges</span> (\u201Cweights\u201D), as illustrated in Figure\_<span
        class=\"ltx_ref ltx_missing_label ltx_ref_self\">LABEL:fig:kan_mlp</span>.
        As a result, KANs have no linear weight matrices at all: instead, each weight
        parameter is replaced by a learnable 1D function parametrized as a spline.
        KANs\u2019 nodes simply sum incoming signals without applying any non-linearities.
        One might worry that KANs are hopelessly expensive, since each MLP\u2019s
        weight parameter becomes KAN\u2019s spline function. Fortunately, KANs usually
        allow much smaller computation graphs than MLPs.</p>\n</div>\n<div id=\"S1.p3\"
        class=\"ltx_para\">\n<p id=\"S1.p3.2\" class=\"ltx_p\">Unsurprisingly, the
        possibility of using Kolmogorov-Arnold representation theorem to build neural
        networks has been studied\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib9\" title=\"\" class=\"ltx_ref\">9</a>, <a href=\"#bib.bib10\"
        title=\"\" class=\"ltx_ref\">10</a>, <a href=\"#bib.bib11\" title=\"\" class=\"ltx_ref\">11</a>,
        <a href=\"#bib.bib12\" title=\"\" class=\"ltx_ref\">12</a>, <a href=\"#bib.bib13\"
        title=\"\" class=\"ltx_ref\">13</a>, <a href=\"#bib.bib14\" title=\"\" class=\"ltx_ref\">14</a>,
        <a href=\"#bib.bib15\" title=\"\" class=\"ltx_ref\">15</a>, <a href=\"#bib.bib16\"
        title=\"\" class=\"ltx_ref\">16</a>]</cite>. However, most work has stuck
        with the original depth-2 width-(<math id=\"S1.p3.1.m1\" class=\"ltx_Math\"
        alttext=\"2n+1\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi></mrow><mo>+</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">2n+1</annotation></semantics></math>) representation,
        and many did not have the chance to leverage more modern techniques (e.g.,
        back propagation) to train the networks. In <cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib12\" title=\"\" class=\"ltx_ref\">12</a>]</cite>, a depth-2
        width-(<math id=\"S1.p3.2.m2\" class=\"ltx_Math\" alttext=\"2n+1\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mn>2</mn><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi></mrow><mo>+</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">2n+1</annotation></semantics></math>) representation
        was investigated, with breaking of the curse of dimensionality observed both
        empirically and with an approximation theory given compositional structures
        of the function. Our contribution lies in generalizing the original Kolmogorov-Arnold
        representation to arbitrary widths and depths, revitalizing and contextualizing
        it in today\u2019s deep learning world, as well as using extensive empirical
        experiments to highlight its potential for AI + Science due to its accuracy
        and interpretability.</p>\n</div>\n<div id=\"S1.p4\" class=\"ltx_para\">\n<p
        id=\"S1.p4.2\" class=\"ltx_p\">Despite their elegant mathematical interpretation,
        KANs are nothing more than combinations of splines and MLPs, leveraging their
        respective strengths and avoiding their respective weaknesses. Splines are
        accurate for low-dimensional functions, easy to adjust locally, and able to
        switch between different resolutions. However, splines have a serious curse
        of dimensionality (COD) problem, because of their inability to exploit compositional
        structures. MLPs, on the other hand, suffer less from COD thanks to their
        feature learning, but are less accurate than splines in low dimensions, because
        of their inability to optimize univariate functions. The link between MLPs
        using ReLU-k as activation functions and splines have been established in
        <cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib17\" title=\"\"
        class=\"ltx_ref\">17</a>, <a href=\"#bib.bib18\" title=\"\" class=\"ltx_ref\">18</a>]</cite>.
        To learn a function accurately, a model should not only learn the compositional
        structure (<span id=\"S1.p4.2.1\" class=\"ltx_text ltx_font_italic\">external</span>
        degrees of freedom), but should also approximate well the univariate functions
        (<span id=\"S1.p4.2.2\" class=\"ltx_text ltx_font_italic\">internal</span>
        degrees of freedom). KANs are such models since they have MLPs on the outside
        and splines on the inside. As a result, KANs can not only learn features (thanks
        to their external similarity to MLPs), but can also optimize these learned
        features to great accuracy (thanks to their internal similarity to splines).
        For example, given a high dimensional function</p>\n<table id=\"A6.EGx1\"
        class=\"ltx_equationgroup ltx_eqn_align ltx_eqn_table\">\n\n<tbody id=\"S1.E1\"><tr
        class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_align_right ltx_eqn_cell\"><math
        id=\"S1.E1.m1\" class=\"ltx_Math\" alttext=\"\\displaystyle f(x_{1},\\cdots,x_{N})=\\exp\\left(\\frac{1}{N}\\sum_{i=1}^{N}{\\rm
        sin}^{2}(x_{i})\\right),\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>x</mi><mi>N</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>exp</mi><mo>\u2061</mo><mrow><mo>(</mo><mrow><mstyle
        displaystyle=\"true\"><mfrac><mn>1</mn><mi>N</mi></mfrac></mstyle><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mstyle displaystyle=\"true\"><munderover><mo
        movablelimits=\"false\">\u2211</mo><mrow><mi>i</mi><mo>=</mo><mn>1</mn></mrow><mi>N</mi></munderover></mstyle><mrow><msup><mi>sin</mi><mn>2</mn></msup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mi>i</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><mo>)</mo></mrow></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle f(x_{1},\\cdots,x_{N})=\\exp\\left(\\frac{1}{N}\\sum_{i=1}^{N}{\\rm
        sin}^{2}(x_{i})\\right),</annotation></semantics></math></td>\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell ltx_eqn_eqno
        ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(1.1)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S1.p4.1\"
        class=\"ltx_p\">splines would fail for large <math id=\"S1.p4.1.m1\" class=\"ltx_Math\"
        alttext=\"N\" display=\"inline\" intent=\":literal\"><semantics><mi>N</mi><annotation
        encoding=\"application/x-tex\">N</annotation></semantics></math> due to COD;
        MLPs can potentially learn the the generalized additive structure, but they
        are very inefficient for approximating the exponential and sine functions
        with say, ReLU activations. In contrast, KANs can learn both the compositional
        structure and the univariate functions quite well, hence outperforming MLPs
        by a large margin (see Figure\_<a href=\"#S3.F1\" title=\"Figure 3.1 \u2023
        3.1 Toy datasets \u2023 3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">3.1</span></a>).</p>\n</div>\n<div
        id=\"S1.p5\" class=\"ltx_para\">\n<p id=\"S1.p5.1\" class=\"ltx_p\">Throughout
        this paper, we will use extensive numerical experiments to show that KANs
        can lead to accuracy and interpretability improvement over MLPs, at least
        on small-scale AI + Science tasks. The organization of the paper is illustrated
        in Figure\_<a href=\"#S2.F1\" title=\"Figure 2.1 \u2023 2 Kolmogorov\u2013Arnold
        Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.1</span></a>. In Section\_<a href=\"#S2\"
        title=\"2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2</span></a>,
        we introduce the KAN architecture and its mathematical foundation, introduce
        network simplification techniques to make KANs interpretable, and introduce
        a grid extension technique to make KANs more accurate. In Section\_<a href=\"#S3\"
        title=\"3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">3</span></a>, we show
        that KANs are more accurate than MLPs for data fitting: KANs can beat the
        curse of dimensionality when there is a compositional structure in data, achieving
        better scaling laws than MLPs. We also demonstrate the potential of KANs in
        PDE solving via a simple example of the Poisson equation. In Section\_<a href=\"#S4\"
        title=\"4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4</span></a>, we show
        that KANs are interpretable and can be used for scientific discoveries. We
        use two examples from mathematics (knot theory) and physics (Anderson localization)
        to demonstrate that KANs can be helpful \u201Ccollaborators\u201D for scientists
        to (re)discover math and physical laws. Section\_<a href=\"#S5\" title=\"5
        Related works \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">5</span></a> summarizes related works. In Section\_<a
        href=\"#S6\" title=\"6 Discussion \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">6</span></a>, we conclude
        by discussing broad impacts and future directions. Codes are available at
        <a href=\"https://github.com/KindXiaoming/pykan\" title=\"\" class=\"ltx_ref
        ltx_url ltx_font_typewriter\">https://github.com/KindXiaoming/pykan</a> and
        can also be installed via <span id=\"S1.p5.1.1\" class=\"ltx_text ltx_font_typewriter\">pip
        install pykan</span>.</p>\n</div>\n</section>\n<section id=\"S2\" class=\"ltx_section\">\n<h2
        class=\"ltx_title ltx_title_section\">\n<span class=\"ltx_tag ltx_tag_section\">2
        </span>Kolmogorov\u2013Arnold Networks (KAN)</h2>\n\n<figure id=\"S2.F1\"
        class=\"ltx_figure\"><img src=\"2404.19756v5/figs/flowchart.png\" id=\"S2.F1.g1\"
        class=\"ltx_graphics ltx_centering ltx_img_landscape\" width=\"598\" height=\"222\"
        alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption ltx_centering\"><span
        class=\"ltx_tag ltx_tag_figure\">Figure 2.1: </span>Our proposed Kolmogorov-Arnold
        networks are in honor of two great late mathematicians, Andrey Kolmogorov
        and Vladimir Arnold. KANs are mathematically sound, accurate and interpretable.\n</figcaption>\n</figure>\n<div
        id=\"S2.p1\" class=\"ltx_para\">\n<p id=\"S2.p1.1\" class=\"ltx_p\">Multi-Layer
        Perceptrons (MLPs) are inspired by the universal approximation theorem. We
        instead focus on the Kolmogorov-Arnold representation theorem, which can be
        realized by a new type of neural network called Kolmogorov-Arnold networks
        (KAN). We review the Kolmogorov-Arnold theorem in Section\_<a href=\"#S2.SS1\"
        title=\"2.1 Kolmogorov-Arnold Representation theorem \u2023 2 Kolmogorov\u2013Arnold
        Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.1</span></a>, to inspire the design of Kolmogorov-Arnold
        Networks in Section\_<a href=\"#S2.SS2\" title=\"2.2 KAN architecture \u2023
        2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.2</span></a>.
        In Section\_<a href=\"#S2.SS3\" title=\"2.3 KAN\u2019s Approximation Abilities
        and Scaling Laws \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN:
        Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">2.3</span></a>, we provide theoretical guarantees for the expressive
        power of KANs and their neural scaling laws, relating them to existing approximation
        and generalization theories in the literature. In Section\_<a href=\"#S2.SS4\"
        title=\"2.4 For accuracy: Grid Extension \u2023 2 Kolmogorov\u2013Arnold Networks
        (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.4</span></a>, we propose a grid extension
        technique to make KANs increasingly more accurate. In Section\_<a href=\"#S2.SS5\"
        title=\"2.5 For Interpretability: Simplifying KANs and Making them interactive
        \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.5</span></a>,
        we propose simplification techniques to make KANs interpretable.</p>\n</div>\n<section
        id=\"S2.SS1\" class=\"ltx_subsection\">\n<h3 class=\"ltx_title ltx_title_subsection\">\n<span
        class=\"ltx_tag ltx_tag_subsection\">2.1 </span>Kolmogorov-Arnold Representation
        theorem</h3>\n\n<div id=\"S2.SS1.p1\" class=\"ltx_para\">\n<p id=\"S2.SS1.p1.3\"
        class=\"ltx_p\">Vladimir Arnold and Andrey Kolmogorov established that if
        <math id=\"S2.SS1.p1.1.m1\" class=\"ltx_Math\" alttext=\"f\" display=\"inline\"
        intent=\":literal\"><semantics><mi>f</mi><annotation encoding=\"application/x-tex\">f</annotation></semantics></math>
        is a multivariate continuous function on a bounded domain, then <math id=\"S2.SS1.p1.2.m2\"
        class=\"ltx_Math\" alttext=\"f\" display=\"inline\" intent=\":literal\"><semantics><mi>f</mi><annotation
        encoding=\"application/x-tex\">f</annotation></semantics></math> can be written
        as a finite composition of continuous functions of a single variable and the
        binary operation of addition. More specifically, for a smooth <math id=\"S2.SS1.p1.3.m3\"
        class=\"ltx_Math\" alttext=\"f:[0,1]^{n}\\to\\mathbb{R}\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>f</mi><mo lspace=\"0.278em\" rspace=\"0.278em\">:</mo><mrow><msup><mrow><mo
        stretchy=\"false\">[</mo><mn>0</mn><mo>,</mo><mn>1</mn><mo stretchy=\"false\">]</mo></mrow><mi>n</mi></msup><mo
        stretchy=\"false\">\u2192</mo><mi>\u211D</mi></mrow></mrow><annotation encoding=\"application/x-tex\">f:[0,1]^{n}\\to\\mathbb{R}</annotation></semantics></math>,</p>\n<table
        id=\"S2.E1\" class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_eqn_cell ltx_align_center\"><math id=\"S2.E1.m1\" class=\"ltx_Math\"
        alttext=\"f(\\mathbf{x})=f(x_{1},\\cdots,x_{n})=\\sum_{q=1}^{2n+1}\\Phi_{q}\\left(\\sum_{p=1}^{n}\\phi_{q,p}(x_{p})\\right),\"
        display=\"block\" intent=\":literal\"><semantics><mrow><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\U0001D431</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>f</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>x</mi><mi>n</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo rspace=\"0.111em\">=</mo><mrow><munderover><mo
        movablelimits=\"false\">\u2211</mo><mrow><mi>q</mi><mo>=</mo><mn>1</mn></mrow><mrow><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi></mrow><mo>+</mo><mn>1</mn></mrow></munderover><mrow><msub><mi
        mathvariant=\"normal\">\u03A6</mi><mi>q</mi></msub><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo>(</mo><mrow><munderover><mo
        lspace=\"0em\" movablelimits=\"false\">\u2211</mo><mrow><mi>p</mi><mo>=</mo><mn>1</mn></mrow><mi>n</mi></munderover><mrow><msub><mi>\u03D5</mi><mrow><mi>q</mi><mo>,</mo><mi>p</mi></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mi>p</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><mo>)</mo></mrow></mrow></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">f(\\mathbf{x})=f(x_{1},\\cdots,x_{n})=\\sum_{q=1}^{2n+1}\\Phi_{q}\\left(\\sum_{p=1}^{n}\\phi_{q,p}(x_{p})\\right),</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.1)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS1.p1.5\"
        class=\"ltx_p\">where <math id=\"S2.SS1.p1.4.m1\" class=\"ltx_Math\" alttext=\"\\phi_{q,p}:[0,1]\\to\\mathbb{R}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>\u03D5</mi><mrow><mi>q</mi><mo>,</mo><mi>p</mi></mrow></msub><mo
        lspace=\"0.278em\" rspace=\"0.278em\">:</mo><mrow><mrow><mo stretchy=\"false\">[</mo><mn>0</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><mo stretchy=\"false\">\u2192</mo><mi>\u211D</mi></mrow></mrow><annotation
        encoding=\"application/x-tex\">\\phi_{q,p}:[0,1]\\to\\mathbb{R}</annotation></semantics></math>
        and <math id=\"S2.SS1.p1.5.m2\" class=\"ltx_Math\" alttext=\"\\Phi_{q}:\\mathbb{R}\\to\\mathbb{R}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi mathvariant=\"normal\">\u03A6</mi><mi>q</mi></msub><mo
        lspace=\"0.278em\" rspace=\"0.278em\">:</mo><mrow><mi>\u211D</mi><mo stretchy=\"false\">\u2192</mo><mi>\u211D</mi></mrow></mrow><annotation
        encoding=\"application/x-tex\">\\Phi_{q}:\\mathbb{R}\\to\\mathbb{R}</annotation></semantics></math>.
        In a sense, they showed that the only true multivariate function is addition,
        since every other function can be written using univariate functions and sum.
        One might naively consider this great news for machine learning: learning
        a high-dimensional function boils down to learning a polynomial number of
        1D functions. However, these 1D functions can be non-smooth and even fractal,
        so they may not be learnable in practice\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib19\" title=\"\" class=\"ltx_ref\">19</a>, <a href=\"#bib.bib20\"
        title=\"\" class=\"ltx_ref\">20</a>]</cite>. Because of this pathological
        behavior, the Kolmogorov-Arnold representation theorem was basically sentenced
        to death in machine learning, regarded as theoretically sound but practically
        useless\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib19\"
        title=\"\" class=\"ltx_ref\">19</a>, <a href=\"#bib.bib20\" title=\"\" class=\"ltx_ref\">20</a>]</cite>.</p>\n</div>\n<div
        id=\"S2.SS1.p2\" class=\"ltx_para\">\n<p id=\"S2.SS1.p2.1\" class=\"ltx_p\">However,
        we are more optimistic about the usefulness of the Kolmogorov-Arnold theorem
        for machine learning. First of all, we need not stick to the original Eq.\_(<a
        href=\"#S2.E1\" title=\"In 2.1 Kolmogorov-Arnold Representation theorem \u2023
        2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.1</span></a>)
        which has only two-layer non-linearities and a small number of terms (<math
        id=\"S2.SS1.p2.1.m1\" class=\"ltx_Math\" alttext=\"2n+1\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mn>2</mn><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi></mrow><mo>+</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">2n+1</annotation></semantics></math>) in the
        hidden layer: we will generalize the network to arbitrary widths and depths.
        Secondly, most functions in science and daily life are often smooth and have
        sparse compositional structures, potentially facilitating smooth Kolmogorov-Arnold
        representations. The philosophy here is close to the mindset of physicists,
        who often care more about typical cases rather than worst cases. After all,
        our physical world and machine learning tasks must have structures to make
        physics and machine learning useful or generalizable at all\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib21\" title=\"\" class=\"ltx_ref\">21</a>]</cite>.</p>\n</div>\n</section>\n<section
        id=\"S2.SS2\" class=\"ltx_subsection\">\n<h3 class=\"ltx_title ltx_title_subsection\">\n<span
        class=\"ltx_tag ltx_tag_subsection\">2.2 </span>KAN architecture</h3>\n\n<figure
        id=\"S2.F2\" class=\"ltx_figure\"><img src=\"2404.19756v5/figs/spline_notation.png\"
        id=\"S2.F2.g1\" class=\"ltx_graphics ltx_centering ltx_img_landscape\" width=\"539\"
        height=\"265\" alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption
        ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure 2.2: </span>Left:
        Notations of activations that flow through the network. Right: an activation
        function is parameterized as a B-spline, which allows switching between coarse-grained
        and fine-grained grids.</figcaption>\n</figure>\n<div id=\"S2.SS2.p1\" class=\"ltx_para\">\n<p
        id=\"S2.SS2.p1.7\" class=\"ltx_p\">Suppose we have a supervised learning task
        consisting of input-output pairs <math id=\"S2.SS2.p1.1.m1\" class=\"ltx_Math\"
        alttext=\"\\{\\mathbf{x}_{i},y_{i}\\}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">{</mo><msub><mi>\U0001D431</mi><mi>i</mi></msub><mo>,</mo><msub><mi>y</mi><mi>i</mi></msub><mo
        stretchy=\"false\">}</mo></mrow><annotation encoding=\"application/x-tex\">\\{\\mathbf{x}_{i},y_{i}\\}</annotation></semantics></math>,
        where we want to find <math id=\"S2.SS2.p1.2.m2\" class=\"ltx_Math\" alttext=\"f\"
        display=\"inline\" intent=\":literal\"><semantics><mi>f</mi><annotation encoding=\"application/x-tex\">f</annotation></semantics></math>
        such that <math id=\"S2.SS2.p1.3.m3\" class=\"ltx_Math\" alttext=\"y_{i}\\approx
        f(\\mathbf{x}_{i})\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>y</mi><mi>i</mi></msub><mo>\u2248</mo><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>\U0001D431</mi><mi>i</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">y_{i}\\approx
        f(\\mathbf{x}_{i})</annotation></semantics></math> for all data points.\nEq.\_(<a
        href=\"#S2.E1\" title=\"In 2.1 Kolmogorov-Arnold Representation theorem \u2023
        2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.1</span></a>)
        implies that we are done if we can find appropriate univariate functions <math
        id=\"S2.SS2.p1.4.m4\" class=\"ltx_Math\" alttext=\"\\phi_{q,p}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>\u03D5</mi><mrow><mi>q</mi><mo>,</mo><mi>p</mi></mrow></msub><annotation
        encoding=\"application/x-tex\">\\phi_{q,p}</annotation></semantics></math>
        and <math id=\"S2.SS2.p1.5.m5\" class=\"ltx_Math\" alttext=\"\\Phi_{q}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi mathvariant=\"normal\">\u03A6</mi><mi>q</mi></msub><annotation
        encoding=\"application/x-tex\">\\Phi_{q}</annotation></semantics></math>.
        This inspires us to design a neural network which explicitly parametrizes
        Eq.\_(<a href=\"#S2.E1\" title=\"In 2.1 Kolmogorov-Arnold Representation theorem
        \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.1</span></a>).
        Since all functions to be learned are univariate functions, we can parametrize
        each 1D function as a B-spline curve, with learnable coefficients of local
        B-spline basis functions (see Figure\_<a href=\"#S2.F2\" title=\"Figure 2.2
        \u2023 2.2 KAN architecture \u2023 2 Kolmogorov\u2013Arnold Networks (KAN)
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">2.2</span></a> right). Now we have a prototype of KAN, whose
        computation graph is exactly specified by Eq.\_(<a href=\"#S2.E1\" title=\"In
        2.1 Kolmogorov-Arnold Representation theorem \u2023 2 Kolmogorov\u2013Arnold
        Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.1</span></a>) and illustrated in Figure\_<span
        class=\"ltx_ref ltx_missing_label ltx_ref_self\">LABEL:fig:kan_mlp</span>
        (b) (with the input dimension <math id=\"S2.SS2.p1.6.m6\" class=\"ltx_Math\"
        alttext=\"n=2\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>n</mi><mo>=</mo><mn>2</mn></mrow><annotation
        encoding=\"application/x-tex\">n=2</annotation></semantics></math>), appearing
        as a two-layer neural network with activation functions placed on edges instead
        of nodes (simple summation is performed on nodes), and with width <math id=\"S2.SS2.p1.7.m7\"
        class=\"ltx_Math\" alttext=\"2n+1\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi></mrow><mo>+</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">2n+1</annotation></semantics></math> in the
        middle layer.</p>\n</div>\n<div id=\"S2.SS2.p2\" class=\"ltx_para\">\n<p id=\"S2.SS2.p2.1\"
        class=\"ltx_p\">As mentioned, such a network is known to be too simple to
        approximate any function arbitrarily well in practice with smooth splines!
        We therefore generalize our KAN to be wider and deeper. It is not immediately
        clear how to make KANs deeper, since Kolmogorov-Arnold representations correspond
        to two-layer KANs. To the best of our knowledge, there is not yet a \u201Cgeneralized\u201D
        version of the theorem that corresponds to deeper KANs.\n</p>\n</div>\n<div
        id=\"S2.SS2.p3\" class=\"ltx_para\">\n<p id=\"S2.SS2.p3.2\" class=\"ltx_p\">The
        breakthrough occurs when we notice the analogy between MLPs and KANs. In MLPs,
        once we define a layer (which is composed of a linear transformation and nonlinearties),
        we can stack more layers to make the network deeper. To build deep KANs, we
        should first answer: \u201Cwhat is a KAN layer?\u201D It turns out that a
        KAN layer with <math id=\"S2.SS2.p3.1.m1\" class=\"ltx_Math\" alttext=\"n_{\\rm
        in}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>n</mi><mi>in</mi></msub><annotation
        encoding=\"application/x-tex\">n_{\\rm in}</annotation></semantics></math>-dimensional
        inputs and <math id=\"S2.SS2.p3.2.m2\" class=\"ltx_Math\" alttext=\"n_{\\rm
        out}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>n</mi><mi>out</mi></msub><annotation
        encoding=\"application/x-tex\">n_{\\rm out}</annotation></semantics></math>-dimensional
        outputs can be defined as a matrix of 1D functions</p>\n<table id=\"A6.EGx2\"
        class=\"ltx_equationgroup ltx_eqn_align ltx_eqn_table\">\n\n<tbody id=\"S2.E2\"><tr
        class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_align_right ltx_eqn_cell\"><math
        id=\"S2.E2.m1\" class=\"ltx_Math\" alttext=\"\\displaystyle{\\mathbf{\\Phi}}=\\{\\phi_{q,p}\\},\\qquad
        p=1,2,\\cdots,n_{\\rm in},\\qquad q=1,2\\cdots,n_{\\rm out},\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mrow><mi>\U0001D6BD</mi><mo>=</mo><mrow><mo
        stretchy=\"false\">{</mo><msub><mi>\u03D5</mi><mrow><mi>q</mi><mo>,</mo><mi>p</mi></mrow></msub><mo
        stretchy=\"false\">}</mo></mrow></mrow><mo rspace=\"2.167em\">,</mo><mrow><mrow><mi>p</mi><mo>=</mo><mrow><mn>1</mn><mo>,</mo><mn>2</mn><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>n</mi><mi>in</mi></msub></mrow></mrow><mo
        rspace=\"2.167em\">,</mo><mrow><mi>q</mi><mo>=</mo><mrow><mn>1</mn><mo>,</mo><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi mathvariant=\"normal\">\u22EF</mi></mrow><mo>,</mo><msub><mi>n</mi><mi>out</mi></msub></mrow></mrow></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle{\\mathbf{\\Phi}}=\\{\\phi_{q,p}\\},\\qquad
        p=1,2,\\cdots,n_{\\rm in},\\qquad q=1,2\\cdots,n_{\\rm out},</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.2)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS2.p3.7\"
        class=\"ltx_p\">where the functions <math id=\"S2.SS2.p3.3.m1\" class=\"ltx_Math\"
        alttext=\"\\phi_{q,p}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03D5</mi><mrow><mi>q</mi><mo>,</mo><mi>p</mi></mrow></msub><annotation
        encoding=\"application/x-tex\">\\phi_{q,p}</annotation></semantics></math>
        have trainable parameters, as detaild below. In the Kolmogov-Arnold theorem,
        the inner functions form a KAN layer with <math id=\"S2.SS2.p3.4.m2\" class=\"ltx_Math\"
        alttext=\"n_{\\rm in}=n\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>n</mi><mi>in</mi></msub><mo>=</mo><mi>n</mi></mrow><annotation
        encoding=\"application/x-tex\">n_{\\rm in}=n</annotation></semantics></math>
        and <math id=\"S2.SS2.p3.5.m3\" class=\"ltx_Math\" alttext=\"n_{\\rm out}=2n+1\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>n</mi><mi>out</mi></msub><mo>=</mo><mrow><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi></mrow><mo>+</mo><mn>1</mn></mrow></mrow><annotation
        encoding=\"application/x-tex\">n_{\\rm out}=2n+1</annotation></semantics></math>,
        and the outer functions form a KAN layer with <math id=\"S2.SS2.p3.6.m4\"
        class=\"ltx_Math\" alttext=\"n_{\\rm in}=2n+1\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>n</mi><mi>in</mi></msub><mo>=</mo><mrow><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi></mrow><mo>+</mo><mn>1</mn></mrow></mrow><annotation
        encoding=\"application/x-tex\">n_{\\rm in}=2n+1</annotation></semantics></math>
        and <math id=\"S2.SS2.p3.7.m5\" class=\"ltx_Math\" alttext=\"n_{\\rm out}=1\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>n</mi><mi>out</mi></msub><mo>=</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">n_{\\rm out}=1</annotation></semantics></math>.
        So the Kolmogorov-Arnold representations in Eq.\_(<a href=\"#S2.E1\" title=\"In
        2.1 Kolmogorov-Arnold Representation theorem \u2023 2 Kolmogorov\u2013Arnold
        Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.1</span></a>) are simply compositions of
        two KAN layers. Now it becomes clear what it means to have deeper Kolmogorov-Arnold
        representations: simply stack more KAN layers!</p>\n</div>\n<div id=\"S2.SS2.p4\"
        class=\"ltx_para\">\n<p id=\"S2.SS2.p4.30\" class=\"ltx_p\">Let us introduce
        some notation. This paragraph will be a bit technical, but readers can refer
        to Figure\_<a href=\"#S2.F2\" title=\"Figure 2.2 \u2023 2.2 KAN architecture
        \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.2</span></a>
        (left) for a concrete example and intuitive understanding. The shape of a
        KAN is represented by an integer array</p>\n<table id=\"A6.EGx3\" class=\"ltx_equationgroup
        ltx_eqn_align ltx_eqn_table\">\n\n<tbody id=\"S2.E3\"><tr class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_td ltx_align_right ltx_eqn_cell\"><math id=\"S2.E3.m1\" class=\"ltx_Math\"
        alttext=\"\\displaystyle[n_{0},n_{1},\\cdots,n_{L}],\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mo stretchy=\"false\">[</mo><msub><mi>n</mi><mn>0</mn></msub><mo>,</mo><msub><mi>n</mi><mn>1</mn></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>n</mi><mi>L</mi></msub><mo
        stretchy=\"false\">]</mo></mrow><mo>,</mo></mrow><annotation encoding=\"application/x-tex\">\\displaystyle[n_{0},n_{1},\\cdots,n_{L}],</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.3)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS2.p4.12\"
        class=\"ltx_p\">where <math id=\"S2.SS2.p4.1.m1\" class=\"ltx_Math\" alttext=\"n_{i}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>n</mi><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">n_{i}</annotation></semantics></math> is the
        number of nodes in the <math id=\"S2.SS2.p4.2.m2\" class=\"ltx_Math\" alttext=\"i^{\\rm
        th}\" display=\"inline\" intent=\":literal\"><semantics><msup><mi>i</mi><mi>th</mi></msup><annotation
        encoding=\"application/x-tex\">i^{\\rm th}</annotation></semantics></math>
        layer of the computational graph. We denote the <math id=\"S2.SS2.p4.3.m3\"
        class=\"ltx_Math\" alttext=\"i^{\\rm th}\" display=\"inline\" intent=\":literal\"><semantics><msup><mi>i</mi><mi>th</mi></msup><annotation
        encoding=\"application/x-tex\">i^{\\rm th}</annotation></semantics></math>
        neuron in the <math id=\"S2.SS2.p4.4.m4\" class=\"ltx_Math\" alttext=\"l^{\\rm
        th}\" display=\"inline\" intent=\":literal\"><semantics><msup><mi>l</mi><mi>th</mi></msup><annotation
        encoding=\"application/x-tex\">l^{\\rm th}</annotation></semantics></math>
        layer by <math id=\"S2.SS2.p4.5.m5\" class=\"ltx_Math\" alttext=\"(l,i)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">(</mo><mi>l</mi><mo>,</mo><mi>i</mi><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(l,i)</annotation></semantics></math>,
        and the activation value of the <math id=\"S2.SS2.p4.6.m6\" class=\"ltx_Math\"
        alttext=\"(l,i)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">(</mo><mi>l</mi><mo>,</mo><mi>i</mi><mo stretchy=\"false\">)</mo></mrow><annotation
        encoding=\"application/x-tex\">(l,i)</annotation></semantics></math>-neuron
        by <math id=\"S2.SS2.p4.7.m7\" class=\"ltx_Math\" alttext=\"x_{l,i}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>x</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi></mrow></msub><annotation
        encoding=\"application/x-tex\">x_{l,i}</annotation></semantics></math>. Between
        layer <math id=\"S2.SS2.p4.8.m8\" class=\"ltx_Math\" alttext=\"l\" display=\"inline\"
        intent=\":literal\"><semantics><mi>l</mi><annotation encoding=\"application/x-tex\">l</annotation></semantics></math>
        and layer <math id=\"S2.SS2.p4.9.m9\" class=\"ltx_Math\" alttext=\"l+1\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>l</mi><mo>+</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">l+1</annotation></semantics></math>, there
        are <math id=\"S2.SS2.p4.10.m10\" class=\"ltx_Math\" alttext=\"n_{l}n_{l+1}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>n</mi><mi>l</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>n</mi><mrow><mi>l</mi><mo>+</mo><mn>1</mn></mrow></msub></mrow><annotation
        encoding=\"application/x-tex\">n_{l}n_{l+1}</annotation></semantics></math>
        activation functions: the activation function that connects <math id=\"S2.SS2.p4.11.m11\"
        class=\"ltx_Math\" alttext=\"(l,i)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">(</mo><mi>l</mi><mo>,</mo><mi>i</mi><mo stretchy=\"false\">)</mo></mrow><annotation
        encoding=\"application/x-tex\">(l,i)</annotation></semantics></math> and <math
        id=\"S2.SS2.p4.12.m12\" class=\"ltx_Math\" alttext=\"(l+1,j)\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">(</mo><mrow><mi>l</mi><mo>+</mo><mn>1</mn></mrow><mo>,</mo><mi>j</mi><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(l+1,j)</annotation></semantics></math>
        is denoted by</p>\n<table id=\"A6.EGx4\" class=\"ltx_equationgroup ltx_eqn_align
        ltx_eqn_table\">\n\n<tbody id=\"S2.E4\"><tr class=\"ltx_equation ltx_eqn_row
        ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_td ltx_align_right ltx_eqn_cell\"><math id=\"S2.E4.m1\" class=\"ltx_Math\"
        alttext=\"\\displaystyle\\phi_{l,j,i},\\quad l=0,\\cdots,L-1,\\quad i=1,\\cdots,n_{l},\\quad
        j=1,\\cdots,n_{l+1}.\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mrow><mrow><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><mi>j</mi><mo>,</mo><mi>i</mi></mrow></msub><mo
        rspace=\"1.167em\">,</mo><mi>l</mi></mrow><mo>=</mo><mn>0</mn></mrow><mo>,</mo><mrow><mrow><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow><mo
        rspace=\"1.167em\">,</mo><mi>i</mi></mrow><mo>=</mo><mn>1</mn></mrow><mo>,</mo><mrow><mrow><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>n</mi><mi>l</mi></msub><mo
        rspace=\"1.167em\">,</mo><mi>j</mi></mrow><mo>=</mo><mn>1</mn></mrow><mo>,</mo><mrow><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>n</mi><mrow><mi>l</mi><mo>+</mo><mn>1</mn></mrow></msub></mrow></mrow><mo
        lspace=\"0em\">.</mo></mrow><annotation encoding=\"application/x-tex\">\\displaystyle\\phi_{l,j,i},\\quad
        l=0,\\cdots,L-1,\\quad i=1,\\cdots,n_{l},\\quad j=1,\\cdots,n_{l+1}.</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.4)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS2.p4.17\"
        class=\"ltx_p\">The pre-activation of <math id=\"S2.SS2.p4.13.m1\" class=\"ltx_Math\"
        alttext=\"\\phi_{l,j,i}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><mi>j</mi><mo>,</mo><mi>i</mi></mrow></msub><annotation
        encoding=\"application/x-tex\">\\phi_{l,j,i}</annotation></semantics></math>
        is simply <math id=\"S2.SS2.p4.14.m2\" class=\"ltx_Math\" alttext=\"x_{l,i}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>x</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi></mrow></msub><annotation
        encoding=\"application/x-tex\">x_{l,i}</annotation></semantics></math>; the
        post-activation of <math id=\"S2.SS2.p4.15.m3\" class=\"ltx_Math\" alttext=\"\\phi_{l,j,i}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><mi>j</mi><mo>,</mo><mi>i</mi></mrow></msub><annotation
        encoding=\"application/x-tex\">\\phi_{l,j,i}</annotation></semantics></math>
        is denoted by <math id=\"S2.SS2.p4.16.m4\" class=\"ltx_Math\" alttext=\"\\tilde{x}_{l,j,i}\\equiv\\phi_{l,j,i}(x_{l,i})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mover accent=\"true\"><mi>x</mi><mo>~</mo></mover><mrow><mi>l</mi><mo>,</mo><mi>j</mi><mo>,</mo><mi>i</mi></mrow></msub><mo>\u2261</mo><mrow><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><mi>j</mi><mo>,</mo><mi>i</mi></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi></mrow></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">\\tilde{x}_{l,j,i}\\equiv\\phi_{l,j,i}(x_{l,i})</annotation></semantics></math>.
        The activation value of the <math id=\"S2.SS2.p4.17.m5\" class=\"ltx_Math\"
        alttext=\"(l+1,j)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>l</mi><mo>+</mo><mn>1</mn></mrow><mo>,</mo><mi>j</mi><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(l+1,j)</annotation></semantics></math>
        neuron is simply the sum of all incoming post-activations:</p>\n<table id=\"S2.E5\"
        class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr class=\"ltx_equation ltx_eqn_row
        ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_eqn_cell ltx_align_center\"><math id=\"S2.E5.m1\" class=\"ltx_Math\"
        alttext=\"x_{l+1,j}=\\sum_{i=1}^{n_{l}}\\tilde{x}_{l,j,i}=\\sum_{i=1}^{n_{l}}\\phi_{l,j,i}(x_{l,i}),\\qquad
        j=1,\\cdots,n_{l+1}.\" display=\"block\" intent=\":literal\"><semantics><mrow><mrow><mrow><msub><mi>x</mi><mrow><mrow><mi>l</mi><mo>+</mo><mn>1</mn></mrow><mo>,</mo><mi>j</mi></mrow></msub><mo
        rspace=\"0.111em\">=</mo><mrow><munderover><mo movablelimits=\"false\">\u2211</mo><mrow><mi>i</mi><mo>=</mo><mn>1</mn></mrow><msub><mi>n</mi><mi>l</mi></msub></munderover><msub><mover
        accent=\"true\"><mi>x</mi><mo>~</mo></mover><mrow><mi>l</mi><mo>,</mo><mi>j</mi><mo>,</mo><mi>i</mi></mrow></msub></mrow><mo
        rspace=\"0.111em\">=</mo><mrow><munderover><mo movablelimits=\"false\">\u2211</mo><mrow><mi>i</mi><mo>=</mo><mn>1</mn></mrow><msub><mi>n</mi><mi>l</mi></msub></munderover><mrow><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><mi>j</mi><mo>,</mo><mi>i</mi></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi></mrow></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><mo rspace=\"2.167em\">,</mo><mrow><mi>j</mi><mo>=</mo><mrow><mn>1</mn><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>n</mi><mrow><mi>l</mi><mo>+</mo><mn>1</mn></mrow></msub></mrow></mrow></mrow><mo
        lspace=\"0em\">.</mo></mrow><annotation encoding=\"application/x-tex\">x_{l+1,j}=\\sum_{i=1}^{n_{l}}\\tilde{x}_{l,j,i}=\\sum_{i=1}^{n_{l}}\\phi_{l,j,i}(x_{l,i}),\\qquad
        j=1,\\cdots,n_{l+1}.</annotation></semantics></math></td>\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell ltx_eqn_eqno
        ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.5)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS2.p4.31\"
        class=\"ltx_p\">In matrix form, this reads</p>\n<table id=\"S2.E6\" class=\"ltx_equation
        ltx_eqn_table\">\n\n<tbody><tr class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_eqn_cell
        ltx_align_center\"><math id=\"S2.E6.m1\" class=\"ltx_Math\" alttext=\"\\mathbf{x}_{l+1}=\\underbrace{\\begin{pmatrix}\\phi_{l,1,1}(\\cdot)&amp;\\phi_{l,1,2}(\\cdot)&amp;\\cdots&amp;\\phi_{l,1,n_{l}}(\\cdot)\\\\\n\\phi_{l,2,1}(\\cdot)&amp;\\phi_{l,2,2}(\\cdot)&amp;\\cdots&amp;\\phi_{l,2,n_{l}}(\\cdot)\\\\\n\\vdots&amp;\\vdots&amp;&amp;\\vdots\\\\\n\\phi_{l,n_{l+1},1}(\\cdot)&amp;\\phi_{l,n_{l+1},2}(\\cdot)&amp;\\cdots&amp;\\phi_{l,n_{l+1},n_{l}}(\\cdot)\\\\\n\\end{pmatrix}}_{\\mathbf{\\Phi}_{l}}\\mathbf{x}_{l},\"
        display=\"block\" intent=\":literal\"><semantics><mrow><mrow><msub><mi>\U0001D431</mi><mrow><mi>l</mi><mo>+</mo><mn>1</mn></mrow></msub><mo>=</mo><mrow><munder><munder
        accentunder=\"true\"><mrow><mo>(</mo><mtable columnspacing=\"5pt\" displaystyle=\"true\"
        rowspacing=\"0pt\"><mtr><mtd><mrow><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mo
        lspace=\"0em\" rspace=\"0em\">\u22C5</mo><mo stretchy=\"false\">)</mo></mrow></mrow></mtd><mtd><mrow><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><mn>1</mn><mo>,</mo><mn>2</mn></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mo
        lspace=\"0em\" rspace=\"0em\">\u22C5</mo><mo stretchy=\"false\">)</mo></mrow></mrow></mtd><mtd><mi
        mathvariant=\"normal\">\u22EF</mi></mtd><mtd><mrow><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><mn>1</mn><mo>,</mo><msub><mi>n</mi><mi>l</mi></msub></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mo
        lspace=\"0em\" rspace=\"0em\">\u22C5</mo><mo stretchy=\"false\">)</mo></mrow></mrow></mtd></mtr><mtr><mtd><mrow><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><mn>2</mn><mo>,</mo><mn>1</mn></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mo
        lspace=\"0em\" rspace=\"0em\">\u22C5</mo><mo stretchy=\"false\">)</mo></mrow></mrow></mtd><mtd><mrow><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><mn>2</mn><mo>,</mo><mn>2</mn></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mo
        lspace=\"0em\" rspace=\"0em\">\u22C5</mo><mo stretchy=\"false\">)</mo></mrow></mrow></mtd><mtd><mi
        mathvariant=\"normal\">\u22EF</mi></mtd><mtd><mrow><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><mn>2</mn><mo>,</mo><msub><mi>n</mi><mi>l</mi></msub></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mo
        lspace=\"0em\" rspace=\"0em\">\u22C5</mo><mo stretchy=\"false\">)</mo></mrow></mrow></mtd></mtr><mtr><mtd><mi
        mathvariant=\"normal\">\u22EE</mi></mtd><mtd><mi mathvariant=\"normal\">\u22EE</mi></mtd><mtd></mtd><mtd><mi
        mathvariant=\"normal\">\u22EE</mi></mtd></mtr><mtr><mtd><mrow><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><msub><mi>n</mi><mrow><mi>l</mi><mo>+</mo><mn>1</mn></mrow></msub><mo>,</mo><mn>1</mn></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mo
        lspace=\"0em\" rspace=\"0em\">\u22C5</mo><mo stretchy=\"false\">)</mo></mrow></mrow></mtd><mtd><mrow><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><msub><mi>n</mi><mrow><mi>l</mi><mo>+</mo><mn>1</mn></mrow></msub><mo>,</mo><mn>2</mn></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mo
        lspace=\"0em\" rspace=\"0em\">\u22C5</mo><mo stretchy=\"false\">)</mo></mrow></mrow></mtd><mtd><mi
        mathvariant=\"normal\">\u22EF</mi></mtd><mtd><mrow><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><msub><mi>n</mi><mrow><mi>l</mi><mo>+</mo><mn>1</mn></mrow></msub><mo>,</mo><msub><mi>n</mi><mi>l</mi></msub></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mo
        lspace=\"0em\" rspace=\"0em\">\u22C5</mo><mo stretchy=\"false\">)</mo></mrow></mrow></mtd></mtr></mtable><mo>)</mo></mrow><mo
        stretchy=\"true\">\u23DF</mo></munder><msub><mi>\U0001D6BD</mi><mi>l</mi></msub></munder><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>\U0001D431</mi><mi>l</mi></msub></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">\\mathbf{x}_{l+1}=\\underbrace{\\begin{pmatrix}\\phi_{l,1,1}(\\cdot)&amp;\\phi_{l,1,2}(\\cdot)&amp;\\cdots&amp;\\phi_{l,1,n_{l}}(\\cdot)\\\\\n\\phi_{l,2,1}(\\cdot)&amp;\\phi_{l,2,2}(\\cdot)&amp;\\cdots&amp;\\phi_{l,2,n_{l}}(\\cdot)\\\\\n\\vdots&amp;\\vdots&amp;&amp;\\vdots\\\\\n\\phi_{l,n_{l+1},1}(\\cdot)&amp;\\phi_{l,n_{l+1},2}(\\cdot)&amp;\\cdots&amp;\\phi_{l,n_{l+1},n_{l}}(\\cdot)\\\\\n\\end{pmatrix}}_{\\mathbf{\\Phi}_{l}}\\mathbf{x}_{l},</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.6)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS2.p4.21\"
        class=\"ltx_p\">where <math id=\"S2.SS2.p4.18.m1\" class=\"ltx_Math\" alttext=\"{\\mathbf{\\Phi}}_{l}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>\U0001D6BD</mi><mi>l</mi></msub><annotation
        encoding=\"application/x-tex\">{\\mathbf{\\Phi}}_{l}</annotation></semantics></math>
        is the function matrix corresponding to the <math id=\"S2.SS2.p4.19.m2\" class=\"ltx_Math\"
        alttext=\"l^{\\rm th}\" display=\"inline\" intent=\":literal\"><semantics><msup><mi>l</mi><mi>th</mi></msup><annotation
        encoding=\"application/x-tex\">l^{\\rm th}</annotation></semantics></math>
        KAN layer. A general KAN network is a composition of <math id=\"S2.SS2.p4.20.m3\"
        class=\"ltx_Math\" alttext=\"L\" display=\"inline\" intent=\":literal\"><semantics><mi>L</mi><annotation
        encoding=\"application/x-tex\">L</annotation></semantics></math> layers: given
        an input vector <math id=\"S2.SS2.p4.21.m4\" class=\"ltx_Math\" alttext=\"\\mathbf{x}_{0}\\in\\mathbb{R}^{n_{0}}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>\U0001D431</mi><mn>0</mn></msub><mo>\u2208</mo><msup><mi>\u211D</mi><msub><mi>n</mi><mn>0</mn></msub></msup></mrow><annotation
        encoding=\"application/x-tex\">\\mathbf{x}_{0}\\in\\mathbb{R}^{n_{0}}</annotation></semantics></math>,
        the output of KAN is</p>\n<table id=\"S2.E7\" class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr
        class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_eqn_cell ltx_align_center\"><math
        id=\"S2.E7.m1\" class=\"ltx_Math\" alttext=\"{\\rm KAN}(\\mathbf{x})=(\\mathbf{\\Phi}_{L-1}\\circ\\mathbf{\\Phi}_{L-2}\\circ\\cdots\\circ\\mathbf{\\Phi}_{1}\\circ\\mathbf{\\Phi}_{0})\\mathbf{x}.\"
        display=\"block\" intent=\":literal\"><semantics><mrow><mrow><mrow><mi>KAN</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\U0001D431</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mrow><mo stretchy=\"false\">(</mo><mrow><msub><mi>\U0001D6BD</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>2</mn></mrow></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi mathvariant=\"normal\">\u22EF</mi><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mn>1</mn></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mn>0</mn></msub></mrow><mo
        stretchy=\"false\">)</mo></mrow><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\U0001D431</mi></mrow></mrow><mo
        lspace=\"0em\">.</mo></mrow><annotation encoding=\"application/x-tex\">{\\rm
        KAN}(\\mathbf{x})=(\\mathbf{\\Phi}_{L-1}\\circ\\mathbf{\\Phi}_{L-2}\\circ\\cdots\\circ\\mathbf{\\Phi}_{1}\\circ\\mathbf{\\Phi}_{0})\\mathbf{x}.</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.7)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS2.p4.23\"
        class=\"ltx_p\">We can also rewrite the above equation to make it more analogous
        to Eq.\_(<a href=\"#S2.E1\" title=\"In 2.1 Kolmogorov-Arnold Representation
        theorem \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.1</span></a>),
        assuming output dimension <math id=\"S2.SS2.p4.22.m1\" class=\"ltx_Math\"
        alttext=\"n_{L}=1\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>n</mi><mi>L</mi></msub><mo>=</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">n_{L}=1</annotation></semantics></math>, and
        define <math id=\"S2.SS2.p4.23.m2\" class=\"ltx_Math\" alttext=\"f(\\mathbf{x})\\equiv{\\rm
        KAN}(\\mathbf{x})\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\U0001D431</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>\u2261</mo><mrow><mi>KAN</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\U0001D431</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">f(\\mathbf{x})\\equiv{\\rm
        KAN}(\\mathbf{x})</annotation></semantics></math>:</p>\n<table id=\"S2.E8\"
        class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr class=\"ltx_equation ltx_eqn_row
        ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_eqn_cell ltx_align_center\"><math id=\"S2.E8.m1\" class=\"ltx_Math\"
        alttext=\"f(\\mathbf{x})=\\sum_{i_{L-1}=1}^{n_{L-1}}\\phi_{L-1,i_{L},i_{L-1}}\\left(\\sum_{i_{L-2}=1}^{n_{L-2}}\\cdots\\left(\\sum_{i_{2}=1}^{n_{2}}\\phi_{2,i_{3},i_{2}}\\left(\\sum_{i_{1}=1}^{n_{1}}\\phi_{1,i_{2},i_{1}}\\left(\\sum_{i_{0}=1}^{n_{0}}\\phi_{0,i_{1},i_{0}}(x_{i_{0}})\\right)\\right)\\right)\\cdots\\right),\"
        display=\"block\" intent=\":literal\"><semantics><mrow><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\U0001D431</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo rspace=\"0.111em\">=</mo><mrow><munderover><mo
        movablelimits=\"false\">\u2211</mo><mrow><msub><mi>i</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow></msub><mo>=</mo><mn>1</mn></mrow><msub><mi>n</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow></msub></munderover><mrow><msub><mi>\u03D5</mi><mrow><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow><mo>,</mo><msub><mi>i</mi><mi>L</mi></msub><mo>,</mo><msub><mi>i</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow></msub></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo>(</mo><mrow><munderover><mo
        lspace=\"0em\" movablelimits=\"false\">\u2211</mo><mrow><msub><mi>i</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>2</mn></mrow></msub><mo>=</mo><mn>1</mn></mrow><msub><mi>n</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>2</mn></mrow></msub></munderover><mrow><mi
        mathvariant=\"normal\">\u22EF</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo>(</mo><mrow><munderover><mo
        lspace=\"0em\" movablelimits=\"false\">\u2211</mo><mrow><msub><mi>i</mi><mn>2</mn></msub><mo>=</mo><mn>1</mn></mrow><msub><mi>n</mi><mn>2</mn></msub></munderover><mrow><msub><mi>\u03D5</mi><mrow><mn>2</mn><mo>,</mo><msub><mi>i</mi><mn>3</mn></msub><mo>,</mo><msub><mi>i</mi><mn>2</mn></msub></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo>(</mo><mrow><munderover><mo
        lspace=\"0em\" movablelimits=\"false\">\u2211</mo><mrow><msub><mi>i</mi><mn>1</mn></msub><mo>=</mo><mn>1</mn></mrow><msub><mi>n</mi><mn>1</mn></msub></munderover><mrow><msub><mi>\u03D5</mi><mrow><mn>1</mn><mo>,</mo><msub><mi>i</mi><mn>2</mn></msub><mo>,</mo><msub><mi>i</mi><mn>1</mn></msub></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo>(</mo><mrow><munderover><mo
        lspace=\"0em\" movablelimits=\"false\">\u2211</mo><mrow><msub><mi>i</mi><mn>0</mn></msub><mo>=</mo><mn>1</mn></mrow><msub><mi>n</mi><mn>0</mn></msub></munderover><mrow><msub><mi>\u03D5</mi><mrow><mn>0</mn><mo>,</mo><msub><mi>i</mi><mn>1</mn></msub><mo>,</mo><msub><mi>i</mi><mn>0</mn></msub></mrow></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><msub><mi>i</mi><mn>0</mn></msub></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><mo>)</mo></mrow></mrow></mrow><mo>)</mo></mrow></mrow></mrow><mo>)</mo></mrow><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi mathvariant=\"normal\">\u22EF</mi></mrow></mrow><mo>)</mo></mrow></mrow></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">f(\\mathbf{x})=\\sum_{i_{L-1}=1}^{n_{L-1}}\\phi_{L-1,i_{L},i_{L-1}}\\left(\\sum_{i_{L-2}=1}^{n_{L-2}}\\cdots\\left(\\sum_{i_{2}=1}^{n_{2}}\\phi_{2,i_{3},i_{2}}\\left(\\sum_{i_{1}=1}^{n_{1}}\\phi_{1,i_{2},i_{1}}\\left(\\sum_{i_{0}=1}^{n_{0}}\\phi_{0,i_{1},i_{0}}(x_{i_{0}})\\right)\\right)\\right)\\cdots\\right),</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.8)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS2.p4.26\"
        class=\"ltx_p\">which is quite cumbersome. In contrast, our abstraction of
        KAN layers and their visualizations are cleaner and intuitive. The original
        Kolmogorov-Arnold representation Eq.\_(<a href=\"#S2.E1\" title=\"In 2.1 Kolmogorov-Arnold
        Representation theorem \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023
        KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">2.1</span></a>) corresponds to a 2-Layer KAN with shape <math
        id=\"S2.SS2.p4.24.m1\" class=\"ltx_Math\" alttext=\"[n,2n+1,1]\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mi>n</mi><mo>,</mo><mrow><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi></mrow><mo>+</mo><mn>1</mn></mrow><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[n,2n+1,1]</annotation></semantics></math>.
        Notice that all the operations are differentiable, so we can train KANs with
        back propagation. For comparison, an MLP can be written as interleaving of
        affine transformations <math id=\"S2.SS2.p4.25.m2\" class=\"ltx_Math\" alttext=\"\\mathbf{W}\"
        display=\"inline\" intent=\":literal\"><semantics><mi>\U0001D416</mi><annotation
        encoding=\"application/x-tex\">\\mathbf{W}</annotation></semantics></math>
        and non-linearities <math id=\"S2.SS2.p4.26.m3\" class=\"ltx_Math\" alttext=\"\\sigma\"
        display=\"inline\" intent=\":literal\"><semantics><mi>\u03C3</mi><annotation
        encoding=\"application/x-tex\">\\sigma</annotation></semantics></math>:</p>\n<table
        id=\"S2.E9\" class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_eqn_cell ltx_align_center\"><math id=\"S2.E9.m1\" class=\"ltx_Math\"
        alttext=\"{\\rm MLP}(\\mathbf{x})=(\\mathbf{W}_{L-1}\\circ\\sigma\\circ\\mathbf{W}_{L-2}\\circ\\sigma\\circ\\cdots\\circ\\mathbf{W}_{1}\\circ\\sigma\\circ\\mathbf{W}_{0})\\mathbf{x}.\"
        display=\"block\" intent=\":literal\"><semantics><mrow><mrow><mrow><mi>MLP</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\U0001D431</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mrow><mo stretchy=\"false\">(</mo><mrow><msub><mi>\U0001D416</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi>\u03C3</mi><mo lspace=\"0.222em\"
        rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D416</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>2</mn></mrow></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi>\u03C3</mi><mo lspace=\"0.222em\"
        rspace=\"0.222em\">\u2218</mo><mi mathvariant=\"normal\">\u22EF</mi><mo lspace=\"0.222em\"
        rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D416</mi><mn>1</mn></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi>\u03C3</mi><mo lspace=\"0.222em\"
        rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D416</mi><mn>0</mn></msub></mrow><mo
        stretchy=\"false\">)</mo></mrow><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\U0001D431</mi></mrow></mrow><mo
        lspace=\"0em\">.</mo></mrow><annotation encoding=\"application/x-tex\">{\\rm
        MLP}(\\mathbf{x})=(\\mathbf{W}_{L-1}\\circ\\sigma\\circ\\mathbf{W}_{L-2}\\circ\\sigma\\circ\\cdots\\circ\\mathbf{W}_{1}\\circ\\sigma\\circ\\mathbf{W}_{0})\\mathbf{x}.</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.9)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS2.p4.29\"
        class=\"ltx_p\">It is clear that MLPs treat linear transformations and nonlinearities
        separately as <math id=\"S2.SS2.p4.27.m1\" class=\"ltx_Math\" alttext=\"\\mathbf{W}\"
        display=\"inline\" intent=\":literal\"><semantics><mi>\U0001D416</mi><annotation
        encoding=\"application/x-tex\">\\mathbf{W}</annotation></semantics></math>
        and <math id=\"S2.SS2.p4.28.m2\" class=\"ltx_Math\" alttext=\"\\sigma\" display=\"inline\"
        intent=\":literal\"><semantics><mi>\u03C3</mi><annotation encoding=\"application/x-tex\">\\sigma</annotation></semantics></math>,
        while KANs treat them all together in <math id=\"S2.SS2.p4.29.m3\" class=\"ltx_Math\"
        alttext=\"\\mathbf{\\Phi}\" display=\"inline\" intent=\":literal\"><semantics><mi>\U0001D6BD</mi><annotation
        encoding=\"application/x-tex\">\\mathbf{\\Phi}</annotation></semantics></math>.
        In Figure\_<span class=\"ltx_ref ltx_missing_label ltx_ref_self\">LABEL:fig:kan_mlp</span>
        (c) and (d), we visualize a three-layer MLP and a three-layer KAN, to clarify
        their differences.</p>\n</div>\n<div id=\"S2.SS2.p5\" class=\"ltx_para\">\n<p
        id=\"S2.SS2.p5.1\" class=\"ltx_p\"><span id=\"S2.SS2.p5.1.1\" class=\"ltx_text
        ltx_font_bold\">Implementation details.</span>\nAlthough a KAN layer Eq.\_(<a
        href=\"#S2.E5\" title=\"In 2.2 KAN architecture \u2023 2 Kolmogorov\u2013Arnold
        Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.5</span></a>) looks extremely simple, it
        is non-trivial to make it well optimizable. The key tricks are:</p>\n<ol id=\"S2.I1\"
        class=\"ltx_enumerate\">\n<li id=\"S2.I1.i1\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(1)</span> \n<div id=\"S2.I1.i1.p1\" class=\"ltx_para\">\n<p
        id=\"S2.I1.i1.p1.3\" class=\"ltx_p\">Residual activation functions. We include
        a basis function <math id=\"S2.I1.i1.p1.1.m1\" class=\"ltx_Math\" alttext=\"b(x)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>b</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">b(x)</annotation></semantics></math>
        (similar to residual connections) such that the activation function <math
        id=\"S2.I1.i1.p1.2.m2\" class=\"ltx_Math\" alttext=\"\\phi(x)\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>\u03D5</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>x</mi><mo stretchy=\"false\">)</mo></mrow></mrow><annotation
        encoding=\"application/x-tex\">\\phi(x)</annotation></semantics></math> is
        the sum of the basis function <math id=\"S2.I1.i1.p1.3.m3\" class=\"ltx_Math\"
        alttext=\"b(x)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>b</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">b(x)</annotation></semantics></math>
        and the spline function:</p>\n<table id=\"A6.EGx5\" class=\"ltx_equationgroup
        ltx_eqn_align ltx_eqn_table\">\n\n<tbody id=\"S2.E10\"><tr class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_td ltx_align_right ltx_eqn_cell\"><math id=\"S2.E10.m1\" class=\"ltx_Math\"
        alttext=\"\\displaystyle\\phi(x)=w_{b}b(x)+w_{s}{\\rm spline}(x).\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mrow><mi>\u03D5</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mrow><msub><mi>w</mi><mi>b</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>b</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>x</mi><mo stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><mrow><msub><mi>w</mi><mi>s</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>spline</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><mo lspace=\"0em\">.</mo></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle\\phi(x)=w_{b}b(x)+w_{s}{\\rm
        spline}(x).</annotation></semantics></math></td>\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell ltx_eqn_eqno
        ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.10)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.I1.i1.p1.10\"
        class=\"ltx_p\">We set</p>\n<table id=\"A6.EGx6\" class=\"ltx_equationgroup
        ltx_eqn_align ltx_eqn_table\">\n\n<tbody id=\"S2.E11\"><tr class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_td ltx_align_right ltx_eqn_cell\"><math id=\"S2.E11.m1\" class=\"ltx_Math\"
        alttext=\"\\displaystyle b(x)={\\rm silu}(x)=x/(1+e^{-x})\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mi>b</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>x</mi><mo stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>silu</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>x</mi><mo>/</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mn>1</mn><mo>+</mo><msup><mi>e</mi><mrow><mo>\u2212</mo><mi>x</mi></mrow></msup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">\\displaystyle
        b(x)={\\rm silu}(x)=x/(1+e^{-x})</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.11)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.I1.i1.p1.4\"
        class=\"ltx_p\">in most cases. <math id=\"S2.I1.i1.p1.4.m1\" class=\"ltx_Math\"
        alttext=\"{\\rm spline}(x)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>spline</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">{\\rm
        spline}(x)</annotation></semantics></math> is parametrized as a linear combination
        of B-splines such that</p>\n<table id=\"A6.EGx7\" class=\"ltx_equationgroup
        ltx_eqn_align ltx_eqn_table\">\n\n<tbody id=\"S2.E12\"><tr class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_td ltx_align_right ltx_eqn_cell\"><math id=\"S2.E12.m1\" class=\"ltx_Math\"
        alttext=\"\\displaystyle{\\rm spline}(x)=\\sum_{i}c_{i}B_{i}(x)\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mi>spline</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mstyle displaystyle=\"true\"><munder><mo
        movablelimits=\"false\">\u2211</mo><mi>i</mi></munder></mstyle><mrow><msub><mi>c</mi><mi>i</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>B</mi><mi>i</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">\\displaystyle{\\rm
        spline}(x)=\\sum_{i}c_{i}B_{i}(x)</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.12)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.I1.i1.p1.9\"
        class=\"ltx_p\">where <math id=\"S2.I1.i1.p1.5.m1\" class=\"ltx_Math\" alttext=\"c_{i}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>c</mi><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">c_{i}</annotation></semantics></math>s are
        trainable (see Figure\_<a href=\"#S2.F2\" title=\"Figure 2.2 \u2023 2.2 KAN
        architecture \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.2</span></a>
        for an illustration). In principle <math id=\"S2.I1.i1.p1.6.m2\" class=\"ltx_Math\"
        alttext=\"w_{b}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>w</mi><mi>b</mi></msub><annotation
        encoding=\"application/x-tex\">w_{b}</annotation></semantics></math> and <math
        id=\"S2.I1.i1.p1.7.m3\" class=\"ltx_Math\" alttext=\"w_{s}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>w</mi><mi>s</mi></msub><annotation
        encoding=\"application/x-tex\">w_{s}</annotation></semantics></math> are redundant
        since it can be absorbed into <math id=\"S2.I1.i1.p1.8.m4\" class=\"ltx_Math\"
        alttext=\"b(x)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>b</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">b(x)</annotation></semantics></math>
        and <math id=\"S2.I1.i1.p1.9.m5\" class=\"ltx_Math\" alttext=\"{\\rm spline}(x)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>spline</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">{\\rm
        spline}(x)</annotation></semantics></math>. However, we still include these
        factors (which are by default trainable) to better control the overall magnitude
        of the activation function.</p>\n</div>\n</li>\n<li id=\"S2.I1.i2\" class=\"ltx_item\"
        style=\"list-style-type:none;\">\n<span class=\"ltx_tag ltx_tag_item\">(2)</span>
        \n<div id=\"S2.I1.i2.p1\" class=\"ltx_para\">\n<p id=\"S2.I1.i2.p1.3\" class=\"ltx_p\">Initialization
        scales. Each activation function is initialized to have <math id=\"S2.I1.i2.p1.1.m1\"
        class=\"ltx_Math\" alttext=\"w_{s}=1\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>w</mi><mi>s</mi></msub><mo>=</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">w_{s}=1</annotation></semantics></math> and
        <math id=\"S2.I1.i2.p1.2.m2\" class=\"ltx_Math\" alttext=\"{\\rm spline}(x)\\approx
        0\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>spline</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>\u2248</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">{\\rm spline}(x)\\approx 0</annotation></semantics></math>\_<span
        id=\"footnote1\" class=\"ltx_note ltx_role_footnote\"><sup class=\"ltx_note_mark\">1</sup><span
        class=\"ltx_note_outer\"><span class=\"ltx_note_content\"><sup class=\"ltx_note_mark\">1</sup><span
        class=\"ltx_tag ltx_tag_note\">1</span>This is done by drawing B-spline coefficients
        <math id=\"footnote1.m1\" class=\"ltx_Math\" alttext=\"c_{i}\\sim\\mathcal{N}(0,\\sigma^{2})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>c</mi><mi>i</mi></msub><mo>\u223C</mo><mrow><mi
        class=\"ltx_font_mathcaligraphic\">\U0001D4A9</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mn>0</mn><mo>,</mo><msup><mi>\u03C3</mi><mn>2</mn></msup><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">c_{i}\\sim\\mathcal{N}(0,\\sigma^{2})</annotation></semantics></math>
        with a small <math id=\"footnote1.m2\" class=\"ltx_Math\" alttext=\"\\sigma\"
        display=\"inline\" intent=\":literal\"><semantics><mi>\u03C3</mi><annotation
        encoding=\"application/x-tex\">\\sigma</annotation></semantics></math>, typically
        we set <math id=\"footnote1.m3\" class=\"ltx_Math\" alttext=\"\\sigma=0.1\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03C3</mi><mo>=</mo><mn>0.1</mn></mrow><annotation
        encoding=\"application/x-tex\">\\sigma=0.1</annotation></semantics></math>.</span></span></span>.
        <math id=\"S2.I1.i2.p1.3.m3\" class=\"ltx_Math\" alttext=\"w_{b}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>w</mi><mi>b</mi></msub><annotation
        encoding=\"application/x-tex\">w_{b}</annotation></semantics></math> is initialized
        according to the Xavier initialization, which has been used to initialize
        linear layers in MLPs.</p>\n</div>\n</li>\n<li id=\"S2.I1.i3\" class=\"ltx_item\"
        style=\"list-style-type:none;\">\n<span class=\"ltx_tag ltx_tag_item\">(3)</span>
        \n<div id=\"S2.I1.i3.p1\" class=\"ltx_para\">\n<p id=\"S2.I1.i3.p1.1\" class=\"ltx_p\">Update
        of spline grids. We update each grid on the fly according to its input activations,
        to address the issue that splines are defined on bounded regions but activation
        values can evolve out of the fixed region during training\_<span id=\"footnote2\"
        class=\"ltx_note ltx_role_footnote\"><sup class=\"ltx_note_mark\">2</sup><span
        class=\"ltx_note_outer\"><span class=\"ltx_note_content\"><sup class=\"ltx_note_mark\">2</sup><span
        class=\"ltx_tag ltx_tag_note\">2</span>Other possibilities are: (a) the grid
        is learnable with gradient descent, e.g., <cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib22\" title=\"\" class=\"ltx_ref\">22</a>]</cite>; (b) use normalization
        such that the input range is fixed. We tried (b) at first but its performance
        is inferior to our current approach.</span></span></span>.</p>\n</div>\n</li>\n</ol>\n</div>\n<div
        id=\"S2.SS2.p6\" class=\"ltx_para\">\n<p id=\"S2.SS2.p6.7\" class=\"ltx_p\"><span
        id=\"S2.SS2.p6.7.1\" class=\"ltx_text ltx_font_bold\">Parameter count.</span>
        For simplicity, let us assume a network</p>\n<ol id=\"S2.I2\" class=\"ltx_enumerate\">\n<li
        id=\"S2.I2.i1\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(1)</span> \n<div id=\"S2.I2.i1.p1\" class=\"ltx_para\">\n<p
        id=\"S2.I2.i1.p1.1\" class=\"ltx_p\">of depth <math id=\"S2.I2.i1.p1.1.m1\"
        class=\"ltx_Math\" alttext=\"L\" display=\"inline\" intent=\":literal\"><semantics><mi>L</mi><annotation
        encoding=\"application/x-tex\">L</annotation></semantics></math>,</p>\n</div>\n</li>\n<li
        id=\"S2.I2.i2\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(2)</span> \n<div id=\"S2.I2.i2.p1\" class=\"ltx_para\">\n<p
        id=\"S2.I2.i2.p1.1\" class=\"ltx_p\">with layers of equal width <math id=\"S2.I2.i2.p1.1.m1\"
        class=\"ltx_Math\" alttext=\"n_{0}=n_{1}=\\cdots=n_{L}=N\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><msub><mi>n</mi><mn>0</mn></msub><mo>=</mo><msub><mi>n</mi><mn>1</mn></msub><mo>=</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>=</mo><msub><mi>n</mi><mi>L</mi></msub><mo>=</mo><mi>N</mi></mrow><annotation
        encoding=\"application/x-tex\">n_{0}=n_{1}=\\cdots=n_{L}=N</annotation></semantics></math>,</p>\n</div>\n</li>\n<li
        id=\"S2.I2.i3\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(3)</span> \n<div id=\"S2.I2.i3.p1\" class=\"ltx_para\">\n<p
        id=\"S2.I2.i3.p1.4\" class=\"ltx_p\">with each spline of order <math id=\"S2.I2.i3.p1.1.m1\"
        class=\"ltx_Math\" alttext=\"k\" display=\"inline\" intent=\":literal\"><semantics><mi>k</mi><annotation
        encoding=\"application/x-tex\">k</annotation></semantics></math> (usually
        <math id=\"S2.I2.i3.p1.2.m2\" class=\"ltx_Math\" alttext=\"k=3\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>k</mi><mo>=</mo><mn>3</mn></mrow><annotation
        encoding=\"application/x-tex\">k=3</annotation></semantics></math>) on <math
        id=\"S2.I2.i3.p1.3.m3\" class=\"ltx_Math\" alttext=\"G\" display=\"inline\"
        intent=\":literal\"><semantics><mi>G</mi><annotation encoding=\"application/x-tex\">G</annotation></semantics></math>
        intervals (for <math id=\"S2.I2.i3.p1.4.m4\" class=\"ltx_Math\" alttext=\"G+1\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>G</mi><mo>+</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">G+1</annotation></semantics></math> grid points).</p>\n</div>\n</li>\n</ol>\n<p
        id=\"S2.SS2.p6.6\" class=\"ltx_p\">Then there are in total <math id=\"S2.SS2.p6.1.m1\"
        class=\"ltx_Math\" alttext=\"O(N^{2}L(G+k))\\sim O(N^{2}LG)\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mi>O</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><msup><mi>N</mi><mn>2</mn></msup><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mi>L</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>G</mi><mo>+</mo><mi>k</mi></mrow><mo stretchy=\"false\">)</mo></mrow></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>\u223C</mo><mrow><mi>O</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><msup><mi>N</mi><mn>2</mn></msup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>L</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>G</mi></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">O(N^{2}L(G+k))\\sim
        O(N^{2}LG)</annotation></semantics></math> parameters. In contrast, an MLP
        with depth <math id=\"S2.SS2.p6.2.m2\" class=\"ltx_Math\" alttext=\"L\" display=\"inline\"
        intent=\":literal\"><semantics><mi>L</mi><annotation encoding=\"application/x-tex\">L</annotation></semantics></math>
        and width <math id=\"S2.SS2.p6.3.m3\" class=\"ltx_Math\" alttext=\"N\" display=\"inline\"
        intent=\":literal\"><semantics><mi>N</mi><annotation encoding=\"application/x-tex\">N</annotation></semantics></math>
        only needs <math id=\"S2.SS2.p6.4.m4\" class=\"ltx_Math\" alttext=\"O(N^{2}L)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>O</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><msup><mi>N</mi><mn>2</mn></msup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>L</mi></mrow><mo stretchy=\"false\">)</mo></mrow></mrow><annotation
        encoding=\"application/x-tex\">O(N^{2}L)</annotation></semantics></math> parameters,
        which appears to be more efficient than KAN. Fortunately, KANs usually require
        much smaller <math id=\"S2.SS2.p6.5.m5\" class=\"ltx_Math\" alttext=\"N\"
        display=\"inline\" intent=\":literal\"><semantics><mi>N</mi><annotation encoding=\"application/x-tex\">N</annotation></semantics></math>
        than MLPs, which not only saves parameters, but also achieves better generalization
        (see e.g., Figure\_<a href=\"#S3.F1\" title=\"Figure 3.1 \u2023 3.1 Toy datasets
        \u2023 3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">3.1</span></a> and\_<a href=\"#S3.F3\" title=\"Figure
        3.3 \u2023 3.4 Solving partial differential equations \u2023 3 KANs are accurate
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">3.3</span></a>) and facilitates interpretability.\nWe remark
        that for 1D problems, we can take <math id=\"S2.SS2.p6.6.m6\" class=\"ltx_Math\"
        alttext=\"N=L=1\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>N</mi><mo>=</mo><mi>L</mi><mo>=</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">N=L=1</annotation></semantics></math> and the
        KAN network in our implementation is nothing but a spline approximation. For
        higher dimensions, we characterize the generalization behavior of KANs with
        a theorem below.</p>\n</div>\n</section>\n<section id=\"S2.SS3\" class=\"ltx_subsection\">\n<h3
        class=\"ltx_title ltx_title_subsection\">\n<span class=\"ltx_tag ltx_tag_subsection\">2.3
        </span>KAN\u2019s Approximation Abilities and Scaling Laws</h3>\n\n<div id=\"S2.SS3.p1\"
        class=\"ltx_para\">\n<p id=\"S2.SS3.p1.1\" class=\"ltx_p\">Recall that in
        Eq.\_(<a href=\"#S2.E1\" title=\"In 2.1 Kolmogorov-Arnold Representation theorem
        \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.1</span></a>),
        the 2-Layer width-<math id=\"S2.SS3.p1.1.m1\" class=\"ltx_Math\" alttext=\"(2n+1)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">(</mo><mrow><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi></mrow><mo>+</mo><mn>1</mn></mrow><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(2n+1)</annotation></semantics></math>
        representation may be non-smooth. However, deeper representations may bring
        the advantages of smoother activations. For example, the 4-variable function</p>\n<table
        id=\"A6.EGx8\" class=\"ltx_equationgroup ltx_eqn_align ltx_eqn_table\">\n\n<tbody
        id=\"S2.E13\"><tr class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_align_right
        ltx_eqn_cell\"><math id=\"S2.E13.m1\" class=\"ltx_Math\" alttext=\"\\displaystyle
        f(x_{1},x_{2},x_{3},x_{4})=\\exp\\left({\\sin}(x_{1}^{2}+x_{2}^{2})+{\\sin}(x_{3}^{2}+x_{4}^{2})\\right)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><msub><mi>x</mi><mn>3</mn></msub><mo>,</mo><msub><mi>x</mi><mn>4</mn></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>exp</mi><mo>\u2061</mo><mrow><mo>(</mo><mrow><mrow><mi>sin</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><msubsup><mi>x</mi><mn>1</mn><mn>2</mn></msubsup><mo>+</mo><msubsup><mi>x</mi><mn>2</mn><mn>2</mn></msubsup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><mrow><mi>sin</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><msubsup><mi>x</mi><mn>3</mn><mn>2</mn></msubsup><mo>+</mo><msubsup><mi>x</mi><mn>4</mn><mn>2</mn></msubsup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><mo>)</mo></mrow></mrow></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle f(x_{1},x_{2},x_{3},x_{4})=\\exp\\left({\\sin}(x_{1}^{2}+x_{2}^{2})+{\\sin}(x_{3}^{2}+x_{4}^{2})\\right)</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.13)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS3.p1.6\"
        class=\"ltx_p\">can be smoothly represented by a <math id=\"S2.SS3.p1.2.m1\"
        class=\"ltx_Math\" alttext=\"[4,2,1,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>4</mn><mo>,</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[4,2,1,1]</annotation></semantics></math>
        KAN which is 3-Layer, but may not admit a 2-Layer KAN with smooth activations.
        To facilitate an approximation analysis, we still assume smoothness of activations,
        but allow the representations to be arbitrarily wide and deep, as in Eq.\_(<a
        href=\"#S2.E7\" title=\"In 2.2 KAN architecture \u2023 2 Kolmogorov\u2013Arnold
        Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.7</span></a>).\nTo emphasize the dependence
        of our KAN on the finite set of grid points, we use <math id=\"S2.SS3.p1.3.m2\"
        class=\"ltx_Math\" alttext=\"\\mathbf{\\Phi}_{l}^{G}\" display=\"inline\"
        intent=\":literal\"><semantics><msubsup><mi>\U0001D6BD</mi><mi>l</mi><mi>G</mi></msubsup><annotation
        encoding=\"application/x-tex\">\\mathbf{\\Phi}_{l}^{G}</annotation></semantics></math>
        and <math id=\"S2.SS3.p1.4.m3\" class=\"ltx_Math\" alttext=\"\\Phi_{l,i,j}^{G}\"
        display=\"inline\" intent=\":literal\"><semantics><msubsup><mi mathvariant=\"normal\">\u03A6</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi><mo>,</mo><mi>j</mi></mrow><mi>G</mi></msubsup><annotation
        encoding=\"application/x-tex\">\\Phi_{l,i,j}^{G}</annotation></semantics></math>
        below to replace the notation <math id=\"S2.SS3.p1.5.m4\" class=\"ltx_Math\"
        alttext=\"\\mathbf{\\Phi}_{l}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>\U0001D6BD</mi><mi>l</mi></msub><annotation
        encoding=\"application/x-tex\">\\mathbf{\\Phi}_{l}</annotation></semantics></math>
        and <math id=\"S2.SS3.p1.6.m5\" class=\"ltx_Math\" alttext=\"\\Phi_{l,i,j}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi mathvariant=\"normal\">\u03A6</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi><mo>,</mo><mi>j</mi></mrow></msub><annotation
        encoding=\"application/x-tex\">\\Phi_{l,i,j}</annotation></semantics></math>
        used in Eq.\_(<a href=\"#S2.E5\" title=\"In 2.2 KAN architecture \u2023 2
        Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.5</span></a>) and
        (<a href=\"#S2.E6\" title=\"In 2.2 KAN architecture \u2023 2 Kolmogorov\u2013Arnold
        Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.6</span></a>).</p>\n</div>\n<div id=\"S2.Thmtheorem1\"
        class=\"ltx_theorem ltx_theorem_theorem\">\n<h6 class=\"ltx_title ltx_runin
        ltx_title_theorem\">\n<span class=\"ltx_tag ltx_tag_theorem\"><span id=\"S2.Thmtheorem1.1.1.1\"
        class=\"ltx_text ltx_font_bold\">Theorem 2.1</span></span><span id=\"S2.Thmtheorem1.2.2\"
        class=\"ltx_text ltx_font_bold\"> </span>(Approximation theory, KAT)<span
        id=\"S2.Thmtheorem1.3.3\" class=\"ltx_text ltx_font_bold\">.</span>\n</h6>\n<div
        id=\"S2.Thmtheorem1.p1\" class=\"ltx_para\">\n<p id=\"S2.Thmtheorem1.p1.2\"
        class=\"ltx_p\"><span id=\"S2.Thmtheorem1.p1.2.2\" class=\"ltx_text ltx_font_italic\">Let
        <math id=\"S2.Thmtheorem1.p1.1.1.m1\" class=\"ltx_Math\" alttext=\"\\mathbf{x}=(x_{1},x_{2},\\cdots,x_{n})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\U0001D431</mi><mo>=</mo><mrow><mo
        stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>x</mi><mi>n</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">\\mathbf{x}=(x_{1},x_{2},\\cdots,x_{n})</annotation></semantics></math>.\nSuppose
        that a function <math id=\"S2.Thmtheorem1.p1.2.2.m2\" class=\"ltx_Math\" alttext=\"f(\\mathbf{x})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>f</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\U0001D431</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">f(\\mathbf{x})</annotation></semantics></math>
        admits a representation</span></p>\n<table id=\"S2.E14\" class=\"ltx_equation
        ltx_eqn_table\">\n\n<tbody><tr class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_eqn_cell
        ltx_align_center\"><math id=\"S2.E14.m1\" class=\"ltx_Math\" alttext=\"f=(\\mathbf{\\Phi}_{L-1}\\circ\\mathbf{\\Phi}_{L-2}\\circ\\cdots\\circ\\mathbf{\\Phi}_{1}\\circ\\mathbf{\\Phi}_{0})\\mathbf{x}\\,,\"
        display=\"block\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo>=</mo><mrow><mrow><mo
        stretchy=\"false\">(</mo><mrow><msub><mi>\U0001D6BD</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>2</mn></mrow></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi mathvariant=\"normal\">\u22EF</mi><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mn>1</mn></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mn>0</mn></msub></mrow><mo
        stretchy=\"false\">)</mo></mrow><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\U0001D431</mi></mrow></mrow><mo
        lspace=\"0.170em\">,</mo></mrow><annotation encoding=\"application/x-tex\">f=(\\mathbf{\\Phi}_{L-1}\\circ\\mathbf{\\Phi}_{L-2}\\circ\\cdots\\circ\\mathbf{\\Phi}_{1}\\circ\\mathbf{\\Phi}_{0})\\mathbf{x}\\,,</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.14)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.Thmtheorem1.p1.10\"
        class=\"ltx_p\"><span id=\"S2.Thmtheorem1.p1.10.8\" class=\"ltx_text ltx_font_italic\">as
        in Eq.\_(<a href=\"#S2.E7\" title=\"In 2.2 KAN architecture \u2023 2 Kolmogorov\u2013Arnold
        Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.7</span></a>), where each one of the <math
        id=\"S2.Thmtheorem1.p1.3.1.m1\" class=\"ltx_Math\" alttext=\"\\Phi_{l,i,j}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi mathvariant=\"normal\">\u03A6</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi><mo>,</mo><mi>j</mi></mrow></msub><annotation
        encoding=\"application/x-tex\">\\Phi_{l,i,j}</annotation></semantics></math>
        are <math id=\"S2.Thmtheorem1.p1.4.2.m2\" class=\"ltx_Math\" alttext=\"(k+1)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">(</mo><mrow><mi>k</mi><mo>+</mo><mn>1</mn></mrow><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(k+1)</annotation></semantics></math>-times
        continuously differentiable. Then there exists a constant <math id=\"S2.Thmtheorem1.p1.5.3.m3\"
        class=\"ltx_Math\" alttext=\"C\" display=\"inline\" intent=\":literal\"><semantics><mi>C</mi><annotation
        encoding=\"application/x-tex\">C</annotation></semantics></math> depending
        on <math id=\"S2.Thmtheorem1.p1.6.4.m4\" class=\"ltx_Math\" alttext=\"f\"
        display=\"inline\" intent=\":literal\"><semantics><mi>f</mi><annotation encoding=\"application/x-tex\">f</annotation></semantics></math>
        and its representation, such that we have the following approximation bound
        in terms of the grid size <math id=\"S2.Thmtheorem1.p1.7.5.m5\" class=\"ltx_Math\"
        alttext=\"G\" display=\"inline\" intent=\":literal\"><semantics><mi>G</mi><annotation
        encoding=\"application/x-tex\">G</annotation></semantics></math>: there exist
        <math id=\"S2.Thmtheorem1.p1.8.6.m6\" class=\"ltx_Math\" alttext=\"k\" display=\"inline\"
        intent=\":literal\"><semantics><mi>k</mi><annotation encoding=\"application/x-tex\">k</annotation></semantics></math>-th
        order B-spline functions <math id=\"S2.Thmtheorem1.p1.9.7.m7\" class=\"ltx_Math\"
        alttext=\"\\Phi_{l,i,j}^{G}\" display=\"inline\" intent=\":literal\"><semantics><msubsup><mi
        mathvariant=\"normal\">\u03A6</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi><mo>,</mo><mi>j</mi></mrow><mi>G</mi></msubsup><annotation
        encoding=\"application/x-tex\">\\Phi_{l,i,j}^{G}</annotation></semantics></math>
        such that for any <math id=\"S2.Thmtheorem1.p1.10.8.m8\" class=\"ltx_Math\"
        alttext=\"0\\leq m\\leq k\" display=\"inline\" intent=\":literal\"><semantics><mrow><mn>0</mn><mo>\u2264</mo><mi>m</mi><mo>\u2264</mo><mi>k</mi></mrow><annotation
        encoding=\"application/x-tex\">0\\leq m\\leq k</annotation></semantics></math>,
        we have the bound</span></p>\n<table id=\"S2.E15\" class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr
        class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_eqn_cell ltx_align_center\"><math
        id=\"S2.E15.m1\" class=\"ltx_Math\" alttext=\"\\|f-(\\mathbf{\\Phi}^{G}_{L-1}\\circ\\mathbf{\\Phi}^{G}_{L-2}\\circ\\cdots\\circ\\mathbf{\\Phi}^{G}_{1}\\circ\\mathbf{\\Phi}^{G}_{0})\\mathbf{x}\\|_{C^{m}}\\leq
        CG^{-k-1+m}\\,.\" display=\"block\" intent=\":literal\"><semantics><mrow><mrow><msub><mrow><mo
        stretchy=\"false\">\u2016</mo><mrow><mi>f</mi><mo>\u2212</mo><mrow><mrow><mo
        stretchy=\"false\">(</mo><mrow><msubsup><mi>\U0001D6BD</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow><mi>G</mi></msubsup><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msubsup><mi>\U0001D6BD</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>2</mn></mrow><mi>G</mi></msubsup><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi mathvariant=\"normal\">\u22EF</mi><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msubsup><mi>\U0001D6BD</mi><mn>1</mn><mi>G</mi></msubsup><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msubsup><mi>\U0001D6BD</mi><mn>0</mn><mi>G</mi></msubsup></mrow><mo
        stretchy=\"false\">)</mo></mrow><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\U0001D431</mi></mrow></mrow><mo
        stretchy=\"false\">\u2016</mo></mrow><msup><mi>C</mi><mi>m</mi></msup></msub><mo>\u2264</mo><mrow><mi>C</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msup><mi>G</mi><mrow><mrow><mrow><mo>\u2212</mo><mi>k</mi></mrow><mo>\u2212</mo><mn>1</mn></mrow><mo>+</mo><mi>m</mi></mrow></msup></mrow></mrow><mo
        lspace=\"0em\">.</mo></mrow><annotation encoding=\"application/x-tex\">\\|f-(\\mathbf{\\Phi}^{G}_{L-1}\\circ\\mathbf{\\Phi}^{G}_{L-2}\\circ\\cdots\\circ\\mathbf{\\Phi}^{G}_{1}\\circ\\mathbf{\\Phi}^{G}_{0})\\mathbf{x}\\|_{C^{m}}\\leq
        CG^{-k-1+m}\\,.</annotation></semantics></math></td>\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell ltx_eqn_eqno
        ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.15)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.Thmtheorem1.p1.12\"
        class=\"ltx_p\"><span id=\"S2.Thmtheorem1.p1.12.2\" class=\"ltx_text ltx_font_italic\">Here
        we adopt the notation of <math id=\"S2.Thmtheorem1.p1.11.1.m1\" class=\"ltx_Math\"
        alttext=\"C^{m}\" display=\"inline\" intent=\":literal\"><semantics><msup><mi>C</mi><mi>m</mi></msup><annotation
        encoding=\"application/x-tex\">C^{m}</annotation></semantics></math>-norm
        measuring the magnitude of derivatives up to order <math id=\"S2.Thmtheorem1.p1.12.2.m2\"
        class=\"ltx_Math\" alttext=\"m\" display=\"inline\" intent=\":literal\"><semantics><mi>m</mi><annotation
        encoding=\"application/x-tex\">m</annotation></semantics></math>:</span></p>\n<table
        id=\"S2.Ex1\" class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_eqn_cell ltx_align_center\"><math id=\"S2.Ex1.m1\" class=\"ltx_Math\"
        alttext=\"\\|g\\|_{C^{m}}=\\max_{|\\beta|\\leq m}\\sup_{x\\in[0,1]^{n}}\\left|D^{\\beta}g(x)\\right|.\"
        display=\"block\" intent=\":literal\"><semantics><mrow><mrow><msub><mrow><mo
        stretchy=\"false\">\u2016</mo><mi>g</mi><mo stretchy=\"false\">\u2016</mo></mrow><msup><mi>C</mi><mi>m</mi></msup></msub><mo>=</mo><mrow><munder><mi>max</mi><mrow><mrow><mo
        stretchy=\"false\">|</mo><mi>\u03B2</mi><mo stretchy=\"false\">|</mo></mrow><mo>\u2264</mo><mi>m</mi></mrow></munder><mo
        lspace=\"0.167em\" rspace=\"0em\">\u200B</mo><mrow><munder><mo movablelimits=\"false\"
        rspace=\"0em\">sup</mo><mrow><mi>x</mi><mo>\u2208</mo><msup><mrow><mo stretchy=\"false\">[</mo><mn>0</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><mi>n</mi></msup></mrow></munder><mrow><mo>|</mo><mrow><msup><mi>D</mi><mi>\u03B2</mi></msup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>g</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>x</mi><mo stretchy=\"false\">)</mo></mrow></mrow><mo>|</mo></mrow></mrow></mrow></mrow><mo
        lspace=\"0em\">.</mo></mrow><annotation encoding=\"application/x-tex\">\\|g\\|_{C^{m}}=\\max_{|\\beta|\\leq
        m}\\sup_{x\\in[0,1]^{n}}\\left|D^{\\beta}g(x)\\right|.</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n</tr></tbody>\n</table>\n</div>\n</div>\n<div
        id=\"S2.SS3.1\" class=\"ltx_proof\">\n<h6 class=\"ltx_title ltx_runin ltx_font_italic
        ltx_title_proof\">Proof.</h6>\n<div id=\"S2.SS3.1.p1\" class=\"ltx_para\">\n<p
        id=\"S2.SS3.1.p1.3\" class=\"ltx_p\">By the classical 1D B-spline theory <cite
        class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib23\" title=\"\" class=\"ltx_ref\">23</a>]</cite>
        and the fact that <math id=\"S2.SS3.1.p1.1.m1\" class=\"ltx_Math\" alttext=\"\\Phi_{l,i,j}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi mathvariant=\"normal\">\u03A6</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi><mo>,</mo><mi>j</mi></mrow></msub><annotation
        encoding=\"application/x-tex\">\\Phi_{l,i,j}</annotation></semantics></math>
        as continuous functions can be uniformly bounded on a bounded domain, we know
        that there exist finite-grid B-spline functions <math id=\"S2.SS3.1.p1.2.m2\"
        class=\"ltx_Math\" alttext=\"\\Phi_{l,i,j}^{G}\" display=\"inline\" intent=\":literal\"><semantics><msubsup><mi
        mathvariant=\"normal\">\u03A6</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi><mo>,</mo><mi>j</mi></mrow><mi>G</mi></msubsup><annotation
        encoding=\"application/x-tex\">\\Phi_{l,i,j}^{G}</annotation></semantics></math>
        such that for any <math id=\"S2.SS3.1.p1.3.m3\" class=\"ltx_Math\" alttext=\"0\\leq
        m\\leq k\" display=\"inline\" intent=\":literal\"><semantics><mrow><mn>0</mn><mo>\u2264</mo><mi>m</mi><mo>\u2264</mo><mi>k</mi></mrow><annotation
        encoding=\"application/x-tex\">0\\leq m\\leq k</annotation></semantics></math>,</p>\n<table
        id=\"S2.Ex2\" class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_eqn_cell ltx_align_center\"><math id=\"S2.Ex2.m1\" class=\"ltx_Math\"
        alttext=\"\\|(\\Phi_{l,i,j}\\circ\\mathbf{\\Phi}_{l-1}\\circ\\mathbf{\\Phi}_{l-2}\\circ\\cdots\\circ\\mathbf{\\Phi}_{1}\\circ\\mathbf{\\Phi}_{0})\\mathbf{x}-(\\Phi_{l,i,j}^{G}\\circ\\mathbf{\\Phi}_{l-1}\\circ\\mathbf{\\Phi}_{l-2}\\circ\\cdots\\circ\\mathbf{\\Phi}_{1}\\circ\\mathbf{\\Phi}_{0})\\mathbf{x}\\|_{C^{m}}\\leq
        CG^{-k-1+m}\\,,\" display=\"block\" intent=\":literal\"><semantics><mrow><mrow><msub><mrow><mo
        stretchy=\"false\">\u2016</mo><mrow><mrow><mrow><mo stretchy=\"false\">(</mo><mrow><msub><mi
        mathvariant=\"normal\">\u03A6</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi><mo>,</mo><mi>j</mi></mrow></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mrow><mi>l</mi><mo>\u2212</mo><mn>1</mn></mrow></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mrow><mi>l</mi><mo>\u2212</mo><mn>2</mn></mrow></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi mathvariant=\"normal\">\u22EF</mi><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mn>1</mn></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mn>0</mn></msub></mrow><mo
        stretchy=\"false\">)</mo></mrow><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\U0001D431</mi></mrow><mo>\u2212</mo><mrow><mrow><mo
        stretchy=\"false\">(</mo><mrow><msubsup><mi mathvariant=\"normal\">\u03A6</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi><mo>,</mo><mi>j</mi></mrow><mi>G</mi></msubsup><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mrow><mi>l</mi><mo>\u2212</mo><mn>1</mn></mrow></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mrow><mi>l</mi><mo>\u2212</mo><mn>2</mn></mrow></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi mathvariant=\"normal\">\u22EF</mi><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mn>1</mn></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mn>0</mn></msub></mrow><mo
        stretchy=\"false\">)</mo></mrow><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\U0001D431</mi></mrow></mrow><mo
        stretchy=\"false\">\u2016</mo></mrow><msup><mi>C</mi><mi>m</mi></msup></msub><mo>\u2264</mo><mrow><mi>C</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msup><mi>G</mi><mrow><mrow><mrow><mo>\u2212</mo><mi>k</mi></mrow><mo>\u2212</mo><mn>1</mn></mrow><mo>+</mo><mi>m</mi></mrow></msup></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">\\|(\\Phi_{l,i,j}\\circ\\mathbf{\\Phi}_{l-1}\\circ\\mathbf{\\Phi}_{l-2}\\circ\\cdots\\circ\\mathbf{\\Phi}_{1}\\circ\\mathbf{\\Phi}_{0})\\mathbf{x}-(\\Phi_{l,i,j}^{G}\\circ\\mathbf{\\Phi}_{l-1}\\circ\\mathbf{\\Phi}_{l-2}\\circ\\cdots\\circ\\mathbf{\\Phi}_{1}\\circ\\mathbf{\\Phi}_{0})\\mathbf{x}\\|_{C^{m}}\\leq
        CG^{-k-1+m}\\,,</annotation></semantics></math></td>\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padright\"></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS3.1.p1.6\"
        class=\"ltx_p\">with a constant <math id=\"S2.SS3.1.p1.4.m1\" class=\"ltx_Math\"
        alttext=\"C\" display=\"inline\" intent=\":literal\"><semantics><mi>C</mi><annotation
        encoding=\"application/x-tex\">C</annotation></semantics></math> independent
        of <math id=\"S2.SS3.1.p1.5.m2\" class=\"ltx_Math\" alttext=\"G\" display=\"inline\"
        intent=\":literal\"><semantics><mi>G</mi><annotation encoding=\"application/x-tex\">G</annotation></semantics></math>.
        We fix those B-spline approximations. Therefore we have that the residue <math
        id=\"S2.SS3.1.p1.6.m3\" class=\"ltx_Math\" alttext=\"R_{l}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>R</mi><mi>l</mi></msub><annotation
        encoding=\"application/x-tex\">R_{l}</annotation></semantics></math> defined
        via</p>\n<table id=\"S2.Ex3\" class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr
        class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_eqn_cell ltx_align_center\"><math
        id=\"S2.Ex3.m1\" class=\"ltx_Math\" alttext=\"R_{l}\\coloneqq(\\mathbf{\\Phi}^{G}_{L-1}\\circ\\cdots\\circ\\mathbf{\\Phi}^{G}_{l+1}\\circ\\mathbf{\\Phi}_{l}\\circ\\mathbf{\\Phi}_{l-1}\\circ\\cdots\\circ\\mathbf{\\Phi}_{0})\\mathbf{x}-(\\mathbf{\\Phi}_{L-1}^{G}\\circ\\cdots\\circ\\mathbf{\\Phi}_{l+1}^{G}\\circ\\mathbf{\\Phi}_{l}^{G}\\circ\\mathbf{\\Phi}_{l-1}\\circ\\cdots\\circ\\mathbf{\\Phi}_{0})\\mathbf{x}\"
        display=\"block\" intent=\":literal\"><semantics><mrow><msub><mi>R</mi><mi>l</mi></msub><mo>\u2254</mo><mrow><mrow><mrow><mo
        stretchy=\"false\">(</mo><mrow><msubsup><mi>\U0001D6BD</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow><mi>G</mi></msubsup><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi mathvariant=\"normal\">\u22EF</mi><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msubsup><mi>\U0001D6BD</mi><mrow><mi>l</mi><mo>+</mo><mn>1</mn></mrow><mi>G</mi></msubsup><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mi>l</mi></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mrow><mi>l</mi><mo>\u2212</mo><mn>1</mn></mrow></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi mathvariant=\"normal\">\u22EF</mi><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mn>0</mn></msub></mrow><mo
        stretchy=\"false\">)</mo></mrow><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\U0001D431</mi></mrow><mo>\u2212</mo><mrow><mrow><mo
        stretchy=\"false\">(</mo><mrow><msubsup><mi>\U0001D6BD</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow><mi>G</mi></msubsup><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi mathvariant=\"normal\">\u22EF</mi><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msubsup><mi>\U0001D6BD</mi><mrow><mi>l</mi><mo>+</mo><mn>1</mn></mrow><mi>G</mi></msubsup><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msubsup><mi>\U0001D6BD</mi><mi>l</mi><mi>G</mi></msubsup><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mrow><mi>l</mi><mo>\u2212</mo><mn>1</mn></mrow></msub><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi mathvariant=\"normal\">\u22EF</mi><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msub><mi>\U0001D6BD</mi><mn>0</mn></msub></mrow><mo
        stretchy=\"false\">)</mo></mrow><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\U0001D431</mi></mrow></mrow></mrow><annotation
        encoding=\"application/x-tex\">R_{l}\\coloneqq(\\mathbf{\\Phi}^{G}_{L-1}\\circ\\cdots\\circ\\mathbf{\\Phi}^{G}_{l+1}\\circ\\mathbf{\\Phi}_{l}\\circ\\mathbf{\\Phi}_{l-1}\\circ\\cdots\\circ\\mathbf{\\Phi}_{0})\\mathbf{x}-(\\mathbf{\\Phi}_{L-1}^{G}\\circ\\cdots\\circ\\mathbf{\\Phi}_{l+1}^{G}\\circ\\mathbf{\\Phi}_{l}^{G}\\circ\\mathbf{\\Phi}_{l-1}\\circ\\cdots\\circ\\mathbf{\\Phi}_{0})\\mathbf{x}</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n</tr></tbody>\n</table>\n<p
        id=\"S2.SS3.1.p1.8\" class=\"ltx_p\">satisfies</p>\n<table id=\"S2.Ex4\" class=\"ltx_equation
        ltx_eqn_table\">\n\n<tbody><tr class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_eqn_cell
        ltx_align_center\"><math id=\"S2.Ex4.m1\" class=\"ltx_Math\" alttext=\"\\|R_{l}\\|_{C^{m}}\\leq
        CG^{-k-1+m}\\,,\" display=\"block\" intent=\":literal\"><semantics><mrow><mrow><msub><mrow><mo
        stretchy=\"false\">\u2016</mo><msub><mi>R</mi><mi>l</mi></msub><mo stretchy=\"false\">\u2016</mo></mrow><msup><mi>C</mi><mi>m</mi></msup></msub><mo>\u2264</mo><mrow><mi>C</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msup><mi>G</mi><mrow><mrow><mrow><mo>\u2212</mo><mi>k</mi></mrow><mo>\u2212</mo><mn>1</mn></mrow><mo>+</mo><mi>m</mi></mrow></msup></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">\\|R_{l}\\|_{C^{m}}\\leq CG^{-k-1+m}\\,,</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n</tr></tbody>\n</table>\n<p
        id=\"S2.SS3.1.p1.7\" class=\"ltx_p\">with a constant independent of <math
        id=\"S2.SS3.1.p1.7.m1\" class=\"ltx_Math\" alttext=\"G\" display=\"inline\"
        intent=\":literal\"><semantics><mi>G</mi><annotation encoding=\"application/x-tex\">G</annotation></semantics></math>.
        Finally notice that</p>\n<table id=\"S2.Ex5\" class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr
        class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_eqn_cell ltx_align_center\"><math
        id=\"S2.Ex5.m1\" class=\"ltx_Math\" alttext=\"f-(\\mathbf{\\Phi}^{G}_{L-1}\\circ\\mathbf{\\Phi}^{G}_{L-2}\\circ\\cdots\\circ\\mathbf{\\Phi}^{G}_{1}\\circ\\mathbf{\\Phi}^{G}_{0})\\mathbf{x}=R_{L-1}+R_{L-2}+\\cdots+R_{1}+R_{0}\\,,\"
        display=\"block\" intent=\":literal\"><semantics><mrow><mrow><mrow><mi>f</mi><mo>\u2212</mo><mrow><mrow><mo
        stretchy=\"false\">(</mo><mrow><msubsup><mi>\U0001D6BD</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow><mi>G</mi></msubsup><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msubsup><mi>\U0001D6BD</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>2</mn></mrow><mi>G</mi></msubsup><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi mathvariant=\"normal\">\u22EF</mi><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msubsup><mi>\U0001D6BD</mi><mn>1</mn><mi>G</mi></msubsup><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><msubsup><mi>\U0001D6BD</mi><mn>0</mn><mi>G</mi></msubsup></mrow><mo
        stretchy=\"false\">)</mo></mrow><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\U0001D431</mi></mrow></mrow><mo>=</mo><mrow><msub><mi>R</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow></msub><mo>+</mo><msub><mi>R</mi><mrow><mi>L</mi><mo>\u2212</mo><mn>2</mn></mrow></msub><mo>+</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>+</mo><msub><mi>R</mi><mn>1</mn></msub><mo>+</mo><msub><mi>R</mi><mn>0</mn></msub></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">f-(\\mathbf{\\Phi}^{G}_{L-1}\\circ\\mathbf{\\Phi}^{G}_{L-2}\\circ\\cdots\\circ\\mathbf{\\Phi}^{G}_{1}\\circ\\mathbf{\\Phi}^{G}_{0})\\mathbf{x}=R_{L-1}+R_{L-2}+\\cdots+R_{1}+R_{0}\\,,</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n</tr></tbody>\n</table>\n<p
        id=\"S2.SS3.1.p1.9\" class=\"ltx_p\">we know that (<a href=\"#S2.E15\" title=\"In
        Theorem 2.1 (Approximation theory, KAT). \u2023 2.3 KAN\u2019s Approximation
        Abilities and Scaling Laws \u2023 2 Kolmogorov\u2013Arnold Networks (KAN)
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">2.15</span></a>) holds.\n\u220E</p>\n</div>\n</div>\n<div id=\"S2.SS3.p2\"
        class=\"ltx_para\">\n<p id=\"S2.SS3.p2.4\" class=\"ltx_p\">We know that asymptotically,
        provided that the assumption in Theorem <a href=\"#S2.Thmtheorem1\" title=\"Theorem
        2.1 (Approximation theory, KAT). \u2023 2.3 KAN\u2019s Approximation Abilities
        and Scaling Laws \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN:
        Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">2.1</span></a> holds, KANs with finite grid size can approximate
        the function well with a residue rate <span id=\"S2.SS3.p2.4.1\" class=\"ltx_text
        ltx_font_bold\">independent of the dimension, hence beating curse of dimensionality!</span>
        This comes naturally since we only use splines to approximate 1D functions.
        In particular, for <math id=\"S2.SS3.p2.1.m1\" class=\"ltx_Math\" alttext=\"m=0\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>m</mi><mo>=</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">m=0</annotation></semantics></math>, we recover
        the accuracy in <math id=\"S2.SS3.p2.2.m2\" class=\"ltx_Math\" alttext=\"L^{\\infty}\"
        display=\"inline\" intent=\":literal\"><semantics><msup><mi>L</mi><mi mathvariant=\"normal\">\u221E</mi></msup><annotation
        encoding=\"application/x-tex\">L^{\\infty}</annotation></semantics></math>
        norm, which in turn provides a bound of RMSE on the finite domain, which gives
        a scaling exponent <math id=\"S2.SS3.p2.3.m3\" class=\"ltx_Math\" alttext=\"k+1\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>k</mi><mo>+</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">k+1</annotation></semantics></math>. Of course,
        the constant <math id=\"S2.SS3.p2.4.m4\" class=\"ltx_Math\" alttext=\"C\"
        display=\"inline\" intent=\":literal\"><semantics><mi>C</mi><annotation encoding=\"application/x-tex\">C</annotation></semantics></math>
        is dependent on the representation; hence it will depend on the dimension.
        We will leave the discussion of the dependence of the constant on the dimension
        as a future work.</p>\n</div>\n<div id=\"S2.SS3.p3\" class=\"ltx_para\">\n<p
        id=\"S2.SS3.p3.1\" class=\"ltx_p\">We remark that although the Kolmogorov-Arnold
        theorem Eq.\_(<a href=\"#S2.E1\" title=\"In 2.1 Kolmogorov-Arnold Representation
        theorem \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.1</span></a>)
        corresponds to a KAN representation with shape <math id=\"S2.SS3.p3.1.m1\"
        class=\"ltx_Math\" alttext=\"[d,2d+1,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mi>d</mi><mo>,</mo><mrow><mrow><mn>2</mn><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mi>d</mi></mrow><mo>+</mo><mn>1</mn></mrow><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[d,2d+1,1]</annotation></semantics></math>,
        its functions are not necessarily smooth. On the other hand, if we are able
        to identify a smooth representation (maybe at the cost of extra layers or
        making the KAN wider than the theory prescribes), then Theorem <a href=\"#S2.Thmtheorem1\"
        title=\"Theorem 2.1 (Approximation theory, KAT). \u2023 2.3 KAN\u2019s Approximation
        Abilities and Scaling Laws \u2023 2 Kolmogorov\u2013Arnold Networks (KAN)
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">2.1</span></a> indicates that we can beat the curse of dimensionality
        (COD). This should not come as a surprise since we can inherently learn the
        structure of the function and make our finite-sample KAN approximation interpretable.</p>\n</div>\n<div
        id=\"S2.SS3.p4\" class=\"ltx_para\">\n<p id=\"S2.SS3.p4.29\" class=\"ltx_p\"><span
        id=\"S2.SS3.p4.29.1\" class=\"ltx_text ltx_font_bold\">Neural scaling laws:
        comparison to other theories.</span> Neural scaling laws are the phenomenon
        where test loss decreases with more model parameters, i.e., <math id=\"S2.SS3.p4.1.m1\"
        class=\"ltx_Math\" alttext=\"\\ell\\propto N^{-\\alpha}\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi mathvariant=\"normal\">\u2113</mi><mo>\u221D</mo><msup><mi>N</mi><mrow><mo>\u2212</mo><mi>\u03B1</mi></mrow></msup></mrow><annotation
        encoding=\"application/x-tex\">\\ell\\propto N^{-\\alpha}</annotation></semantics></math>
        where <math id=\"S2.SS3.p4.2.m2\" class=\"ltx_Math\" alttext=\"\\ell\" display=\"inline\"
        intent=\":literal\"><semantics><mi mathvariant=\"normal\">\u2113</mi><annotation
        encoding=\"application/x-tex\">\\ell</annotation></semantics></math> is test
        RMSE, <math id=\"S2.SS3.p4.3.m3\" class=\"ltx_Math\" alttext=\"N\" display=\"inline\"
        intent=\":literal\"><semantics><mi>N</mi><annotation encoding=\"application/x-tex\">N</annotation></semantics></math>
        is the number of parameters, and <math id=\"S2.SS3.p4.4.m4\" class=\"ltx_Math\"
        alttext=\"\\alpha\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03B1</mi><annotation
        encoding=\"application/x-tex\">\\alpha</annotation></semantics></math> is
        the scaling exponent. A larger <math id=\"S2.SS3.p4.5.m5\" class=\"ltx_Math\"
        alttext=\"\\alpha\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03B1</mi><annotation
        encoding=\"application/x-tex\">\\alpha</annotation></semantics></math> promises
        more improvement by simply scaling up the model. Different theories have been
        proposed to predict <math id=\"S2.SS3.p4.6.m6\" class=\"ltx_Math\" alttext=\"\\alpha\"
        display=\"inline\" intent=\":literal\"><semantics><mi>\u03B1</mi><annotation
        encoding=\"application/x-tex\">\\alpha</annotation></semantics></math>. Sharma
        &amp; Kaplan\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib24\"
        title=\"\" class=\"ltx_ref\">24</a>]</cite> suggest that <math id=\"S2.SS3.p4.7.m7\"
        class=\"ltx_Math\" alttext=\"\\alpha\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03B1</mi><annotation
        encoding=\"application/x-tex\">\\alpha</annotation></semantics></math> comes
        from data fitting on an input manifold of intrinsic dimensionality <math id=\"S2.SS3.p4.8.m8\"
        class=\"ltx_Math\" alttext=\"d\" display=\"inline\" intent=\":literal\"><semantics><mi>d</mi><annotation
        encoding=\"application/x-tex\">d</annotation></semantics></math>. If the model
        function class is piecewise polynomials of order <math id=\"S2.SS3.p4.9.m9\"
        class=\"ltx_Math\" alttext=\"k\" display=\"inline\" intent=\":literal\"><semantics><mi>k</mi><annotation
        encoding=\"application/x-tex\">k</annotation></semantics></math> (<math id=\"S2.SS3.p4.10.m10\"
        class=\"ltx_Math\" alttext=\"k=1\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>k</mi><mo>=</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">k=1</annotation></semantics></math> for ReLU),
        then the standard approximation theory implies <math id=\"S2.SS3.p4.11.m11\"
        class=\"ltx_Math\" alttext=\"\\alpha=(k+1)/d\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03B1</mi><mo>=</mo><mrow><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>k</mi><mo>+</mo><mn>1</mn></mrow><mo stretchy=\"false\">)</mo></mrow><mo>/</mo><mi>d</mi></mrow></mrow><annotation
        encoding=\"application/x-tex\">\\alpha=(k+1)/d</annotation></semantics></math>
        from the approximation theory. This bound suffers from the curse of dimensionality,
        so people have sought other bounds independent of <math id=\"S2.SS3.p4.12.m12\"
        class=\"ltx_Math\" alttext=\"d\" display=\"inline\" intent=\":literal\"><semantics><mi>d</mi><annotation
        encoding=\"application/x-tex\">d</annotation></semantics></math> by leveraging
        compositional structures. In particular, Michaud et al.\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib25\" title=\"\" class=\"ltx_ref\">25</a>]</cite>
        considered computational graphs that only involve unary (e.g., squared, sine,
        exp) and binary (<math id=\"S2.SS3.p4.13.m13\" class=\"ltx_Math\" alttext=\"+\"
        display=\"inline\" intent=\":literal\"><semantics><mo>+</mo><annotation encoding=\"application/x-tex\">+</annotation></semantics></math>
        and <math id=\"S2.SS3.p4.14.m14\" class=\"ltx_Math\" alttext=\"\\times\" display=\"inline\"
        intent=\":literal\"><semantics><mo>\xD7</mo><annotation encoding=\"application/x-tex\">\\times</annotation></semantics></math>)
        operations, finding <math id=\"S2.SS3.p4.15.m15\" class=\"ltx_Math\" alttext=\"\\alpha=(k+1)/d^{*}=(k+1)/2\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03B1</mi><mo>=</mo><mrow><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>k</mi><mo>+</mo><mn>1</mn></mrow><mo stretchy=\"false\">)</mo></mrow><mo>/</mo><msup><mi>d</mi><mo>\u2217</mo></msup></mrow><mo>=</mo><mrow><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>k</mi><mo>+</mo><mn>1</mn></mrow><mo stretchy=\"false\">)</mo></mrow><mo>/</mo><mn>2</mn></mrow></mrow><annotation
        encoding=\"application/x-tex\">\\alpha=(k+1)/d^{*}=(k+1)/2</annotation></semantics></math>,
        where <math id=\"S2.SS3.p4.16.m16\" class=\"ltx_Math\" alttext=\"d^{*}=2\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msup><mi>d</mi><mo>\u2217</mo></msup><mo>=</mo><mn>2</mn></mrow><annotation
        encoding=\"application/x-tex\">d^{*}=2</annotation></semantics></math> is
        the maximum arity. Poggio et al.\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib19\" title=\"\" class=\"ltx_ref\">19</a>]</cite> leveraged
        the idea of compositional sparsity and proved that given function class <math
        id=\"S2.SS3.p4.17.m17\" class=\"ltx_Math\" alttext=\"W_{m}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>W</mi><mi>m</mi></msub><annotation
        encoding=\"application/x-tex\">W_{m}</annotation></semantics></math> (function
        whose derivatives are continuous up to <math id=\"S2.SS3.p4.18.m18\" class=\"ltx_Math\"
        alttext=\"m\" display=\"inline\" intent=\":literal\"><semantics><mi>m</mi><annotation
        encoding=\"application/x-tex\">m</annotation></semantics></math>-th order),
        one needs <math id=\"S2.SS3.p4.19.m19\" class=\"ltx_Math\" alttext=\"N=O(\\epsilon^{-\\frac{2}{m}})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>N</mi><mo>=</mo><mrow><mi>O</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msup><mi>\u03F5</mi><mrow><mo>\u2212</mo><mfrac><mn>2</mn><mi>m</mi></mfrac></mrow></msup><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">N=O(\\epsilon^{-\\frac{2}{m}})</annotation></semantics></math>
        number of parameters to achieve error <math id=\"S2.SS3.p4.20.m20\" class=\"ltx_Math\"
        alttext=\"\\epsilon\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03F5</mi><annotation
        encoding=\"application/x-tex\">\\epsilon</annotation></semantics></math>,
        which is equivalent to <math id=\"S2.SS3.p4.21.m21\" class=\"ltx_Math\" alttext=\"\\alpha=\\frac{m}{2}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03B1</mi><mo>=</mo><mfrac><mi>m</mi><mn>2</mn></mfrac></mrow><annotation
        encoding=\"application/x-tex\">\\alpha=\\frac{m}{2}</annotation></semantics></math>.
        Our approach, which assumes the existence of smooth Kolmogorov-Arnold representations,
        decomposes the high-dimensional function into several 1D functions, giving
        <math id=\"S2.SS3.p4.22.m22\" class=\"ltx_Math\" alttext=\"\\alpha=k+1\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>\u03B1</mi><mo>=</mo><mrow><mi>k</mi><mo>+</mo><mn>1</mn></mrow></mrow><annotation
        encoding=\"application/x-tex\">\\alpha=k+1</annotation></semantics></math>
        (where <math id=\"S2.SS3.p4.23.m23\" class=\"ltx_Math\" alttext=\"k\" display=\"inline\"
        intent=\":literal\"><semantics><mi>k</mi><annotation encoding=\"application/x-tex\">k</annotation></semantics></math>
        is the piecewise polynomial order of the splines). We choose <math id=\"S2.SS3.p4.24.m24\"
        class=\"ltx_Math\" alttext=\"k=3\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>k</mi><mo>=</mo><mn>3</mn></mrow><annotation
        encoding=\"application/x-tex\">k=3</annotation></semantics></math> cubic splines
        so <math id=\"S2.SS3.p4.25.m25\" class=\"ltx_Math\" alttext=\"\\alpha=4\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03B1</mi><mo>=</mo><mn>4</mn></mrow><annotation
        encoding=\"application/x-tex\">\\alpha=4</annotation></semantics></math> which
        is the largest and best scaling exponent compared to other works. We will
        show in Section\_<a href=\"#S3.SS1\" title=\"3.1 Toy datasets \u2023 3 KANs
        are accurate \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">3.1</span></a> that this bound <math id=\"S2.SS3.p4.26.m26\"
        class=\"ltx_Math\" alttext=\"\\alpha=4\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03B1</mi><mo>=</mo><mn>4</mn></mrow><annotation
        encoding=\"application/x-tex\">\\alpha=4</annotation></semantics></math> can
        in fact be achieved empirically with KANs, while previous work\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib25\" title=\"\" class=\"ltx_ref\">25</a>]</cite>
        reported that MLPs have problems even saturating slower bounds (e.g., <math
        id=\"S2.SS3.p4.27.m27\" class=\"ltx_Math\" alttext=\"\\alpha=1\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>\u03B1</mi><mo>=</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">\\alpha=1</annotation></semantics></math>)
        and plateau quickly. Of course, we can increase <math id=\"S2.SS3.p4.28.m28\"
        class=\"ltx_Math\" alttext=\"k\" display=\"inline\" intent=\":literal\"><semantics><mi>k</mi><annotation
        encoding=\"application/x-tex\">k</annotation></semantics></math> to match
        the smoothness of functions, but too high <math id=\"S2.SS3.p4.29.m29\" class=\"ltx_Math\"
        alttext=\"k\" display=\"inline\" intent=\":literal\"><semantics><mi>k</mi><annotation
        encoding=\"application/x-tex\">k</annotation></semantics></math> might be
        too oscillatory, leading to optimization issues.</p>\n</div>\n<div id=\"S2.SS3.p5\"
        class=\"ltx_para\">\n<p id=\"S2.SS3.p5.10\" class=\"ltx_p\"><span id=\"S2.SS3.p5.10.1\"
        class=\"ltx_text ltx_font_bold\">Comparison between KAT and UAT.</span>\nThe
        power of fully-connected neural networks is justified by the universal approximation
        theorem (UAT), which states that given a function and error tolerance <math
        id=\"S2.SS3.p5.1.m1\" class=\"ltx_Math\" alttext=\"\\epsilon&gt;0\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>\u03F5</mi><mo>&gt;</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">\\epsilon&gt;0</annotation></semantics></math>,
        a two-layer network with <math id=\"S2.SS3.p5.2.m2\" class=\"ltx_Math\" alttext=\"k&gt;N(\\epsilon)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>k</mi><mo>&gt;</mo><mrow><mi>N</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03F5</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">k&gt;N(\\epsilon)</annotation></semantics></math>
        neurons can approximate the function within error <math id=\"S2.SS3.p5.3.m3\"
        class=\"ltx_Math\" alttext=\"\\epsilon\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03F5</mi><annotation
        encoding=\"application/x-tex\">\\epsilon</annotation></semantics></math>.
        However, the UAT guarantees no bound for how <math id=\"S2.SS3.p5.4.m4\" class=\"ltx_Math\"
        alttext=\"N(\\epsilon)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>N</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03F5</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">N(\\epsilon)</annotation></semantics></math>
        scales with <math id=\"S2.SS3.p5.5.m5\" class=\"ltx_Math\" alttext=\"\\epsilon\"
        display=\"inline\" intent=\":literal\"><semantics><mi>\u03F5</mi><annotation
        encoding=\"application/x-tex\">\\epsilon</annotation></semantics></math>.
        Indeed, it suffers from the COD, and <math id=\"S2.SS3.p5.6.m6\" class=\"ltx_Math\"
        alttext=\"N\" display=\"inline\" intent=\":literal\"><semantics><mi>N</mi><annotation
        encoding=\"application/x-tex\">N</annotation></semantics></math> has been
        shown to grow exponentially with <math id=\"S2.SS3.p5.7.m7\" class=\"ltx_Math\"
        alttext=\"d\" display=\"inline\" intent=\":literal\"><semantics><mi>d</mi><annotation
        encoding=\"application/x-tex\">d</annotation></semantics></math> in some cases\_<cite
        class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib21\" title=\"\" class=\"ltx_ref\">21</a>]</cite>.
        The difference between KAT and UAT is a consequence that KANs take advantage
        of the intrinsically low-dimensional representation of the function while
        MLPs do not. In KAT, we highlight quantifying the approximation error in the
        compositional space. In the literature, generalization error bounds, taking
        into account finite samples of training data, for a similar space have been
        studied for regression problems; see <cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib26\" title=\"\" class=\"ltx_ref\">26</a>, <a href=\"#bib.bib27\"
        title=\"\" class=\"ltx_ref\">27</a>]</cite>, and also specifically for MLPs
        with ReLU activations <cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib28\"
        title=\"\" class=\"ltx_ref\">28</a>]</cite>. On the other hand, for general
        function spaces like Sobolev or Besov spaces, the nonlinear <math id=\"S2.SS3.p5.8.m8\"
        class=\"ltx_Math\" alttext=\"n\" display=\"inline\" intent=\":literal\"><semantics><mi>n</mi><annotation
        encoding=\"application/x-tex\">n</annotation></semantics></math>-widths theory
        <cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib29\" title=\"\"
        class=\"ltx_ref\">29</a>, <a href=\"#bib.bib30\" title=\"\" class=\"ltx_ref\">30</a>,
        <a href=\"#bib.bib31\" title=\"\" class=\"ltx_ref\">31</a>]</cite> indicates
        that we can never beat the curse of dimensionality, while MLPs with ReLU activations
        can achieve the tight rate <cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib32\" title=\"\" class=\"ltx_ref\">32</a>, <a href=\"#bib.bib33\"
        title=\"\" class=\"ltx_ref\">33</a>, <a href=\"#bib.bib34\" title=\"\" class=\"ltx_ref\">34</a>]</cite>.
        This fact again motivates us to consider functions of compositional structure,
        the much \"nicer\" functions that we encounter in practice and in science,
        to overcome the COD. Compared with MLPs, we may use a smaller architecture
        in practice, since we learn general nonlinear activation functions; see also
        <cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib28\" title=\"\"
        class=\"ltx_ref\">28</a>]</cite> where the depth of the ReLU MLPs needs to
        reach at least <math id=\"S2.SS3.p5.9.m9\" class=\"ltx_Math\" alttext=\"\\log
        n\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>log</mi><mo
        lspace=\"0.167em\">\u2061</mo><mi>n</mi></mrow><annotation encoding=\"application/x-tex\">\\log
        n</annotation></semantics></math> to have the desired rate, where <math id=\"S2.SS3.p5.10.m10\"
        class=\"ltx_Math\" alttext=\"n\" display=\"inline\" intent=\":literal\"><semantics><mi>n</mi><annotation
        encoding=\"application/x-tex\">n</annotation></semantics></math> is the number
        of samples. Indeed, we will show that KANs are nicely aligned with symbolic
        functions while MLPs are not.</p>\n</div>\n</section>\n<section id=\"S2.SS4\"
        class=\"ltx_subsection\">\n<h3 class=\"ltx_title ltx_title_subsection\">\n<span
        class=\"ltx_tag ltx_tag_subsection\">2.4 </span>For accuracy: Grid Extension</h3>\n\n<figure
        id=\"S2.F3\" class=\"ltx_figure\"><img src=\"2404.19756v5/x2.png\" id=\"S2.F3.g1\"
        class=\"ltx_graphics ltx_centering ltx_img_landscape\" width=\"830\" height=\"472\"
        alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption ltx_centering\"><span
        class=\"ltx_tag ltx_tag_figure\">Figure 2.3: </span>We can make KANs more
        accurate by grid extension (fine-graining spline grids). Top left (right):
        training dynamics of a <math id=\"S2.F3.5.m1\" class=\"ltx_Math\" alttext=\"[2,5,1]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>5</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,5,1]</annotation></semantics></math>
        (<math id=\"S2.F3.6.m2\" class=\"ltx_Math\" alttext=\"[2,1,1]\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,1,1]</annotation></semantics></math>)
        KAN. Both models display staircases in their loss curves, i.e., loss suddently
        drops then plateaus after grid extension. Bottom left: test RMSE follows scaling
        laws against grid size <math id=\"S2.F3.7.m3\" class=\"ltx_Math\" alttext=\"G\"
        display=\"inline\" intent=\":literal\"><semantics><mi>G</mi><annotation encoding=\"application/x-tex\">G</annotation></semantics></math>.
        Bottom right: training time scales favorably with grid size <math id=\"S2.F3.8.m4\"
        class=\"ltx_Math\" alttext=\"G\" display=\"inline\" intent=\":literal\"><semantics><mi>G</mi><annotation
        encoding=\"application/x-tex\">G</annotation></semantics></math>.</figcaption>\n</figure>\n<div
        id=\"S2.SS4.p1\" class=\"ltx_para\">\n<p id=\"S2.SS4.p1.1\" class=\"ltx_p\">In
        principle, a spline can be made arbitrarily accurate to a target function
        as the grid can be made arbitrarily fine-grained. This good feature is inherited
        by KANs. By contrast, MLPs do not have the notion of \u201Cfine-graining\u201D.
        Admittedly, increasing the width and depth of MLPs can lead to improvement
        in performance (\u201Cneural scaling laws\u201D). However, these neural scaling
        laws are slow (discussed in the last section). They are also expensive to
        obtain, because models of varying sizes are trained independently. By contrast,
        for KANs, one can first train a KAN with fewer parameters and then extend
        it to a KAN with more parameters by simply making its spline grids finer,
        without the need to retraining the larger model from scratch.</p>\n</div>\n<div
        id=\"S2.SS4.p2\" class=\"ltx_para\">\n<p id=\"S2.SS4.p2.21\" class=\"ltx_p\">We
        next describe how to perform grid extension (illustrated in Figure\_<a href=\"#S2.F2\"
        title=\"Figure 2.2 \u2023 2.2 KAN architecture \u2023 2 Kolmogorov\u2013Arnold
        Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.2</span></a> right), which is basically fitting
        a new fine-grained spline to an old coarse-grained spline. Suppose we want
        to approximate a 1D function <math id=\"S2.SS4.p2.1.m1\" class=\"ltx_Math\"
        alttext=\"f\" display=\"inline\" intent=\":literal\"><semantics><mi>f</mi><annotation
        encoding=\"application/x-tex\">f</annotation></semantics></math> in a bounded
        region <math id=\"S2.SS4.p2.2.m2\" class=\"ltx_Math\" alttext=\"[a,b]\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mi>a</mi><mo>,</mo><mi>b</mi><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[a,b]</annotation></semantics></math>
        with B-splines of order <math id=\"S2.SS4.p2.3.m3\" class=\"ltx_Math\" alttext=\"k\"
        display=\"inline\" intent=\":literal\"><semantics><mi>k</mi><annotation encoding=\"application/x-tex\">k</annotation></semantics></math>.
        A coarse-grained grid with <math id=\"S2.SS4.p2.4.m4\" class=\"ltx_Math\"
        alttext=\"G_{1}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>G</mi><mn>1</mn></msub><annotation
        encoding=\"application/x-tex\">G_{1}</annotation></semantics></math> intervals
        has grid points at <math id=\"S2.SS4.p2.5.m5\" class=\"ltx_Math\" alttext=\"\\{t_{0}=a,t_{1},t_{2},\\cdots,t_{G_{1}}=b\\}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">{</mo><mrow><mrow><msub><mi>t</mi><mn>0</mn></msub><mo>=</mo><mrow><mi>a</mi><mo>,</mo><msub><mi>t</mi><mn>1</mn></msub><mo>,</mo><msub><mi>t</mi><mn>2</mn></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi></mrow></mrow><mo>,</mo><mrow><msub><mi>t</mi><msub><mi>G</mi><mn>1</mn></msub></msub><mo>=</mo><mi>b</mi></mrow></mrow><mo
        stretchy=\"false\">}</mo></mrow><annotation encoding=\"application/x-tex\">\\{t_{0}=a,t_{1},t_{2},\\cdots,t_{G_{1}}=b\\}</annotation></semantics></math>,
        which is augmented to <math id=\"S2.SS4.p2.6.m6\" class=\"ltx_Math\" alttext=\"\\{t_{-k},\\cdots,t_{-1},t_{0},\\cdots,t_{G_{1}},t_{G_{1}+1},\\cdots,t_{G_{1}+k}\\}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">{</mo><msub><mi>t</mi><mrow><mo>\u2212</mo><mi>k</mi></mrow></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>t</mi><mrow><mo>\u2212</mo><mn>1</mn></mrow></msub><mo>,</mo><msub><mi>t</mi><mn>0</mn></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>t</mi><msub><mi>G</mi><mn>1</mn></msub></msub><mo>,</mo><msub><mi>t</mi><mrow><msub><mi>G</mi><mn>1</mn></msub><mo>+</mo><mn>1</mn></mrow></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>t</mi><mrow><msub><mi>G</mi><mn>1</mn></msub><mo>+</mo><mi>k</mi></mrow></msub><mo
        stretchy=\"false\">}</mo></mrow><annotation encoding=\"application/x-tex\">\\{t_{-k},\\cdots,t_{-1},t_{0},\\cdots,t_{G_{1}},t_{G_{1}+1},\\cdots,t_{G_{1}+k}\\}</annotation></semantics></math>.
        There are <math id=\"S2.SS4.p2.7.m7\" class=\"ltx_Math\" alttext=\"G_{1}+k\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>G</mi><mn>1</mn></msub><mo>+</mo><mi>k</mi></mrow><annotation
        encoding=\"application/x-tex\">G_{1}+k</annotation></semantics></math> B-spline
        basis functions, with the <math id=\"S2.SS4.p2.8.m8\" class=\"ltx_Math\" alttext=\"i^{\\rm
        th}\" display=\"inline\" intent=\":literal\"><semantics><msup><mi>i</mi><mi>th</mi></msup><annotation
        encoding=\"application/x-tex\">i^{\\rm th}</annotation></semantics></math>
        B-spline <math id=\"S2.SS4.p2.9.m9\" class=\"ltx_Math\" alttext=\"B_{i}(x)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>B</mi><mi>i</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">B_{i}(x)</annotation></semantics></math>
        being non-zero only on <math id=\"S2.SS4.p2.10.m10\" class=\"ltx_Math\" alttext=\"[t_{-k+i},t_{i+1}]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><msub><mi>t</mi><mrow><mrow><mo>\u2212</mo><mi>k</mi></mrow><mo>+</mo><mi>i</mi></mrow></msub><mo>,</mo><msub><mi>t</mi><mrow><mi>i</mi><mo>+</mo><mn>1</mn></mrow></msub><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[t_{-k+i},t_{i+1}]</annotation></semantics></math>
        <math id=\"S2.SS4.p2.11.m11\" class=\"ltx_Math\" alttext=\"(i=0,\\cdots,G_{1}+k-1)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">(</mo><mrow><mi>i</mi><mo>=</mo><mrow><mn>0</mn><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><mrow><mrow><msub><mi>G</mi><mn>1</mn></msub><mo>+</mo><mi>k</mi></mrow><mo>\u2212</mo><mn>1</mn></mrow></mrow></mrow><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(i=0,\\cdots,G_{1}+k-1)</annotation></semantics></math>.
        Then <math id=\"S2.SS4.p2.12.m12\" class=\"ltx_Math\" alttext=\"f\" display=\"inline\"
        intent=\":literal\"><semantics><mi>f</mi><annotation encoding=\"application/x-tex\">f</annotation></semantics></math>
        on the coarse grid is expressed in terms of linear combination of these B-splines
        basis functions <math id=\"S2.SS4.p2.13.m13\" class=\"ltx_Math\" alttext=\"f_{\\rm
        coarse}(x)=\\sum_{i=0}^{G_{1}+k-1}c_{i}B_{i}(x)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><msub><mi>f</mi><mi>coarse</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo rspace=\"0.111em\">=</mo><mrow><msubsup><mo>\u2211</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mrow><mrow><msub><mi>G</mi><mn>1</mn></msub><mo>+</mo><mi>k</mi></mrow><mo>\u2212</mo><mn>1</mn></mrow></msubsup><mrow><msub><mi>c</mi><mi>i</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>B</mi><mi>i</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">f_{\\rm
        coarse}(x)=\\sum_{i=0}^{G_{1}+k-1}c_{i}B_{i}(x)</annotation></semantics></math>.
        Given a finer grid with <math id=\"S2.SS4.p2.14.m14\" class=\"ltx_Math\" alttext=\"G_{2}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>G</mi><mn>2</mn></msub><annotation
        encoding=\"application/x-tex\">G_{2}</annotation></semantics></math> intervals,
        <math id=\"S2.SS4.p2.15.m15\" class=\"ltx_Math\" alttext=\"f\" display=\"inline\"
        intent=\":literal\"><semantics><mi>f</mi><annotation encoding=\"application/x-tex\">f</annotation></semantics></math>
        on the fine grid is correspondingly <math id=\"S2.SS4.p2.16.m16\" class=\"ltx_Math\"
        alttext=\"f_{\\rm fine}(x)=\\sum_{j=0}^{G_{2}+k-1}c_{j}^{\\prime}B_{j}^{\\prime}(x)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><msub><mi>f</mi><mi>fine</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo rspace=\"0.111em\">=</mo><mrow><msubsup><mo>\u2211</mo><mrow><mi>j</mi><mo>=</mo><mn>0</mn></mrow><mrow><mrow><msub><mi>G</mi><mn>2</mn></msub><mo>+</mo><mi>k</mi></mrow><mo>\u2212</mo><mn>1</mn></mrow></msubsup><mrow><msubsup><mi>c</mi><mi>j</mi><mo>\u2032</mo></msubsup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msubsup><mi>B</mi><mi>j</mi><mo>\u2032</mo></msubsup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">f_{\\rm
        fine}(x)=\\sum_{j=0}^{G_{2}+k-1}c_{j}^{\\prime}B_{j}^{\\prime}(x)</annotation></semantics></math>.
        The parameters <math id=\"S2.SS4.p2.17.m17\" class=\"ltx_Math\" alttext=\"c^{\\prime}_{j}\"
        display=\"inline\" intent=\":literal\"><semantics><msubsup><mi>c</mi><mi>j</mi><mo>\u2032</mo></msubsup><annotation
        encoding=\"application/x-tex\">c^{\\prime}_{j}</annotation></semantics></math>s
        can be initialized from the parameters <math id=\"S2.SS4.p2.18.m18\" class=\"ltx_Math\"
        alttext=\"c_{i}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>c</mi><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">c_{i}</annotation></semantics></math> by minimizing
        the distance between <math id=\"S2.SS4.p2.19.m19\" class=\"ltx_Math\" alttext=\"f_{\\rm
        fine}(x)\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>f</mi><mi>fine</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">f_{\\rm
        fine}(x)</annotation></semantics></math> to <math id=\"S2.SS4.p2.20.m20\"
        class=\"ltx_Math\" alttext=\"f_{\\rm coarse}(x)\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>f</mi><mi>coarse</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">f_{\\rm
        coarse}(x)</annotation></semantics></math> (over some distribution of <math
        id=\"S2.SS4.p2.21.m21\" class=\"ltx_Math\" alttext=\"x\" display=\"inline\"
        intent=\":literal\"><semantics><mi>x</mi><annotation encoding=\"application/x-tex\">x</annotation></semantics></math>):</p>\n<table
        id=\"S2.E16\" class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_eqn_cell ltx_align_center\"><math id=\"S2.E16.m1\" class=\"ltx_Math\"
        alttext=\"\\{c_{j}^{\\prime}\\}=\\underset{\\{c_{j}^{\\prime}\\}}{\\rm argmin}\\
        \\mathop{\\mathbb{E}}_{x\\sim p(x)}\\left(\\sum_{j=0}^{G_{2}+k-1}c_{j}^{\\prime}B_{j}^{\\prime}(x)-\\sum_{i=0}^{G_{1}+k-1}c_{i}B_{i}(x)\\right)^{2},\"
        display=\"block\" intent=\":literal\"><semantics><mrow><mrow><mrow><mo stretchy=\"false\">{</mo><msubsup><mi>c</mi><mi>j</mi><mo>\u2032</mo></msubsup><mo
        stretchy=\"false\">}</mo></mrow><mo>=</mo><mrow><munder accentunder=\"true\"><mi>argmin</mi><mrow><mo
        maxsize=\"0.700em\" minsize=\"0.700em\">{</mo><msubsup><mi mathsize=\"0.700em\">c</mi><mi
        mathsize=\"0.710em\">j</mi><mo mathsize=\"0.710em\">\u2032</mo></msubsup><mo
        maxsize=\"0.700em\" minsize=\"0.700em\">}</mo></mrow></munder><mo lspace=\"0.167em\"
        rspace=\"0em\">\u200B</mo><mrow><munder><mo movablelimits=\"false\" rspace=\"0em\">\U0001D53C</mo><mrow><mi
        mathvariant=\"normal\">x</mi><mo>\u223C</mo><mrow><mi mathvariant=\"normal\">p</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi
        mathvariant=\"normal\">x</mi><mo stretchy=\"false\">)</mo></mrow></mrow></mrow></munder><msup><mrow><mo>(</mo><mrow><mrow><munderover><mo
        lspace=\"0em\" movablelimits=\"false\">\u2211</mo><mrow><mi mathvariant=\"normal\">j</mi><mo>=</mo><mn>0</mn></mrow><mrow><mrow><msub><mi
        mathvariant=\"normal\">G</mi><mn>2</mn></msub><mo>+</mo><mi mathvariant=\"normal\">k</mi></mrow><mo>\u2212</mo><mn>1</mn></mrow></munderover><mrow><msubsup><mi
        mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">j</mi><mo>\u2032</mo></msubsup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msubsup><mi mathvariant=\"normal\">B</mi><mi
        mathvariant=\"normal\">j</mi><mo>\u2032</mo></msubsup><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi mathvariant=\"normal\">x</mi><mo stretchy=\"false\">)</mo></mrow></mrow></mrow><mo
        rspace=\"0.055em\">\u2212</mo><mrow><munderover><mo movablelimits=\"false\">\u2211</mo><mrow><mi
        mathvariant=\"normal\">i</mi><mo>=</mo><mn>0</mn></mrow><mrow><mrow><msub><mi
        mathvariant=\"normal\">G</mi><mn>1</mn></msub><mo>+</mo><mi mathvariant=\"normal\">k</mi></mrow><mo>\u2212</mo><mn>1</mn></mrow></munderover><mrow><msub><mi
        mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">i</mi></msub><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><msub><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">i</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi
        mathvariant=\"normal\">x</mi><mo stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><mo>)</mo></mrow><mn>2</mn></msup></mrow></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">\\{c_{j}^{\\prime}\\}=\\underset{\\{c_{j}^{\\prime}\\}}{\\rm
        argmin}\\ \\mathop{\\mathbb{E}}_{x\\sim p(x)}\\left(\\sum_{j=0}^{G_{2}+k-1}c_{j}^{\\prime}B_{j}^{\\prime}(x)-\\sum_{i=0}^{G_{1}+k-1}c_{i}B_{i}(x)\\right)^{2},</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.16)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS4.p2.22\"
        class=\"ltx_p\">which can be implemented by the least squares algorithm. We
        perform grid extension for all splines in a KAN independently.</p>\n</div>\n<div
        id=\"S2.SS4.p3\" class=\"ltx_para\">\n<p id=\"S2.SS4.p3.7\" class=\"ltx_p\"><span
        id=\"S2.SS4.p3.7.1\" class=\"ltx_text ltx_font_bold\">Toy example: staricase-like
        loss curves.</span> We use a toy example <math id=\"S2.SS4.p3.1.m1\" class=\"ltx_Math\"
        alttext=\"f(x,y)={\\rm exp}({\\rm sin}(\\pi x)+y^{2})\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>x</mi><mo>,</mo><mi>y</mi><mo stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>exp</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mrow><mi>sin</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><msup><mi>y</mi><mn>2</mn></msup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">f(x,y)={\\rm
        exp}({\\rm sin}(\\pi x)+y^{2})</annotation></semantics></math> to demonstrate
        the effect of grid extension. In Figure\_<a href=\"#S2.F3\" title=\"Figure
        2.3 \u2023 2.4 For accuracy: Grid Extension \u2023 2 Kolmogorov\u2013Arnold
        Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.3</span></a> (top left), we show the train
        and test RMSE for a <math id=\"S2.SS4.p3.2.m2\" class=\"ltx_Math\" alttext=\"[2,5,1]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>5</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,5,1]</annotation></semantics></math>
        KAN. The number of grid points starts as 3, increases to a higher value every
        200 LBFGS steps, ending up with 1000 grid points. It is clear that every time
        fine graining happens, the training loss drops faster than before (except
        for the finest grid with 1000 points, where optimization ceases to work probably
        due to bad loss landscapes). However, the test losses first go down then go
        up, displaying a U-shape, due to the bias-variance tradeoff (underfitting
        vs. overfitting). We conjecture that the optimal test loss is achieved at
        the interpolation threshold when the number of parameters match the number
        of data points. Since our training samples are 1000 and the total parameters
        of a <math id=\"S2.SS4.p3.3.m3\" class=\"ltx_Math\" alttext=\"[2,5,1]\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>5</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,5,1]</annotation></semantics></math>
        KAN is <math id=\"S2.SS4.p3.4.m4\" class=\"ltx_Math\" alttext=\"15G\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mn>15</mn><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>G</mi></mrow><annotation
        encoding=\"application/x-tex\">15G</annotation></semantics></math> (<math
        id=\"S2.SS4.p3.5.m5\" class=\"ltx_Math\" alttext=\"G\" display=\"inline\"
        intent=\":literal\"><semantics><mi>G</mi><annotation encoding=\"application/x-tex\">G</annotation></semantics></math>
        is the number of grid intervals), we expect the interpolation threshold to
        be <math id=\"S2.SS4.p3.6.m6\" class=\"ltx_Math\" alttext=\"G=1000/15\\approx
        67\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>G</mi><mo>=</mo><mrow><mn>1000</mn><mo>/</mo><mn>15</mn></mrow><mo>\u2248</mo><mn>67</mn></mrow><annotation
        encoding=\"application/x-tex\">G=1000/15\\approx 67</annotation></semantics></math>,
        which roughly agrees with our experimentally observed value <math id=\"S2.SS4.p3.7.m7\"
        class=\"ltx_Math\" alttext=\"G\\sim 50\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>G</mi><mo>\u223C</mo><mn>50</mn></mrow><annotation
        encoding=\"application/x-tex\">G\\sim 50</annotation></semantics></math>.</p>\n</div>\n<div
        id=\"S2.SS4.p4\" class=\"ltx_para\">\n<p id=\"S2.SS4.p4.3\" class=\"ltx_p\"><span
        id=\"S2.SS4.p4.3.1\" class=\"ltx_text ltx_font_bold\">Small KANs generalize
        better.</span> Is this the best test performance we can achieve? Notice that
        the synthetic task can be represented exactly by a <math id=\"S2.SS4.p4.1.m1\"
        class=\"ltx_Math\" alttext=\"[2,1,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,1,1]</annotation></semantics></math>
        KAN, so we train a <math id=\"S2.SS4.p4.2.m2\" class=\"ltx_Math\" alttext=\"[2,1,1]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,1,1]</annotation></semantics></math>
        KAN and present the training dynamics in Figure\_<a href=\"#S2.F3\" title=\"Figure
        2.3 \u2023 2.4 For accuracy: Grid Extension \u2023 2 Kolmogorov\u2013Arnold
        Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.3</span></a> top right. Interestingly, it
        can achieve even lower test losses than the <math id=\"S2.SS4.p4.3.m3\" class=\"ltx_Math\"
        alttext=\"[2,5,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>5</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,5,1]</annotation></semantics></math>
        KAN, with clearer staircase structures and the interpolation threshold is
        delayed to a larger grid size as a result of fewer parameters. This highlights
        a subtlety of choosing KAN architectures. If we do not know the problem structure,
        how can we determine the minimal KAN shape? In Section\_<a href=\"#S2.SS5\"
        title=\"2.5 For Interpretability: Simplifying KANs and Making them interactive
        \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.5</span></a>,
        we will propose a method to auto-discover such minimal KAN architecture via
        regularization and pruning.</p>\n</div>\n<div id=\"S2.SS4.p5\" class=\"ltx_para\">\n<p
        id=\"S2.SS4.p5.4\" class=\"ltx_p\"><span id=\"S2.SS4.p5.4.1\" class=\"ltx_text
        ltx_font_bold\">Scaling laws: comparison with theory.</span> We are also interested
        in how the test loss decreases as the number of grid parameters increases.
        In Figure\_<a href=\"#S2.F3\" title=\"Figure 2.3 \u2023 2.4 For accuracy:
        Grid Extension \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN:
        Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">2.3</span></a> (bottom left), a [2,1,1] KAN scales roughly as
        <math id=\"S2.SS4.p5.1.m1\" class=\"ltx_Math\" alttext=\"{\\rm test\\ RMSE}\\propto
        G^{-3}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>test</mi><mo
        lspace=\"0.500em\" rspace=\"0em\">\u200B</mo><mi>RMSE</mi></mrow><mo>\u221D</mo><msup><mi>G</mi><mrow><mo>\u2212</mo><mn>3</mn></mrow></msup></mrow><annotation
        encoding=\"application/x-tex\">{\\rm test\\ RMSE}\\propto G^{-3}</annotation></semantics></math>.
        However, according to the Theorem\_<a href=\"#S2.Thmtheorem1\" title=\"Theorem
        2.1 (Approximation theory, KAT). \u2023 2.3 KAN\u2019s Approximation Abilities
        and Scaling Laws \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN:
        Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">2.1</span></a>, we would expect <math id=\"S2.SS4.p5.2.m2\"
        class=\"ltx_Math\" alttext=\"{\\rm test\\ RMSE}\\propto G^{-4}\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mi>test</mi><mo lspace=\"0.500em\"
        rspace=\"0em\">\u200B</mo><mi>RMSE</mi></mrow><mo>\u221D</mo><msup><mi>G</mi><mrow><mo>\u2212</mo><mn>4</mn></mrow></msup></mrow><annotation
        encoding=\"application/x-tex\">{\\rm test\\ RMSE}\\propto G^{-4}</annotation></semantics></math>.
        We found that the errors across samples are not uniform. This is probably
        attributed to boundary effects\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib25\" title=\"\" class=\"ltx_ref\">25</a>]</cite>. In fact,
        there are a few samples that have significantly larger errors than others,
        making the overall scaling slow down. If we plot the square root of the <span
        id=\"S2.SS4.p5.4.2\" class=\"ltx_text ltx_font_italic\">median</span> (not
        <span id=\"S2.SS4.p5.4.3\" class=\"ltx_text ltx_font_italic\">mean</span>)
        of the squared losses, we get a scaling closer to <math id=\"S2.SS4.p5.3.m3\"
        class=\"ltx_Math\" alttext=\"G^{-4}\" display=\"inline\" intent=\":literal\"><semantics><msup><mi>G</mi><mrow><mo>\u2212</mo><mn>4</mn></mrow></msup><annotation
        encoding=\"application/x-tex\">G^{-4}</annotation></semantics></math>. Despite
        this suboptimality (probably due to optimization), KANs still have much better
        scaling laws than MLPs, for data fitting (Figure\_<a href=\"#S3.F1\" title=\"Figure
        3.1 \u2023 3.1 Toy datasets \u2023 3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">3.1</span></a>)
        and PDE solving (Figure\_<a href=\"#S3.F3\" title=\"Figure 3.3 \u2023 3.4
        Solving partial differential equations \u2023 3 KANs are accurate \u2023 KAN:
        Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">3.3</span></a>). In addition, the training time scales favorably
        with the number of grid points <math id=\"S2.SS4.p5.4.m4\" class=\"ltx_Math\"
        alttext=\"G\" display=\"inline\" intent=\":literal\"><semantics><mi>G</mi><annotation
        encoding=\"application/x-tex\">G</annotation></semantics></math>, shown in
        Figure\_<a href=\"#S2.F3\" title=\"Figure 2.3 \u2023 2.4 For accuracy: Grid
        Extension \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.3</span></a>
        bottom right\_<span id=\"footnote3\" class=\"ltx_note ltx_role_footnote\"><sup
        class=\"ltx_note_mark\">3</sup><span class=\"ltx_note_outer\"><span class=\"ltx_note_content\"><sup
        class=\"ltx_note_mark\">3</sup><span class=\"ltx_tag ltx_tag_note\">3</span>When
        <math id=\"footnote3.m1\" class=\"ltx_Math\" alttext=\"G=1000\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>G</mi><mo>=</mo><mn>1000</mn></mrow><annotation
        encoding=\"application/x-tex\">G=1000</annotation></semantics></math>, training
        becomes significantly slower, which is specific to the use of the LBFGS optimizer
        with line search. We conjecture that the loss landscape becomes bad for <math
        id=\"footnote3.m2\" class=\"ltx_Math\" alttext=\"G=1000\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>G</mi><mo>=</mo><mn>1000</mn></mrow><annotation
        encoding=\"application/x-tex\">G=1000</annotation></semantics></math>, so
        line search with trying to find an optimal step size within maximal iterations
        without early stopping.</span></span></span>.</p>\n</div>\n<div id=\"S2.SS4.p6\"
        class=\"ltx_para\">\n<p id=\"S2.SS4.p6.1\" class=\"ltx_p\"><span id=\"S2.SS4.p6.1.1\"
        class=\"ltx_text ltx_font_bold\">External vs Internal degrees of freedom.</span>
        A new concept that KANs highlights is a distinction between external versus
        internal degrees of freedom (parameters). The computational graph of how nodes
        are connected represents external degrees of freedom (\u201Cdofs\u201D), while
        the grid points inside an activation function are internal degrees of freedom.
        KANs benefit from the fact that they have both external dofs and internal
        dofs. External dofs (that MLPs also have but splines do not) are responsible
        for learning compositional structures of multiple variables. Internal dofs
        (that splines also have but MLPs do not) are responsible for learning univariate
        functions.</p>\n</div>\n</section>\n<section id=\"S2.SS5\" class=\"ltx_subsection\">\n<h3
        class=\"ltx_title ltx_title_subsection\">\n<span class=\"ltx_tag ltx_tag_subsection\">2.5
        </span>For Interpretability: Simplifying KANs and Making them interactive</h3>\n\n<div
        id=\"S2.SS5.p1\" class=\"ltx_para\">\n<p id=\"S2.SS5.p1.2\" class=\"ltx_p\">One
        loose end from the last subsection is that we do not know how to choose the
        KAN shape that best matches the structure of a dataset. For example, if we
        know that the dataset is generated via the symbolic formula <math id=\"S2.SS5.p1.1.m1\"
        class=\"ltx_Math\" alttext=\"f(x,y)={\\rm exp}({\\rm sin}(\\pi x)+y^{2})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo>,</mo><mi>y</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>exp</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mrow><mi>sin</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><msup><mi>y</mi><mn>2</mn></msup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">f(x,y)={\\rm
        exp}({\\rm sin}(\\pi x)+y^{2})</annotation></semantics></math>, then we know
        that a <math id=\"S2.SS5.p1.2.m2\" class=\"ltx_Math\" alttext=\"[2,1,1]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,1,1]</annotation></semantics></math>
        KAN is able to express this function. However, in practice we do not know
        the information a priori, so it would be nice to have approaches to determine
        this shape automatically. The idea is to start from a large enough KAN and
        train it with sparsity regularization followed by pruning. We will show that
        these pruned KANs are much more interpretable than non-pruned ones. To make
        KANs maximally interpretable, we propose a few simplification techniques in
        Section\_<a href=\"#S2.SS5.SSS1\" title=\"2.5.1 Simplification techniques
        \u2023 2.5 For Interpretability: Simplifying KANs and Making them interactive
        \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.5.1</span></a>,
        and an example of how users can interact with KANs to make them more interpretable
        in Section\_<a href=\"#S2.SS5.SSS2\" title=\"2.5.2 A toy example: how humans
        can interact with KANs \u2023 2.5 For Interpretability: Simplifying KANs and
        Making them interactive \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023
        KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">2.5.2</span></a>.</p>\n</div>\n<section id=\"S2.SS5.SSS1\" class=\"ltx_subsubsection\">\n<h4
        class=\"ltx_title ltx_title_subsubsection\">\n<span class=\"ltx_tag ltx_tag_subsubsection\">2.5.1
        </span>Simplification techniques</h4>\n\n<div id=\"S2.SS5.SSS1.p1\" class=\"ltx_para\">\n<p
        id=\"S2.SS5.SSS1.p1.13\" class=\"ltx_p\"><span id=\"S2.SS5.SSS1.p1.13.1\"
        class=\"ltx_text ltx_font_bold\">1. Sparsification.</span> For MLPs, L1 regularization
        of linear weights is used to favor sparsity. KANs can adapt this high-level
        idea, but need two modifications:</p>\n<ol id=\"S2.I3\" class=\"ltx_enumerate\">\n<li
        id=\"S2.I3.i1\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(1)</span> \n<div id=\"S2.I3.i1.p1\" class=\"ltx_para\">\n<p
        id=\"S2.I3.i1.p1.1\" class=\"ltx_p\">There is no linear \u201Cweight\u201D
        in KANs. Linear weights are replaced by learnable activation functions, so
        we should define the L1 norm of these activation functions.</p>\n</div>\n</li>\n<li
        id=\"S2.I3.i2\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(2)</span> \n<div id=\"S2.I3.i2.p1\" class=\"ltx_para\">\n<p
        id=\"S2.I3.i2.p1.1\" class=\"ltx_p\">We find L1 to be insufficient for sparsification
        of KANs; instead an additional entropy regularization is necessary (see Appendix\_<a
        href=\"#A3\" title=\"Appendix C Dependence on hyperparameters \u2023 KAN:
        Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">C</span></a> for more details).</p>\n</div>\n</li>\n</ol>\n<p
        id=\"S2.SS5.SSS1.p1.2\" class=\"ltx_p\">We define the L1 norm of an activation
        function <math id=\"S2.SS5.SSS1.p1.1.m1\" class=\"ltx_Math\" alttext=\"\\phi\"
        display=\"inline\" intent=\":literal\"><semantics><mi>\u03D5</mi><annotation
        encoding=\"application/x-tex\">\\phi</annotation></semantics></math> to be
        its average magnitude over its <math id=\"S2.SS5.SSS1.p1.2.m2\" class=\"ltx_Math\"
        alttext=\"N_{p}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>N</mi><mi>p</mi></msub><annotation
        encoding=\"application/x-tex\">N_{p}</annotation></semantics></math> inputs,
        i.e.,</p>\n<table id=\"S2.E17\" class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr
        class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_eqn_cell ltx_align_center\"><math
        id=\"S2.E17.m1\" class=\"ltx_Math\" alttext=\"\\left|\\phi\\right|_{1}\\equiv\\frac{1}{N_{p}}\\sum_{s=1}^{N_{p}}\\left|\\phi(x^{(s)})\\right|.\"
        display=\"block\" intent=\":literal\"><semantics><mrow><mrow><msub><mrow><mo>|</mo><mi>\u03D5</mi><mo>|</mo></mrow><mn>1</mn></msub><mo>\u2261</mo><mrow><mfrac><mn>1</mn><msub><mi>N</mi><mi>p</mi></msub></mfrac><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><munderover><mo movablelimits=\"false\"
        rspace=\"0em\">\u2211</mo><mrow><mi>s</mi><mo>=</mo><mn>1</mn></mrow><msub><mi>N</mi><mi>p</mi></msub></munderover><mrow><mo>|</mo><mrow><mi>\u03D5</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msup><mi>x</mi><mrow><mo
        stretchy=\"false\">(</mo><mi>s</mi><mo stretchy=\"false\">)</mo></mrow></msup><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>|</mo></mrow></mrow></mrow></mrow><mo
        lspace=\"0em\">.</mo></mrow><annotation encoding=\"application/x-tex\">\\left|\\phi\\right|_{1}\\equiv\\frac{1}{N_{p}}\\sum_{s=1}^{N_{p}}\\left|\\phi(x^{(s)})\\right|.</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.17)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS5.SSS1.p1.6\"
        class=\"ltx_p\">Then for a KAN layer <math id=\"S2.SS5.SSS1.p1.3.m1\" class=\"ltx_Math\"
        alttext=\"\\mathbf{\\Phi}\" display=\"inline\" intent=\":literal\"><semantics><mi>\U0001D6BD</mi><annotation
        encoding=\"application/x-tex\">\\mathbf{\\Phi}</annotation></semantics></math>
        with <math id=\"S2.SS5.SSS1.p1.4.m2\" class=\"ltx_Math\" alttext=\"n_{\\rm
        in}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>n</mi><mi>in</mi></msub><annotation
        encoding=\"application/x-tex\">n_{\\rm in}</annotation></semantics></math>
        inputs and <math id=\"S2.SS5.SSS1.p1.5.m3\" class=\"ltx_Math\" alttext=\"n_{\\rm
        out}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>n</mi><mi>out</mi></msub><annotation
        encoding=\"application/x-tex\">n_{\\rm out}</annotation></semantics></math>
        outputs, we define the L1 norm of <math id=\"S2.SS5.SSS1.p1.6.m4\" class=\"ltx_Math\"
        alttext=\"\\mathbf{\\Phi}\" display=\"inline\" intent=\":literal\"><semantics><mi>\U0001D6BD</mi><annotation
        encoding=\"application/x-tex\">\\mathbf{\\Phi}</annotation></semantics></math>
        to be the sum of L1 norms of all activation functions, i.e.,</p>\n<table id=\"S2.E18\"
        class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr class=\"ltx_equation ltx_eqn_row
        ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_eqn_cell ltx_align_center\"><math id=\"S2.E18.m1\" class=\"ltx_Math\"
        alttext=\"\\left|\\mathbf{\\Phi}\\right|_{1}\\equiv\\sum_{i=1}^{n_{\\rm in}}\\sum_{j=1}^{n_{\\rm
        out}}\\left|\\phi_{i,j}\\right|_{1}.\" display=\"block\" intent=\":literal\"><semantics><mrow><mrow><msub><mrow><mo>|</mo><mi>\U0001D6BD</mi><mo>|</mo></mrow><mn>1</mn></msub><mo
        rspace=\"0.111em\">\u2261</mo><mrow><munderover><mo movablelimits=\"false\"
        rspace=\"0em\">\u2211</mo><mrow><mi>i</mi><mo>=</mo><mn>1</mn></mrow><msub><mi>n</mi><mi>in</mi></msub></munderover><mrow><munderover><mo
        movablelimits=\"false\" rspace=\"0em\">\u2211</mo><mrow><mi>j</mi><mo>=</mo><mn>1</mn></mrow><msub><mi>n</mi><mi>out</mi></msub></munderover><msub><mrow><mo>|</mo><msub><mi>\u03D5</mi><mrow><mi>i</mi><mo>,</mo><mi>j</mi></mrow></msub><mo>|</mo></mrow><mn>1</mn></msub></mrow></mrow></mrow><mo
        lspace=\"0em\">.</mo></mrow><annotation encoding=\"application/x-tex\">\\left|\\mathbf{\\Phi}\\right|_{1}\\equiv\\sum_{i=1}^{n_{\\rm
        in}}\\sum_{j=1}^{n_{\\rm out}}\\left|\\phi_{i,j}\\right|_{1}.</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.18)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS5.SSS1.p1.7\"
        class=\"ltx_p\">In addition, we define the entropy of <math id=\"S2.SS5.SSS1.p1.7.m1\"
        class=\"ltx_Math\" alttext=\"\\mathbf{\\Phi}\" display=\"inline\" intent=\":literal\"><semantics><mi>\U0001D6BD</mi><annotation
        encoding=\"application/x-tex\">\\mathbf{\\Phi}</annotation></semantics></math>
        to be</p>\n<table id=\"S2.E19\" class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr
        class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_eqn_cell ltx_align_center\"><math
        id=\"S2.E19.m1\" class=\"ltx_Math\" alttext=\"S(\\mathbf{\\Phi})\\equiv-\\sum_{i=1}^{n_{\\rm
        in}}\\sum_{j=1}^{n_{\\rm out}}\\frac{\\left|\\phi_{i,j}\\right|_{1}}{\\left|\\mathbf{\\Phi}\\right|_{1}}{\\rm
        log}\\left(\\frac{\\left|\\phi_{i,j}\\right|_{1}}{\\left|\\mathbf{\\Phi}\\right|_{1}}\\right).\"
        display=\"block\" intent=\":literal\"><semantics><mrow><mrow><mrow><mi>S</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\U0001D6BD</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>\u2261</mo><mrow><mo>\u2212</mo><mrow><munderover><mo
        movablelimits=\"false\" rspace=\"0em\">\u2211</mo><mrow><mi>i</mi><mo>=</mo><mn>1</mn></mrow><msub><mi>n</mi><mi>in</mi></msub></munderover><mrow><munderover><mo
        movablelimits=\"false\">\u2211</mo><mrow><mi>j</mi><mo>=</mo><mn>1</mn></mrow><msub><mi>n</mi><mi>out</mi></msub></munderover><mrow><mfrac><msub><mrow><mo>|</mo><msub><mi>\u03D5</mi><mrow><mi>i</mi><mo>,</mo><mi>j</mi></mrow></msub><mo>|</mo></mrow><mn>1</mn></msub><msub><mrow><mo>|</mo><mi>\U0001D6BD</mi><mo>|</mo></mrow><mn>1</mn></msub></mfrac><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>log</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo>(</mo><mfrac><msub><mrow><mo>|</mo><msub><mi>\u03D5</mi><mrow><mi>i</mi><mo>,</mo><mi>j</mi></mrow></msub><mo>|</mo></mrow><mn>1</mn></msub><msub><mrow><mo>|</mo><mi>\U0001D6BD</mi><mo>|</mo></mrow><mn>1</mn></msub></mfrac><mo>)</mo></mrow></mrow></mrow></mrow></mrow></mrow><mo
        lspace=\"0em\">.</mo></mrow><annotation encoding=\"application/x-tex\">S(\\mathbf{\\Phi})\\equiv-\\sum_{i=1}^{n_{\\rm
        in}}\\sum_{j=1}^{n_{\\rm out}}\\frac{\\left|\\phi_{i,j}\\right|_{1}}{\\left|\\mathbf{\\Phi}\\right|_{1}}{\\rm
        log}\\left(\\frac{\\left|\\phi_{i,j}\\right|_{1}}{\\left|\\mathbf{\\Phi}\\right|_{1}}\\right).</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.19)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS5.SSS1.p1.9\"
        class=\"ltx_p\">The total training objective <math id=\"S2.SS5.SSS1.p1.8.m1\"
        class=\"ltx_Math\" alttext=\"\\ell_{\\rm total}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi
        mathvariant=\"normal\">\u2113</mi><mi>total</mi></msub><annotation encoding=\"application/x-tex\">\\ell_{\\rm
        total}</annotation></semantics></math> is the prediction loss <math id=\"S2.SS5.SSS1.p1.9.m2\"
        class=\"ltx_Math\" alttext=\"\\ell_{\\rm pred}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi
        mathvariant=\"normal\">\u2113</mi><mi>pred</mi></msub><annotation encoding=\"application/x-tex\">\\ell_{\\rm
        pred}</annotation></semantics></math> plus L1 and entropy regularization of
        all KAN layers:</p>\n<table id=\"S2.E20\" class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr
        class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_eqn_cell ltx_align_center\"><math
        id=\"S2.E20.m1\" class=\"ltx_Math\" alttext=\"\\ell_{\\rm total}=\\ell_{\\rm
        pred}+\\lambda\\left(\\mu_{1}\\sum_{l=0}^{L-1}\\left|\\mathbf{\\Phi}_{l}\\right|_{1}+\\mu_{2}\\sum_{l=0}^{L-1}S(\\mathbf{\\Phi}_{l})\\right),\"
        display=\"block\" intent=\":literal\"><semantics><mrow><mrow><msub><mi mathvariant=\"normal\">\u2113</mi><mi>total</mi></msub><mo>=</mo><mrow><msub><mi
        mathvariant=\"normal\">\u2113</mi><mi>pred</mi></msub><mo>+</mo><mrow><mi>\u03BB</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo>(</mo><mrow><mrow><msub><mi>\u03BC</mi><mn>1</mn></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><munderover><mo movablelimits=\"false\"
        rspace=\"0em\">\u2211</mo><mrow><mi>l</mi><mo>=</mo><mn>0</mn></mrow><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow></munderover><msub><mrow><mo>|</mo><msub><mi>\U0001D6BD</mi><mi>l</mi></msub><mo>|</mo></mrow><mn>1</mn></msub></mrow></mrow><mo>+</mo><mrow><msub><mi>\u03BC</mi><mn>2</mn></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><munderover><mo movablelimits=\"false\">\u2211</mo><mrow><mi>l</mi><mo>=</mo><mn>0</mn></mrow><mrow><mi>L</mi><mo>\u2212</mo><mn>1</mn></mrow></munderover><mrow><mi>S</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>\U0001D6BD</mi><mi>l</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow></mrow><mo>)</mo></mrow></mrow></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">\\ell_{\\rm total}=\\ell_{\\rm pred}+\\lambda\\left(\\mu_{1}\\sum_{l=0}^{L-1}\\left|\\mathbf{\\Phi}_{l}\\right|_{1}+\\mu_{2}\\sum_{l=0}^{L-1}S(\\mathbf{\\Phi}_{l})\\right),</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.20)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS5.SSS1.p1.12\"
        class=\"ltx_p\">where <math id=\"S2.SS5.SSS1.p1.10.m1\" class=\"ltx_Math\"
        alttext=\"\\mu_{1},\\mu_{2}\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>\u03BC</mi><mn>1</mn></msub><mo>,</mo><msub><mi>\u03BC</mi><mn>2</mn></msub></mrow><annotation
        encoding=\"application/x-tex\">\\mu_{1},\\mu_{2}</annotation></semantics></math>
        are relative magnitudes usually set to <math id=\"S2.SS5.SSS1.p1.11.m2\" class=\"ltx_Math\"
        alttext=\"\\mu_{1}=\\mu_{2}=1\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>\u03BC</mi><mn>1</mn></msub><mo>=</mo><msub><mi>\u03BC</mi><mn>2</mn></msub><mo>=</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">\\mu_{1}=\\mu_{2}=1</annotation></semantics></math>,
        and <math id=\"S2.SS5.SSS1.p1.12.m3\" class=\"ltx_Math\" alttext=\"\\lambda\"
        display=\"inline\" intent=\":literal\"><semantics><mi>\u03BB</mi><annotation
        encoding=\"application/x-tex\">\\lambda</annotation></semantics></math> controls
        overall regularization magnitude.</p>\n</div>\n<div id=\"S2.SS5.SSS1.p2\"
        class=\"ltx_para\">\n<p id=\"S2.SS5.SSS1.p2.3\" class=\"ltx_p\"><span id=\"S2.SS5.SSS1.p2.3.1\"
        class=\"ltx_text ltx_font_bold\">2. Visualization.</span> When we visualize
        a KAN, to get a sense of magnitudes, we set the transparency of an activation
        function <math id=\"S2.SS5.SSS1.p2.1.m1\" class=\"ltx_Math\" alttext=\"\\phi_{l,i,j}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi><mo>,</mo><mi>j</mi></mrow></msub><annotation
        encoding=\"application/x-tex\">\\phi_{l,i,j}</annotation></semantics></math>
        proportional to <math id=\"S2.SS5.SSS1.p2.2.m2\" class=\"ltx_Math\" alttext=\"{\\rm
        tanh}(\\beta A_{l,i,j})\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>tanh</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mi>\u03B2</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>A</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi><mo>,</mo><mi>j</mi></mrow></msub></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">{\\rm
        tanh}(\\beta A_{l,i,j})</annotation></semantics></math> where <math id=\"S2.SS5.SSS1.p2.3.m3\"
        class=\"ltx_Math\" alttext=\"\\beta=3\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03B2</mi><mo>=</mo><mn>3</mn></mrow><annotation
        encoding=\"application/x-tex\">\\beta=3</annotation></semantics></math> .
        Hence, functions with small magnitude appear faded out to allow us to focus
        on important ones.</p>\n</div>\n<div id=\"S2.SS5.SSS1.p3\" class=\"ltx_para\">\n<p
        id=\"S2.SS5.SSS1.p3.2\" class=\"ltx_p\"><span id=\"S2.SS5.SSS1.p3.2.1\" class=\"ltx_text
        ltx_font_bold\">3. Pruning.</span> After training with sparsification penalty,
        we may also want to prune the network to a smaller subnetwork. We sparsify
        KANs on the node level (rather than on the edge level). For each node (say
        the <math id=\"S2.SS5.SSS1.p3.1.m1\" class=\"ltx_Math\" alttext=\"i^{\\rm
        th}\" display=\"inline\" intent=\":literal\"><semantics><msup><mi>i</mi><mi>th</mi></msup><annotation
        encoding=\"application/x-tex\">i^{\\rm th}</annotation></semantics></math>
        neuron in the <math id=\"S2.SS5.SSS1.p3.2.m2\" class=\"ltx_Math\" alttext=\"l^{\\rm
        th}\" display=\"inline\" intent=\":literal\"><semantics><msup><mi>l</mi><mi>th</mi></msup><annotation
        encoding=\"application/x-tex\">l^{\\rm th}</annotation></semantics></math>
        layer), we define its incoming and outgoing score as</p>\n<table id=\"S2.E21\"
        class=\"ltx_equation ltx_eqn_table\">\n\n<tbody><tr class=\"ltx_equation ltx_eqn_row
        ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_eqn_cell ltx_align_center\"><math id=\"S2.E21.m1\" class=\"ltx_Math\"
        alttext=\"I_{l,i}=\\underset{k}{\\rm max}(\\left|\\phi_{l-1,i,k}\\right|_{1}),\\qquad
        O_{l,i}=\\underset{j}{\\rm max}(\\left|\\phi_{l+1,j,i}\\right|_{1}),\" display=\"block\"
        intent=\":literal\"><semantics><mrow><mrow><mrow><msub><mi>I</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi></mrow></msub><mo>=</mo><mrow><munder
        accentunder=\"true\"><mi>max</mi><mo mathsize=\"0.700em\">\U0001D458</mo></munder><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mrow><mo>|</mo><msub><mi>\u03D5</mi><mrow><mrow><mi
        mathvariant=\"normal\">l</mi><mo>\u2212</mo><mn>1</mn></mrow><mo>,</mo><mi
        mathvariant=\"normal\">i</mi><mo>,</mo><mi mathvariant=\"normal\">k</mi></mrow></msub><mo>|</mo></mrow><mn>1</mn></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><mo rspace=\"2.167em\">,</mo><mrow><msub><mi
        mathvariant=\"normal\">O</mi><mrow><mi mathvariant=\"normal\">l</mi><mo>,</mo><mi
        mathvariant=\"normal\">i</mi></mrow></msub><mo>=</mo><mrow><munder accentunder=\"true\"><mi>max</mi><mo
        mathsize=\"0.700em\">j</mo></munder><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><msub><mrow><mo>|</mo><msub><mi>\u03D5</mi><mrow><mrow><mi
        mathvariant=\"normal\">l</mi><mo>+</mo><mn>1</mn></mrow><mo>,</mo><mi mathvariant=\"normal\">j</mi><mo>,</mo><mi
        mathvariant=\"normal\">i</mi></mrow></msub><mo>|</mo></mrow><mn>1</mn></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">I_{l,i}=\\underset{k}{\\rm max}(\\left|\\phi_{l-1,i,k}\\right|_{1}),\\qquad
        O_{l,i}=\\underset{j}{\\rm max}(\\left|\\phi_{l+1,j,i}\\right|_{1}),</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.21)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS5.SSS1.p3.3\"
        class=\"ltx_p\">and consider a node to be important if both incoming and outgoing
        scores are greater than a threshold hyperparameter <math id=\"S2.SS5.SSS1.p3.3.m1\"
        class=\"ltx_Math\" alttext=\"\\theta=10^{-2}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03B8</mi><mo>=</mo><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>2</mn></mrow></msup></mrow><annotation
        encoding=\"application/x-tex\">\\theta=10^{-2}</annotation></semantics></math>
        by default. All unimportant neurons are pruned.</p>\n</div>\n<div id=\"S2.SS5.SSS1.p4\"
        class=\"ltx_para\">\n<p id=\"S2.SS5.SSS1.p4.10\" class=\"ltx_p\"><span id=\"S2.SS5.SSS1.p4.10.1\"
        class=\"ltx_text ltx_font_bold\">4. Symbolification.</span> In cases where
        we suspect that some activation functions are in fact symbolic (e.g., <math
        id=\"S2.SS5.SSS1.p4.1.m1\" class=\"ltx_Math\" alttext=\"{\\rm cos}\" display=\"inline\"
        intent=\":literal\"><semantics><mi>cos</mi><annotation encoding=\"application/x-tex\">{\\rm
        cos}</annotation></semantics></math> or <math id=\"S2.SS5.SSS1.p4.2.m2\" class=\"ltx_Math\"
        alttext=\"{\\rm log}\" display=\"inline\" intent=\":literal\"><semantics><mi>log</mi><annotation
        encoding=\"application/x-tex\">{\\rm log}</annotation></semantics></math>),
        we provide an interface to set them to be a specified symbolic form, <span
        id=\"S2.SS5.SSS1.p4.10.2\" class=\"ltx_text ltx_markedasmath ltx_font_typewriter\">fix_symbolic(l,i,j,f)</span>
        can set the <math id=\"S2.SS5.SSS1.p4.4.m4\" class=\"ltx_Math\" alttext=\"(l,i,j)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">(</mo><mi>l</mi><mo>,</mo><mi>i</mi><mo>,</mo><mi>j</mi><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(l,i,j)</annotation></semantics></math>
        activation to be <math id=\"S2.SS5.SSS1.p4.5.m5\" class=\"ltx_Math\" alttext=\"f\"
        display=\"inline\" intent=\":literal\"><semantics><mi>f</mi><annotation encoding=\"application/x-tex\">f</annotation></semantics></math>.
        However, we cannot simply set the activation function to be the exact symbolic
        formula, since its inputs and outputs may have shifts and scalings. So, we
        obtain preactivations <math id=\"S2.SS5.SSS1.p4.6.m6\" class=\"ltx_Math\"
        alttext=\"x\" display=\"inline\" intent=\":literal\"><semantics><mi>x</mi><annotation
        encoding=\"application/x-tex\">x</annotation></semantics></math> and postactivations
        <math id=\"S2.SS5.SSS1.p4.7.m7\" class=\"ltx_Math\" alttext=\"y\" display=\"inline\"
        intent=\":literal\"><semantics><mi>y</mi><annotation encoding=\"application/x-tex\">y</annotation></semantics></math>
        from samples, and fit affine parameters <math id=\"S2.SS5.SSS1.p4.8.m8\" class=\"ltx_Math\"
        alttext=\"(a,b,c,d)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">(</mo><mi>a</mi><mo>,</mo><mi>b</mi><mo>,</mo><mi>c</mi><mo>,</mo><mi>d</mi><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(a,b,c,d)</annotation></semantics></math>
        such that\n<math id=\"S2.SS5.SSS1.p4.9.m9\" class=\"ltx_Math\" alttext=\"y\\approx
        cf(ax+b)+d\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>y</mi><mo>\u2248</mo><mrow><mrow><mi>c</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>f</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mrow><mi>a</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo>+</mo><mi>b</mi></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><mi>d</mi></mrow></mrow><annotation
        encoding=\"application/x-tex\">y\\approx cf(ax+b)+d</annotation></semantics></math>.
        The fitting is done by iterative grid search of <math id=\"S2.SS5.SSS1.p4.10.m10\"
        class=\"ltx_Math\" alttext=\"a,b\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>a</mi><mo>,</mo><mi>b</mi></mrow><annotation
        encoding=\"application/x-tex\">a,b</annotation></semantics></math> and linear
        regression.</p>\n</div>\n<div id=\"S2.SS5.SSS1.p5\" class=\"ltx_para\">\n<p
        id=\"S2.SS5.SSS1.p5.1\" class=\"ltx_p\">Besides these techniques, we provide
        additional tools that allow users to apply more fine-grained control to KANs,
        listed in Appendix\_<a href=\"#A1\" title=\"Appendix A KAN Functionalities
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">A</span></a>.</p>\n</div>\n</section>\n<section id=\"S2.SS5.SSS2\"
        class=\"ltx_subsubsection\">\n<h4 class=\"ltx_title ltx_title_subsubsection\">\n<span
        class=\"ltx_tag ltx_tag_subsubsection\">2.5.2 </span>A toy example: how humans
        can interact with KANs</h4>\n\n<figure id=\"S2.F4\" class=\"ltx_figure\"><img
        src=\"2404.19756v5/figs/sr.png\" id=\"S2.F4.g1\" class=\"ltx_graphics ltx_centering
        ltx_img_landscape\" width=\"598\" height=\"292\" alt=\"Refer to caption\">\n<figcaption
        class=\"ltx_caption ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure
        2.4: </span>An example of how to do symbolic regression with KAN.</figcaption>\n</figure>\n<div
        id=\"S2.SS5.SSS2.p1\" class=\"ltx_para\">\n<p id=\"S2.SS5.SSS2.p1.1\" class=\"ltx_p\">Above
        we have proposed a number of simplification techniques for KANs. We can view
        these simplification choices as buttons one can click on. A user interacting
        with these buttons can decide which button is most promising to click next
        to make KANs more interpretable. We use an example below to showcase how a
        user could interact with a KAN to obtain maximally interpretable results.</p>\n</div>\n<div
        id=\"S2.SS5.SSS2.p2\" class=\"ltx_para\">\n<p id=\"S2.SS5.SSS2.p2.3\" class=\"ltx_p\">Let
        us again consider the regression task</p>\n<table id=\"A6.EGx9\" class=\"ltx_equationgroup
        ltx_eqn_align ltx_eqn_table\">\n\n<tbody id=\"S2.E22\"><tr class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_td ltx_align_right ltx_eqn_cell\"><math id=\"S2.E22.m1\" class=\"ltx_Math\"
        alttext=\"\\displaystyle f(x,y)=\\exp\\left({\\sin}(\\pi x)+y^{2}\\right).\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo>,</mo><mi>y</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>exp</mi><mo>\u2061</mo><mrow><mo>(</mo><mrow><mrow><mi>sin</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><msup><mi>y</mi><mn>2</mn></msup></mrow><mo>)</mo></mrow></mrow></mrow><mo
        lspace=\"0em\">.</mo></mrow><annotation encoding=\"application/x-tex\">\\displaystyle
        f(x,y)=\\exp\\left({\\sin}(\\pi x)+y^{2}\\right).</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(2.22)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S2.SS5.SSS2.p2.2\"
        class=\"ltx_p\">Given data points <math id=\"S2.SS5.SSS2.p2.1.m1\" class=\"ltx_Math\"
        alttext=\"(x_{i},y_{i},f_{i})\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">(</mo><msub><mi>x</mi><mi>i</mi></msub><mo>,</mo><msub><mi>y</mi><mi>i</mi></msub><mo>,</mo><msub><mi>f</mi><mi>i</mi></msub><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(x_{i},y_{i},f_{i})</annotation></semantics></math>,
        <math id=\"S2.SS5.SSS2.p2.2.m2\" class=\"ltx_Math\" alttext=\"i=1,2,\\cdots,N_{p}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>i</mi><mo>=</mo><mrow><mn>1</mn><mo>,</mo><mn>2</mn><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>N</mi><mi>p</mi></msub></mrow></mrow><annotation
        encoding=\"application/x-tex\">i=1,2,\\cdots,N_{p}</annotation></semantics></math>,
        a hypothetical user Alice is interested in figuring out the symbolic formula.
        The steps of Alice\u2019s interaction with the KANs are described below (illustrated
        in Figure\_<a href=\"#S2.F4\" title=\"Figure 2.4 \u2023 2.5.2 A toy example:
        how humans can interact with KANs \u2023 2.5 For Interpretability: Simplifying
        KANs and Making them interactive \u2023 2 Kolmogorov\u2013Arnold Networks
        (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.4</span></a>):</p>\n</div>\n<div id=\"S2.SS5.SSS2.p3\"
        class=\"ltx_para\">\n<p id=\"S2.SS5.SSS2.p3.1\" class=\"ltx_p\"><span id=\"S2.SS5.SSS2.p3.1.1\"
        class=\"ltx_text ltx_font_bold\">Step 1: Training with sparsification.</span>
        Starting from a fully-connected <math id=\"S2.SS5.SSS2.p3.1.m1\" class=\"ltx_Math\"
        alttext=\"[2,5,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>5</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,5,1]</annotation></semantics></math>
        KAN, training with sparsification regularization can make it quite sparse.
        4 out of 5 neurons in the hidden layer appear useless, hence we want to prune
        them away.</p>\n</div>\n<div id=\"S2.SS5.SSS2.p4\" class=\"ltx_para\">\n<p
        id=\"S2.SS5.SSS2.p4.1\" class=\"ltx_p\"><span id=\"S2.SS5.SSS2.p4.1.1\" class=\"ltx_text
        ltx_font_bold\">Step 2: Pruning.</span> Automatic pruning is seen to discard
        all hidden neurons except the last one, leaving a <math id=\"S2.SS5.SSS2.p4.1.m1\"
        class=\"ltx_Math\" alttext=\"[2,1,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,1,1]</annotation></semantics></math>
        KAN. The activation functions appear to be known symbolic functions.</p>\n</div>\n<div
        id=\"S2.SS5.SSS2.p5\" class=\"ltx_para\">\n<p id=\"S2.SS5.SSS2.p5.2\" class=\"ltx_p\"><span
        id=\"S2.SS5.SSS2.p5.2.1\" class=\"ltx_text ltx_font_bold\">Step 3: Setting
        symbolic functions.</span> Assuming that the user can correctly guess these
        symbolic formulas from staring at the KAN plot, they can set</p>\n<table id=\"S2.E23\"
        class=\"ltx_equationgroup ltx_eqn_table\">\n<tbody>\n<tr id=\"S2.E23X\" class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_td ltx_eqn_cell\"></td>\n<td class=\"ltx_td ltx_align_left ltx_eqn_cell\"><span
        id=\"S2.E23X.2.1.1.1\" class=\"ltx_text ltx_markedasmath ltx_font_italic\">fix_symbolic(0,0,0,\u2018sin\u2019)</span></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"3\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equationgroup
        ltx_align_right\">(2.23)</span></td>\n</tr>\n<tr id=\"S2.E23Xa\" class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_td ltx_eqn_cell\"></td>\n<td class=\"ltx_td ltx_align_left ltx_eqn_cell\"><span
        id=\"S2.E23Xa.2.1.1.1\" class=\"ltx_text ltx_markedasmath ltx_font_italic\">fix_symbolic(0,1,0,\u2018x\u02C62\u2019)</span></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n</tr>\n<tr id=\"S2.E23Xb\"
        class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_eqn_cell\"></td>\n<td
        class=\"ltx_td ltx_align_left ltx_eqn_cell\"><math id=\"S2.E23Xb.2.1.1.m1\"
        class=\"ltx_Math\" alttext=\"\\displaystyle\\texttt{fix\\_symbolic(1,0,0,`exp')}.\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mtext class=\"ltx_mathvariant_monospace\">fix_symbolic(1,0,0,\u2018exp\u2019)</mtext><mo
        lspace=\"0em\">.</mo></mrow><annotation encoding=\"application/x-tex\">\\displaystyle\\texttt{fix\\_symbolic(1,0,0,`exp')}.</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n</tr>\n</tbody>\n</table>\n<p
        id=\"S2.SS5.SSS2.p5.1\" class=\"ltx_p\">In case the user has no domain knowledge
        or no idea which symbolic functions these activation functions might be, we
        provide a function <span id=\"S2.SS5.SSS2.p5.1.1\" class=\"ltx_text ltx_markedasmath
        ltx_font_typewriter\">suggest_symbolic</span> to suggest symbolic candidates.</p>\n</div>\n<div
        id=\"S2.SS5.SSS2.p6\" class=\"ltx_para\">\n<p id=\"S2.SS5.SSS2.p6.1\" class=\"ltx_p\"><span
        id=\"S2.SS5.SSS2.p6.1.1\" class=\"ltx_text ltx_font_bold\">Step 4: Further
        training.</span> After symbolifying all the activation functions in the network,
        the only remaining parameters are the affine parameters. We continue training
        these affine parameters, and when we see the loss dropping to machine precision,
        we know that we have found the correct symbolic expression.</p>\n</div>\n<div
        id=\"S2.SS5.SSS2.p7\" class=\"ltx_para\">\n<p id=\"S2.SS5.SSS2.p7.2\" class=\"ltx_p\"><span
        id=\"S2.SS5.SSS2.p7.2.1\" class=\"ltx_text ltx_font_bold\">Step 5: Output
        the symbolic formula.</span> <span id=\"S2.SS5.SSS2.p7.2.2\" class=\"ltx_text
        ltx_font_typewriter\">Sympy</span> is used to compute the symbolic formula
        of the output node. The user obtains <math id=\"S2.SS5.SSS2.p7.1.m1\" class=\"ltx_Math\"
        alttext=\"1.0e^{1.0y^{2}+1.0{\\rm sin}(3.14x)}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mn>1.0</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msup><mi>e</mi><mrow><mrow><mn>1.0</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msup><mi>y</mi><mn>2</mn></msup></mrow><mo>+</mo><mrow><mn>1.0</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>sin</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mn>3.14</mn><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></msup></mrow><annotation encoding=\"application/x-tex\">1.0e^{1.0y^{2}+1.0{\\rm
        sin}(3.14x)}</annotation></semantics></math>, which is the true answer (we
        only displayed two decimals for <math id=\"S2.SS5.SSS2.p7.2.m2\" class=\"ltx_Math\"
        alttext=\"\\pi\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03C0</mi><annotation
        encoding=\"application/x-tex\">\\pi</annotation></semantics></math>).</p>\n</div>\n<div
        id=\"S2.SS5.SSS2.p8\" class=\"ltx_para\">\n<p id=\"S2.SS5.SSS2.p8.1\" class=\"ltx_p\"><span
        id=\"S2.SS5.SSS2.p8.1.1\" class=\"ltx_text ltx_font_bold\">Remark: Why not
        symbolic regression (SR)?</span>\nIt is reasonable to use symbolic regression
        for this example. However, symbolic regression methods are in general brittle
        and hard to debug. They either return a success or a failure in the end without
        outputting interpretable intermediate results. In contrast, KANs do continuous
        search (with gradient descent) in function space, so their results are more
        continuous and hence more robust. Moreover, users have more control over KANs
        as compared to SR due to KANs\u2019 transparency. The way we visualize KANs
        is like displaying KANs\u2019 \u201Cbrain\u201D to users, and users can perform
        \u201Csurgery\u201D (debugging) on KANs. This level of control is typically
        unavailable for SR. We will show examples of this in Section\_<a href=\"#S4.SS4\"
        title=\"4.4 Application to Physics: Anderson localization \u2023 4 KANs are
        interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">4.4</span></a>. More generally, when the target
        function is not symbolic, symbolic regression will fail but KANs can still
        provide something meaningful. For example, a special function (e.g., a Bessel
        function) is impossible to SR to learn unless it is provided in advance, but
        KANs can use splines to approximate it numerically anyway (see Figure\_<a
        href=\"#S4.F1\" title=\"Figure 4.1 \u2023 4.1 Supervised toy datasets \u2023
        4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">4.1</span></a> (d)).</p>\n</div>\n</section>\n</section>\n</section>\n<section
        id=\"S3\" class=\"ltx_section\">\n<h2 class=\"ltx_title ltx_title_section\">\n<span
        class=\"ltx_tag ltx_tag_section\">3 </span>KANs are accurate</h2>\n\n<div
        id=\"S3.p1\" class=\"ltx_para\">\n<p id=\"S3.p1.1\" class=\"ltx_p\">In this
        section, we demonstrate that KANs are more effective at representing functions
        than MLPs in various tasks (regression and PDE solving). When comparing two
        families of models, it is fair to compare both their accuracy (loss) and their
        complexity (number of parameters). We will show that KANs display more favorable
        Pareto Frontiers than MLPs. Moreover, in Section\_<a href=\"#S3.SS5\" title=\"3.5
        Continual Learning \u2023 3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">3.5</span></a>,
        we show that KANs can naturally work in continual learning without catastrophic
        forgetting.</p>\n</div>\n<section id=\"S3.SS1\" class=\"ltx_subsection\">\n<h3
        class=\"ltx_title ltx_title_subsection\">\n<span class=\"ltx_tag ltx_tag_subsection\">3.1
        </span>Toy datasets</h3>\n\n<figure id=\"S3.F1\" class=\"ltx_figure\"><img
        src=\"2404.19756v5/x3.png\" id=\"S3.F1.g1\" class=\"ltx_graphics ltx_centering
        ltx_img_landscape\" width=\"830\" height=\"177\" alt=\"Refer to caption\">\n<figcaption
        class=\"ltx_caption ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure
        3.1: </span>Compare KANs to MLPs on five toy examples. KANs can almost saturate
        the fastest scaling law predicted by our theory <math id=\"S3.F1.2.m1\" class=\"ltx_Math\"
        alttext=\"(\\alpha=4)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>\u03B1</mi><mo>=</mo><mn>4</mn></mrow><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(\\alpha=4)</annotation></semantics></math>,
        while MLPs scales slowly and plateau quickly.</figcaption>\n</figure>\n<div
        id=\"S3.SS1.p1\" class=\"ltx_para\">\n<p id=\"S3.SS1.p1.3\" class=\"ltx_p\">In
        Section\_<a href=\"#S2.SS3\" title=\"2.3 KAN\u2019s Approximation Abilities
        and Scaling Laws \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN:
        Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">2.3</span></a>, our theory suggested that test RMSE loss <math
        id=\"S3.SS1.p1.1.m1\" class=\"ltx_Math\" alttext=\"\\ell\" display=\"inline\"
        intent=\":literal\"><semantics><mi mathvariant=\"normal\">\u2113</mi><annotation
        encoding=\"application/x-tex\">\\ell</annotation></semantics></math> scales
        as <math id=\"S3.SS1.p1.2.m2\" class=\"ltx_Math\" alttext=\"\\ell\\propto
        N^{-4}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi mathvariant=\"normal\">\u2113</mi><mo>\u221D</mo><msup><mi>N</mi><mrow><mo>\u2212</mo><mn>4</mn></mrow></msup></mrow><annotation
        encoding=\"application/x-tex\">\\ell\\propto N^{-4}</annotation></semantics></math>
        with model parameters <math id=\"S3.SS1.p1.3.m3\" class=\"ltx_Math\" alttext=\"N\"
        display=\"inline\" intent=\":literal\"><semantics><mi>N</mi><annotation encoding=\"application/x-tex\">N</annotation></semantics></math>.
        However, this relies on the existence of a Kolmogorov-Arnold representation.
        As a sanity check, we construct five examples we know have smooth KA representations:</p>\n<ol
        id=\"S3.I1\" class=\"ltx_enumerate\">\n<li id=\"S3.I1.i1\" class=\"ltx_item\"
        style=\"list-style-type:none;\">\n<span class=\"ltx_tag ltx_tag_item\">(1)</span>
        \n<div id=\"S3.I1.i1.p1\" class=\"ltx_para\">\n<p id=\"S3.I1.i1.p1.2\" class=\"ltx_p\"><math
        id=\"S3.I1.i1.p1.1.m1\" class=\"ltx_Math\" alttext=\"f(x)=J_{0}(20x)\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>x</mi><mo stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><msub><mi>J</mi><mn>0</mn></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mn>20</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation
        encoding=\"application/x-tex\">f(x)=J_{0}(20x)</annotation></semantics></math>,
        which is the Bessel function. Since it is a univariate function, it can be
        represented by a spline, which is a <math id=\"S3.I1.i1.p1.2.m2\" class=\"ltx_Math\"
        alttext=\"[1,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo stretchy=\"false\">]</mo></mrow><annotation
        encoding=\"application/x-tex\">[1,1]</annotation></semantics></math> KAN.</p>\n</div>\n</li>\n<li
        id=\"S3.I1.i2\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(2)</span> \n<div id=\"S3.I1.i2.p1\" class=\"ltx_para\">\n<p
        id=\"S3.I1.i2.p1.2\" class=\"ltx_p\"><math id=\"S3.I1.i2.p1.1.m1\" class=\"ltx_Math\"
        alttext=\"f(x,y)={\\rm exp}({\\rm sin}(\\pi x)+y^{2})\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>x</mi><mo>,</mo><mi>y</mi><mo stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>exp</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mrow><mi>sin</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><msup><mi>y</mi><mn>2</mn></msup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">f(x,y)={\\rm
        exp}({\\rm sin}(\\pi x)+y^{2})</annotation></semantics></math>. We know that
        it can be exactly represented by a <math id=\"S3.I1.i2.p1.2.m2\" class=\"ltx_Math\"
        alttext=\"[2,1,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,1,1]</annotation></semantics></math>
        KAN.</p>\n</div>\n</li>\n<li id=\"S3.I1.i3\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(3)</span> \n<div id=\"S3.I1.i3.p1\" class=\"ltx_para\">\n<p
        id=\"S3.I1.i3.p1.2\" class=\"ltx_p\"><math id=\"S3.I1.i3.p1.1.m1\" class=\"ltx_Math\"
        alttext=\"f(x,y)=xy\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo>,</mo><mi>y</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>x</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mi>y</mi></mrow></mrow><annotation encoding=\"application/x-tex\">f(x,y)=xy</annotation></semantics></math>.
        We know from Figure\_<a href=\"#S4.F1\" title=\"Figure 4.1 \u2023 4.1 Supervised
        toy datasets \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.1</span></a>
        that it can be exactly represented by a <math id=\"S3.I1.i3.p1.2.m2\" class=\"ltx_Math\"
        alttext=\"[2,2,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,2,1]</annotation></semantics></math>
        KAN.</p>\n</div>\n</li>\n<li id=\"S3.I1.i4\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(4)</span> \n<div id=\"S3.I1.i4.p1\" class=\"ltx_para\">\n<p
        id=\"S3.I1.i4.p1.2\" class=\"ltx_p\">A high-dimensional example <math id=\"S3.I1.i4.p1.1.m1\"
        class=\"ltx_Math\" alttext=\"f(x_{1},\\cdots,x_{100})={\\rm exp}(\\frac{1}{100}\\sum_{i=1}^{100}{\\rm
        sin}^{2}(\\frac{\\pi x_{i}}{2}))\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>x</mi><mn>100</mn></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>exp</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mfrac><mn>1</mn><mn>100</mn></mfrac><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><msubsup><mo>\u2211</mo><mrow><mi>i</mi><mo>=</mo><mn>1</mn></mrow><mn>100</mn></msubsup><mrow><msup><mi>sin</mi><mn>2</mn></msup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mfrac><mrow><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>x</mi><mi>i</mi></msub></mrow><mn>2</mn></mfrac><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><mo stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation
        encoding=\"application/x-tex\">f(x_{1},\\cdots,x_{100})={\\rm exp}(\\frac{1}{100}\\sum_{i=1}^{100}{\\rm
        sin}^{2}(\\frac{\\pi x_{i}}{2}))</annotation></semantics></math> which can
        be represented by a <math id=\"S3.I1.i4.p1.2.m2\" class=\"ltx_Math\" alttext=\"[100,1,1]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>100</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[100,1,1]</annotation></semantics></math>
        KAN.</p>\n</div>\n</li>\n<li id=\"S3.I1.i5\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(5)</span> \n<div id=\"S3.I1.i5.p1\" class=\"ltx_para\">\n<p
        id=\"S3.I1.i5.p1.2\" class=\"ltx_p\">A four-dimensional example <math id=\"S3.I1.i5.p1.1.m1\"
        class=\"ltx_Math\" alttext=\"f(x_{1},x_{2},x_{3},x_{4})={\\rm exp}(\\frac{1}{2}({\\rm
        sin}(\\pi(x_{1}^{2}+x_{2}^{2}))+{\\rm sin}(\\pi(x_{3}^{2}+x_{4}^{2}))))\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><msub><mi>x</mi><mn>3</mn></msub><mo>,</mo><msub><mi>x</mi><mn>4</mn></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>exp</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mfrac><mn>1</mn><mn>2</mn></mfrac><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mrow><mi>sin</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><msubsup><mi>x</mi><mn>1</mn><mn>2</mn></msubsup><mo>+</mo><msubsup><mi>x</mi><mn>2</mn><mn>2</mn></msubsup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><mrow><mi>sin</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><msubsup><mi>x</mi><mn>3</mn><mn>2</mn></msubsup><mo>+</mo><msubsup><mi>x</mi><mn>4</mn><mn>2</mn></msubsup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo stretchy=\"false\">)</mo></mrow></mrow></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation
        encoding=\"application/x-tex\">f(x_{1},x_{2},x_{3},x_{4})={\\rm exp}(\\frac{1}{2}({\\rm
        sin}(\\pi(x_{1}^{2}+x_{2}^{2}))+{\\rm sin}(\\pi(x_{3}^{2}+x_{4}^{2}))))</annotation></semantics></math>
        which can be represented by a <math id=\"S3.I1.i5.p1.2.m2\" class=\"ltx_Math\"
        alttext=\"[4,4,2,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>4</mn><mo>,</mo><mn>4</mn><mo>,</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[4,4,2,1]</annotation></semantics></math>
        KAN.</p>\n</div>\n</li>\n</ol>\n<p id=\"S3.SS1.p1.8\" class=\"ltx_p\">We train
        these KANs by increasing grid points every 200 steps, in total covering <math
        id=\"S3.SS1.p1.4.m1\" class=\"ltx_Math\" alttext=\"G=\\{3,5,10,20,50,100,200,500,1000\\}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>G</mi><mo>=</mo><mrow><mo
        stretchy=\"false\">{</mo><mn>3</mn><mo>,</mo><mn>5</mn><mo>,</mo><mn>10</mn><mo>,</mo><mn>20</mn><mo>,</mo><mn>50</mn><mo>,</mo><mn>100</mn><mo>,</mo><mn>200</mn><mo>,</mo><mn>500</mn><mo>,</mo><mn>1000</mn><mo
        stretchy=\"false\">}</mo></mrow></mrow><annotation encoding=\"application/x-tex\">G=\\{3,5,10,20,50,100,200,500,1000\\}</annotation></semantics></math>.
        We train MLPs with different depths and widths as baselines. Both MLPs and
        KANs are trained with LBFGS for 1800 steps in total. We plot test RMSE as
        a function of the number of parameters for KANs and MLPs in Figure\_<a href=\"#S3.F1\"
        title=\"Figure 3.1 \u2023 3.1 Toy datasets \u2023 3 KANs are accurate \u2023
        KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">3.1</span></a>, showing that KANs have better scaling curves
        than MLPs, especially for the high-dimensional example. For comparison, we
        plot the lines predicted from our KAN theory as red dashed (<math id=\"S3.SS1.p1.5.m2\"
        class=\"ltx_Math\" alttext=\"\\alpha=k+1=4\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03B1</mi><mo>=</mo><mrow><mi>k</mi><mo>+</mo><mn>1</mn></mrow><mo>=</mo><mn>4</mn></mrow><annotation
        encoding=\"application/x-tex\">\\alpha=k+1=4</annotation></semantics></math>),
        and the lines predicted from Sharma &amp; Kaplan\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib24\" title=\"\" class=\"ltx_ref\">24</a>]</cite> as black-dashed
        (<math id=\"S3.SS1.p1.6.m3\" class=\"ltx_Math\" alttext=\"\\alpha=(k+1)/d=4/d\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03B1</mi><mo>=</mo><mrow><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>k</mi><mo>+</mo><mn>1</mn></mrow><mo stretchy=\"false\">)</mo></mrow><mo>/</mo><mi>d</mi></mrow><mo>=</mo><mrow><mn>4</mn><mo>/</mo><mi>d</mi></mrow></mrow><annotation
        encoding=\"application/x-tex\">\\alpha=(k+1)/d=4/d</annotation></semantics></math>).
        KANs can almost saturate the steeper red lines, while MLPs struggle to converge
        even as fast as the slower black lines and plateau quickly. We also note that
        for the last example, the 2-Layer KAN <math id=\"S3.SS1.p1.7.m4\" class=\"ltx_Math\"
        alttext=\"[4,9,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>4</mn><mo>,</mo><mn>9</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[4,9,1]</annotation></semantics></math>
        behaves much worse than the 3-Layer KAN (shape <math id=\"S3.SS1.p1.8.m5\"
        class=\"ltx_Math\" alttext=\"[4,2,2,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>4</mn><mo>,</mo><mn>2</mn><mo>,</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[4,2,2,1]</annotation></semantics></math>).
        This highlights the greater expressive power of deeper KANs, which is the
        same for MLPs: deeper MLPs have more expressive power than shallower ones.
        Note that we have adopted the vanilla setup where both KANs and MLPs are trained
        with LBFGS without advanced techniques, e.g., switching between Adam and LBFGS,
        or boosting\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib35\"
        title=\"\" class=\"ltx_ref\">35</a>]</cite>. We leave the comparison of KANs
        and MLPs in advanced setups for future work.</p>\n</div>\n</section>\n<section
        id=\"S3.SS2\" class=\"ltx_subsection\">\n<h3 class=\"ltx_title ltx_title_subsection\">\n<span
        class=\"ltx_tag ltx_tag_subsection\">3.2 </span>Special functions</h3>\n\n<figure
        id=\"S3.F2\" class=\"ltx_figure\"><img src=\"2404.19756v5/x4.png\" id=\"S3.F2.g1\"
        class=\"ltx_graphics ltx_centering ltx_img_landscape\" width=\"830\" height=\"403\"
        alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption ltx_centering\"><span
        class=\"ltx_tag ltx_tag_figure\">Figure 3.2: </span>Fitting special functions.
        We show the Pareto Frontier of KANs and MLPs in the plane spanned by the number
        of model parameters and RMSE loss. Consistently accross all special functions,
        KANs have better Pareto Frontiers than MLPs. The definitions of these special
        functions are in Table\_<a href=\"#S3.T1\" title=\"Table 1 \u2023 3.2 Special
        functions \u2023 3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">1</span></a>.</figcaption>\n</figure>\n<div
        id=\"S3.SS2.p1\" class=\"ltx_para\">\n<p id=\"S3.SS2.p1.1\" class=\"ltx_p\">One
        caveat for the above results is that we assume knowledge of the \u201Ctrue\u201D
        KAN shape. In practice, we do not know the existence of KA representations.
        Even when we are promised that such a KA representation exists, we do not
        know the KAN shape a priori. Special functions in more than one variables
        are such cases, because it would be (mathematically) surprising if multivariate
        special functions (e.g., a Bessel function <math id=\"S3.SS2.p1.1.m1\" class=\"ltx_Math\"
        alttext=\"f(\\nu,x)=J_{\\nu}(x)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03BD</mi><mo>,</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><msub><mi>J</mi><mi>\u03BD</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">f(\\nu,x)=J_{\\nu}(x)</annotation></semantics></math>)
        could be written in KA represenations, involving only univariate functions
        and sums). We show below that:</p>\n<ol id=\"S3.I2\" class=\"ltx_enumerate\">\n<li
        id=\"S3.I2.i1\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(1)</span> \n<div id=\"S3.I2.i1.p1\" class=\"ltx_para\">\n<p
        id=\"S3.I2.i1.p1.1\" class=\"ltx_p\">Finding (approximate) compact KA representations
        of special functions is possible, revealing novel mathematical properties
        of special functions from the perspective of Kolmogorov-Arnold representations.</p>\n</div>\n</li>\n<li
        id=\"S3.I2.i2\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(2)</span> \n<div id=\"S3.I2.i2.p1\" class=\"ltx_para\">\n<p
        id=\"S3.I2.i2.p1.1\" class=\"ltx_p\">KANs are more efficient and accurate
        in representing special functions than MLPs.</p>\n</div>\n</li>\n</ol>\n</div>\n<div
        id=\"S3.SS2.p2\" class=\"ltx_para\">\n<p id=\"S3.SS2.p2.4\" class=\"ltx_p\">We
        collect 15 special functions common in math and physics, summarized in Table\_<a
        href=\"#S3.T1\" title=\"Table 1 \u2023 3.2 Special functions \u2023 3 KANs
        are accurate \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">1</span></a>. We choose MLPs with fixed width
        5 or 100 and depths swept in <math id=\"S3.SS2.p2.1.m1\" class=\"ltx_Math\"
        alttext=\"\\{2,3,4,5,6\\}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">{</mo><mn>2</mn><mo>,</mo><mn>3</mn><mo>,</mo><mn>4</mn><mo>,</mo><mn>5</mn><mo>,</mo><mn>6</mn><mo
        stretchy=\"false\">}</mo></mrow><annotation encoding=\"application/x-tex\">\\{2,3,4,5,6\\}</annotation></semantics></math>.
        We run KANs both with and without pruning. <span id=\"S3.SS2.p2.4.1\" class=\"ltx_text
        ltx_font_italic\">KANs without pruning</span>: We fix the shape of KAN, whose
        width are set to 5 and depths are swept in {2,3,4,5,6}.\n<span id=\"S3.SS2.p2.4.2\"
        class=\"ltx_text ltx_font_italic\">KAN with pruning</span>. We use the sparsification
        <math id=\"S3.SS2.p2.2.m2\" class=\"ltx_Math\" alttext=\"(\\lambda=10^{-2}\\
        {\\rm or}\\ 10^{-3})\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>\u03BB</mi><mo>=</mo><mrow><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>2</mn></mrow></msup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>or</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><msup><mn>
        10</mn><mrow><mo>\u2212</mo><mn>3</mn></mrow></msup></mrow></mrow><mo stretchy=\"false\">)</mo></mrow><annotation
        encoding=\"application/x-tex\">(\\lambda=10^{-2}\\ {\\rm or}\\ 10^{-3})</annotation></semantics></math>
        and pruning technique in Section\_<a href=\"#S2.SS5.SSS1\" title=\"2.5.1 Simplification
        techniques \u2023 2.5 For Interpretability: Simplifying KANs and Making them
        interactive \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.5.1</span></a>
        to obtain a smaller KAN pruned from a fixed-shape KAN. Each KAN is initialized
        to have <math id=\"S3.SS2.p2.3.m3\" class=\"ltx_Math\" alttext=\"G=3\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>G</mi><mo>=</mo><mn>3</mn></mrow><annotation
        encoding=\"application/x-tex\">G=3</annotation></semantics></math>, trained
        with LBFGS, with increasing number of grid points every 200 steps to cover
        <math id=\"S3.SS2.p2.4.m4\" class=\"ltx_Math\" alttext=\"G=\\{3,5,10,20,50,100,200\\}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>G</mi><mo>=</mo><mrow><mo
        stretchy=\"false\">{</mo><mn>3</mn><mo>,</mo><mn>5</mn><mo>,</mo><mn>10</mn><mo>,</mo><mn>20</mn><mo>,</mo><mn>50</mn><mo>,</mo><mn>100</mn><mo>,</mo><mn>200</mn><mo
        stretchy=\"false\">}</mo></mrow></mrow><annotation encoding=\"application/x-tex\">G=\\{3,5,10,20,50,100,200\\}</annotation></semantics></math>.
        For each hyperparameter combination, we run 3 random seeds.</p>\n</div>\n<div
        id=\"S3.SS2.p3\" class=\"ltx_para\">\n<p id=\"S3.SS2.p3.1\" class=\"ltx_p\">For
        each dataset and each model family (KANs or MLPs), we plot the Pareto frontier\_<span
        id=\"footnote4\" class=\"ltx_note ltx_role_footnote\"><sup class=\"ltx_note_mark\">4</sup><span
        class=\"ltx_note_outer\"><span class=\"ltx_note_content\"><sup class=\"ltx_note_mark\">4</sup><span
        class=\"ltx_tag ltx_tag_note\">4</span>Pareto frontier is defined as fits
        that are optimal in the sense of no other fit being both simpler and more
        accurate.</span></span></span>, in the (number of parameters, RMSE) plane,
        shown in Figure\_<a href=\"#S3.F2\" title=\"Figure 3.2 \u2023 3.2 Special
        functions \u2023 3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">3.2</span></a>. KANs\u2019
        performance is shown to be consistently better than MLPs, i.e., KANs can achieve
        lower training/test losses than MLPs, given the same number of parameters.
        Moreover, we report the (surprisingly compact) shapes of our auto-discovered
        KANs for special functions in Table\_<a href=\"#S3.T1\" title=\"Table 1 \u2023
        3.2 Special functions \u2023 3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">1</span></a>.
        On one hand, it is interesting to interpret what these compact representations
        mean mathematically (we include the KAN illustrations in Figure\_<a href=\"#A6.F1\"
        title=\"Figure F.1 \u2023 Appendix F KANs for special functions \u2023 KAN:
        Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">F.1</span></a> and\_<a href=\"#A6.F2\" title=\"Figure F.2 \u2023
        Appendix F KANs for special functions \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">F.2</span></a> in Appendix\_<a
        href=\"#A6\" title=\"Appendix F KANs for special functions \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">F</span></a>).
        On the other hand, these compact representations imply the possibility of
        breaking down a high-dimensional lookup table into several 1D lookup tables,
        which can potentially save a lot of memory, with the (almost negligible) overhead
        to perform a few additions at inference time.</p>\n</div>\n<figure id=\"S3.T1\"
        class=\"ltx_table\">\n<div id=\"S3.T1.69\" class=\"ltx_inline-block ltx_align_center
        ltx_transformed_outer\" style=\"width:390.3pt;height:98.2pt;vertical-align:-47.9pt;\"><span
        class=\"ltx_transformed_inner\" style=\"transform:translate(-223.7pt,56.3pt)
        scale(0.465895996907746,0.465895996907746) ;\">\n<table id=\"S3.T1.69.69\"
        class=\"ltx_tabular ltx_align_middle\">\n<tr id=\"S3.T1.1.1.1\" class=\"ltx_tr\">\n<td
        id=\"S3.T1.1.1.1.2\" class=\"ltx_td ltx_align_center ltx_border_l ltx_border_r
        ltx_border_t\" style=\"padding-top:3.5pt;padding-bottom:3.5pt;\">Name</td>\n<td
        id=\"S3.T1.1.1.1.3\" class=\"ltx_td ltx_align_center ltx_border_r ltx_border_t\"
        style=\"padding-top:3.5pt;padding-bottom:3.5pt;\">scipy.special API</td>\n<td
        id=\"S3.T1.1.1.1.1\" class=\"ltx_td ltx_align_center ltx_border_r ltx_border_t\"
        style=\"padding-top:3.5pt;padding-bottom:3.5pt;\">\n<span id=\"S3.T1.1.1.1.1.2\"
        class=\"ltx_text\"></span> <span id=\"S3.T1.1.1.1.1.1\" class=\"ltx_text\">\n<span
        id=\"S3.T1.1.1.1.1.1.1\" class=\"ltx_tabular ltx_align_middle\">\n<span id=\"S3.T1.1.1.1.1.1.1.2\"
        class=\"ltx_tr\">\n<span id=\"S3.T1.1.1.1.1.1.1.2.1\" class=\"ltx_td ltx_nopad_r
        ltx_align_center\" style=\"padding-top:3.5pt;padding-bottom:3.5pt;\">Minimal
        KAN shape</span></span>\n<span id=\"S3.T1.1.1.1.1.1.1.1\" class=\"ltx_tr\">\n<span
        id=\"S3.T1.1.1.1.1.1.1.1.1\" class=\"ltx_td ltx_nopad_r ltx_align_center\"
        style=\"padding-top:3.5pt;padding-bottom:3.5pt;\">test RMSE <math id=\"S3.T1.1.1.1.1.1.1.1.1.m1\"
        class=\"ltx_Math\" alttext=\"&lt;10^{-2}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi></mi><mo>&lt;</mo><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>2</mn></mrow></msup></mrow><annotation
        encoding=\"application/x-tex\">&lt;10^{-2}</annotation></semantics></math></span></span>\n</span></span><span
        id=\"S3.T1.1.1.1.1.3\" class=\"ltx_text\"></span></td>\n<td id=\"S3.T1.1.1.1.4\"
        class=\"ltx_td ltx_align_center ltx_border_r ltx_border_t\" style=\"padding-top:3.5pt;padding-bottom:3.5pt;\">Minimal
        KAN test RMSE</td>\n<td id=\"S3.T1.1.1.1.5\" class=\"ltx_td ltx_align_center
        ltx_border_r ltx_border_t\" style=\"padding-top:3.5pt;padding-bottom:3.5pt;\">Best
        KAN shape</td>\n<td id=\"S3.T1.1.1.1.6\" class=\"ltx_td ltx_align_center ltx_border_r
        ltx_border_t\" style=\"padding-top:3.5pt;padding-bottom:3.5pt;\">Best KAN
        test RMSE</td>\n<td id=\"S3.T1.1.1.1.7\" class=\"ltx_td ltx_align_center ltx_border_r
        ltx_border_t\" style=\"padding-top:3.5pt;padding-bottom:3.5pt;\">MLP test
        RMSE</td>\n</tr>\n<tr id=\"S3.T1.5.5.5\" class=\"ltx_tr\">\n<td id=\"S3.T1.5.5.5.5\"
        class=\"ltx_td ltx_align_center ltx_border_l ltx_border_r ltx_border_t\" style=\"padding-top:3.5pt;padding-bottom:3.5pt;\">Jacobian
        elliptic functions</td>\n<td id=\"S3.T1.2.2.2.1\" class=\"ltx_td ltx_align_center
        ltx_border_r ltx_border_t\" style=\"padding-top:3.5pt;padding-bottom:3.5pt;\"><math
