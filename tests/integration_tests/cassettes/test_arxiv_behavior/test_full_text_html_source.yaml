        class=\"ltx_td ltx_nopad_r ltx_align_center\">the numerical value of <math
        id=\"A1.T6.2.2.1.1.1.1.1.m1\" class=\"ltx_Math\" alttext=\"\\phi_{l,i,j}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03D5</mi><mrow><mi>l</mi><mo>,</mo><mi>i</mi><mo>,</mo><mi>j</mi></mrow></msub><annotation
        encoding=\"application/x-tex\">\\phi_{l,i,j}</annotation></semantics></math></span></span>\n</span></span><span
        id=\"A1.T6.2.2.1.3\" class=\"ltx_text\"></span></td>\n</tr>\n<tr id=\"A1.T6.2.7\"
        class=\"ltx_tr\">\n<td id=\"A1.T6.2.7.1\" class=\"ltx_td ltx_align_center
        ltx_border_l ltx_border_r ltx_border_t\"><span id=\"A1.T6.2.7.1.1\" class=\"ltx_text
        ltx_font_typewriter\">model.auto_symbolic()</span></td>\n<td id=\"A1.T6.2.7.2\"
