        encoding=\"application/x-tex\">\\phi_{l,i,j}</annotation></semantics></math></span></span>\n<span
        id=\"A1.T6.1.1.1.1.1.2\" class=\"ltx_tr\">\n<span id=\"A1.T6.1.1.1.1.1.2.1\"
        class=\"ltx_td ltx_nopad_r ltx_align_center\">to be the symbolic function
        <span id=\"A1.T6.1.1.1.1.1.2.1.1\" class=\"ltx_text ltx_font_typewriter\">fun</span></span></span>\n</span></span><span
        id=\"A1.T6.1.1.1.3\" class=\"ltx_text\"></span></td>\n</tr>\n<tr id=\"A1.T6.2.2\"
        class=\"ltx_tr\">\n<td id=\"A1.T6.2.2.2\" class=\"ltx_td ltx_align_center
        ltx_border_l ltx_border_r ltx_border_t\"><span id=\"A1.T6.2.2.2.1\" class=\"ltx_text
        ltx_font_typewriter\">model.suggest_symbolic(l,i,j)</span></td>\n<td id=\"A1.T6.2.2.1\"
        class=\"ltx_td ltx_align_center ltx_border_r ltx_border_t\">\n<span id=\"A1.T6.2.2.1.2\"
        class=\"ltx_text\"></span> <span id=\"A1.T6.2.2.1.1\" class=\"ltx_text\">\n<span
        id=\"A1.T6.2.2.1.1.1\" class=\"ltx_tabular ltx_align_middle\">\n<span id=\"A1.T6.2.2.1.1.1.2\"
        class=\"ltx_tr\">\n<span id=\"A1.T6.2.2.1.1.1.2.1\" class=\"ltx_td ltx_nopad_r
        ltx_align_center\">suggest symbolic functions that match</span></span>\n<span
