        class=\"ltx_caption ltx_centering\"><span class=\"ltx_tag ltx_tag_table\">Table
        2: </span>Feynman dataset</figcaption>\n</figure>\n<div id=\"S3.SS3.p2\" class=\"ltx_para\">\n<p
        id=\"S3.SS3.p2.8\" class=\"ltx_p\"><span id=\"S3.SS3.p2.8.1\" class=\"ltx_text
        ltx_font_bold\">Feynman dataset.</span> The Feynman dataset collects many
        physics equations from Feynman\u2019s textbooks\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib36\" title=\"\" class=\"ltx_ref\">36</a>, <a href=\"#bib.bib37\"
        title=\"\" class=\"ltx_ref\">37</a>]</cite>. For our purpose, we are interested
        in problems in the <span id=\"S3.SS3.p2.8.2\" class=\"ltx_text ltx_font_typewriter\">Feynman_no_units</span>
        dataset that have at least 2 variables, since univariate problems are trivial
        for KANs (they simplify to 1D splines). A sample equation from the Feynman
        dataset is the relativisic velocity addition formula</p>\n<table id=\"A6.EGx10\"
        class=\"ltx_equationgroup ltx_eqn_align ltx_eqn_table\">\n\n<tbody id=\"S3.E1\"><tr
        class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_align_right ltx_eqn_cell\"><math
        id=\"S3.E1.m1\" class=\"ltx_Math\" alttext=\"\\displaystyle f(u,v)=(u+v)/(1+uv).\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>u</mi><mo>,</mo><mi>v</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mrow><mo stretchy=\"false\">(</mo><mrow><mi>u</mi><mo>+</mo><mi>v</mi></mrow><mo
        stretchy=\"false\">)</mo></mrow><mo>/</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mn>1</mn><mo>+</mo><mrow><mi>u</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>v</mi></mrow></mrow><mo stretchy=\"false\">)</mo></mrow></mrow></mrow><mo
        lspace=\"0em\">.</mo></mrow><annotation encoding=\"application/x-tex\">\\displaystyle
        f(u,v)=(u+v)/(1+uv).</annotation></semantics></math></td>\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell ltx_eqn_eqno
        ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(3.1)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S3.SS3.p2.7\"
        class=\"ltx_p\">The dataset can be constructed by randomly drawing <math id=\"S3.SS3.p2.1.m1\"
        class=\"ltx_Math\" alttext=\"u_{i}\\in(-1,1)\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>u</mi><mi>i</mi></msub><mo>\u2208</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mo>\u2212</mo><mn>1</mn></mrow><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">u_{i}\\in(-1,1)</annotation></semantics></math>,
        <math id=\"S3.SS3.p2.2.m2\" class=\"ltx_Math\" alttext=\"v_{i}\\in(-1,1)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>v</mi><mi>i</mi></msub><mo>\u2208</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mo>\u2212</mo><mn>1</mn></mrow><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">v_{i}\\in(-1,1)</annotation></semantics></math>,
        and computing <math id=\"S3.SS3.p2.3.m3\" class=\"ltx_Math\" alttext=\"f_{i}=f(u_{i},v_{i})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>f</mi><mi>i</mi></msub><mo>=</mo><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>u</mi><mi>i</mi></msub><mo>,</mo><msub><mi>v</mi><mi>i</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">f_{i}=f(u_{i},v_{i})</annotation></semantics></math>.
        Given many tuples <math id=\"S3.SS3.p2.4.m4\" class=\"ltx_Math\" alttext=\"(u_{i},v_{i},f_{i})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">(</mo><msub><mi>u</mi><mi>i</mi></msub><mo>,</mo><msub><mi>v</mi><mi>i</mi></msub><mo>,</mo><msub><mi>f</mi><mi>i</mi></msub><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(u_{i},v_{i},f_{i})</annotation></semantics></math>,
        a neural network is trained and aims to predict <math id=\"S3.SS3.p2.5.m5\"
        class=\"ltx_Math\" alttext=\"f\" display=\"inline\" intent=\":literal\"><semantics><mi>f</mi><annotation
        encoding=\"application/x-tex\">f</annotation></semantics></math> from <math
        id=\"S3.SS3.p2.6.m6\" class=\"ltx_Math\" alttext=\"u\" display=\"inline\"
        intent=\":literal\"><semantics><mi>u</mi><annotation encoding=\"application/x-tex\">u</annotation></semantics></math>
        and <math id=\"S3.SS3.p2.7.m7\" class=\"ltx_Math\" alttext=\"v\" display=\"inline\"
        intent=\":literal\"><semantics><mi>v</mi><annotation encoding=\"application/x-tex\">v</annotation></semantics></math>.
        We are interested in (1) how well a neural network can perform on test samples;
        (2) how much we can learn about the structure of the problem from neural networks.</p>\n</div>\n<div
        id=\"S3.SS3.p3\" class=\"ltx_para\">\n<p id=\"S3.SS3.p3.3\" class=\"ltx_p\">We
        compare four kinds of neural networks:</p>\n<ol id=\"S3.I3\" class=\"ltx_enumerate\">\n<li
        id=\"S3.I3.i1\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(1)</span> \n<div id=\"S3.I3.i1.p1\" class=\"ltx_para\">\n<p
        id=\"S3.I3.i1.p1.4\" class=\"ltx_p\">Human-constructued KAN. Given a symbolic
        formula, we rewrite it in Kolmogorov-Arnold representations. For example,
        to multiply two numbers <math id=\"S3.I3.i1.p1.1.m1\" class=\"ltx_Math\" alttext=\"x\"
        display=\"inline\" intent=\":literal\"><semantics><mi>x</mi><annotation encoding=\"application/x-tex\">x</annotation></semantics></math>
        and <math id=\"S3.I3.i1.p1.2.m2\" class=\"ltx_Math\" alttext=\"y\" display=\"inline\"
        intent=\":literal\"><semantics><mi>y</mi><annotation encoding=\"application/x-tex\">y</annotation></semantics></math>,
        we can use the identity <math id=\"S3.I3.i1.p1.3.m3\" class=\"ltx_Math\" alttext=\"xy=\\frac{(x+y)^{2}}{4}-\\frac{(x-y)^{2}}{4}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>x</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>y</mi></mrow><mo>=</mo><mrow><mfrac><msup><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>x</mi><mo>+</mo><mi>y</mi></mrow><mo stretchy=\"false\">)</mo></mrow><mn>2</mn></msup><mn>4</mn></mfrac><mo>\u2212</mo><mfrac><msup><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>x</mi><mo>\u2212</mo><mi>y</mi></mrow><mo
        stretchy=\"false\">)</mo></mrow><mn>2</mn></msup><mn>4</mn></mfrac></mrow></mrow><annotation
        encoding=\"application/x-tex\">xy=\\frac{(x+y)^{2}}{4}-\\frac{(x-y)^{2}}{4}</annotation></semantics></math>,
        which corresponds to a <math id=\"S3.I3.i1.p1.4.m4\" class=\"ltx_Math\" alttext=\"[2,2,1]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,2,1]</annotation></semantics></math>
        KAN. The constructued shapes are listed in the \u201CHuman-constructed KAN
        shape\u201D in Table\_<a href=\"#S3.T2\" title=\"Table 2 \u2023 3.3 Feynman
        datasets \u2023 3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2</span></a>.</p>\n</div>\n</li>\n<li
        id=\"S3.I3.i2\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(2)</span> \n<div id=\"S3.I3.i2.p1\" class=\"ltx_para\">\n<p
        id=\"S3.I3.i2.p1.1\" class=\"ltx_p\">KANs without pruning. We fix the KAN
        shape to width 5 and depths are swept over {2,3,4,5,6}.</p>\n</div>\n</li>\n<li
        id=\"S3.I3.i3\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(3)</span> \n<div id=\"S3.I3.i3.p1\" class=\"ltx_para\">\n<p
        id=\"S3.I3.i3.p1.1\" class=\"ltx_p\">KAN with pruning. We use the sparsification
        <math id=\"S3.I3.i3.p1.1.m1\" class=\"ltx_Math\" alttext=\"(\\lambda=10^{-2}\\
        {\\rm or}\\ 10^{-3})\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>\u03BB</mi><mo>=</mo><mrow><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>2</mn></mrow></msup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>or</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><msup><mn>
        10</mn><mrow><mo>\u2212</mo><mn>3</mn></mrow></msup></mrow></mrow><mo stretchy=\"false\">)</mo></mrow><annotation
        encoding=\"application/x-tex\">(\\lambda=10^{-2}\\ {\\rm or}\\ 10^{-3})</annotation></semantics></math>
        and the pruning technique from Section\_<a href=\"#S2.SS5.SSS1\" title=\"2.5.1
        Simplification techniques \u2023 2.5 For Interpretability: Simplifying KANs
        and Making them interactive \u2023 2 Kolmogorov\u2013Arnold Networks (KAN)
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">2.5.1</span></a> to obtain a smaller KAN from a fixed-shape
        KAN from (2).</p>\n</div>\n</li>\n<li id=\"S3.I3.i4\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(4)</span> \n<div id=\"S3.I3.i4.p1\" class=\"ltx_para\">\n<p
        id=\"S3.I3.i4.p1.2\" class=\"ltx_p\">MLPs with fixed width 5, depths swept
        in <math id=\"S3.I3.i4.p1.1.m1\" class=\"ltx_Math\" alttext=\"\\{2,3,4,5,6\\}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">{</mo><mn>2</mn><mo>,</mo><mn>3</mn><mo>,</mo><mn>4</mn><mo>,</mo><mn>5</mn><mo>,</mo><mn>6</mn><mo
        stretchy=\"false\">}</mo></mrow><annotation encoding=\"application/x-tex\">\\{2,3,4,5,6\\}</annotation></semantics></math>,
        and activations chosen from <math id=\"S3.I3.i4.p1.2.m2\" class=\"ltx_Math\"
        alttext=\"\\{{\\rm Tanh},{\\rm ReLU},{\\rm SiLU}\\}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">{</mo><mi>Tanh</mi><mo>,</mo><mi>ReLU</mi><mo>,</mo><mi>SiLU</mi><mo
        stretchy=\"false\">}</mo></mrow><annotation encoding=\"application/x-tex\">\\{{\\rm
        Tanh},{\\rm ReLU},{\\rm SiLU}\\}</annotation></semantics></math>.</p>\n</div>\n</li>\n</ol>\n<p
        id=\"S3.SS3.p3.2\" class=\"ltx_p\">Each KAN is initialized to have <math id=\"S3.SS3.p3.1.m1\"
        class=\"ltx_Math\" alttext=\"G=3\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>G</mi><mo>=</mo><mn>3</mn></mrow><annotation
        encoding=\"application/x-tex\">G=3</annotation></semantics></math>, trained
        with LBFGS, with increasing number of grid points every 200 steps to cover
        <math id=\"S3.SS3.p3.2.m2\" class=\"ltx_Math\" alttext=\"G=\\{3,5,10,20,50,100,200\\}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>G</mi><mo>=</mo><mrow><mo
        stretchy=\"false\">{</mo><mn>3</mn><mo>,</mo><mn>5</mn><mo>,</mo><mn>10</mn><mo>,</mo><mn>20</mn><mo>,</mo><mn>50</mn><mo>,</mo><mn>100</mn><mo>,</mo><mn>200</mn><mo
        stretchy=\"false\">}</mo></mrow></mrow><annotation encoding=\"application/x-tex\">G=\\{3,5,10,20,50,100,200\\}</annotation></semantics></math>.
        For each hyperparameter combination, we try 3 random seeds. For each dataset
        (equation) and each method, we report the results of the best model (minimal
        KAN shape, or lowest test loss) over random seeds and depths in Table\_<a
        href=\"#S3.T2\" title=\"Table 2 \u2023 3.3 Feynman datasets \u2023 3 KANs
        are accurate \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2</span></a>. We find that MLPs and KANs behave
        comparably on average. For each dataset and each model family (KANs or MLPs),
        we plot the Pareto frontier in the plane spanned by the number of parameters
        and RMSE losses, shown in Figure\_<a href=\"#A4.F1\" title=\"Figure D.1 \u2023
        Appendix D Feynman KANs \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">D.1</span></a> in Appendix\_<a href=\"#A4\"
        title=\"Appendix D Feynman KANs \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">D</span></a>. We conjecture
        that the Feynman datasets are too simple to let KANs make further improvements,
        in the sense that variable dependence is usually smooth or monotonic, which
        is in contrast to the complexity of special functions which often demonstrate
        oscillatory behavior.</p>\n</div>\n<div id=\"S3.SS3.p4\" class=\"ltx_para\">\n<p
        id=\"S3.SS3.p4.1\" class=\"ltx_p\"><span id=\"S3.SS3.p4.1.1\" class=\"ltx_text
        ltx_font_bold\">Auto-discovered KANs are smaller than human-constructed ones.</span>
        We report the pruned KAN shape in two columns of Table\_<a href=\"#S3.T2\"
        title=\"Table 2 \u2023 3.3 Feynman datasets \u2023 3 KANs are accurate \u2023
        KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">2</span></a>; one column is for the minimal pruned KAN shape
        that can achieve reasonable loss (i.e., test RMSE smaller than <math id=\"S3.SS3.p4.1.m1\"
        class=\"ltx_Math\" alttext=\"10^{-2}\" display=\"inline\" intent=\":literal\"><semantics><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>2</mn></mrow></msup><annotation
        encoding=\"application/x-tex\">10^{-2}</annotation></semantics></math>); the
        other column is for the pruned KAN that achieves lowest test loss. For completeness,
        we visualize all 54 pruned KANs in Appendix\_<a href=\"#A4\" title=\"Appendix
        D Feynman KANs \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">D</span></a> (Figure\_<a href=\"#A4.F2\" title=\"Figure
        D.2 \u2023 Appendix D Feynman KANs \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">D.2</span></a> and\_<a
        href=\"#A4.F3\" title=\"Figure D.3 \u2023 Appendix D Feynman KANs \u2023 KAN:
        Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">D.3</span></a>). It is interesting to observe that auto-discovered
        KAN shapes (for both minimal and best) are usually smaller than our human
        constructions. This means that KA representations can be more efficient than
        we imagine. At the same time, this may make interpretability subtle because
        information is being squashed into a smaller space than what we are comfortable
        with.</p>\n</div>\n<div id=\"S3.SS3.p5\" class=\"ltx_para\">\n<p id=\"S3.SS3.p5.8\"
        class=\"ltx_p\">Consider the relativistic velocity composition <math id=\"S3.SS3.p5.1.m1\"
        class=\"ltx_Math\" alttext=\"f(u,v)=\\frac{u+v}{1+uv}\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>u</mi><mo>,</mo><mi>v</mi><mo stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mfrac><mrow><mi>u</mi><mo>+</mo><mi>v</mi></mrow><mrow><mn>1</mn><mo>+</mo><mrow><mi>u</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>v</mi></mrow></mrow></mfrac></mrow><annotation
        encoding=\"application/x-tex\">f(u,v)=\\frac{u+v}{1+uv}</annotation></semantics></math>,
        for example. Our construction is quite deep because we were assuming that
        multiplication of <math id=\"S3.SS3.p5.2.m2\" class=\"ltx_Math\" alttext=\"u,v\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>u</mi><mo>,</mo><mi>v</mi></mrow><annotation
        encoding=\"application/x-tex\">u,v</annotation></semantics></math> would use
        two layers (see Figure\_<a href=\"#S4.F1\" title=\"Figure 4.1 \u2023 4.1 Supervised
        toy datasets \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.1</span></a>
        (a)), inversion of <math id=\"S3.SS3.p5.3.m3\" class=\"ltx_Math\" alttext=\"1+uv\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mn>1</mn><mo>+</mo><mrow><mi>u</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>v</mi></mrow></mrow><annotation
        encoding=\"application/x-tex\">1+uv</annotation></semantics></math> would
        use one layer, and multiplication of <math id=\"S3.SS3.p5.4.m4\" class=\"ltx_Math\"
        alttext=\"u+v\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>u</mi><mo>+</mo><mi>v</mi></mrow><annotation
        encoding=\"application/x-tex\">u+v</annotation></semantics></math> and <math
        id=\"S3.SS3.p5.5.m5\" class=\"ltx_Math\" alttext=\"1/(1+uv)\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mn>1</mn><mo>/</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mn>1</mn><mo>+</mo><mrow><mi>u</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>v</mi></mrow></mrow><mo stretchy=\"false\">)</mo></mrow></mrow><annotation
        encoding=\"application/x-tex\">1/(1+uv)</annotation></semantics></math> would
        use another two layers<span id=\"footnote5\" class=\"ltx_note ltx_role_footnote\"><sup
        class=\"ltx_note_mark\">5</sup><span class=\"ltx_note_outer\"><span class=\"ltx_note_content\"><sup
        class=\"ltx_note_mark\">5</sup><span class=\"ltx_tag ltx_tag_note\">5</span>Note
        that we cannot use the logarithmic construction for division, because <math
        id=\"footnote5.m1\" class=\"ltx_Math\" alttext=\"u\" display=\"inline\" intent=\":literal\"><semantics><mi>u</mi><annotation
        encoding=\"application/x-tex\">u</annotation></semantics></math> and <math
        id=\"footnote5.m2\" class=\"ltx_Math\" alttext=\"v\" display=\"inline\" intent=\":literal\"><semantics><mi>v</mi><annotation
        encoding=\"application/x-tex\">v</annotation></semantics></math> here might
        be negative numbers.</span></span></span>, resulting a total of 5 layers.
        However, the auto-discovered KANs are only 2 layers deep! In hindsight, this
        is actually expected if we recall the rapidity trick in relativity: define
        the two \u201Crapidities\u201D <math id=\"S3.SS3.p5.6.m6\" class=\"ltx_Math\"
        alttext=\"a\\equiv{\\rm arctanh}\\ u\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>a</mi><mo>\u2261</mo><mrow><mi>arctanh</mi><mo
        lspace=\"0.500em\" rspace=\"0em\">\u200B</mo><mi>u</mi></mrow></mrow><annotation
        encoding=\"application/x-tex\">a\\equiv{\\rm arctanh}\\ u</annotation></semantics></math>
        and <math id=\"S3.SS3.p5.7.m7\" class=\"ltx_Math\" alttext=\"b\\equiv{\\rm
        arctanh}\\ v\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>b</mi><mo>\u2261</mo><mrow><mi>arctanh</mi><mo
        lspace=\"0.500em\" rspace=\"0em\">\u200B</mo><mi>v</mi></mrow></mrow><annotation
        encoding=\"application/x-tex\">b\\equiv{\\rm arctanh}\\ v</annotation></semantics></math>.
        The relativistic composition of velocities are simple additions in rapidity
        space, i.e., <math id=\"S3.SS3.p5.8.m8\" class=\"ltx_Math\" alttext=\"\\frac{u+v}{1+uv}={\\rm
        tanh}({\\rm arctanh}\\ u+{\\rm arctanh}\\ v)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mfrac><mrow><mi>u</mi><mo>+</mo><mi>v</mi></mrow><mrow><mn>1</mn><mo>+</mo><mrow><mi>u</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>v</mi></mrow></mrow></mfrac><mo>=</mo><mrow><mi>tanh</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mrow><mi>arctanh</mi><mo
        lspace=\"0.500em\" rspace=\"0em\">\u200B</mo><mi>u</mi></mrow><mo>+</mo><mrow><mi>arctanh</mi><mo
        lspace=\"0.500em\" rspace=\"0em\">\u200B</mo><mi>v</mi></mrow></mrow><mo stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation
        encoding=\"application/x-tex\">\\frac{u+v}{1+uv}={\\rm tanh}({\\rm arctanh}\\
        u+{\\rm arctanh}\\ v)</annotation></semantics></math>, which can be realized
        by a two-layer KAN. Pretending we do not know the notion of rapidity in physics,
        we could potentially discover this concept right from KANs without trial-and-error
        symbolic manipulations. The interpretability of KANs which can facilitate
        scientific discovery is the main topic in Section\_<a href=\"#S4\" title=\"4
        KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">4</span></a>.</p>\n</div>\n</section>\n<section
        id=\"S3.SS4\" class=\"ltx_subsection\">\n<h3 class=\"ltx_title ltx_title_subsection\">\n<span
        class=\"ltx_tag ltx_tag_subsection\">3.4 </span>Solving partial differential
        equations</h3>\n\n<figure id=\"S3.F3\" class=\"ltx_figure\"><img src=\"2404.19756v5/x5.png\"
        id=\"S3.F3.g1\" class=\"ltx_graphics ltx_centering ltx_img_landscape\" width=\"830\"
        height=\"188\" alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption
        ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure 3.3: </span>The
        PDE example. We plot L2 squared and H1 squared losses between the predicted
        solution and ground truth solution. First and second: training dynamics of
        losses. Third and fourth: scaling laws of losses against the number of parameters.
        KANs converge faster, achieve lower losses, and have steeper scaling laws
        than MLPs.</figcaption>\n</figure>\n<div id=\"S3.SS4.p1\" class=\"ltx_para\">\n<p
        id=\"S3.SS4.p1.1\" class=\"ltx_p\">We consider a Poisson equation with zero
        Dirichlet boundary data. For <math id=\"S3.SS4.p1.1.m1\" class=\"ltx_Math\"
        alttext=\"\\Omega=[-1,1]^{2}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi
        mathvariant=\"normal\">\u03A9</mi><mo>=</mo><msup><mrow><mo stretchy=\"false\">[</mo><mrow><mo>\u2212</mo><mn>1</mn></mrow><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><mn>2</mn></msup></mrow><annotation encoding=\"application/x-tex\">\\Omega=[-1,1]^{2}</annotation></semantics></math>,
        consider the PDE</p>\n<table id=\"S3.E2\" class=\"ltx_equationgroup ltx_eqn_table\">\n<tbody>\n<tr
        id=\"S3.E2X\" class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_align_right
        ltx_eqn_cell\"><math id=\"S3.E2X.2.1.1.m1\" class=\"ltx_Math\" alttext=\"\\displaystyle
        u_{xx}+u_{yy}\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>u</mi><mrow><mi>x</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow></msub><mo>+</mo><msub><mi>u</mi><mrow><mi>y</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>y</mi></mrow></msub></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle u_{xx}+u_{yy}</annotation></semantics></math></td>\n<td
        class=\"ltx_td ltx_align_left ltx_eqn_cell\"><math id=\"S3.E2X.3.2.2.m1\"
        class=\"ltx_Math\" alttext=\"\\displaystyle=f\\quad\\text{in}\\,\\,\\Omega\\,,\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi></mi><mo>=</mo><mrow><mi>f</mi><mspace
        style=\"width:1em;\" width=\"1em\"></mspace><mrow><mtext>in</mtext><mo lspace=\"0.330em\"
        rspace=\"0em\">\u200B</mo><mi mathvariant=\"normal\">\u03A9</mi></mrow></mrow></mrow><mo
        lspace=\"0.170em\">,</mo></mrow><annotation encoding=\"application/x-tex\">\\displaystyle=f\\quad\\text{in}\\,\\,\\Omega\\,,</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"2\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equationgroup
        ltx_align_right\">(3.2)</span></td>\n</tr>\n<tr id=\"S3.E2Xa\" class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_td ltx_align_right ltx_eqn_cell\"><math id=\"S3.E2Xa.2.1.1.m1\"
        class=\"ltx_Math\" alttext=\"\\displaystyle u\" display=\"inline\" intent=\":literal\"><semantics><mi>u</mi><annotation
        encoding=\"application/x-tex\">\\displaystyle u</annotation></semantics></math></td>\n<td
        class=\"ltx_td ltx_align_left ltx_eqn_cell\"><math id=\"S3.E2Xa.3.2.2.m1\"
        class=\"ltx_Math\" alttext=\"\\displaystyle=0\\quad\\text{on}\\,\\,\\partial\\Omega\\,.\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi></mi><mo>=</mo><mrow><mn>0</mn><mspace
        style=\"width:1em;\" width=\"1em\"></mspace><mrow><mtext>on</mtext><mo lspace=\"0.330em\"
        rspace=\"0em\">\u200B</mo><mrow><mo rspace=\"0em\">\u2202</mo><mi mathvariant=\"normal\">\u03A9</mi></mrow></mrow></mrow></mrow><mo
        lspace=\"0.170em\">.</mo></mrow><annotation encoding=\"application/x-tex\">\\displaystyle=0\\quad\\text{on}\\,\\,\\partial\\Omega\\,.</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n</tr>\n</tbody>\n</table>\n<p
        id=\"S3.SS4.p1.3\" class=\"ltx_p\">We consider the data <math id=\"S3.SS4.p1.2.m1\"
        class=\"ltx_Math\" alttext=\"f=-\\pi^{2}(1+4y^{2})\\sin(\\pi x)\\sin(\\pi
        y^{2})+2\\pi\\sin(\\pi x)\\cos(\\pi y^{2})\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>f</mi><mo>=</mo><mrow><mrow><mo>\u2212</mo><mrow><msup><mi>\u03C0</mi><mn>2</mn></msup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mn>1</mn><mo>+</mo><mrow><mn>4</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msup><mi>y</mi><mn>2</mn></msup></mrow></mrow><mo
        stretchy=\"false\">)</mo></mrow><mo lspace=\"0.167em\" rspace=\"0em\">\u200B</mo><mrow><mi>sin</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo lspace=\"0.167em\" rspace=\"0em\">\u200B</mo><mrow><mi>sin</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><msup><mi>y</mi><mn>2</mn></msup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><mo>+</mo><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\u03C0</mi><mo lspace=\"0.167em\"
        rspace=\"0em\">\u200B</mo><mrow><mi>sin</mi><mo>\u2061</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo stretchy=\"false\">)</mo></mrow></mrow><mo
        lspace=\"0.167em\" rspace=\"0em\">\u200B</mo><mrow><mi>cos</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><msup><mi>y</mi><mn>2</mn></msup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">f=-\\pi^{2}(1+4y^{2})\\sin(\\pi
        x)\\sin(\\pi y^{2})+2\\pi\\sin(\\pi x)\\cos(\\pi y^{2})</annotation></semantics></math>
        for which <math id=\"S3.SS4.p1.3.m2\" class=\"ltx_Math\" alttext=\"u=\\sin(\\pi
        x)\\sin(\\pi y^{2})\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>u</mi><mo>=</mo><mrow><mrow><mi>sin</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo lspace=\"0.167em\" rspace=\"0em\">\u200B</mo><mrow><mi>sin</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><msup><mi>y</mi><mn>2</mn></msup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">u=\\sin(\\pi
        x)\\sin(\\pi y^{2})</annotation></semantics></math> is the true solution.
        We use the framework of physics-informed neural networks (PINNs) <cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib38\" title=\"\" class=\"ltx_ref\">38</a>,
        <a href=\"#bib.bib39\" title=\"\" class=\"ltx_ref\">39</a>]</cite> to solve
        this PDE, with the loss function given by</p>\n<table id=\"S3.Ex1\" class=\"ltx_equation
        ltx_eqn_table\">\n\n<tbody><tr class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_eqn_cell
        ltx_align_center\"><math id=\"S3.Ex1.m1\" class=\"ltx_Math\" alttext=\"\\text{loss}_{\\text{pde}}=\\alpha\\text{loss}_{i}+\\text{loss}_{b}\\coloneqq\\alpha\\frac{1}{n_{i}}\\sum_{i=1}^{n_{i}}|u_{xx}(z_{i})+u_{yy}(z_{i})-f(z_{i})|^{2}+\\frac{1}{n_{b}}\\sum_{i=1}^{n_{b}}u^{2}\\,,\"
        display=\"block\" intent=\":literal\"><semantics><mrow><mrow><msub><mtext>loss</mtext><mtext>pde</mtext></msub><mo>=</mo><mrow><mrow><mi>\u03B1</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mtext>loss</mtext><mi>i</mi></msub></mrow><mo>+</mo><msub><mtext>loss</mtext><mi>b</mi></msub></mrow><mo>\u2254</mo><mrow><mrow><mi>\u03B1</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mfrac><mn>1</mn><msub><mi>n</mi><mi>i</mi></msub></mfrac><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><munderover><mo movablelimits=\"false\"
        rspace=\"0em\">\u2211</mo><mrow><mi>i</mi><mo>=</mo><mn>1</mn></mrow><msub><mi>n</mi><mi>i</mi></msub></munderover><msup><mrow><mo
        stretchy=\"false\">|</mo><mrow><mrow><mrow><msub><mi>u</mi><mrow><mi>x</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow></msub><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>z</mi><mi>i</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><mrow><msub><mi>u</mi><mrow><mi>y</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>y</mi></mrow></msub><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>z</mi><mi>i</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><mo>\u2212</mo><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>z</mi><mi>i</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><mo stretchy=\"false\">|</mo></mrow><mn>2</mn></msup></mrow></mrow><mo>+</mo><mrow><mfrac><mn>1</mn><msub><mi>n</mi><mi>b</mi></msub></mfrac><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><munderover><mo movablelimits=\"false\">\u2211</mo><mrow><mi>i</mi><mo>=</mo><mn>1</mn></mrow><msub><mi>n</mi><mi>b</mi></msub></munderover><msup><mi>u</mi><mn>2</mn></msup></mrow></mrow></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">\\text{loss}_{\\text{pde}}=\\alpha\\text{loss}_{i}+\\text{loss}_{b}\\coloneqq\\alpha\\frac{1}{n_{i}}\\sum_{i=1}^{n_{i}}|u_{xx}(z_{i})+u_{yy}(z_{i})-f(z_{i})|^{2}+\\frac{1}{n_{b}}\\sum_{i=1}^{n_{b}}u^{2}\\,,</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n</tr></tbody>\n</table>\n<p
        id=\"S3.SS4.p1.9\" class=\"ltx_p\">where we use <math id=\"S3.SS4.p1.4.m1\"
        class=\"ltx_Math\" alttext=\"\\text{loss}_{i}\" display=\"inline\" intent=\":literal\"><semantics><msub><mtext>loss</mtext><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">\\text{loss}_{i}</annotation></semantics></math>
        to denote the interior loss, discretized and evaluated by a uniform sampling
        of <math id=\"S3.SS4.p1.5.m2\" class=\"ltx_Math\" alttext=\"n_{i}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>n</mi><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">n_{i}</annotation></semantics></math> points
        <math id=\"S3.SS4.p1.6.m3\" class=\"ltx_Math\" alttext=\"z_{i}=(x_{i},y_{i})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>z</mi><mi>i</mi></msub><mo>=</mo><mrow><mo
        stretchy=\"false\">(</mo><msub><mi>x</mi><mi>i</mi></msub><mo>,</mo><msub><mi>y</mi><mi>i</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">z_{i}=(x_{i},y_{i})</annotation></semantics></math>
        inside the domain, and similarly we use <math id=\"S3.SS4.p1.7.m4\" class=\"ltx_Math\"
        alttext=\"\\text{loss}_{b}\" display=\"inline\" intent=\":literal\"><semantics><msub><mtext>loss</mtext><mi>b</mi></msub><annotation
        encoding=\"application/x-tex\">\\text{loss}_{b}</annotation></semantics></math>
        to denote the boundary loss, discretized and evaluated by a uniform sampling
        of <math id=\"S3.SS4.p1.8.m5\" class=\"ltx_Math\" alttext=\"n_{b}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>n</mi><mi>b</mi></msub><annotation
        encoding=\"application/x-tex\">n_{b}</annotation></semantics></math> points
        on the boundary. <math id=\"S3.SS4.p1.9.m6\" class=\"ltx_Math\" alttext=\"\\alpha\"
        display=\"inline\" intent=\":literal\"><semantics><mi>\u03B1</mi><annotation
        encoding=\"application/x-tex\">\\alpha</annotation></semantics></math> is
        the hyperparameter balancing the effect of the two terms.</p>\n</div>\n<div
        id=\"S3.SS4.p2\" class=\"ltx_para\">\n<p id=\"S3.SS4.p2.9\" class=\"ltx_p\">We
        compare the KAN architecture with that of MLPs using the same hyperparameters
        <math id=\"S3.SS4.p2.1.m1\" class=\"ltx_Math\" alttext=\"n_{i}=10000\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><msub><mi>n</mi><mi>i</mi></msub><mo>=</mo><mn>10000</mn></mrow><annotation
        encoding=\"application/x-tex\">n_{i}=10000</annotation></semantics></math>,
        <math id=\"S3.SS4.p2.2.m2\" class=\"ltx_Math\" alttext=\"n_{b}=800\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><msub><mi>n</mi><mi>b</mi></msub><mo>=</mo><mn>800</mn></mrow><annotation
        encoding=\"application/x-tex\">n_{b}=800</annotation></semantics></math>,
        and <math id=\"S3.SS4.p2.3.m3\" class=\"ltx_Math\" alttext=\"\\alpha=0.01\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03B1</mi><mo>=</mo><mn>0.01</mn></mrow><annotation
        encoding=\"application/x-tex\">\\alpha=0.01</annotation></semantics></math>.
        We measure both the error in the <math id=\"S3.SS4.p2.4.m4\" class=\"ltx_Math\"
        alttext=\"L^{2}\" display=\"inline\" intent=\":literal\"><semantics><msup><mi>L</mi><mn>2</mn></msup><annotation
        encoding=\"application/x-tex\">L^{2}</annotation></semantics></math> norm
        and energy (<math id=\"S3.SS4.p2.5.m5\" class=\"ltx_Math\" alttext=\"H^{1}\"
        display=\"inline\" intent=\":literal\"><semantics><msup><mi>H</mi><mn>1</mn></msup><annotation
        encoding=\"application/x-tex\">H^{1}</annotation></semantics></math>) norm
        and see that KAN achieves a much better scaling law with a smaller error,
        using smaller networks and fewer parameters; see Figure <a href=\"#S3.F3\"
        title=\"Figure 3.3 \u2023 3.4 Solving partial differential equations \u2023
        3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">3.3</span></a>. A 2-Layer width-10 KAN is 100
        times more accurate than a 4-Layer width-100 MLP (<math id=\"S3.SS4.p2.6.m6\"
        class=\"ltx_Math\" alttext=\"10^{-7}\" display=\"inline\" intent=\":literal\"><semantics><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>7</mn></mrow></msup><annotation
        encoding=\"application/x-tex\">10^{-7}</annotation></semantics></math> vs
        <math id=\"S3.SS4.p2.7.m7\" class=\"ltx_Math\" alttext=\"10^{-5}\" display=\"inline\"
        intent=\":literal\"><semantics><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>5</mn></mrow></msup><annotation
        encoding=\"application/x-tex\">10^{-5}</annotation></semantics></math> MSE)
        and 100 times more parameter efficient (<math id=\"S3.SS4.p2.8.m8\" class=\"ltx_Math\"
        alttext=\"10^{2}\" display=\"inline\" intent=\":literal\"><semantics><msup><mn>10</mn><mn>2</mn></msup><annotation
        encoding=\"application/x-tex\">10^{2}</annotation></semantics></math> vs <math
        id=\"S3.SS4.p2.9.m9\" class=\"ltx_Math\" alttext=\"10^{4}\" display=\"inline\"
        intent=\":literal\"><semantics><msup><mn>10</mn><mn>4</mn></msup><annotation
        encoding=\"application/x-tex\">10^{4}</annotation></semantics></math> parameters).
        Therefore we speculate that KANs might have the potential of serving as a
        good neural network representation for model reduction of PDEs. However, we
        want to note that our implementation of KANs are typically 10x slower than
        MLPs to train. The ground truth being a symbolic formula might be an unfair
        comparison for MLPs since KANs are good at representing symbolic formulas.
        In general, KANs and MLPs are good at representing different function classes
        of PDE solutions, which needs detailed future study to understand their respective
        boundaries.</p>\n</div>\n</section>\n<section id=\"S3.SS5\" class=\"ltx_subsection\">\n<h3
        class=\"ltx_title ltx_title_subsection\">\n<span class=\"ltx_tag ltx_tag_subsection\">3.5
        </span>Continual Learning</h3>\n\n<figure id=\"S3.F4\" class=\"ltx_figure\"><img
        src=\"2404.19756v5/x6.png\" id=\"S3.F4.g1\" class=\"ltx_graphics ltx_centering
        ltx_img_landscape\" width=\"830\" height=\"358\" alt=\"Refer to caption\">\n<figcaption
        class=\"ltx_caption ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure
        3.4: </span>A toy continual learning problem. The dataset is a 1D regression
        task with 5 Gaussian peaks (top row). Data around each peak is presented sequentially
        (instead of all at once) to KANs and MLPs. KANs (middle row) can perfectly
        avoid catastrophic forgetting, while MLPs (bottom row) display severe catastrophic
        forgetting. </figcaption>\n</figure>\n<div id=\"S3.SS5.p1\" class=\"ltx_para\">\n<p
        id=\"S3.SS5.p1.1\" class=\"ltx_p\">Catastrophic forgetting is a serious problem
        in current machine learning\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib40\" title=\"\" class=\"ltx_ref\">40</a>]</cite>. When a human
        masters a task and switches to another task, they do not forget how to perform
        the first task. Unfortunately, this is not the case for neural networks. When
        a neural network is trained on task\_1 and then shifted to being trained on
        task\_2, the network will soon forget about how to perform task\_1. A key
        difference between artificial neural networks and human brains is that human
        brains have functionally distinct modules placed locally in space. When a
        new task is learned, structure re-organization only occurs in local regions
        responsible for relevant skills\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib41\" title=\"\" class=\"ltx_ref\">41</a>, <a href=\"#bib.bib42\"
        title=\"\" class=\"ltx_ref\">42</a>]</cite>, leaving other regions intact.
        Most artificial neural networks, including MLPs, do not have this notion of
        locality, which is probably the reason for catastrophic forgetting.</p>\n</div>\n<div
        id=\"S3.SS5.p2\" class=\"ltx_para\">\n<p id=\"S3.SS5.p2.1\" class=\"ltx_p\">We
        show that KANs have local plasticity and can avoid catastrophic forgetting
        by leveraging the locality of splines. The idea is simple: since spline bases
        are local, a sample will only affect a few nearby spline coefficients, leaving
        far-away coefficients intact (which is desirable since far-away regions may
        have already stored information that we want to preserve). By contrast, since
        MLPs usually use global activations, e.g., ReLU/Tanh/SiLU etc., any local
        change may propagate uncontrollably to regions far away, destroying the information
        being stored there.</p>\n</div>\n<div id=\"S3.SS5.p3\" class=\"ltx_para\">\n<p
        id=\"S3.SS5.p3.1\" class=\"ltx_p\">We use a toy example to validate this intuition.
        The 1D regression task is composed of 5 Gaussian peaks. Data around each peak
        is presented sequentially (instead of all at once) to KANs and MLPs, as shown
        in Figure\_<a href=\"#S3.F4\" title=\"Figure 3.4 \u2023 3.5 Continual Learning
        \u2023 3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">3.4</span></a> top row. KAN and MLP predictions
        after each training phase are shown in the middle and bottom rows. As expected,
        KAN only remodels regions where data is present on in the current phase, leaving
        previous regions unchanged. By contrast, MLPs remodels the whole region after
        seeing new data samples, leading to catastrophic forgetting.</p>\n</div>\n<div
        id=\"S3.SS5.p4\" class=\"ltx_para\">\n<p id=\"S3.SS5.p4.1\" class=\"ltx_p\">Here
        we simply present our preliminary results on an extremely simple example,
        to demonstrate how one could possibly leverage locality in KANs (thanks to
        spline parametrizations) to reduce catastrophic forgetting. However, it remains
        unclear whether our method can generalize to more realistic setups, especially
        in high-dimensional cases where it is unclear how to define \u201Clocality\u201D.
        In future work, We would also like to study how our method can be connected
        to and combined with SOTA methods in continual learning\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib43\" title=\"\" class=\"ltx_ref\">43</a>,
        <a href=\"#bib.bib44\" title=\"\" class=\"ltx_ref\">44</a>]</cite>.</p>\n</div>\n</section>\n</section>\n<section
        id=\"S4\" class=\"ltx_section\">\n<h2 class=\"ltx_title ltx_title_section\">\n<span
        class=\"ltx_tag ltx_tag_section\">4 </span>KANs are interpretable</h2>\n\n<div
        id=\"S4.p1\" class=\"ltx_para\">\n<p id=\"S4.p1.1\" class=\"ltx_p\">In this
        section, we show that KANs are interpretable and interactive thanks to the
        techniques we developed in Section\_<a href=\"#S2.SS5\" title=\"2.5 For Interpretability:
        Simplifying KANs and Making them interactive \u2023 2 Kolmogorov\u2013Arnold
        Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.5</span></a>. We want to test the use of
        KANs not only on synthetic tasks (Section\_<a href=\"#S4.SS1\" title=\"4.1
        Supervised toy datasets \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.1</span></a>
        and\_<a href=\"#S4.SS2\" title=\"4.2 Unsupervised toy dataset \u2023 4 KANs
        are interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">4.2</span></a>), but also in real-life scientific
        research. We demonstrate that KANs can (re)discover both highly non-trivial
        relations in knot theory (Section\_<a href=\"#S4.SS3\" title=\"4.3 Application
        to Mathematics: Knot Theory \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.3</span></a>)
        and phase transition boundaries in condensed matter physics (Section\_<a href=\"#S4.SS4\"
        title=\"4.4 Application to Physics: Anderson localization \u2023 4 KANs are
        interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">4.4</span></a>). KANs could potentially be
        the foundation model for AI + Science due to their accuracy (last section)
        and interpretability (this section).</p>\n</div>\n<section id=\"S4.SS1\" class=\"ltx_subsection\">\n<h3
        class=\"ltx_title ltx_title_subsection\">\n<span class=\"ltx_tag ltx_tag_subsection\">4.1
        </span>Supervised toy datasets</h3>\n\n<figure id=\"S4.F1\" class=\"ltx_figure\"><img
        src=\"2404.19756v5/figs/interpretable_examples.png\" id=\"S4.F1.g1\" class=\"ltx_graphics
        ltx_centering ltx_img_landscape\" width=\"598\" height=\"369\" alt=\"Refer
        to caption\">\n<figcaption class=\"ltx_caption ltx_centering\"><span class=\"ltx_tag
        ltx_tag_figure\">Figure 4.1: </span>KANs are interepretable for simple symbolic
        tasks</figcaption>\n</figure>\n<div id=\"S4.SS1.p1\" class=\"ltx_para\">\n<p
        id=\"S4.SS1.p1.1\" class=\"ltx_p\">We first examine KANs\u2019 ability to
        reveal the compositional structures in symbolic formulas. Six examples are
        listed below and their KANs are visualized in Figure\_<a href=\"#S4.F1\" title=\"Figure
        4.1 \u2023 4.1 Supervised toy datasets \u2023 4 KANs are interpretable \u2023
        KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">4.1</span></a>. KANs are able to reveal the compositional structures
        present in these formulas, as well as learn the correct univariate functions.</p>\n</div>\n<div
        id=\"S4.SS1.p2\" class=\"ltx_para\">\n<ol id=\"S4.I1\" class=\"ltx_enumerate\">\n<li
        id=\"S4.I1.i1\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(a)</span> \n<div id=\"S4.I1.i1.p1\" class=\"ltx_para\">\n<p
        id=\"S4.I1.i1.p1.5\" class=\"ltx_p\">Multiplication <math id=\"S4.I1.i1.p1.1.m1\"
        class=\"ltx_Math\" alttext=\"f(x,y)=xy\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo>,</mo><mi>y</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>x</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mi>y</mi></mrow></mrow><annotation encoding=\"application/x-tex\">f(x,y)=xy</annotation></semantics></math>.
        A <math id=\"S4.I1.i1.p1.2.m2\" class=\"ltx_Math\" alttext=\"[2,5,1]\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>5</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,5,1]</annotation></semantics></math>
        KAN is pruned to a <math id=\"S4.I1.i1.p1.3.m3\" class=\"ltx_Math\" alttext=\"[2,2,1]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,2,1]</annotation></semantics></math>
        KAN. The learned activation functions are linear and quadratic. From the computation
        graph, we see that the way it computes <math id=\"S4.I1.i1.p1.4.m4\" class=\"ltx_Math\"
        alttext=\"xy\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>x</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>y</mi></mrow><annotation encoding=\"application/x-tex\">xy</annotation></semantics></math>
        is leveraging <math id=\"S4.I1.i1.p1.5.m5\" class=\"ltx_Math\" alttext=\"2xy=(x+y)^{2}-(x^{2}+y^{2})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>y</mi></mrow><mo>=</mo><mrow><msup><mrow><mo
        stretchy=\"false\">(</mo><mrow><mi>x</mi><mo>+</mo><mi>y</mi></mrow><mo stretchy=\"false\">)</mo></mrow><mn>2</mn></msup><mo>\u2212</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><msup><mi>x</mi><mn>2</mn></msup><mo>+</mo><msup><mi>y</mi><mn>2</mn></msup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">2xy=(x+y)^{2}-(x^{2}+y^{2})</annotation></semantics></math>.</p>\n</div>\n</li>\n<li
        id=\"S4.I1.i2\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(b)</span> \n<div id=\"S4.I1.i2.p1\" class=\"ltx_para\">\n<p
        id=\"S4.I1.i2.p1.5\" class=\"ltx_p\">Division of positive numbers <math id=\"S4.I1.i2.p1.1.m1\"
        class=\"ltx_Math\" alttext=\"f(x,y)=x/y\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo>,</mo><mi>y</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>x</mi><mo>/</mo><mi>y</mi></mrow></mrow><annotation
        encoding=\"application/x-tex\">f(x,y)=x/y</annotation></semantics></math>.
        A <math id=\"S4.I1.i2.p1.2.m2\" class=\"ltx_Math\" alttext=\"[2,5,1]\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>5</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,5,1]</annotation></semantics></math>
        KAN is pruned to a <math id=\"S4.I1.i2.p1.3.m3\" class=\"ltx_Math\" alttext=\"[2,1,1]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[2,1,1]</annotation></semantics></math>
        KAN. The learned activation functions are logarithmic and exponential functions,
        and the KAN is computing <math id=\"S4.I1.i2.p1.4.m4\" class=\"ltx_Math\"
        alttext=\"x/y\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>x</mi><mo>/</mo><mi>y</mi></mrow><annotation
        encoding=\"application/x-tex\">x/y</annotation></semantics></math> by leveraging
        the identity <math id=\"S4.I1.i2.p1.5.m5\" class=\"ltx_Math\" alttext=\"x/y={\\exp}({\\log}x-{\\log}y)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>x</mi><mo>/</mo><mi>y</mi></mrow><mo>=</mo><mrow><mi>exp</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mrow><mi>log</mi><mo lspace=\"0.167em\">\u2061</mo><mi>x</mi></mrow><mo>\u2212</mo><mrow><mi>log</mi><mo
        lspace=\"0.167em\">\u2061</mo><mi>y</mi></mrow></mrow><mo stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation
        encoding=\"application/x-tex\">x/y={\\exp}({\\log}x-{\\log}y)</annotation></semantics></math>.</p>\n</div>\n</li>\n<li
        id=\"S4.I1.i3\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(c)</span> \n<div id=\"S4.I1.i3.p1\" class=\"ltx_para\">\n<p
        id=\"S4.I1.i3.p1.3\" class=\"ltx_p\">Numerical to categorical. The task is
        to convert a real number in <math id=\"S4.I1.i3.p1.1.m1\" class=\"ltx_Math\"
        alttext=\"[0,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>0</mn><mo>,</mo><mn>1</mn><mo stretchy=\"false\">]</mo></mrow><annotation
        encoding=\"application/x-tex\">[0,1]</annotation></semantics></math> to its
        first decimal digit (as one hots), e.g., <math id=\"S4.I1.i3.p1.2.m2\" class=\"ltx_Math\"
        alttext=\"0.0618\\to[1,0,0,0,0,\\cdots]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mn>0.0618</mn><mo
        stretchy=\"false\">\u2192</mo><mrow><mo stretchy=\"false\">[</mo><mn>1</mn><mo>,</mo><mn>0</mn><mo>,</mo><mn>0</mn><mo>,</mo><mn>0</mn><mo>,</mo><mn>0</mn><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo stretchy=\"false\">]</mo></mrow></mrow><annotation
        encoding=\"application/x-tex\">0.0618\\to[1,0,0,0,0,\\cdots]</annotation></semantics></math>,
        <math id=\"S4.I1.i3.p1.3.m3\" class=\"ltx_Math\" alttext=\"0.314\\to[0,0,0,1,0,\\cdots]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mn>0.314</mn><mo
        stretchy=\"false\">\u2192</mo><mrow><mo stretchy=\"false\">[</mo><mn>0</mn><mo>,</mo><mn>0</mn><mo>,</mo><mn>0</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>0</mn><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo stretchy=\"false\">]</mo></mrow></mrow><annotation
        encoding=\"application/x-tex\">0.314\\to[0,0,0,1,0,\\cdots]</annotation></semantics></math>.
        Notice that activation functions are learned to be spikes located around the
        corresponding decimal digits.</p>\n</div>\n</li>\n<li id=\"S4.I1.i4\" class=\"ltx_item\"
        style=\"list-style-type:none;\">\n<span class=\"ltx_tag ltx_tag_item\">(d)</span>
        \n<div id=\"S4.I1.i4.p1\" class=\"ltx_para\">\n<p id=\"S4.I1.i4.p1.2\" class=\"ltx_p\">Special
        function <math id=\"S4.I1.i4.p1.1.m1\" class=\"ltx_Math\" alttext=\"f(x,y)={\\rm
        exp}(J_{0}(20x)+y^{2})\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo>,</mo><mi>y</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>exp</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mrow><msub><mi>J</mi><mn>0</mn></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mn>20</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><msup><mi>y</mi><mn>2</mn></msup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">f(x,y)={\\rm
        exp}(J_{0}(20x)+y^{2})</annotation></semantics></math>. One limitation of
        symbolic regression is that it will never find the correct formula of a special
        function if the special function is not provided as prior knowledge. KANs
        can learn special functions \u2013 the highly wiggly Bessel function <math
        id=\"S4.I1.i4.p1.2.m2\" class=\"ltx_Math\" alttext=\"J_{0}(20x)\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><msub><mi>J</mi><mn>0</mn></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mn>20</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo stretchy=\"false\">)</mo></mrow></mrow><annotation
        encoding=\"application/x-tex\">J_{0}(20x)</annotation></semantics></math>
        is learned (numerically) by KAN.</p>\n</div>\n</li>\n<li id=\"S4.I1.i5\" class=\"ltx_item\"
        style=\"list-style-type:none;\">\n<span class=\"ltx_tag ltx_tag_item\">(e)</span>
        \n<div id=\"S4.I1.i5.p1\" class=\"ltx_para\">\n<p id=\"S4.I1.i5.p1.2\" class=\"ltx_p\">Phase
        transition <math id=\"S4.I1.i5.p1.1.m1\" class=\"ltx_Math\" alttext=\"f(x_{1},x_{2},x_{3})={\\rm
        tanh}(5(x_{1}^{4}+x_{2}^{4}+x_{3}^{4}-1))\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><msub><mi>x</mi><mn>3</mn></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>tanh</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mn>5</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mrow><msubsup><mi>x</mi><mn>1</mn><mn>4</mn></msubsup><mo>+</mo><msubsup><mi>x</mi><mn>2</mn><mn>4</mn></msubsup><mo>+</mo><msubsup><mi>x</mi><mn>3</mn><mn>4</mn></msubsup></mrow><mo>\u2212</mo><mn>1</mn></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation
        encoding=\"application/x-tex\">f(x_{1},x_{2},x_{3})={\\rm tanh}(5(x_{1}^{4}+x_{2}^{4}+x_{3}^{4}-1))</annotation></semantics></math>.
        Phase transitions are of great interest in physics, so we want KANs to be
        able to detect phase transitions and to identify the correct order parameters.
        We use the tanh function to simulate the phase transition behavior, and the
        order parameter is the combination of the quartic terms of <math id=\"S4.I1.i5.p1.2.m2\"
        class=\"ltx_Math\" alttext=\"x_{1},x_{2},x_{3}\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><msub><mi>x</mi><mn>3</mn></msub></mrow><annotation
        encoding=\"application/x-tex\">x_{1},x_{2},x_{3}</annotation></semantics></math>.
        Both the quartic dependence and tanh dependence emerge after KAN training.
        This is a simplified case of a localization phase transition discussed in
        Section\_<a href=\"#S4.SS4\" title=\"4.4 Application to Physics: Anderson
        localization \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.4</span></a>.</p>\n</div>\n</li>\n<li
        id=\"S4.I1.i6\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(f)</span> \n<div id=\"S4.I1.i6.p1\" class=\"ltx_para\">\n<p
        id=\"S4.I1.i6.p1.3\" class=\"ltx_p\">Deeper compositions <math id=\"S4.I1.i6.p1.1.m1\"
        class=\"ltx_Math\" alttext=\"f(x_{1},x_{2},x_{3},x_{4})=\\sqrt{(x_{1}-x_{2})^{2}+(x_{3}-x_{4})^{2}}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><msub><mi>x</mi><mn>3</mn></msub><mo>,</mo><msub><mi>x</mi><mn>4</mn></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><msqrt><mrow><msup><mrow><mo
        stretchy=\"false\">(</mo><mrow><msub><mi>x</mi><mn>1</mn></msub><mo>\u2212</mo><msub><mi>x</mi><mn>2</mn></msub></mrow><mo
        stretchy=\"false\">)</mo></mrow><mn>2</mn></msup><mo>+</mo><msup><mrow><mo
        stretchy=\"false\">(</mo><mrow><msub><mi>x</mi><mn>3</mn></msub><mo>\u2212</mo><msub><mi>x</mi><mn>4</mn></msub></mrow><mo
        stretchy=\"false\">)</mo></mrow><mn>2</mn></msup></mrow></msqrt></mrow><annotation
        encoding=\"application/x-tex\">f(x_{1},x_{2},x_{3},x_{4})=\\sqrt{(x_{1}-x_{2})^{2}+(x_{3}-x_{4})^{2}}</annotation></semantics></math>.
        To compute this, we would need the identity function, squared function, and
        square root, which requires at least a three-layer KAN. Indeed, we find that
        a <math id=\"S4.I1.i6.p1.2.m2\" class=\"ltx_Math\" alttext=\"[4,3,3,1]\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>4</mn><mo>,</mo><mn>3</mn><mo>,</mo><mn>3</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[4,3,3,1]</annotation></semantics></math>
        KAN can be auto-pruned to a <math id=\"S4.I1.i6.p1.3.m3\" class=\"ltx_Math\"
        alttext=\"[4,2,1,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>4</mn><mo>,</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[4,2,1,1]</annotation></semantics></math>
        KAN, which exactly corresponds to the computation graph we would expect.</p>\n</div>\n</li>\n</ol>\n<p
        id=\"S4.SS1.p2.1\" class=\"ltx_p\">More examples from the Feynman dataset
        and the special function dataset are visualized in Figure\_<a href=\"#A4.F2\"
        title=\"Figure D.2 \u2023 Appendix D Feynman KANs \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">D.2</span></a>,\_<a
        href=\"#A4.F3\" title=\"Figure D.3 \u2023 Appendix D Feynman KANs \u2023 KAN:
        Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">D.3</span></a>,\_<a href=\"#A6.F1\" title=\"Figure F.1 \u2023
        Appendix F KANs for special functions \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">F.1</span></a>,\_<a
        href=\"#A6.F2\" title=\"Figure F.2 \u2023 Appendix F KANs for special functions
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">F.2</span></a> in Appendices\_<a href=\"#A4\" title=\"Appendix
        D Feynman KANs \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">D</span></a> and\_<a href=\"#A6\" title=\"Appendix
        F KANs for special functions \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">F</span></a>.</p>\n</div>\n</section>\n<section
        id=\"S4.SS2\" class=\"ltx_subsection\">\n<h3 class=\"ltx_title ltx_title_subsection\">\n<span
        class=\"ltx_tag ltx_tag_subsection\">4.2 </span>Unsupervised toy dataset</h3>\n\n<div
        id=\"S4.SS2.p1\" class=\"ltx_para\">\n<p id=\"S4.SS2.p1.6\" class=\"ltx_p\">Often,
        scientific discoveries are formulated as supervised learning problems, i.e.,
        given input variables <math id=\"S4.SS2.p1.1.m1\" class=\"ltx_Math\" alttext=\"x_{1},x_{2},\\cdots,x_{d}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>x</mi><mi>d</mi></msub></mrow><annotation
        encoding=\"application/x-tex\">x_{1},x_{2},\\cdots,x_{d}</annotation></semantics></math>
        and output variable(s) <math id=\"S4.SS2.p1.2.m2\" class=\"ltx_Math\" alttext=\"y\"
        display=\"inline\" intent=\":literal\"><semantics><mi>y</mi><annotation encoding=\"application/x-tex\">y</annotation></semantics></math>,
        we want to find an interpretable function <math id=\"S4.SS2.p1.3.m3\" class=\"ltx_Math\"
        alttext=\"f\" display=\"inline\" intent=\":literal\"><semantics><mi>f</mi><annotation
        encoding=\"application/x-tex\">f</annotation></semantics></math> such that
        <math id=\"S4.SS2.p1.4.m4\" class=\"ltx_Math\" alttext=\"y\\approx f(x_{1},x_{2},\\cdots,x_{d})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>y</mi><mo>\u2248</mo><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>x</mi><mi>d</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">y\\approx
        f(x_{1},x_{2},\\cdots,x_{d})</annotation></semantics></math>. However, another
        type of scientific discovery can be formulated as unsupervised learning, i.e.,
        given a set of variables <math id=\"S4.SS2.p1.5.m5\" class=\"ltx_Math\" alttext=\"(x_{1},x_{2},\\cdots,x_{d})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>x</mi><mi>d</mi></msub><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(x_{1},x_{2},\\cdots,x_{d})</annotation></semantics></math>,
        we want to discover a structural relationship between the variables. Specifically,
        we want to find a non-zero <math id=\"S4.SS2.p1.6.m6\" class=\"ltx_Math\"
        alttext=\"f\" display=\"inline\" intent=\":literal\"><semantics><mi>f</mi><annotation
        encoding=\"application/x-tex\">f</annotation></semantics></math> such that</p>\n<table
        id=\"A6.EGx11\" class=\"ltx_equationgroup ltx_eqn_align ltx_eqn_table\">\n\n<tbody
        id=\"S4.E1\"><tr class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_align_right
        ltx_eqn_cell\"><math id=\"S4.E1.m1\" class=\"ltx_Math\" alttext=\"\\displaystyle
        f(x_{1},x_{2},\\cdots,x_{d})\\approx 0.\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>x</mi><mi>d</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>\u2248</mo><mn>0</mn></mrow><mo
        lspace=\"0em\">.</mo></mrow><annotation encoding=\"application/x-tex\">\\displaystyle
        f(x_{1},x_{2},\\cdots,x_{d})\\approx 0.</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(4.1)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S4.SS2.p1.12\"
        class=\"ltx_p\">For example, consider a set of features <math id=\"S4.SS2.p1.7.m1\"
        class=\"ltx_Math\" alttext=\"(x_{1},x_{2},x_{3})\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><msub><mi>x</mi><mn>3</mn></msub><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(x_{1},x_{2},x_{3})</annotation></semantics></math>
        that satisfies <math id=\"S4.SS2.p1.8.m2\" class=\"ltx_Math\" alttext=\"x_{3}={\\rm
        exp}({\\rm sin}(\\pi x_{1})+x_{2}^{2})\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>x</mi><mn>3</mn></msub><mo>=</mo><mrow><mi>exp</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mrow><mi>sin</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>x</mi><mn>1</mn></msub></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><msubsup><mi>x</mi><mn>2</mn><mn>2</mn></msubsup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">x_{3}={\\rm
        exp}({\\rm sin}(\\pi x_{1})+x_{2}^{2})</annotation></semantics></math>. Then
        a valid <math id=\"S4.SS2.p1.9.m3\" class=\"ltx_Math\" alttext=\"f\" display=\"inline\"
        intent=\":literal\"><semantics><mi>f</mi><annotation encoding=\"application/x-tex\">f</annotation></semantics></math>
        is <math id=\"S4.SS2.p1.10.m4\" class=\"ltx_Math\" alttext=\"f(x_{1},x_{2},x_{3})={\\rm
        sin}(\\pi x_{1})+x_{2}^{2}-{\\rm log}(x_{3})=0\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><msub><mi>x</mi><mn>3</mn></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mrow><mrow><mi>sin</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>x</mi><mn>1</mn></msub></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><msubsup><mi>x</mi><mn>2</mn><mn>2</mn></msubsup></mrow><mo>\u2212</mo><mrow><mi>log</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>3</mn></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><mo>=</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">f(x_{1},x_{2},x_{3})={\\rm sin}(\\pi x_{1})+x_{2}^{2}-{\\rm
        log}(x_{3})=0</annotation></semantics></math>, implying that points of <math
        id=\"S4.SS2.p1.11.m5\" class=\"ltx_Math\" alttext=\"(x_{1},x_{2},x_{3})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><msub><mi>x</mi><mn>3</mn></msub><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(x_{1},x_{2},x_{3})</annotation></semantics></math>
        form a 2D submanifold specified by <math id=\"S4.SS2.p1.12.m6\" class=\"ltx_Math\"
        alttext=\"f=0\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>f</mi><mo>=</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">f=0</annotation></semantics></math> instead
        of filling the whole 3D space.</p>\n</div>\n<div id=\"S4.SS2.p2\" class=\"ltx_para\">\n<p
        id=\"S4.SS2.p2.5\" class=\"ltx_p\">If an algorithm for solving the unsupervised
        problem can be devised, it has a considerable advantage over the supervised
        problem, since it requires only the sets of features <math id=\"S4.SS2.p2.1.m1\"
        class=\"ltx_Math\" alttext=\"S=(x_{1},x_{2},\\cdots,x_{d})\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>S</mi><mo>=</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u22EF</mi><mo>,</mo><msub><mi>x</mi><mi>d</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">S=(x_{1},x_{2},\\cdots,x_{d})</annotation></semantics></math>.
        The supervised problem, on the other hand, tries to predict subsets of features
        in terms of the others, i.e. it splits <math id=\"S4.SS2.p2.2.m2\" class=\"ltx_Math\"
        alttext=\"S=S_{\\text{in}}\\cup S_{\\text{out}}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>S</mi><mo>=</mo><mrow><msub><mi>S</mi><mtext>in</mtext></msub><mo>\u222A</mo><msub><mi>S</mi><mtext>out</mtext></msub></mrow></mrow><annotation
        encoding=\"application/x-tex\">S=S_{\\text{in}}\\cup S_{\\text{out}}</annotation></semantics></math>
        into input and output features of the function to be learned. Without domain
        expertise to advise the splitting, there are <math id=\"S4.SS2.p2.3.m3\" class=\"ltx_Math\"
        alttext=\"2^{d}-2\" display=\"inline\" intent=\":literal\"><semantics><mrow><msup><mn>2</mn><mi>d</mi></msup><mo>\u2212</mo><mn>2</mn></mrow><annotation
        encoding=\"application/x-tex\">2^{d}-2</annotation></semantics></math> possibilities
        such that <math id=\"S4.SS2.p2.4.m4\" class=\"ltx_Math\" alttext=\"|S_{\\text{in}}|&gt;0\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mo stretchy=\"false\">|</mo><msub><mi>S</mi><mtext>in</mtext></msub><mo
        stretchy=\"false\">|</mo></mrow><mo>&gt;</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">|S_{\\text{in}}|&gt;0</annotation></semantics></math>
        and <math id=\"S4.SS2.p2.5.m5\" class=\"ltx_Math\" alttext=\"|S_{\\text{out}}|&gt;0\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mo stretchy=\"false\">|</mo><msub><mi>S</mi><mtext>out</mtext></msub><mo
        stretchy=\"false\">|</mo></mrow><mo>&gt;</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">|S_{\\text{out}}|&gt;0</annotation></semantics></math>.
        This exponentially large space of supervised problems can be avoided by using
        the unsupervised approach.\nThis unsupervised learning approach will be valuable
        to the knot dataset in Section\_<a href=\"#S4.SS3\" title=\"4.3 Application
        to Mathematics: Knot Theory \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.3</span></a>.
        A Google Deepmind team\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib45\"
        title=\"\" class=\"ltx_ref\">45</a>]</cite> manually chose signature to be
        the target variable, otherwise they would face this combinatorial problem
        described above.\nThis raises the question whether we can instead tackle the
        unsupervised learning directly. We present our method and a toy example below.</p>\n</div>\n<div
        id=\"S4.SS2.p3\" class=\"ltx_para\">\n<p id=\"S4.SS2.p3.15\" class=\"ltx_p\">We
        tackle the unsupervised learning problem by turning it into a supervised learning
        problem on all of the <math id=\"S4.SS2.p3.1.m1\" class=\"ltx_Math\" alttext=\"d\"
        display=\"inline\" intent=\":literal\"><semantics><mi>d</mi><annotation encoding=\"application/x-tex\">d</annotation></semantics></math>
        features, without requiring the choice of a splitting. The essential idea
        is to learn a function <math id=\"S4.SS2.p3.2.m2\" class=\"ltx_Math\" alttext=\"f(x_{1},\\dots,x_{d})=0\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><mi
        mathvariant=\"normal\">\u2026</mi><mo>,</mo><msub><mi>x</mi><mi>d</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">f(x_{1},\\dots,x_{d})=0</annotation></semantics></math>
        such that <math id=\"S4.SS2.p3.3.m3\" class=\"ltx_Math\" alttext=\"f\" display=\"inline\"
        intent=\":literal\"><semantics><mi>f</mi><annotation encoding=\"application/x-tex\">f</annotation></semantics></math>
        is not the <math id=\"S4.SS2.p3.4.m4\" class=\"ltx_Math\" alttext=\"0\" display=\"inline\"
        intent=\":literal\"><mn>0</mn></math>-function. To do this, similar to contrastive
        learning, we define positive samples and negative samples: positive samples
        are feature vectors of real data. Negative samples are constructed by feature
        corruption. To ensure that the overall feature distribution for each topological
        invariant stays the same, we perform feature corruption by random permutation
        of each feature across the entire training set. Now we want to train a network
        <math id=\"S4.SS2.p3.5.m5\" class=\"ltx_Math\" alttext=\"g\" display=\"inline\"
        intent=\":literal\"><semantics><mi>g</mi><annotation encoding=\"application/x-tex\">g</annotation></semantics></math>
        such that <math id=\"S4.SS2.p3.6.m6\" class=\"ltx_Math\" alttext=\"g(\\mathbf{x}_{\\rm
        real})=1\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>g</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>\U0001D431</mi><mi>real</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">g(\\mathbf{x}_{\\rm real})=1</annotation></semantics></math>
        and <math id=\"S4.SS2.p3.7.m7\" class=\"ltx_Math\" alttext=\"g(\\mathbf{x}_{\\rm
        fake})=0\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>g</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>\U0001D431</mi><mi>fake</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">g(\\mathbf{x}_{\\rm fake})=0</annotation></semantics></math>
        which turns the problem into a supervised problem. However, remember that
        we originally want <math id=\"S4.SS2.p3.8.m8\" class=\"ltx_Math\" alttext=\"f(\\mathbf{x}_{\\rm
        real})=0\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>\U0001D431</mi><mi>real</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">f(\\mathbf{x}_{\\rm real})=0</annotation></semantics></math>
        and <math id=\"S4.SS2.p3.9.m9\" class=\"ltx_Math\" alttext=\"f(\\mathbf{x}_{\\rm
        fake})\\neq 0\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>\U0001D431</mi><mi>fake</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>\u2260</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">f(\\mathbf{x}_{\\rm fake})\\neq 0</annotation></semantics></math>.
        We can achieve this by having <math id=\"S4.SS2.p3.10.m10\" class=\"ltx_Math\"
        alttext=\"g=\\sigma\\circ f\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>g</mi><mo>=</mo><mrow><mi>\u03C3</mi><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\u2218</mo><mi>f</mi></mrow></mrow><annotation
        encoding=\"application/x-tex\">g=\\sigma\\circ f</annotation></semantics></math>
        where <math id=\"S4.SS2.p3.11.m11\" class=\"ltx_Math\" alttext=\"\\sigma(x)={\\rm
        exp}(-\\frac{x^{2}}{2w^{2}})\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>\u03C3</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>exp</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mo>\u2212</mo><mfrac><msup><mi>x</mi><mn>2</mn></msup><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msup><mi>w</mi><mn>2</mn></msup></mrow></mfrac></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">\\sigma(x)={\\rm
        exp}(-\\frac{x^{2}}{2w^{2}})</annotation></semantics></math> is a Gaussian
        function with a small width <math id=\"S4.SS2.p3.12.m12\" class=\"ltx_Math\"
        alttext=\"w\" display=\"inline\" intent=\":literal\"><semantics><mi>w</mi><annotation
        encoding=\"application/x-tex\">w</annotation></semantics></math>, which can
        be conveniently realized by a KAN with shape <math id=\"S4.SS2.p3.13.m13\"
        class=\"ltx_Math\" alttext=\"[...,1,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mi mathvariant=\"normal\">\u2026</mi><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[...,1,1]</annotation></semantics></math>
        whose last activation is set to be the Gaussian function <math id=\"S4.SS2.p3.14.m14\"
        class=\"ltx_Math\" alttext=\"\\sigma\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03C3</mi><annotation
        encoding=\"application/x-tex\">\\sigma</annotation></semantics></math> and
        all previous layers form <math id=\"S4.SS2.p3.15.m15\" class=\"ltx_Math\"
        alttext=\"f\" display=\"inline\" intent=\":literal\"><semantics><mi>f</mi><annotation
        encoding=\"application/x-tex\">f</annotation></semantics></math>. Except for
        the modifications mentioned above, everything else is the same for supervised
        training.</p>\n</div>\n<figure id=\"S4.F2\" class=\"ltx_figure\"><img src=\"2404.19756v5/figs/unsupervised_toy.png\"
        id=\"S4.F2.g1\" class=\"ltx_graphics ltx_centering ltx_img_landscape\" width=\"359\"
        height=\"179\" alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption
        ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure 4.2: </span>Unsupervised
        learning of a toy task. KANs can identify groups of dependent variables, i.e.,
        <math id=\"S4.F2.3.m1\" class=\"ltx_Math\" alttext=\"(x_{1},x_{2},x_{3})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><msub><mi>x</mi><mn>3</mn></msub><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(x_{1},x_{2},x_{3})</annotation></semantics></math>
        and <math id=\"S4.F2.4.m2\" class=\"ltx_Math\" alttext=\"(x_{4},x_{5})\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>4</mn></msub><mo>,</mo><msub><mi>x</mi><mn>5</mn></msub><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(x_{4},x_{5})</annotation></semantics></math>
        in this case.</figcaption>\n</figure>\n<div id=\"S4.SS2.p4\" class=\"ltx_para\">\n<p
        id=\"S4.SS2.p4.10\" class=\"ltx_p\">Now we demonstrate that the unsupervised
        paradigm works for a synthetic example. Let us consider a 6D dataset, where
        <math id=\"S4.SS2.p4.1.m1\" class=\"ltx_Math\" alttext=\"(x_{1},x_{2},x_{3})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo>,</mo><msub><mi>x</mi><mn>2</mn></msub><mo>,</mo><msub><mi>x</mi><mn>3</mn></msub><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(x_{1},x_{2},x_{3})</annotation></semantics></math>
        are dependent variables such that <math id=\"S4.SS2.p4.2.m2\" class=\"ltx_Math\"
        alttext=\"x_{3}=\\exp(\\sin(x_{1})+x_{2}^{2})\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>x</mi><mn>3</mn></msub><mo>=</mo><mrow><mi>exp</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mrow><mi>sin</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><msub><mi>x</mi><mn>1</mn></msub><mo stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><msubsup><mi>x</mi><mn>2</mn><mn>2</mn></msubsup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">x_{3}=\\exp(\\sin(x_{1})+x_{2}^{2})</annotation></semantics></math>;
        <math id=\"S4.SS2.p4.3.m3\" class=\"ltx_Math\" alttext=\"(x_{4},x_{5})\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mn>4</mn></msub><mo>,</mo><msub><mi>x</mi><mn>5</mn></msub><mo
        stretchy=\"false\">)</mo></mrow><annotation encoding=\"application/x-tex\">(x_{4},x_{5})</annotation></semantics></math>
        are dependent variables with <math id=\"S4.SS2.p4.4.m4\" class=\"ltx_Math\"
        alttext=\"x_{5}=x_{4}^{3}\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>x</mi><mn>5</mn></msub><mo>=</mo><msubsup><mi>x</mi><mn>4</mn><mn>3</mn></msubsup></mrow><annotation
        encoding=\"application/x-tex\">x_{5}=x_{4}^{3}</annotation></semantics></math>;
        <math id=\"S4.SS2.p4.5.m5\" class=\"ltx_Math\" alttext=\"x_{6}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>x</mi><mn>6</mn></msub><annotation
        encoding=\"application/x-tex\">x_{6}</annotation></semantics></math> is independent
        of the other variables. In Figure\_<a href=\"#S4.F2\" title=\"Figure 4.2 \u2023
        4.2 Unsupervised toy dataset \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.2</span></a>,
        we show that for seed = 0, KAN reveals the functional dependence among <math
        id=\"S4.SS2.p4.6.m6\" class=\"ltx_Math\" alttext=\"x_{1}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>x</mi><mn>1</mn></msub><annotation
        encoding=\"application/x-tex\">x_{1}</annotation></semantics></math>,<math
        id=\"S4.SS2.p4.7.m7\" class=\"ltx_Math\" alttext=\"x_{2}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>x</mi><mn>2</mn></msub><annotation
        encoding=\"application/x-tex\">x_{2}</annotation></semantics></math>, and
        <math id=\"S4.SS2.p4.8.m8\" class=\"ltx_Math\" alttext=\"x_{3}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>x</mi><mn>3</mn></msub><annotation
        encoding=\"application/x-tex\">x_{3}</annotation></semantics></math>; for
        another seed = 2024, KAN reveals the functional dependence between <math id=\"S4.SS2.p4.9.m9\"
        class=\"ltx_Math\" alttext=\"x_{4}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>x</mi><mn>4</mn></msub><annotation
        encoding=\"application/x-tex\">x_{4}</annotation></semantics></math> and <math
        id=\"S4.SS2.p4.10.m10\" class=\"ltx_Math\" alttext=\"x_{5}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>x</mi><mn>5</mn></msub><annotation
        encoding=\"application/x-tex\">x_{5}</annotation></semantics></math>. Our
        preliminary results rely on randomness (different seeds) to discover different
        relations; in the future we would like to investigate a more systematic and
        more controlled way to discover a complete set of relations. Even so, our
        tool in its current status can provide insights for scientific tasks. We present
        our results with the knot dataset in Section\_<a href=\"#S4.SS3\" title=\"4.3
        Application to Mathematics: Knot Theory \u2023 4 KANs are interpretable \u2023
        KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">4.3</span></a>.</p>\n</div>\n</section>\n<section id=\"S4.SS3\"
        class=\"ltx_subsection\">\n<h3 class=\"ltx_title ltx_title_subsection\">\n<span
        class=\"ltx_tag ltx_tag_subsection\">4.3 </span>Application to Mathematics:
        Knot Theory</h3>\n\n<div id=\"S4.SS3.p1\" class=\"ltx_para\">\n<p id=\"S4.SS3.p1.14\"
        class=\"ltx_p\">Knot theory is a subject in low-dimensional topology that
        sheds light on topological aspects of three-manifolds and four-manifolds and
        has a variety of applications, including in biology and topological quantum
        computing. Mathematically, a knot <math id=\"S4.SS3.p1.1.m1\" class=\"ltx_Math\"
        alttext=\"K\" display=\"inline\" intent=\":literal\"><semantics><mi>K</mi><annotation
        encoding=\"application/x-tex\">K</annotation></semantics></math> is an embedding
        of <math id=\"S4.SS3.p1.2.m2\" class=\"ltx_Math\" alttext=\"S^{1}\" display=\"inline\"
        intent=\":literal\"><semantics><msup><mi>S</mi><mn>1</mn></msup><annotation
        encoding=\"application/x-tex\">S^{1}</annotation></semantics></math> into
        <math id=\"S4.SS3.p1.3.m3\" class=\"ltx_Math\" alttext=\"S^{3}\" display=\"inline\"
        intent=\":literal\"><semantics><msup><mi>S</mi><mn>3</mn></msup><annotation
        encoding=\"application/x-tex\">S^{3}</annotation></semantics></math>. Two
        knots <math id=\"S4.SS3.p1.4.m4\" class=\"ltx_Math\" alttext=\"K\" display=\"inline\"
        intent=\":literal\"><semantics><mi>K</mi><annotation encoding=\"application/x-tex\">K</annotation></semantics></math>
        and <math id=\"S4.SS3.p1.5.m5\" class=\"ltx_Math\" alttext=\"K^{\\prime}\"
        display=\"inline\" intent=\":literal\"><semantics><msup><mi>K</mi><mo>\u2032</mo></msup><annotation
        encoding=\"application/x-tex\">K^{\\prime}</annotation></semantics></math>
        are topologically equivalent if one can be deformed into the other via deformation
        of the ambient space <math id=\"S4.SS3.p1.6.m6\" class=\"ltx_Math\" alttext=\"S^{3}\"
        display=\"inline\" intent=\":literal\"><semantics><msup><mi>S</mi><mn>3</mn></msup><annotation
        encoding=\"application/x-tex\">S^{3}</annotation></semantics></math>, in which
        case we write <math id=\"S4.SS3.p1.7.m7\" class=\"ltx_Math\" alttext=\"[K]=[K^{\\prime}]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mo stretchy=\"false\">[</mo><mi>K</mi><mo
        stretchy=\"false\">]</mo></mrow><mo>=</mo><mrow><mo stretchy=\"false\">[</mo><msup><mi>K</mi><mo>\u2032</mo></msup><mo
        stretchy=\"false\">]</mo></mrow></mrow><annotation encoding=\"application/x-tex\">[K]=[K^{\\prime}]</annotation></semantics></math>.
        Some knots are topologically trivial, meaning that they can be smoothly deformed
        to a standard circle. Knots have a variety of deformation-invariant features
        <math id=\"S4.SS3.p1.8.m8\" class=\"ltx_Math\" alttext=\"f\" display=\"inline\"
        intent=\":literal\"><semantics><mi>f</mi><annotation encoding=\"application/x-tex\">f</annotation></semantics></math>
        called topological invariants, which may be used to show that two knots are
        topologically inequivalent, <math id=\"S4.SS3.p1.9.m9\" class=\"ltx_Math\"
        alttext=\"[K]\\neq[K^{\\prime}]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mo
        stretchy=\"false\">[</mo><mi>K</mi><mo stretchy=\"false\">]</mo></mrow><mo>\u2260</mo><mrow><mo
        stretchy=\"false\">[</mo><msup><mi>K</mi><mo>\u2032</mo></msup><mo stretchy=\"false\">]</mo></mrow></mrow><annotation
        encoding=\"application/x-tex\">[K]\\neq[K^{\\prime}]</annotation></semantics></math>
        if <math id=\"S4.SS3.p1.10.m10\" class=\"ltx_Math\" alttext=\"f(K)\\neq f(K^{\\prime})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>K</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>\u2260</mo><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msup><mi>K</mi><mo>\u2032</mo></msup><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">f(K)\\neq
        f(K^{\\prime})</annotation></semantics></math>. In some cases the topological
        invariants are geometric in nature. For instance, a hyperbolic knot <math
        id=\"S4.SS3.p1.11.m11\" class=\"ltx_Math\" alttext=\"K\" display=\"inline\"
        intent=\":literal\"><semantics><mi>K</mi><annotation encoding=\"application/x-tex\">K</annotation></semantics></math>
        has a knot complement <math id=\"S4.SS3.p1.12.m12\" class=\"ltx_Math\" alttext=\"S^{3}\\setminus
        K\" display=\"inline\" intent=\":literal\"><semantics><mrow><msup><mi>S</mi><mn>3</mn></msup><mo>\u2216</mo><mi>K</mi></mrow><annotation
        encoding=\"application/x-tex\">S^{3}\\setminus K</annotation></semantics></math>
        that admits a canonical hyperbolic metric <math id=\"S4.SS3.p1.13.m13\" class=\"ltx_Math\"
        alttext=\"g\" display=\"inline\" intent=\":literal\"><semantics><mi>g</mi><annotation
        encoding=\"application/x-tex\">g</annotation></semantics></math> such that
        <math id=\"S4.SS3.p1.14.m14\" class=\"ltx_Math\" alttext=\"\\text{vol}_{g}(K)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mtext>vol</mtext><mi>g</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>K</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">\\text{vol}_{g}(K)</annotation></semantics></math>
        is a topological invariant known as the hyperbolic volume. Other topological
        invariants are algebraic in nature, such as the Jones polynomial.</p>\n</div>\n<div
        id=\"S4.SS3.p2\" class=\"ltx_para\">\n<p id=\"S4.SS3.p2.1\" class=\"ltx_p\">Given
        the fundamental nature of knots in mathematics and the importance of its applications,
        it is interesting to study whether ML can lead to new results. For instance,
        in <cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib46\" title=\"\"
        class=\"ltx_ref\">46</a>]</cite> reinforcement learning was utilized to establish
        ribbonness of certain knots, which ruled out many potential counterexamples
        to the smooth 4d Poincar\xE9 conjecture.</p>\n</div>\n<div id=\"S4.SS3.p3\"
        class=\"ltx_para\">\n<p id=\"S4.SS3.p3.1\" class=\"ltx_p\"><span id=\"S4.SS3.p3.1.1\"
        class=\"ltx_text ltx_font_bold\">Supervised learning</span> In <cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib45\" title=\"\" class=\"ltx_ref\">45</a>]</cite>,
        supervised learning and human domain experts were utilized to arrive at a
        new theorem relating algebraic and geometric knot invariants. In this case,
        gradient saliency identified key invariants for the supervised problem, which
        led the domain experts to make a conjecture that was subsequently refined
        and proven. We study whether a KAN can achieve good interpretable results
        on the same problem, which predicts the signature of a knot. Their main results
        from studying the knot theory dataset are:</p>\n<ol id=\"S4.I2\" class=\"ltx_enumerate\">\n<li
        id=\"S4.I2.i1\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(1)</span> \n<div id=\"S4.I2.i1.p1\" class=\"ltx_para\">\n<p
        id=\"S4.I2.i1.p1.5\" class=\"ltx_p\">They use network attribution methods
        to find that the signature <math id=\"S4.I2.i1.p1.1.m1\" class=\"ltx_Math\"
        alttext=\"\\sigma\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03C3</mi><annotation
        encoding=\"application/x-tex\">\\sigma</annotation></semantics></math> is
        mostly dependent on meridinal distance <math id=\"S4.I2.i1.p1.2.m2\" class=\"ltx_Math\"
        alttext=\"\\mu\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03BC</mi><annotation
        encoding=\"application/x-tex\">\\mu</annotation></semantics></math> (real
        <math id=\"S4.I2.i1.p1.3.m3\" class=\"ltx_Math\" alttext=\"\\mu_{r}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>r</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{r}</annotation></semantics></math>, imag
        <math id=\"S4.I2.i1.p1.4.m4\" class=\"ltx_Math\" alttext=\"\\mu_{i}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{i}</annotation></semantics></math>) and
        longitudinal distance <math id=\"S4.I2.i1.p1.5.m5\" class=\"ltx_Math\" alttext=\"\\lambda\"
        display=\"inline\" intent=\":literal\"><semantics><mi>\u03BB</mi><annotation
        encoding=\"application/x-tex\">\\lambda</annotation></semantics></math>.</p>\n</div>\n</li>\n<li
        id=\"S4.I2.i2\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(2)</span> \n<div id=\"S4.I2.i2.p1\" class=\"ltx_para\">\n<p
        id=\"S4.I2.i2.p1.3\" class=\"ltx_p\">Human scientists later identified that
        <math id=\"S4.I2.i2.p1.1.m1\" class=\"ltx_Math\" alttext=\"\\sigma\" display=\"inline\"
        intent=\":literal\"><semantics><mi>\u03C3</mi><annotation encoding=\"application/x-tex\">\\sigma</annotation></semantics></math>
        has high correlation with the <math id=\"S4.I2.i2.p1.2.m2\" class=\"ltx_Math\"
        alttext=\"{\\rm slope}\\equiv{\\rm Re}(\\frac{\\lambda}{\\mu})=\\frac{\\lambda\\mu_{r}}{\\mu_{r}^{2}+\\mu_{i}^{2}}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>slope</mi><mo>\u2261</mo><mrow><mi>Re</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mfrac><mi>\u03BB</mi><mi>\u03BC</mi></mfrac><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mfrac><mrow><mi>\u03BB</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>\u03BC</mi><mi>r</mi></msub></mrow><mrow><msubsup><mi>\u03BC</mi><mi>r</mi><mn>2</mn></msubsup><mo>+</mo><msubsup><mi>\u03BC</mi><mi>i</mi><mn>2</mn></msubsup></mrow></mfrac></mrow><annotation
        encoding=\"application/x-tex\">{\\rm slope}\\equiv{\\rm Re}(\\frac{\\lambda}{\\mu})=\\frac{\\lambda\\mu_{r}}{\\mu_{r}^{2}+\\mu_{i}^{2}}</annotation></semantics></math>
        and derived a bound for <math id=\"S4.I2.i2.p1.3.m3\" class=\"ltx_Math\" alttext=\"|2\\sigma-{\\rm
        slope}|\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">|</mo><mrow><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\u03C3</mi></mrow><mo>\u2212</mo><mi>slope</mi></mrow><mo
        stretchy=\"false\">|</mo></mrow><annotation encoding=\"application/x-tex\">|2\\sigma-{\\rm
        slope}|</annotation></semantics></math>.</p>\n</div>\n</li>\n</ol>\n<p id=\"S4.SS3.p3.2\"
        class=\"ltx_p\">We show below that KANs not only rediscover these results
        with much smaller networks and much more automation, but also present some
        interesting new results and insights.</p>\n</div>\n<figure id=\"S4.F3\" class=\"ltx_figure\"><img
        src=\"2404.19756v5/figs/math.png\" id=\"S4.F3.g1\" class=\"ltx_graphics ltx_centering
        ltx_img_landscape\" width=\"598\" height=\"272\" alt=\"Refer to caption\">\n<figcaption
        class=\"ltx_caption ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure
        4.3: </span>Knot dataset, supervised mode. With KANs, we rediscover Deepmind\u2019s
        results that signature is mainly dependent on meridinal translation (real
        and imaginary parts).</figcaption>\n</figure>\n<div id=\"S4.SS3.p4\" class=\"ltx_para\">\n<p
        id=\"S4.SS3.p4.23\" class=\"ltx_p\">To investigate (1), we treat 17 knot invariants
        as inputs and signature as outputs. Similar to the setup in\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib45\" title=\"\" class=\"ltx_ref\">45</a>]</cite>,
        signatures (which are even numbers) are encoded as one-hot vectors and networks
        are trained with cross-entropy loss. We find that an extremely small <math
        id=\"S4.SS3.p4.1.m1\" class=\"ltx_Math\" alttext=\"[17,1,14]\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>17</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>14</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[17,1,14]</annotation></semantics></math>
        KAN is able to achieve <math id=\"S4.SS3.p4.2.m2\" class=\"ltx_Math\" alttext=\"81.6\\%\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mn>81.6</mn><mo>%</mo></mrow><annotation
        encoding=\"application/x-tex\">81.6\\%</annotation></semantics></math> test
        accuracy (while Deepmind\u2019s 4-layer width-300 MLP achieves 78% test accuracy).
        The <math id=\"S4.SS3.p4.3.m3\" class=\"ltx_Math\" alttext=\"[17,1,14]\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>17</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>14</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[17,1,14]</annotation></semantics></math>
        KAN (<math id=\"S4.SS3.p4.4.m4\" class=\"ltx_Math\" alttext=\"G=3\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>G</mi><mo>=</mo><mn>3</mn></mrow><annotation
        encoding=\"application/x-tex\">G=3</annotation></semantics></math>, <math
        id=\"S4.SS3.p4.5.m5\" class=\"ltx_Math\" alttext=\"k=3\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>k</mi><mo>=</mo><mn>3</mn></mrow><annotation
        encoding=\"application/x-tex\">k=3</annotation></semantics></math>) has <math
        id=\"S4.SS3.p4.6.m6\" class=\"ltx_Math\" alttext=\"\\approx 200\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi></mi><mo>\u2248</mo><mn>200</mn></mrow><annotation
        encoding=\"application/x-tex\">\\approx 200</annotation></semantics></math>
        parameters, while the MLP has <math id=\"S4.SS3.p4.7.m7\" class=\"ltx_Math\"
        alttext=\"\\approx 3\\times 10^{5}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi></mi><mo>\u2248</mo><mrow><mn>3</mn><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\xD7</mo><msup><mn>10</mn><mn>5</mn></msup></mrow></mrow><annotation
        encoding=\"application/x-tex\">\\approx 3\\times 10^{5}</annotation></semantics></math>
        parameters, shown in Table\_<a href=\"#S4.T3\" title=\"Table 3 \u2023 4.3
        Application to Mathematics: Knot Theory \u2023 4 KANs are interpretable \u2023
        KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">3</span></a>. It is remarkable that KANs can be both more accurate
        and much more parameter efficient than MLPs at the same time. In terms of
        interpretability, we scale the transparency of each activation according to
        its magnitude, so it becomes immediately clear which input variables are important
        without the need for feature attribution (see Figure\_<a href=\"#S4.F3\" title=\"Figure
        4.3 \u2023 4.3 Application to Mathematics: Knot Theory \u2023 4 KANs are interpretable
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">4.3</span></a> left): signature is mostly dependent on <math
        id=\"S4.SS3.p4.8.m8\" class=\"ltx_Math\" alttext=\"\\mu_{r}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>r</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{r}</annotation></semantics></math>, and
        slightly dependent on <math id=\"S4.SS3.p4.9.m9\" class=\"ltx_Math\" alttext=\"\\mu_{i}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{i}</annotation></semantics></math> and
        <math id=\"S4.SS3.p4.10.m10\" class=\"ltx_Math\" alttext=\"\\lambda\" display=\"inline\"
        intent=\":literal\"><semantics><mi>\u03BB</mi><annotation encoding=\"application/x-tex\">\\lambda</annotation></semantics></math>,
        while dependence on other variables is small. We then train a <math id=\"S4.SS3.p4.11.m11\"
        class=\"ltx_Math\" alttext=\"[3,1,14]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>3</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>14</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[3,1,14]</annotation></semantics></math>
        KAN on the three important variables, obtaining test accuracy <math id=\"S4.SS3.p4.12.m12\"
        class=\"ltx_Math\" alttext=\"78.2\\%\" display=\"inline\" intent=\":literal\"><semantics><mrow><mn>78.2</mn><mo>%</mo></mrow><annotation
        encoding=\"application/x-tex\">78.2\\%</annotation></semantics></math>. Our
        results have one subtle difference from results in\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib45\" title=\"\" class=\"ltx_ref\">45</a>]</cite>:
        they find that signature is mostly dependent on <math id=\"S4.SS3.p4.13.m13\"
        class=\"ltx_Math\" alttext=\"\\mu_{i}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{i}</annotation></semantics></math>, while
        we find that signature is mostly dependent on <math id=\"S4.SS3.p4.14.m14\"
        class=\"ltx_Math\" alttext=\"\\mu_{r}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>r</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{r}</annotation></semantics></math>. This
        difference could be due to subtle algorithmic choices, but has led us to carry
        out the following experiments: (a) ablation studies. We show that <math id=\"S4.SS3.p4.15.m15\"
        class=\"ltx_Math\" alttext=\"\\mu_{r}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>r</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{r}</annotation></semantics></math> contributes
        more to accuracy than <math id=\"S4.SS3.p4.16.m16\" class=\"ltx_Math\" alttext=\"\\mu_{i}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{i}</annotation></semantics></math> (see
        Figure\_<a href=\"#S4.F3\" title=\"Figure 4.3 \u2023 4.3 Application to Mathematics:
        Knot Theory \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.3</span></a>):
        for example, <math id=\"S4.SS3.p4.17.m17\" class=\"ltx_Math\" alttext=\"\\mu_{r}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>r</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{r}</annotation></semantics></math> alone
        can achieve <math id=\"S4.SS3.p4.18.m18\" class=\"ltx_Math\" alttext=\"65.0\\%\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mn>65.0</mn><mo>%</mo></mrow><annotation
        encoding=\"application/x-tex\">65.0\\%</annotation></semantics></math> accuracy,
        while <math id=\"S4.SS3.p4.19.m19\" class=\"ltx_Math\" alttext=\"\\mu_{i}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{i}</annotation></semantics></math> alone
        can only achieve <math id=\"S4.SS3.p4.20.m20\" class=\"ltx_Math\" alttext=\"43.8\\%\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mn>43.8</mn><mo>%</mo></mrow><annotation
        encoding=\"application/x-tex\">43.8\\%</annotation></semantics></math> accuracy.
        (b) We find a symbolic formula (in Table\_<a href=\"#S4.T4\" title=\"Table
        4 \u2023 4.3 Application to Mathematics: Knot Theory \u2023 4 KANs are interpretable
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">4</span></a>) which only involves <math id=\"S4.SS3.p4.21.m21\"
        class=\"ltx_Math\" alttext=\"\\mu_{r}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>r</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{r}</annotation></semantics></math> and
        <math id=\"S4.SS3.p4.22.m22\" class=\"ltx_Math\" alttext=\"\\lambda\" display=\"inline\"
        intent=\":literal\"><semantics><mi>\u03BB</mi><annotation encoding=\"application/x-tex\">\\lambda</annotation></semantics></math>,
        but can achieve <math id=\"S4.SS3.p4.23.m23\" class=\"ltx_Math\" alttext=\"77.8\\%\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mn>77.8</mn><mo>%</mo></mrow><annotation
        encoding=\"application/x-tex\">77.8\\%</annotation></semantics></math> test
        accuracy.</p>\n</div>\n<figure id=\"S4.T3\" class=\"ltx_table\">\n<table id=\"S4.T3.7\"
        class=\"ltx_tabular ltx_centering ltx_align_middle\">\n<tr id=\"S4.T3.7.8\"
        class=\"ltx_tr\">\n<td id=\"S4.T3.7.8.1\" class=\"ltx_td ltx_align_center
        ltx_border_l ltx_border_r ltx_border_t\">Method</td>\n<td id=\"S4.T3.7.8.2\"
        class=\"ltx_td ltx_align_center ltx_border_r ltx_border_t\">Architecture</td>\n<td
        id=\"S4.T3.7.8.3\" class=\"ltx_td ltx_align_center ltx_border_r ltx_border_t\">Parameter
        Count</td>\n<td id=\"S4.T3.7.8.4\" class=\"ltx_td ltx_align_center ltx_border_r
        ltx_border_t\">Accuracy</td>\n</tr>\n<tr id=\"S4.T3.2.2\" class=\"ltx_tr\">\n<td
        id=\"S4.T3.2.2.3\" class=\"ltx_td ltx_align_center ltx_border_l ltx_border_r
        ltx_border_t\">Deepmind\u2019s MLP</td>\n<td id=\"S4.T3.2.2.4\" class=\"ltx_td
        ltx_align_center ltx_border_r ltx_border_t\">4 layer, width-300</td>\n<td
        id=\"S4.T3.1.1.1\" class=\"ltx_td ltx_align_center ltx_border_r ltx_border_t\"><math
