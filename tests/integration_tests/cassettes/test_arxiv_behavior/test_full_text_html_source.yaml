        class=\"ltx_caption ltx_centering\"><span class=\"ltx_tag ltx_tag_table\">Table
        4: </span>Symbolic formulas of signature as a function of meridinal translation
        <math id=\"S4.T4.21.m1\" class=\"ltx_Math\" alttext=\"\\mu\" display=\"inline\"
        intent=\":literal\"><semantics><mi>\u03BC</mi><annotation encoding=\"application/x-tex\">\\mu</annotation></semantics></math>
        (real <math id=\"S4.T4.22.m2\" class=\"ltx_Math\" alttext=\"\\mu_{r}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>r</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{r}</annotation></semantics></math>, imag
        <math id=\"S4.T4.23.m3\" class=\"ltx_Math\" alttext=\"\\mu_{i}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{i}</annotation></semantics></math>) and
        longitudinal translation <math id=\"S4.T4.24.m4\" class=\"ltx_Math\" alttext=\"\\lambda\"
        display=\"inline\" intent=\":literal\"><semantics><mi>\u03BB</mi><annotation
        encoding=\"application/x-tex\">\\lambda</annotation></semantics></math>. In\_<cite
        class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib45\" title=\"\" class=\"ltx_ref\">45</a>]</cite>,
        formula A was discovered by human scientists inspired by neural network attribution
        results. Formulas B-F are auto-discovered by KANs. KANs can trade-off between
        simplicity and accuracy (B, C, D). By adding more inductive biases, KAN is
        able to discover formula E which is not too dissimilar from formula A. KANs
        also discovered a formula F which only involves two variables (<math id=\"S4.T4.25.m5\"
        class=\"ltx_Math\" alttext=\"\\mu_{r}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>r</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{r}</annotation></semantics></math> and
        <math id=\"S4.T4.26.m6\" class=\"ltx_Math\" alttext=\"\\lambda\" display=\"inline\"
        intent=\":literal\"><semantics><mi>\u03BB</mi><annotation encoding=\"application/x-tex\">\\lambda</annotation></semantics></math>)
        instead of all three variables, with little sacrifice in accuracy.</figcaption>\n</figure>\n<div
        id=\"S4.SS3.p6\" class=\"ltx_para\">\n<p id=\"S4.SS3.p6.1\" class=\"ltx_p\">So
        far, we have rediscovered the main results from\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib45\" title=\"\" class=\"ltx_ref\">45</a>]</cite>. It is remarkable
        to see that KANs made this discovery very intuitive and convenient. Instead
        of using feature attribution methods (which are great methods), one can instead
        simply stare at visualizations of KANs. Moreover, automatic symbolic regression
        also makes the discovery of symbolic formulas much easier.</p>\n</div>\n<div
        id=\"S4.SS3.p7\" class=\"ltx_para\">\n<p id=\"S4.SS3.p7.1\" class=\"ltx_p\">In
        the next part, we propose a new paradigm of \u201CAI for Math\u201D not included
        in the Deepmind paper, where we aim to use KANs\u2019 unsupervised learning
        mode to discover more relations (besides signature) in knot invariants.</p>\n</div>\n<figure
        id=\"S4.F4\" class=\"ltx_figure\"><img src=\"2404.19756v5/figs/knot_unsupervised.png\"
        id=\"S4.F4.g1\" class=\"ltx_graphics ltx_centering ltx_img_landscape\" width=\"598\"
        height=\"357\" alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption
        ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure 4.4: </span>Knot
        dataset, unsupervised mode. With KANs, we rediscover three mathematical relations
        in the knot dataset.</figcaption>\n</figure>\n<div id=\"S4.SS3.p8\" class=\"ltx_para\">\n<p
        id=\"S4.SS3.p8.6\" class=\"ltx_p\"><span id=\"S4.SS3.p8.6.1\" class=\"ltx_text
        ltx_font_bold\">Unsupervised learning</span> As we mentioned in Section\_<a
        href=\"#S4.SS2\" title=\"4.2 Unsupervised toy dataset \u2023 4 KANs are interpretable
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">4.2</span></a>, unsupervised learning is the setup that is more
        promising since it avoids manual partition of input and output variables which
        have combinatorially many possibilities. In the unsupervised learning mode,
        we treat all 18 variables (including signature) as inputs such that they are
        on the same footing. Knot data are positive samples, and we randomly shuffle
        features to obtain negative samples.\nAn <math id=\"S4.SS3.p8.1.m1\" class=\"ltx_Math\"
        alttext=\"[18,1,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>18</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[18,1,1]</annotation></semantics></math>
        KAN is trained to classify whether a given feature vector belongs to a positive
        sample (1) or a negative sample (0). We manually set the second layer activation
        to be the Gaussian function with a peak one centered at zero, so positive
        samples will have activations at (around) zero, implicitly giving a relation
        among knot invariants <math id=\"S4.SS3.p8.2.m2\" class=\"ltx_Math\" alttext=\"\\sum_{i=1}^{18}g_{i}(x_{i})=0\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><msubsup><mo>\u2211</mo><mrow><mi>i</mi><mo>=</mo><mn>1</mn></mrow><mn>18</mn></msubsup><mrow><msub><mi>g</mi><mi>i</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msub><mi>x</mi><mi>i</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><mo>=</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">\\sum_{i=1}^{18}g_{i}(x_{i})=0</annotation></semantics></math>
        where <math id=\"S4.SS3.p8.3.m3\" class=\"ltx_Math\" alttext=\"x_{i}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>x</mi><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">x_{i}</annotation></semantics></math> stands
        for a feature (invariant), and <math id=\"S4.SS3.p8.4.m4\" class=\"ltx_Math\"
        alttext=\"g_{i}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>g</mi><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">g_{i}</annotation></semantics></math> is the
        corresponding activation function which can be readily read off from KAN diagrams.
        We train the KANs with <math id=\"S4.SS3.p8.5.m5\" class=\"ltx_Math\" alttext=\"\\lambda=\\{10^{-2},10^{-3}\\}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03BB</mi><mo>=</mo><mrow><mo
        stretchy=\"false\">{</mo><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>2</mn></mrow></msup><mo>,</mo><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>3</mn></mrow></msup><mo
        stretchy=\"false\">}</mo></mrow></mrow><annotation encoding=\"application/x-tex\">\\lambda=\\{10^{-2},10^{-3}\\}</annotation></semantics></math>
        to favor sparse combination of inputs, and <math id=\"S4.SS3.p8.6.m6\" class=\"ltx_Math\"
        alttext=\"{\\rm seed}=\\{0,1,\\cdots,99\\}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>seed</mi><mo>=</mo><mrow><mo
        stretchy=\"false\">{</mo><mn>0</mn><mo>,</mo><mn>1</mn><mo>,</mo><mi mathvariant=\"normal\">\u22EF</mi><mo>,</mo><mn>99</mn><mo
        stretchy=\"false\">}</mo></mrow></mrow><annotation encoding=\"application/x-tex\">{\\rm
        seed}=\\{0,1,\\cdots,99\\}</annotation></semantics></math>. All 200 networks
        can be grouped into three clusters, with representative KANs displayed in
        Figure\_<a href=\"#S4.F4\" title=\"Figure 4.4 \u2023 4.3 Application to Mathematics:
        Knot Theory \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.4</span></a>.
        These three groups of dependent variables are:</p>\n<ol id=\"S4.I3\" class=\"ltx_enumerate\">\n<li
        id=\"S4.I3.i1\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(1)</span> \n<div id=\"S4.I3.i1.p1\" class=\"ltx_para\">\n<p
        id=\"S4.I3.i1.p1.1\" class=\"ltx_p\">The first group of dependent variables
        is signature, real part of meridinal distance, and longitudinal distance (plus
        two other variables which can be removed because of (3)). This is the signature
        dependence studied above, so it is very interesting to see that this dependence
        relation is rediscovered again in the unsupervised mode.</p>\n</div>\n</li>\n<li
        id=\"S4.I3.i2\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(2)</span> \n<div id=\"S4.I3.i2.p1\" class=\"ltx_para\">\n<p
        id=\"S4.I3.i2.p1.5\" class=\"ltx_p\">The second group of variables involve
        cusp volume <math id=\"S4.I3.i2.p1.1.m1\" class=\"ltx_Math\" alttext=\"V\"
        display=\"inline\" intent=\":literal\"><semantics><mi>V</mi><annotation encoding=\"application/x-tex\">V</annotation></semantics></math>,
        real part of meridinal translation <math id=\"S4.I3.i2.p1.2.m2\" class=\"ltx_Math\"
        alttext=\"\\mu_{r}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>r</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{r}</annotation></semantics></math> and
        longitudinal translation <math id=\"S4.I3.i2.p1.3.m3\" class=\"ltx_Math\"
        alttext=\"\\lambda\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03BB</mi><annotation
        encoding=\"application/x-tex\">\\lambda</annotation></semantics></math>. Their
        activations all look like logarithmic functions (which can be verified by
        the implied symbolic functionality in Section\_<a href=\"#S2.SS5.SSS1\" title=\"2.5.1
        Simplification techniques \u2023 2.5 For Interpretability: Simplifying KANs
        and Making them interactive \u2023 2 Kolmogorov\u2013Arnold Networks (KAN)
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">2.5.1</span></a>). So the relation is <math id=\"S4.I3.i2.p1.4.m4\"
        class=\"ltx_Math\" alttext=\"-\\log V+\\log\\mu_{r}+\\log\\lambda=0\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mrow><mo rspace=\"0.167em\">\u2212</mo><mrow><mi>log</mi><mo
        lspace=\"0.167em\">\u2061</mo><mi>V</mi></mrow></mrow><mo>+</mo><mrow><mi>log</mi><mo
        lspace=\"0.167em\">\u2061</mo><msub><mi>\u03BC</mi><mi>r</mi></msub></mrow><mo>+</mo><mrow><mi>log</mi><mo
        lspace=\"0.167em\">\u2061</mo><mi>\u03BB</mi></mrow></mrow><mo>=</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">-\\log V+\\log\\mu_{r}+\\log\\lambda=0</annotation></semantics></math>
        which is equivalent to <math id=\"S4.I3.i2.p1.5.m5\" class=\"ltx_Math\" alttext=\"V=\\mu_{r}\\lambda\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>V</mi><mo>=</mo><mrow><msub><mi>\u03BC</mi><mi>r</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\u03BB</mi></mrow></mrow><annotation
        encoding=\"application/x-tex\">V=\\mu_{r}\\lambda</annotation></semantics></math>,
        which is true by definition. It is, however, reassuring that we discover this
        relation without any prior knowledge.</p>\n</div>\n</li>\n<li id=\"S4.I3.i3\"
        class=\"ltx_item\" style=\"list-style-type:none;\">\n<span class=\"ltx_tag
        ltx_tag_item\">(3)</span> \n<div id=\"S4.I3.i3.p1\" class=\"ltx_para\">\n<p
        id=\"S4.I3.i3.p1.3\" class=\"ltx_p\">The third group of variables includes
        the real part of short geodesic <math id=\"S4.I3.i3.p1.1.m1\" class=\"ltx_Math\"
        alttext=\"g_{r}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>g</mi><mi>r</mi></msub><annotation
        encoding=\"application/x-tex\">g_{r}</annotation></semantics></math> and injectivity
        radius. Their activations look qualitatively the same but differ by a minus
        sign, so it is conjectured that these two variables have a linear correlation.
        We plot 2D scatters, finding that <math id=\"S4.I3.i3.p1.2.m2\" class=\"ltx_Math\"
        alttext=\"2r\" display=\"inline\" intent=\":literal\"><semantics><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>r</mi></mrow><annotation encoding=\"application/x-tex\">2r</annotation></semantics></math>
        upper bounds <math id=\"S4.I3.i3.p1.3.m3\" class=\"ltx_Math\" alttext=\"g_{r}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>g</mi><mi>r</mi></msub><annotation
        encoding=\"application/x-tex\">g_{r}</annotation></semantics></math>, which
        is also a well-known relation <cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib47\" title=\"\" class=\"ltx_ref\">47</a>]</cite>.</p>\n</div>\n</li>\n</ol>\n</div>\n<div
        id=\"S4.SS3.p9\" class=\"ltx_para\">\n<p id=\"S4.SS3.p9.1\" class=\"ltx_p\">It
        is interesting that KANs\u2019 unsupervised mode can rediscover several known
        mathematical relations. The good news is that the results discovered by KANs
        are probably reliable; the bad news is that we have not discovered anything
        new yet. It is worth noting that we have chosen a shallow KAN for simple visualization,
        but deeper KANs can probably find more relations if they exist. We would like
        to investigate how to discover more complicated relations with deeper KANs
        in future work.</p>\n</div>\n</section>\n<section id=\"S4.SS4\" class=\"ltx_subsection\">\n<h3
        class=\"ltx_title ltx_title_subsection\">\n<span class=\"ltx_tag ltx_tag_subsection\">4.4
        </span>Application to Physics: Anderson localization</h3>\n\n<div id=\"S4.SS4.p1\"
        class=\"ltx_para\">\n<p id=\"S4.SS4.p1.1\" class=\"ltx_p\">Anderson localization
        is the fundamental phenomenon in which disorder in a quantum system leads
        to the localization of electronic wave functions, causing all transport to
        be ceased\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib48\"
        title=\"\" class=\"ltx_ref\">48</a>]</cite>. In one and two dimensions, scaling
        arguments show that all electronic eigenstates are exponentially localized
        for an infinitesimal amount of random disorder\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib49\" title=\"\" class=\"ltx_ref\">49</a>, <a href=\"#bib.bib50\"
        title=\"\" class=\"ltx_ref\">50</a>]</cite>. In contrast, in three dimensions,
        a critical energy forms a phase boundary that separates the extended states
        from the localized states, known as a mobility edge. The understanding of
        these mobility edges is crucial for explaining various fundamental phenomena
        such as the metal-insulator transition in solids\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib51\" title=\"\" class=\"ltx_ref\">51</a>]</cite>, as well as
        localization effects of light in photonic devices\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib52\" title=\"\" class=\"ltx_ref\">52</a>,
        <a href=\"#bib.bib53\" title=\"\" class=\"ltx_ref\">53</a>, <a href=\"#bib.bib54\"
        title=\"\" class=\"ltx_ref\">54</a>, <a href=\"#bib.bib55\" title=\"\" class=\"ltx_ref\">55</a>,
        <a href=\"#bib.bib56\" title=\"\" class=\"ltx_ref\">56</a>]</cite>. It is
        therefore necessary to develop microscopic models that exhibit mobility edges
        to enable detailed investigations. Developing such models is often more practical
        in lower dimensions, where introducing quasiperiodicity instead of random
        disorder can also result in mobility edges that separate localized and extended
        phases. Furthermore, experimental realizations of analytical mobility edges
        can help resolve the debate on localization in interacting systems\_<cite
        class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib57\" title=\"\" class=\"ltx_ref\">57</a>,
        <a href=\"#bib.bib58\" title=\"\" class=\"ltx_ref\">58</a>]</cite>. Indeed,
        several recent studies have focused on identifying such models and deriving
        exact analytic expressions for their mobility edges\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib59\" title=\"\" class=\"ltx_ref\">59</a>,
        <a href=\"#bib.bib60\" title=\"\" class=\"ltx_ref\">60</a>, <a href=\"#bib.bib61\"
        title=\"\" class=\"ltx_ref\">61</a>, <a href=\"#bib.bib62\" title=\"\" class=\"ltx_ref\">62</a>,
        <a href=\"#bib.bib63\" title=\"\" class=\"ltx_ref\">63</a>, <a href=\"#bib.bib64\"
        title=\"\" class=\"ltx_ref\">64</a>, <a href=\"#bib.bib65\" title=\"\" class=\"ltx_ref\">65</a>]</cite>.</p>\n</div>\n<div
        id=\"S4.SS4.p2\" class=\"ltx_para\">\n<p id=\"S4.SS4.p2.1\" class=\"ltx_p\">Here,
        we apply KANs to numerical data generated from quasiperiodic tight-binding
        models to extract their mobility edges. In particular, we examine three classes
        of models: the Mosaic model (MM)\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib63\" title=\"\" class=\"ltx_ref\">63</a>]</cite>, the generalized
        Aubry-Andr\xE9 model (GAAM)\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib62\" title=\"\" class=\"ltx_ref\">62</a>]</cite> and the modified
        Aubry-Andr\xE9 model (MAAM)\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib60\" title=\"\" class=\"ltx_ref\">60</a>]</cite>. For the MM,
        we testify KAN\u2019s ability to accurately extract mobility edge as a 1D
        function of energy. For the GAAM, we find that the formula obtained from a
        KAN closely matches the ground truth. For the more complicated MAAM, we demonstrate
        yet another example of the symbolic interpretability of this framework. A
        user can simplify the complex expression obtained from KANs (and corresponding
        symbolic formulas) by means of a \u201Ccollaboration\u201D where the human
        generates hypotheses to obtain a better match (e.g., making an assumption
        of the form of certain activation function), after which KANs can carry out
        quick hypotheses testing.</p>\n</div>\n<div id=\"S4.SS4.p3\" class=\"ltx_para\">\n<p
        id=\"S4.SS4.p3.2\" class=\"ltx_p\">To quantify the localization of states
        in these models, the inverse participation ratio (IPR) is commonly used. The
        IPR for the <math id=\"S4.SS4.p3.1.m1\" class=\"ltx_Math\" alttext=\"k^{th}\"
        display=\"inline\" intent=\":literal\"><semantics><msup><mi>k</mi><mrow><mi>t</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>h</mi></mrow></msup><annotation
        encoding=\"application/x-tex\">k^{th}</annotation></semantics></math> eigenstate,
        <math id=\"S4.SS4.p3.2.m2\" class=\"ltx_Math\" alttext=\"\\psi^{(k)}\" display=\"inline\"
        intent=\":literal\"><semantics><msup><mi>\u03C8</mi><mrow><mo stretchy=\"false\">(</mo><mi>k</mi><mo
        stretchy=\"false\">)</mo></mrow></msup><annotation encoding=\"application/x-tex\">\\psi^{(k)}</annotation></semantics></math>,
        is given by</p>\n<table id=\"A6.EGx12\" class=\"ltx_equationgroup ltx_eqn_align
        ltx_eqn_table\">\n\n<tbody id=\"S4.E2\"><tr class=\"ltx_equation ltx_eqn_row
        ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_td ltx_align_right ltx_eqn_cell\"><math id=\"S4.E2.m1\" class=\"ltx_Math\"
        alttext=\"\\displaystyle\\text{IPR}_{k}=\\frac{\\sum_{n}|\\psi^{(k)}_{n}|^{4}}{\\left(\\sum_{n}|\\psi^{(k)}_{n}|^{2}\\right)^{2}}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mtext>IPR</mtext><mi>k</mi></msub><mo>=</mo><mstyle
        displaystyle=\"true\"><mfrac><mrow><msub><mo>\u2211</mo><mi>n</mi></msub><msup><mrow><mo
        lspace=\"0em\" stretchy=\"false\">|</mo><msubsup><mi>\u03C8</mi><mi>n</mi><mrow><mo
        stretchy=\"false\">(</mo><mi>k</mi><mo stretchy=\"false\">)</mo></mrow></msubsup><mo
        stretchy=\"false\">|</mo></mrow><mn>4</mn></msup></mrow><msup><mrow><mo>(</mo><mrow><msub><mo
        lspace=\"0em\" rspace=\"0em\">\u2211</mo><mi>n</mi></msub><msup><mrow><mo
        stretchy=\"false\">|</mo><msubsup><mi>\u03C8</mi><mi>n</mi><mrow><mo stretchy=\"false\">(</mo><mi>k</mi><mo
        stretchy=\"false\">)</mo></mrow></msubsup><mo stretchy=\"false\">|</mo></mrow><mn>2</mn></msup></mrow><mo>)</mo></mrow><mn>2</mn></msup></mfrac></mstyle></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle\\text{IPR}_{k}=\\frac{\\sum_{n}|\\psi^{(k)}_{n}|^{4}}{\\left(\\sum_{n}|\\psi^{(k)}_{n}|^{2}\\right)^{2}}</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(4.2)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S4.SS4.p3.5\"
        class=\"ltx_p\">where the sum runs over the site index. Here, we use the related
        measure of localization \u2013 the fractal dimension of the states, given
        by</p>\n<table id=\"A6.EGx13\" class=\"ltx_equationgroup ltx_eqn_align ltx_eqn_table\">\n\n<tbody
        id=\"S4.E3\"><tr class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_align_right
        ltx_eqn_cell\"><math id=\"S4.E3.m1\" class=\"ltx_Math\" alttext=\"\\displaystyle
        D_{k}=-\\frac{\\log(\\text{IPR}_{k})}{\\log(N)}\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>D</mi><mi>k</mi></msub><mo>=</mo><mrow><mo>\u2212</mo><mstyle
        displaystyle=\"true\"><mfrac><mrow><mi>log</mi><mo>\u2061</mo><mrow><mo stretchy=\"false\">(</mo><msub><mtext>IPR</mtext><mi>k</mi></msub><mo
        stretchy=\"false\">)</mo></mrow></mrow><mrow><mi>log</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>N</mi><mo stretchy=\"false\">)</mo></mrow></mrow></mfrac></mstyle></mrow></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle D_{k}=-\\frac{\\log(\\text{IPR}_{k})}{\\log(N)}</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(4.3)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S4.SS4.p3.4\"
        class=\"ltx_p\">where <math id=\"S4.SS4.p3.3.m1\" class=\"ltx_Math\" alttext=\"N\"
        display=\"inline\" intent=\":literal\"><semantics><mi>N</mi><annotation encoding=\"application/x-tex\">N</annotation></semantics></math>
        is the system size. <math id=\"S4.SS4.p3.4.m2\" class=\"ltx_Math\" alttext=\"D_{k}=0(1)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>D</mi><mi>k</mi></msub><mo>=</mo><mrow><mn>0</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mn>1</mn><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">D_{k}=0(1)</annotation></semantics></math>
        indicates localized (extended) states.</p>\n</div>\n<div id=\"S4.SS4.p4\"
        class=\"ltx_para\">\n<p id=\"S4.SS4.p4.11\" class=\"ltx_p\"><span id=\"S4.SS4.p4.11.1\"
        class=\"ltx_text ltx_font_bold\">Mosaic Model (MM)</span> We first consider
        a class of tight-binding models defined by the Hamiltonian\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib63\" title=\"\" class=\"ltx_ref\">63</a>]</cite></p>\n<table
        id=\"A6.EGx14\" class=\"ltx_equationgroup ltx_eqn_align ltx_eqn_table\">\n\n<tbody
        id=\"S4.E4\"><tr class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_align_right
        ltx_eqn_cell\"><math id=\"S4.E4.m1\" class=\"ltx_Math\" alttext=\"\\displaystyle
        H=t\\sum_{n}\\left(c^{\\dagger}_{n+1}c_{n}+\\text{H.c.}\\right)+\\sum_{n}V_{n}(\\lambda,\\phi)c^{\\dagger}_{n}c_{n},\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>H</mi><mo>=</mo><mrow><mrow><mi>t</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mstyle displaystyle=\"true\"><munder><mo
        movablelimits=\"false\">\u2211</mo><mi>n</mi></munder></mstyle><mrow><mo>(</mo><mrow><mrow><msubsup><mi>c</mi><mrow><mi>n</mi><mo>+</mo><mn>1</mn></mrow><mo>\u2020</mo></msubsup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>c</mi><mi>n</mi></msub></mrow><mo>+</mo><mtext>H.c.</mtext></mrow><mo>)</mo></mrow></mrow></mrow><mo>+</mo><mrow><mstyle
        displaystyle=\"true\"><munder><mo movablelimits=\"false\">\u2211</mo><mi>n</mi></munder></mstyle><mrow><msub><mi>V</mi><mi>n</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03BB</mi><mo>,</mo><mi>\u03D5</mi><mo
        stretchy=\"false\">)</mo></mrow><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><msubsup><mi>c</mi><mi>n</mi><mo>\u2020</mo></msubsup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>c</mi><mi>n</mi></msub></mrow></mrow></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle H=t\\sum_{n}\\left(c^{\\dagger}_{n+1}c_{n}+\\text{H.c.}\\right)+\\sum_{n}V_{n}(\\lambda,\\phi)c^{\\dagger}_{n}c_{n},</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(4.4)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S4.SS4.p4.4\"
        class=\"ltx_p\">where <math id=\"S4.SS4.p4.1.m1\" class=\"ltx_Math\" alttext=\"t\"
        display=\"inline\" intent=\":literal\"><semantics><mi>t</mi><annotation encoding=\"application/x-tex\">t</annotation></semantics></math>
        is the nearest-neighbor coupling, <math id=\"S4.SS4.p4.2.m2\" class=\"ltx_Math\"
        alttext=\"c_{n}(c^{\\dagger}_{n})\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>c</mi><mi>n</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msubsup><mi>c</mi><mi>n</mi><mo>\u2020</mo></msubsup><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">c_{n}(c^{\\dagger}_{n})</annotation></semantics></math>
        is the annihilation (creation) operator at site <math id=\"S4.SS4.p4.3.m3\"
        class=\"ltx_Math\" alttext=\"n\" display=\"inline\" intent=\":literal\"><semantics><mi>n</mi><annotation
        encoding=\"application/x-tex\">n</annotation></semantics></math> and the potential
        energy <math id=\"S4.SS4.p4.4.m4\" class=\"ltx_Math\" alttext=\"V_{n}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>V</mi><mi>n</mi></msub><annotation
        encoding=\"application/x-tex\">V_{n}</annotation></semantics></math> is given
        by</p>\n<table id=\"A6.EGx15\" class=\"ltx_equationgroup ltx_eqn_align ltx_eqn_table\">\n\n<tbody
        id=\"S4.E5\"><tr class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_align_right
        ltx_eqn_cell\"><math id=\"S4.E5.m1\" class=\"ltx_Math\" alttext=\"\\displaystyle
        V_{n}(\\lambda,\\phi)=\\begin{cases}\\lambda\\cos(2\\pi nb+\\phi)&amp;j=m\\kappa\\\\\n0,&amp;\\text{otherwise,}\\end{cases}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><msub><mi>V</mi><mi>n</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03BB</mi><mo>,</mo><mi>\u03D5</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mo>{</mo><mtable columnspacing=\"5pt\"
        rowspacing=\"0pt\"><mtr><mtd class=\"ltx_align_left\" columnalign=\"left\"><mrow><mi>\u03BB</mi><mo
        lspace=\"0.167em\" rspace=\"0em\">\u200B</mo><mrow><mi>cos</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mrow><mn>2</mn><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>b</mi></mrow><mo>+</mo><mi>\u03D5</mi></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mtd><mtd class=\"ltx_align_left\"
        columnalign=\"left\"><mrow><mi>j</mi><mo>=</mo><mrow><mi>m</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mi>\u03BA</mi></mrow></mrow></mtd></mtr><mtr><mtd
        class=\"ltx_align_left\" columnalign=\"left\"><mrow><mn>0</mn><mo>,</mo></mrow></mtd><mtd
        class=\"ltx_align_left\" columnalign=\"left\"><mtext>otherwise,</mtext></mtd></mtr></mtable></mrow></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle V_{n}(\\lambda,\\phi)=\\begin{cases}\\lambda\\cos(2\\pi
        nb+\\phi)&amp;j=m\\kappa\\\\\n0,&amp;\\text{otherwise,}\\end{cases}</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(4.5)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S4.SS4.p4.10\"
        class=\"ltx_p\">To introduce quasiperiodicity, we set <math id=\"S4.SS4.p4.5.m1\"
        class=\"ltx_Math\" alttext=\"b\" display=\"inline\" intent=\":literal\"><semantics><mi>b</mi><annotation
        encoding=\"application/x-tex\">b</annotation></semantics></math> to be irrational
        (in particular, we choose <math id=\"S4.SS4.p4.6.m2\" class=\"ltx_Math\" alttext=\"b\"
        display=\"inline\" intent=\":literal\"><semantics><mi>b</mi><annotation encoding=\"application/x-tex\">b</annotation></semantics></math>
        to be the golden ratio <math id=\"S4.SS4.p4.7.m3\" class=\"ltx_Math\" alttext=\"\\frac{1+\\sqrt{5}}{2}\"
        display=\"inline\" intent=\":literal\"><semantics><mfrac><mrow><mn>1</mn><mo>+</mo><msqrt><mn>5</mn></msqrt></mrow><mn>2</mn></mfrac><annotation
        encoding=\"application/x-tex\">\\frac{1+\\sqrt{5}}{2}</annotation></semantics></math>).
        <math id=\"S4.SS4.p4.8.m4\" class=\"ltx_Math\" alttext=\"\\kappa\" display=\"inline\"
        intent=\":literal\"><semantics><mi>\u03BA</mi><annotation encoding=\"application/x-tex\">\\kappa</annotation></semantics></math>
        is an integer and the quasiperiodic potential occurs with interval <math id=\"S4.SS4.p4.9.m5\"
        class=\"ltx_Math\" alttext=\"\\kappa\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03BA</mi><annotation
        encoding=\"application/x-tex\">\\kappa</annotation></semantics></math>. The
        energy (<math id=\"S4.SS4.p4.10.m6\" class=\"ltx_Math\" alttext=\"E\" display=\"inline\"
        intent=\":literal\"><semantics><mi>E</mi><annotation encoding=\"application/x-tex\">E</annotation></semantics></math>)
        spectrum for this model generically contains extended and localized regimes
        separated by a mobility edge. Interestingly, a unique feature found here is
        that the mobility edges are present for an arbitrarily strong quasiperiodic
        potential (i.e. there are always extended states present in the system that
        co-exist with localized ones).</p>\n</div>\n<div id=\"S4.SS4.p5\" class=\"ltx_para\">\n<p
        id=\"S4.SS4.p5.4\" class=\"ltx_p\">The mobility edge can be described by <math
        id=\"S4.SS4.p5.1.m1\" class=\"ltx_Math\" alttext=\"g(\\lambda,E)\\equiv\\lambda-|f_{\\kappa}(E)|=0\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>g</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03BB</mi><mo>,</mo><mi>E</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>\u2261</mo><mrow><mi>\u03BB</mi><mo>\u2212</mo><mrow><mo
        stretchy=\"false\">|</mo><mrow><msub><mi>f</mi><mi>\u03BA</mi></msub><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>E</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo stretchy=\"false\">|</mo></mrow></mrow><mo>=</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">g(\\lambda,E)\\equiv\\lambda-|f_{\\kappa}(E)|=0</annotation></semantics></math>.
        <math id=\"S4.SS4.p5.2.m2\" class=\"ltx_Math\" alttext=\"g(\\lambda,E)\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>g</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>\u03BB</mi><mo>,</mo><mi>E</mi><mo stretchy=\"false\">)</mo></mrow></mrow><annotation
        encoding=\"application/x-tex\">g(\\lambda,E)</annotation></semantics></math>
        &gt; 0 and <math id=\"S4.SS4.p5.3.m3\" class=\"ltx_Math\" alttext=\"g(\\lambda,E)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>g</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03BB</mi><mo>,</mo><mi>E</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">g(\\lambda,E)</annotation></semantics></math>
        &lt; 0 correspond to localized and extended phases, respectively. Learning
        the mobility edge therefore hinges on learning the \u201Corder parameter\u201D
        <math id=\"S4.SS4.p5.4.m4\" class=\"ltx_Math\" alttext=\"g(\\lambda,E)\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>g</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>\u03BB</mi><mo>,</mo><mi>E</mi><mo stretchy=\"false\">)</mo></mrow></mrow><annotation
        encoding=\"application/x-tex\">g(\\lambda,E)</annotation></semantics></math>.
        Admittedly, this problem can be tackled by many other theoretical methods
        for this class of models\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib63\" title=\"\" class=\"ltx_ref\">63</a>]</cite>, but we will
        demonstrate below that our KAN framework is ready and convenient to take in
        assumptions and inductive biases from human users.</p>\n</div>\n<div id=\"S4.SS4.p6\"
        class=\"ltx_para\">\n<p id=\"S4.SS4.p6.6\" class=\"ltx_p\">Let us assume a
        hypothetical user Alice, who is a new PhD student in condensed matter physics,
        and she is provided with a <math id=\"S4.SS4.p6.1.m1\" class=\"ltx_Math\"
        alttext=\"[2,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo stretchy=\"false\">]</mo></mrow><annotation
        encoding=\"application/x-tex\">[2,1]</annotation></semantics></math> KAN as
        an assistant for the task. Firstly, she understands that this is a classification
        task, so it is wise to set the activation function in the second layer to
        be sigmoid by using the <span id=\"S4.SS4.p6.6.1\" class=\"ltx_text ltx_font_typewriter\">fix_symbolic</span>
        functionality. Secondly, she realizes that learning the whole 2D function
        <math id=\"S4.SS4.p6.2.m2\" class=\"ltx_Math\" alttext=\"g(\\lambda,E)\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>g</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>\u03BB</mi><mo>,</mo><mi>E</mi><mo stretchy=\"false\">)</mo></mrow></mrow><annotation
        encoding=\"application/x-tex\">g(\\lambda,E)</annotation></semantics></math>
        is unnecessary because in the end she only cares about <math id=\"S4.SS4.p6.3.m3\"
        class=\"ltx_Math\" alttext=\"\\lambda=\\lambda(E)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03BB</mi><mo>=</mo><mrow><mi>\u03BB</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>E</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">\\lambda=\\lambda(E)</annotation></semantics></math>
        determined by <math id=\"S4.SS4.p6.4.m4\" class=\"ltx_Math\" alttext=\"g(\\lambda,E)=0\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>g</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03BB</mi><mo>,</mo><mi>E</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">g(\\lambda,E)=0</annotation></semantics></math>.
        In so doing, it is reasonable to assume <math id=\"S4.SS4.p6.5.m5\" class=\"ltx_Math\"
        alttext=\"g(\\lambda,E)=\\lambda-h(E)=0\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>g</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03BB</mi><mo>,</mo><mi>E</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>\u03BB</mi><mo>\u2212</mo><mrow><mi>h</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>E</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><mo>=</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">g(\\lambda,E)=\\lambda-h(E)=0</annotation></semantics></math>.
        Alice simply sets the activation function of <math id=\"S4.SS4.p6.6.m6\" class=\"ltx_Math\"
        alttext=\"\\lambda\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03BB</mi><annotation
        encoding=\"application/x-tex\">\\lambda</annotation></semantics></math> to
        be linear by again using the <span id=\"S4.SS4.p6.6.2\" class=\"ltx_text ltx_font_typewriter\">fix_symbolic</span>
        functionality. Now Alice trains the KAN network and conveniently obtains the
        mobility edge, as shown in Figure\_<a href=\"#S4.F5\" title=\"Figure 4.5 \u2023
        4.4 Application to Physics: Anderson localization \u2023 4 KANs are interpretable
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">4.5</span></a>. Alice can get both intuitive qualitative understanding
        (bottom) and quantitative results (middle), which well match the ground truth
        (top).</p>\n</div>\n<figure id=\"S4.F5\" class=\"ltx_figure\"><img src=\"2404.19756v5/figs/mosaic_results.png\"
        id=\"S4.F5.g1\" class=\"ltx_graphics ltx_centering ltx_img_landscape\" width=\"598\"
        height=\"343\" alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption
        ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure 4.5: </span>Results
        for the Mosaic Model. Top: phase diagram. Middle and Bottom: KANs can obtain
        both qualitative intuition (bottom) and extract quantitative results (middle).
        <math id=\"S4.F5.2.m1\" class=\"ltx_Math\" alttext=\"\\varphi=\\frac{1+\\sqrt{5}}{2}\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03C6</mi><mo>=</mo><mfrac><mrow><mn>1</mn><mo>+</mo><msqrt><mn>5</mn></msqrt></mrow><mn>2</mn></mfrac></mrow><annotation
        encoding=\"application/x-tex\">\\varphi=\\frac{1+\\sqrt{5}}{2}</annotation></semantics></math>
        is the golden ratio.</figcaption>\n</figure>\n<div id=\"S4.SS4.p7\" class=\"ltx_para\">\n<p
        id=\"S4.SS4.p7.8\" class=\"ltx_p\"><span id=\"S4.SS4.p7.8.1\" class=\"ltx_text
        ltx_font_bold\">Generalized Andre-Aubry Model (GAAM)</span> We next consider
        a class of tight-binding models defined by the Hamiltonian\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib62\" title=\"\" class=\"ltx_ref\">62</a>]</cite></p>\n<table
        id=\"A6.EGx16\" class=\"ltx_equationgroup ltx_eqn_align ltx_eqn_table\">\n\n<tbody
        id=\"S4.E6\"><tr class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_align_right
        ltx_eqn_cell\"><math id=\"S4.E6.m1\" class=\"ltx_Math\" alttext=\"\\displaystyle
        H=t\\sum_{n}\\left(c^{\\dagger}_{n+1}c_{n}+\\text{H.c.}\\right)+\\sum_{n}V_{n}(\\alpha,\\lambda,\\phi)c^{\\dagger}_{n}c_{n},\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>H</mi><mo>=</mo><mrow><mrow><mi>t</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mstyle displaystyle=\"true\"><munder><mo
        movablelimits=\"false\">\u2211</mo><mi>n</mi></munder></mstyle><mrow><mo>(</mo><mrow><mrow><msubsup><mi>c</mi><mrow><mi>n</mi><mo>+</mo><mn>1</mn></mrow><mo>\u2020</mo></msubsup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>c</mi><mi>n</mi></msub></mrow><mo>+</mo><mtext>H.c.</mtext></mrow><mo>)</mo></mrow></mrow></mrow><mo>+</mo><mrow><mstyle
        displaystyle=\"true\"><munder><mo movablelimits=\"false\">\u2211</mo><mi>n</mi></munder></mstyle><mrow><msub><mi>V</mi><mi>n</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03B1</mi><mo>,</mo><mi>\u03BB</mi><mo>,</mo><mi>\u03D5</mi><mo
        stretchy=\"false\">)</mo></mrow><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><msubsup><mi>c</mi><mi>n</mi><mo>\u2020</mo></msubsup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>c</mi><mi>n</mi></msub></mrow></mrow></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle H=t\\sum_{n}\\left(c^{\\dagger}_{n+1}c_{n}+\\text{H.c.}\\right)+\\sum_{n}V_{n}(\\alpha,\\lambda,\\phi)c^{\\dagger}_{n}c_{n},</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(4.6)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S4.SS4.p7.4\"
        class=\"ltx_p\">where <math id=\"S4.SS4.p7.1.m1\" class=\"ltx_Math\" alttext=\"t\"
        display=\"inline\" intent=\":literal\"><semantics><mi>t</mi><annotation encoding=\"application/x-tex\">t</annotation></semantics></math>
        is the nearest-neighbor coupling, <math id=\"S4.SS4.p7.2.m2\" class=\"ltx_Math\"
        alttext=\"c_{n}(c^{\\dagger}_{n})\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>c</mi><mi>n</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msubsup><mi>c</mi><mi>n</mi><mo>\u2020</mo></msubsup><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">c_{n}(c^{\\dagger}_{n})</annotation></semantics></math>
        is the annihilation (creation) operator at site <math id=\"S4.SS4.p7.3.m3\"
        class=\"ltx_Math\" alttext=\"n\" display=\"inline\" intent=\":literal\"><semantics><mi>n</mi><annotation
        encoding=\"application/x-tex\">n</annotation></semantics></math> and the potential
        energy <math id=\"S4.SS4.p7.4.m4\" class=\"ltx_Math\" alttext=\"V_{n}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>V</mi><mi>n</mi></msub><annotation
        encoding=\"application/x-tex\">V_{n}</annotation></semantics></math> is given
        by</p>\n<table id=\"A6.EGx17\" class=\"ltx_equationgroup ltx_eqn_align ltx_eqn_table\">\n\n<tbody
        id=\"S4.E7\"><tr class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_align_right
        ltx_eqn_cell\"><math id=\"S4.E7.m1\" class=\"ltx_Math\" alttext=\"\\displaystyle
        V_{n}(\\alpha,\\lambda,\\phi)=2\\lambda\\frac{\\cos(2\\pi nb+\\phi)}{1-\\alpha\\cos(2\\pi
        nb+\\phi)},\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mrow><msub><mi>V</mi><mi>n</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03B1</mi><mo>,</mo><mi>\u03BB</mi><mo>,</mo><mi>\u03D5</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mn>2</mn><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mi>\u03BB</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mstyle
        displaystyle=\"true\"><mfrac><mrow><mi>cos</mi><mo>\u2061</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\u03C0</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mi>n</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>b</mi></mrow><mo>+</mo><mi>\u03D5</mi></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow><mrow><mn>1</mn><mo>\u2212</mo><mrow><mi>\u03B1</mi><mo
        lspace=\"0.167em\" rspace=\"0em\">\u200B</mo><mrow><mi>cos</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mrow><mn>2</mn><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>b</mi></mrow><mo>+</mo><mi>\u03D5</mi></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow></mfrac></mstyle></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle V_{n}(\\alpha,\\lambda,\\phi)=2\\lambda\\frac{\\cos(2\\pi
        nb+\\phi)}{1-\\alpha\\cos(2\\pi nb+\\phi)},</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(4.7)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S4.SS4.p7.7\"
        class=\"ltx_p\">which is smooth for <math id=\"S4.SS4.p7.5.m1\" class=\"ltx_Math\"
        alttext=\"\\alpha\\in(-1,1)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>\u03B1</mi><mo>\u2208</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mo>\u2212</mo><mn>1</mn></mrow><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">\\alpha\\in(-1,1)</annotation></semantics></math>.
        To introduce quasiperiodicity, we again set <math id=\"S4.SS4.p7.6.m2\" class=\"ltx_Math\"
        alttext=\"b\" display=\"inline\" intent=\":literal\"><semantics><mi>b</mi><annotation
        encoding=\"application/x-tex\">b</annotation></semantics></math> to be irrational
        (in particular, we choose <math id=\"S4.SS4.p7.7.m3\" class=\"ltx_Math\" alttext=\"b\"
        display=\"inline\" intent=\":literal\"><semantics><mi>b</mi><annotation encoding=\"application/x-tex\">b</annotation></semantics></math>
        to be the golden ratio). As before, we would like to obtain an expression
        for the mobility edge. For these models, the mobility edge is given by the
        closed form expression\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib62\"
        title=\"\" class=\"ltx_ref\">62</a>, <a href=\"#bib.bib64\" title=\"\" class=\"ltx_ref\">64</a>]</cite>,</p>\n<table
        id=\"A6.EGx18\" class=\"ltx_equationgroup ltx_eqn_align ltx_eqn_table\">\n\n<tbody
        id=\"S4.E8\"><tr class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_align_right
        ltx_eqn_cell\"><math id=\"S4.E8.m1\" class=\"ltx_Math\" alttext=\"\\displaystyle\\alpha
        E=2(t-\\lambda).\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mrow><mi>\u03B1</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>E</mi></mrow><mo>=</mo><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mi>t</mi><mo>\u2212</mo><mi>\u03BB</mi></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><mo lspace=\"0em\">.</mo></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle\\alpha E=2(t-\\lambda).</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(4.8)</span></td>\n</tr></tbody>\n</table>\n</div>\n<div
        id=\"S4.SS4.p8\" class=\"ltx_para\">\n<p id=\"S4.SS4.p8.4\" class=\"ltx_p\">We
        randomly sample the model parameters: <math id=\"S4.SS4.p8.1.m1\" class=\"ltx_Math\"
        alttext=\"\\phi\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03D5</mi><annotation
