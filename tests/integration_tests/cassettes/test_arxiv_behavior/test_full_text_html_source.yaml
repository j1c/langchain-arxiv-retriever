        intent=\":literal\"><semantics><mrow><mn>3</mn><mo lspace=\"0.222em\" rspace=\"0.222em\">\xD7</mo><msup><mn>10</mn><mn>5</mn></msup></mrow><annotation
        encoding=\"application/x-tex\">3\\times 10^{5}</annotation></semantics></math></td>\n<td
        id=\"S4.T3.2.2.2\" class=\"ltx_td ltx_align_center ltx_border_r ltx_border_t\"><math
        id=\"S4.T3.2.2.2.m1\" class=\"ltx_Math\" alttext=\"78.0\\%\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mn>78.0</mn><mo>%</mo></mrow><annotation
        encoding=\"application/x-tex\">78.0\\%</annotation></semantics></math></td>\n</tr>\n<tr
        id=\"S4.T3.7.7\" class=\"ltx_tr\">\n<td id=\"S4.T3.7.7.6\" class=\"ltx_td
        ltx_align_center ltx_border_b ltx_border_l ltx_border_r ltx_border_t\">KANs</td>\n<td
        id=\"S4.T3.5.5.3\" class=\"ltx_td ltx_align_center ltx_border_b ltx_border_r
        ltx_border_t\">2 layer, <math id=\"S4.T3.3.3.1.m1\" class=\"ltx_Math\" alttext=\"[17,1,14]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>17</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>14</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[17,1,14]</annotation></semantics></math>
        (<math id=\"S4.T3.4.4.2.m2\" class=\"ltx_Math\" alttext=\"G=3\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>G</mi><mo>=</mo><mn>3</mn></mrow><annotation
        encoding=\"application/x-tex\">G=3</annotation></semantics></math>, <math
        id=\"S4.T3.5.5.3.m3\" class=\"ltx_Math\" alttext=\"k=3\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>k</mi><mo>=</mo><mn>3</mn></mrow><annotation
        encoding=\"application/x-tex\">k=3</annotation></semantics></math>)</td>\n<td
        id=\"S4.T3.6.6.4\" class=\"ltx_td ltx_align_center ltx_border_b ltx_border_r
        ltx_border_t\"><math id=\"S4.T3.6.6.4.m1\" class=\"ltx_Math\" alttext=\"2\\times
        10^{2}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mn>2</mn><mo
        lspace=\"0.222em\" rspace=\"0.222em\">\xD7</mo><msup><mn>10</mn><mn>2</mn></msup></mrow><annotation
        encoding=\"application/x-tex\">2\\times 10^{2}</annotation></semantics></math></td>\n<td
        id=\"S4.T3.7.7.5\" class=\"ltx_td ltx_align_center ltx_border_b ltx_border_r
        ltx_border_t\"><math id=\"S4.T3.7.7.5.m1\" class=\"ltx_Math\" alttext=\"81.6\\%\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mn>81.6</mn><mo>%</mo></mrow><annotation
        encoding=\"application/x-tex\">81.6\\%</annotation></semantics></math></td>\n</tr>\n</table>\n<figcaption
        class=\"ltx_caption ltx_centering\"><span class=\"ltx_tag ltx_tag_table\">Table
        3: </span>KANs can achieve better accuracy than MLPs with much fewer parameters
        in the signature classification problem. Soon after our preprint was first
        released, Prof. Shi Lab from Georgia tech discovered that an MLP with only
        60 parameters is sufficient to achieve 80% accuracy (public but unpublished
        results). This is good news for AI + Science because this means perhaps many
        AI + Science tasks are not that computationally demanding than we might think
        (either with MLPs or with KANs), hence many new scientific discoveries are
        possible even on personal laptops.</figcaption>\n</figure>\n<div id=\"S4.SS3.p5\"
        class=\"ltx_para\">\n<p id=\"S4.SS3.p5.8\" class=\"ltx_p\">To investigate
        (2), i.e., obtain the symbolic form of <math id=\"S4.SS3.p5.1.m1\" class=\"ltx_Math\"
        alttext=\"\\sigma\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03C3</mi><annotation
        encoding=\"application/x-tex\">\\sigma</annotation></semantics></math>, we
        formulate the problem as a regression task. Using auto-symbolic regression
        introduced in Section\_<a href=\"#S2.SS5.SSS1\" title=\"2.5.1 Simplification
        techniques \u2023 2.5 For Interpretability: Simplifying KANs and Making them
        interactive \u2023 2 Kolmogorov\u2013Arnold Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">2.5.1</span></a>,
        we can convert a trained KAN into symbolic formulas. We train KANs with shapes
        <math id=\"S4.SS3.p5.2.m2\" class=\"ltx_Math\" alttext=\"[3,1]\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>3</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[3,1]</annotation></semantics></math>,
        <math id=\"S4.SS3.p5.3.m3\" class=\"ltx_Math\" alttext=\"[3,1,1]\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>3</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[3,1,1]</annotation></semantics></math>,
        <math id=\"S4.SS3.p5.4.m4\" class=\"ltx_Math\" alttext=\"[3,2,1]\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>3</mn><mo>,</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[3,2,1]</annotation></semantics></math>,
        whose corresponding symbolic formulas are displayed in Table\_<a href=\"#S4.T4\"
        title=\"Table 4 \u2023 4.3 Application to Mathematics: Knot Theory \u2023
        4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">4</span></a> B-D. It is clear that by having
        a larger KAN, both accuracy and complexity increase. So KANs provide not just
        a single symbolic formula, but a whole Pareto frontier of formulas, trading
        off simplicity and accuracy. However, KANs need additional inductive biases
        to further simplify these equations to rediscover the formula from\_<cite
        class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib45\" title=\"\" class=\"ltx_ref\">45</a>]</cite>
        (Table\_<a href=\"#S4.T4\" title=\"Table 4 \u2023 4.3 Application to Mathematics:
        Knot Theory \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4</span></a>
        A). We have tested two scenarios: (1) in the first scenario, we assume the
        ground truth formula has a multi-variate Pade representation (division of
        two multi-variate Taylor series). We first train <math id=\"S4.SS3.p5.5.m5\"
        class=\"ltx_Math\" alttext=\"[3,2,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>3</mn><mo>,</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[3,2,1]</annotation></semantics></math>
        and then fit it to a Pade representation. We can obtain Formula E in Table\_<a
        href=\"#S4.T4\" title=\"Table 4 \u2023 4.3 Application to Mathematics: Knot
        Theory \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4</span></a>,
        which bears similarity with Deepmind\u2019s formula. (2) We hypothesize that
        the division is not very interpretable for KANs, so we train two KANs (one
        for the numerator and the other for the denominator) and divide them manually.
        Surprisingly, we end up with the formula F (in Table\_<a href=\"#S4.T4\" title=\"Table
        4 \u2023 4.3 Application to Mathematics: Knot Theory \u2023 4 KANs are interpretable
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">4</span></a>) which only involves <math id=\"S4.SS3.p5.6.m6\"
        class=\"ltx_Math\" alttext=\"\\mu_{r}\" display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>r</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{r}</annotation></semantics></math> and
        <math id=\"S4.SS3.p5.7.m7\" class=\"ltx_Math\" alttext=\"\\lambda\" display=\"inline\"
        intent=\":literal\"><semantics><mi>\u03BB</mi><annotation encoding=\"application/x-tex\">\\lambda</annotation></semantics></math>,
        although <math id=\"S4.SS3.p5.8.m8\" class=\"ltx_Math\" alttext=\"\\mu_{i}\"
        display=\"inline\" intent=\":literal\"><semantics><msub><mi>\u03BC</mi><mi>i</mi></msub><annotation
        encoding=\"application/x-tex\">\\mu_{i}</annotation></semantics></math> is
        also provided but ignored by KANs.</p>\n</div>\n<figure id=\"S4.T4\" class=\"ltx_table\">\n<div
