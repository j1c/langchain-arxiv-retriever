        ltx_border_t\" style=\"padding-top:3.5pt;padding-bottom:3.5pt;\">95.4%</td>\n</tr>\n</table>\n</span></div>\n<figcaption
        class=\"ltx_caption ltx_centering\"><span class=\"ltx_tag ltx_tag_table\">Table
        5: </span>Symbolic formulas for two systems GAAM and MAAM, ground truth ones
        and KAN-discovered ones.</figcaption>\n</figure>\n<div id=\"S4.SS4.p9\" class=\"ltx_para\">\n<p
        id=\"S4.SS4.p9.6\" class=\"ltx_p\">Here the \u201Corder parameter\u201D to
        be learned is <math id=\"S4.SS4.p9.1.m1\" class=\"ltx_Math\" alttext=\"g(\\alpha,E,\\lambda,\\phi)=\\alpha
        E+2(\\lambda-1)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>g</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03B1</mi><mo>,</mo><mi>E</mi><mo>,</mo><mi>\u03BB</mi><mo>,</mo><mi>\u03D5</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mrow><mi>\u03B1</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>E</mi></mrow><mo>+</mo><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mi>\u03BB</mi><mo>\u2212</mo><mn>1</mn></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">g(\\alpha,E,\\lambda,\\phi)=\\alpha
        E+2(\\lambda-1)</annotation></semantics></math> and mobility edge corresponds
        to <math id=\"S4.SS4.p9.2.m2\" class=\"ltx_Math\" alttext=\"g=0\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mi>g</mi><mo>=</mo><mn>0</mn></mrow><annotation
        encoding=\"application/x-tex\">g=0</annotation></semantics></math>. Let us
        again assume that Alice wants to figure out the mobility edge but only has
        access to IPR or fractal dimension data, so she decides to use KAN to help
        her with the task. Alice wants the model to be as small as possible, so she
        could either start from a large model and use auto-pruning to get a small
        model, or she could guess a reasonable small model based on her understanding
        of the complexity of the given problem. Either way, let us assume she arrives
        at a <math id=\"S4.SS4.p9.3.m3\" class=\"ltx_Math\" alttext=\"[4,2,1,1]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>4</mn><mo>,</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[4,2,1,1]</annotation></semantics></math>
        KAN. First, she sets the last activation to be sigmoid because this is a classification
        problem. She trains her KAN with some sparsity regularization to accuracy
        98.7% and visualizes the trained KAN in Figure\_<a href=\"#S4.F6\" title=\"Figure
        4.6 \u2023 4.4 Application to Physics: Anderson localization \u2023 4 KANs
        are interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">4.6</span></a> (a) step 1. She observes that
        <math id=\"S4.SS4.p9.4.m4\" class=\"ltx_Math\" alttext=\"\\phi\" display=\"inline\"
        intent=\":literal\"><semantics><mi>\u03D5</mi><annotation encoding=\"application/x-tex\">\\phi</annotation></semantics></math>
        is not picked up on at all, which makes her realize that the mobility edge
        is independent of <math id=\"S4.SS4.p9.5.m5\" class=\"ltx_Math\" alttext=\"\\phi\"
        display=\"inline\" intent=\":literal\"><semantics><mi>\u03D5</mi><annotation
        encoding=\"application/x-tex\">\\phi</annotation></semantics></math> (agreeing
        with Eq.\_(<a href=\"#S4.E8\" title=\"In 4.4 Application to Physics: Anderson
        localization \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.8</span></a>)).
        In addition, she observes that almost all other activation functions are linear
        or quadratic, so she turns on automatic symbolic snapping, constraining the
        library to be only linear or quadratic. After that, she immediately gets a
        network which is already symbolic (shown in Figure\_<a href=\"#S4.F6\" title=\"Figure
        4.6 \u2023 4.4 Application to Physics: Anderson localization \u2023 4 KANs
        are interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">4.6</span></a> (a) step 2), with comparable
        (even slightly better) accuracy 98.9%. By using <span id=\"S4.SS4.p9.6.1\"
        class=\"ltx_text ltx_font_typewriter\">symbolic_formula</span> functionality,
        Alice conveniently gets the symbolic form of <math id=\"S4.SS4.p9.6.m6\" class=\"ltx_Math\"
        alttext=\"g\" display=\"inline\" intent=\":literal\"><semantics><mi>g</mi><annotation
        encoding=\"application/x-tex\">g</annotation></semantics></math>, shown in
        Table\_<a href=\"#S4.T5\" title=\"Table 5 \u2023 4.4 Application to Physics:
        Anderson localization \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">5</span></a>
        GAAM-KAN auto (row three). Perhaps she wants to cross out some small terms
        and snap coefficient to small integers, which takes her close to the true
        answer.</p>\n</div>\n<div id=\"S4.SS4.p10\" class=\"ltx_para\">\n<p id=\"S4.SS4.p10.1\"
        class=\"ltx_p\">This hypothetical story for Alice would be completely different
        if she is using a symbolic regression method. If she is lucky, SR can return
        the exact correct formula. However, the vast majority of the time SR does
        not return useful results and it is impossible for Alice to \u201Cdebug\u201D
        or interact with the underlying process of symbolic regression. Furthermore,
        Alice may feel uncomfortable/inexperienced to provide a library of symbolic
        terms as prior knowledge to SR before SR is run. By constrast in KANs, Alice
        does not need to put any prior information to KANs. She can first get some
        clues by staring at a trained KAN and only then it is her job to decide which
        hypothesis she wants to make (e.g., \u201Call activations are linear or quadratic\u201D)
        and implement her hypothesis in KANs. Although it is not likely for KANs to
        return the correct answer immediately, KANs will always return something useful,
        and Alice can collaborate with it to refine the results.</p>\n</div>\n<div
        id=\"S4.SS4.p11\" class=\"ltx_para\">\n<p id=\"S4.SS4.p11.8\" class=\"ltx_p\"><span
        id=\"S4.SS4.p11.8.1\" class=\"ltx_text ltx_font_bold\">Modified Andre-Aubry
        Model (MAAM)</span> The last class of models we consider is defined by the
        Hamiltonian\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib60\"
        title=\"\" class=\"ltx_ref\">60</a>]</cite></p>\n<table id=\"A6.EGx19\" class=\"ltx_equationgroup
        ltx_eqn_align ltx_eqn_table\">\n\n<tbody id=\"S4.E9\"><tr class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_td ltx_align_right ltx_eqn_cell\"><math id=\"S4.E9.m1\" class=\"ltx_Math\"
        alttext=\"\\displaystyle H=\\sum_{n\\neq n^{\\prime}}te^{-p|n-n^{\\prime}|}\\left(c^{\\dagger}_{n}c_{n^{\\prime}}+\\text{H.c.}\\right)+\\sum_{n}V_{n}(\\lambda,\\phi)c^{\\dagger}_{n}c_{n},\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>H</mi><mo>=</mo><mrow><mrow><mstyle
        displaystyle=\"true\"><munder><mo movablelimits=\"false\">\u2211</mo><mrow><mi>n</mi><mo>\u2260</mo><msup><mi>n</mi><mo>\u2032</mo></msup></mrow></munder></mstyle><mrow><mi>t</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msup><mi>e</mi><mrow><mo>\u2212</mo><mrow><mi>p</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">|</mo><mrow><mi>n</mi><mo>\u2212</mo><msup><mi>n</mi><mo>\u2032</mo></msup></mrow><mo
        stretchy=\"false\">|</mo></mrow></mrow></mrow></msup><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo>(</mo><mrow><mrow><msubsup><mi>c</mi><mi>n</mi><mo>\u2020</mo></msubsup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>c</mi><msup><mi>n</mi><mo>\u2032</mo></msup></msub></mrow><mo>+</mo><mtext>H.c.</mtext></mrow><mo>)</mo></mrow></mrow></mrow><mo>+</mo><mrow><mstyle
        displaystyle=\"true\"><munder><mo movablelimits=\"false\">\u2211</mo><mi>n</mi></munder></mstyle><mrow><msub><mi>V</mi><mi>n</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03BB</mi><mo>,</mo><mi>\u03D5</mi><mo
        stretchy=\"false\">)</mo></mrow><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><msubsup><mi>c</mi><mi>n</mi><mo>\u2020</mo></msubsup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><msub><mi>c</mi><mi>n</mi></msub></mrow></mrow></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle H=\\sum_{n\\neq n^{\\prime}}te^{-p|n-n^{\\prime}|}\\left(c^{\\dagger}_{n}c_{n^{\\prime}}+\\text{H.c.}\\right)+\\sum_{n}V_{n}(\\lambda,\\phi)c^{\\dagger}_{n}c_{n},</annotation></semantics></math></td>\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell
        ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(4.9)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S4.SS4.p11.4\"
        class=\"ltx_p\">where <math id=\"S4.SS4.p11.1.m1\" class=\"ltx_Math\" alttext=\"t\"
        display=\"inline\" intent=\":literal\"><semantics><mi>t</mi><annotation encoding=\"application/x-tex\">t</annotation></semantics></math>
        is the strength of the exponentially decaying coupling in space, <math id=\"S4.SS4.p11.2.m2\"
        class=\"ltx_Math\" alttext=\"c_{n}(c^{\\dagger}_{n})\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><msub><mi>c</mi><mi>n</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><msubsup><mi>c</mi><mi>n</mi><mo>\u2020</mo></msubsup><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">c_{n}(c^{\\dagger}_{n})</annotation></semantics></math>
        is the annihilation (creation) operator at site <math id=\"S4.SS4.p11.3.m3\"
        class=\"ltx_Math\" alttext=\"n\" display=\"inline\" intent=\":literal\"><semantics><mi>n</mi><annotation
        encoding=\"application/x-tex\">n</annotation></semantics></math> and the potential
        energy <math id=\"S4.SS4.p11.4.m4\" class=\"ltx_Math\" alttext=\"V_{n}\" display=\"inline\"
        intent=\":literal\"><semantics><msub><mi>V</mi><mi>n</mi></msub><annotation
        encoding=\"application/x-tex\">V_{n}</annotation></semantics></math> is given
        by</p>\n<table id=\"A6.EGx20\" class=\"ltx_equationgroup ltx_eqn_align ltx_eqn_table\">\n\n<tbody
        id=\"S4.E10\"><tr class=\"ltx_equation ltx_eqn_row ltx_align_baseline\">\n<td
        class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td class=\"ltx_td ltx_align_right
        ltx_eqn_cell\"><math id=\"S4.E10.m1\" class=\"ltx_Math\" alttext=\"\\displaystyle
        V_{n}(\\lambda,\\phi)=\\lambda\\cos(2\\pi nb+\\phi),\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mrow><msub><mi>V</mi><mi>n</mi></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>\u03BB</mi><mo>,</mo><mi>\u03D5</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>\u03BB</mi><mo
        lspace=\"0.167em\" rspace=\"0em\">\u200B</mo><mrow><mi>cos</mi><mo>\u2061</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mrow><mn>2</mn><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>b</mi></mrow><mo>+</mo><mi>\u03D5</mi></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><mo>,</mo></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle V_{n}(\\lambda,\\phi)=\\lambda\\cos(2\\pi
        nb+\\phi),</annotation></semantics></math></td>\n<td class=\"ltx_eqn_cell
        ltx_eqn_center_padright\"></td>\n<td rowspan=\"1\" class=\"ltx_eqn_cell ltx_eqn_eqno
        ltx_align_middle ltx_align_right\"><span class=\"ltx_tag ltx_tag_equation
        ltx_align_right\">(4.10)</span></td>\n</tr></tbody>\n</table>\n<p id=\"S4.SS4.p11.5\"
        class=\"ltx_p\">As before, to introduce quasiperiodicity, we set <math id=\"S4.SS4.p11.5.m1\"
        class=\"ltx_Math\" alttext=\"b\" display=\"inline\" intent=\":literal\"><semantics><mi>b</mi><annotation
        encoding=\"application/x-tex\">b</annotation></semantics></math> to be irrational
        (the golden ratio). For these models, the mobility edge is given by the closed
        form expression\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib60\"
        title=\"\" class=\"ltx_ref\">60</a>]</cite>,</p>\n<table id=\"A6.EGx21\" class=\"ltx_equationgroup
        ltx_eqn_align ltx_eqn_table\">\n\n<tbody id=\"S4.E11\"><tr class=\"ltx_equation
        ltx_eqn_row ltx_align_baseline\">\n<td class=\"ltx_eqn_cell ltx_eqn_center_padleft\"></td>\n<td
        class=\"ltx_td ltx_align_right ltx_eqn_cell\"><math id=\"S4.E11.m1\" class=\"ltx_Math\"
        alttext=\"\\displaystyle\\lambda\\cosh(p)=E+t=E+t_{1}{\\rm exp}(p)\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mi>\u03BB</mi><mo lspace=\"0.167em\"
        rspace=\"0em\">\u200B</mo><mrow><mi>cosh</mi><mo>\u2061</mo><mrow><mo stretchy=\"false\">(</mo><mi>p</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><mo>=</mo><mrow><mi>E</mi><mo>+</mo><mi>t</mi></mrow><mo>=</mo><mrow><mi>E</mi><mo>+</mo><mrow><msub><mi>t</mi><mn>1</mn></msub><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>exp</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>p</mi><mo stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><annotation
        encoding=\"application/x-tex\">\\displaystyle\\lambda\\cosh(p)=E+t=E+t_{1}{\\rm
        exp}(p)</annotation></semantics></math></td>\n<td class=\"ltx_eqn_cell ltx_eqn_center_padright\"></td>\n<td
        rowspan=\"1\" class=\"ltx_eqn_cell ltx_eqn_eqno ltx_align_middle ltx_align_right\"><span
        class=\"ltx_tag ltx_tag_equation ltx_align_right\">(4.11)</span></td>\n</tr></tbody>\n</table>\n<p
        id=\"S4.SS4.p11.7\" class=\"ltx_p\">where we define <math id=\"S4.SS4.p11.6.m1\"
        class=\"ltx_Math\" alttext=\"t_{1}\\equiv t{\\rm exp}(-p)\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><msub><mi>t</mi><mn>1</mn></msub><mo>\u2261</mo><mrow><mi>t</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>exp</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mrow><mo>\u2212</mo><mi>p</mi></mrow><mo stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation
        encoding=\"application/x-tex\">t_{1}\\equiv t{\\rm exp}(-p)</annotation></semantics></math>
        as the nearest neighbor hopping strength, and we set <math id=\"S4.SS4.p11.7.m2\"
        class=\"ltx_Math\" alttext=\"t_{1}=1\" display=\"inline\" intent=\":literal\"><semantics><mrow><msub><mi>t</mi><mn>1</mn></msub><mo>=</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">t_{1}=1</annotation></semantics></math> below.</p>\n</div>\n<div
        id=\"S4.SS4.p12\" class=\"ltx_para\">\n<p id=\"S4.SS4.p12.16\" class=\"ltx_p\">Let
        us assume Alice wants to figure out the mobility edge for MAAM. This task
        is more complicated and requires more human wisdom. As in the last example,
        Alice starts from a <math id=\"S4.SS4.p12.1.m1\" class=\"ltx_Math\" alttext=\"[4,2,1,1]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mn>4</mn><mo>,</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[4,2,1,1]</annotation></semantics></math>
        KAN and trains it but gets an accuracy around 75% which is less than acceptable.
        She then chooses a larger <math id=\"S4.SS4.p12.2.m2\" class=\"ltx_Math\"
        alttext=\"[4,3,1,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>4</mn><mo>,</mo><mn>3</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[4,3,1,1]</annotation></semantics></math>
        KAN and successfully gets 98.4% which is acceptable (Figure\_<a href=\"#S4.F6\"
        title=\"Figure 4.6 \u2023 4.4 Application to Physics: Anderson localization
        \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.6</span></a> (b)
        step 1). Alice notices that <math id=\"S4.SS4.p12.3.m3\" class=\"ltx_Math\"
        alttext=\"\\phi\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03D5</mi><annotation
        encoding=\"application/x-tex\">\\phi</annotation></semantics></math> is not
        picked up on by KANs, which means that the mobility edge is independent of
        the phase factor <math id=\"S4.SS4.p12.4.m4\" class=\"ltx_Math\" alttext=\"\\phi\"
        display=\"inline\" intent=\":literal\"><semantics><mi>\u03D5</mi><annotation
        encoding=\"application/x-tex\">\\phi</annotation></semantics></math> (agreeing
        with Eq.\_(<a href=\"#S4.E11\" title=\"In 4.4 Application to Physics: Anderson
        localization \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.11</span></a>)).
        If Alice turns on the automatic symbolic regression (using a large library
        consisting of exp, tanh etc.), she would get a complicated formula in Tabel\_<a
        href=\"#S4.T5\" title=\"Table 5 \u2023 4.4 Application to Physics: Anderson
        localization \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">5</span></a>-MAAM-KAN
        auto, which has 97.1% accuracy. However, if Alice wants to find a simpler
        symbolic formula, she will want to use the manual mode where she does the
        symbolic snapping by herself. Before that she finds that the <math id=\"S4.SS4.p12.5.m5\"
        class=\"ltx_Math\" alttext=\"[4,3,1,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>4</mn><mo>,</mo><mn>3</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[4,3,1,1]</annotation></semantics></math>
        KAN after training can then be pruned to be <math id=\"S4.SS4.p12.6.m6\" class=\"ltx_Math\"
        alttext=\"[4,2,1,1]\" display=\"inline\" intent=\":literal\"><semantics><mrow><mo
        stretchy=\"false\">[</mo><mn>4</mn><mo>,</mo><mn>2</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[4,2,1,1]</annotation></semantics></math>,
        while maintaining <math id=\"S4.SS4.p12.7.m7\" class=\"ltx_Math\" alttext=\"97.7\\%\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mn>97.7</mn><mo>%</mo></mrow><annotation
        encoding=\"application/x-tex\">97.7\\%</annotation></semantics></math> accuracy
        (Figure\_<a href=\"#S4.F6\" title=\"Figure 4.6 \u2023 4.4 Application to Physics:
        Anderson localization \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.6</span></a>
        (b)). Alice may think that all activation functions except those dependent
        on <math id=\"S4.SS4.p12.8.m8\" class=\"ltx_Math\" alttext=\"p\" display=\"inline\"
        intent=\":literal\"><semantics><mi>p</mi><annotation encoding=\"application/x-tex\">p</annotation></semantics></math>
        are linear or quadratic and snap them to be either linear or quadratic manually
        by using <span id=\"S4.SS4.p12.16.1\" class=\"ltx_text ltx_font_typewriter\">fix_symbolic</span>.
        After snapping and retraining, the updated KAN is shown in Figure\_<a href=\"#S4.F6\"
        title=\"Figure 4.6 \u2023 4.4 Application to Physics: Anderson localization
        \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.6</span></a> (c)
        step 3, maintaining <math id=\"S4.SS4.p12.9.m9\" class=\"ltx_Math\" alttext=\"97.7\\%\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mn>97.7</mn><mo>%</mo></mrow><annotation
        encoding=\"application/x-tex\">97.7\\%</annotation></semantics></math> accuracy.
        From now on, Alice may make two different choices based on her prior knowledge.
        In one case, Alice may have guessed that the dependence on <math id=\"S4.SS4.p12.10.m10\"
        class=\"ltx_Math\" alttext=\"p\" display=\"inline\" intent=\":literal\"><semantics><mi>p</mi><annotation
        encoding=\"application/x-tex\">p</annotation></semantics></math> is <math
        id=\"S4.SS4.p12.11.m11\" class=\"ltx_Math\" alttext=\"{\\rm cosh}\" display=\"inline\"
        intent=\":literal\"><semantics><mi>cosh</mi><annotation encoding=\"application/x-tex\">{\\rm
        cosh}</annotation></semantics></math>, so she sets the activations of <math
        id=\"S4.SS4.p12.12.m12\" class=\"ltx_Math\" alttext=\"p\" display=\"inline\"
        intent=\":literal\"><semantics><mi>p</mi><annotation encoding=\"application/x-tex\">p</annotation></semantics></math>
        to be <math id=\"S4.SS4.p12.13.m13\" class=\"ltx_Math\" alttext=\"{\\rm cosh}\"
        display=\"inline\" intent=\":literal\"><semantics><mi>cosh</mi><annotation
        encoding=\"application/x-tex\">{\\rm cosh}</annotation></semantics></math>
        function. She retrains KAN and gets 96.9% accuracy (Figure\_<a href=\"#S4.F6\"
        title=\"Figure 4.6 \u2023 4.4 Application to Physics: Anderson localization
        \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.6</span></a> (c)
        Step 4A). In another case, Alice does not know the <math id=\"S4.SS4.p12.14.m14\"
        class=\"ltx_Math\" alttext=\"{\\rm cosh}\\ p\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>cosh</mi><mo
        lspace=\"0.500em\" rspace=\"0em\">\u200B</mo><mi>p</mi></mrow><annotation
        encoding=\"application/x-tex\">{\\rm cosh}\\ p</annotation></semantics></math>
        dependence, so she pursues simplicity and again assumes the functions of <math
        id=\"S4.SS4.p12.15.m15\" class=\"ltx_Math\" alttext=\"p\" display=\"inline\"
        intent=\":literal\"><semantics><mi>p</mi><annotation encoding=\"application/x-tex\">p</annotation></semantics></math>
        to be quadratic. She retrains KAN and gets 95.4% accuracy (Figure\_<a href=\"#S4.F6\"
        title=\"Figure 4.6 \u2023 4.4 Application to Physics: Anderson localization
        \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.6</span></a> (c)
        Step 4B). If she tried both, she would realize that <math id=\"S4.SS4.p12.16.m16\"
        class=\"ltx_Math\" alttext=\"{\\rm cosh}\" display=\"inline\" intent=\":literal\"><semantics><mi>cosh</mi><annotation
        encoding=\"application/x-tex\">{\\rm cosh}</annotation></semantics></math>
        is better in terms of accuracy, while quadratic is better in terms of simplicity.
        The formulas corresponding to these steps are listed in Table\_<a href=\"#S4.T5\"
        title=\"Table 5 \u2023 4.4 Application to Physics: Anderson localization \u2023
        4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">5</span></a>. It is clear that the more manual
        operations are done by Alice, the simpler the symbolic formula is (which slight
        sacrifice in accuracy). KANs have a \u201Cknob\" that a user can tune to trade-off
        between simplicity and accuracy (sometimes simplicity can even lead to better
        accuracy, as in the GAAM case).</p>\n</div>\n<figure id=\"S4.F6\" class=\"ltx_figure\"><img
        src=\"2404.19756v5/figs/al_complex.png\" id=\"S4.F6.g1\" class=\"ltx_graphics
        ltx_centering ltx_img_landscape\" width=\"598\" height=\"430\" alt=\"Refer
        to caption\">\n<figcaption class=\"ltx_caption ltx_centering\"><span class=\"ltx_tag
        ltx_tag_figure\">Figure 4.6: </span>Human-KAN collaboration to discover mobility
        edges of GAAM and MAAM. The human user can choose to be lazy (using the auto
        mode) or more involved (using the manual mode). More details in text.</figcaption>\n</figure>\n</section>\n</section>\n<section
        id=\"S5\" class=\"ltx_section\">\n<h2 class=\"ltx_title ltx_title_section\">\n<span
        class=\"ltx_tag ltx_tag_section\">5 </span>Related works</h2>\n\n<div id=\"S5.p1\"
        class=\"ltx_para\">\n<p id=\"S5.p1.1\" class=\"ltx_p\"><span id=\"S5.p1.1.1\"
        class=\"ltx_text ltx_font_bold\">Kolmogorov-Arnold theorem and neural networks.</span>
        The connection between the Kolmogorov-Arnold theorem (KAT) and neural networks
        is not new in the literature \_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib66\" title=\"\" class=\"ltx_ref\">66</a>, <a href=\"#bib.bib67\"
        title=\"\" class=\"ltx_ref\">67</a>, <a href=\"#bib.bib9\" title=\"\" class=\"ltx_ref\">9</a>,
        <a href=\"#bib.bib10\" title=\"\" class=\"ltx_ref\">10</a>, <a href=\"#bib.bib11\"
        title=\"\" class=\"ltx_ref\">11</a>, <a href=\"#bib.bib12\" title=\"\" class=\"ltx_ref\">12</a>,
        <a href=\"#bib.bib13\" title=\"\" class=\"ltx_ref\">13</a>, <a href=\"#bib.bib14\"
        title=\"\" class=\"ltx_ref\">14</a>, <a href=\"#bib.bib68\" title=\"\" class=\"ltx_ref\">68</a>,
        <a href=\"#bib.bib69\" title=\"\" class=\"ltx_ref\">69</a>]</cite>, but the
        pathological behavior of inner functions makes KAT appear unpromising in practice\_<cite
        class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib66\" title=\"\" class=\"ltx_ref\">66</a>]</cite>.
        Most of these prior works stick to the original 2-layer width-(<math id=\"S5.p1.1.m1\"
        class=\"ltx_Math\" alttext=\"2n+1\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi></mrow><mo>+</mo><mn>1</mn></mrow><annotation
        encoding=\"application/x-tex\">2n+1</annotation></semantics></math>) networks,
        which were limited in expressive power and many of them are even predating
        back-propagation. Therefore, most studies were built on theories with rather
        limited or artificial toy experiments. More broadly speaking, KANs are also
        somewhat related to generalized additive models (GAMs)\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib70\" title=\"\" class=\"ltx_ref\">70</a>]</cite>,
        graph neural networks\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib71\"
        title=\"\" class=\"ltx_ref\">71</a>]</cite> and kernel machines\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib72\" title=\"\" class=\"ltx_ref\">72</a>]</cite>.
        The connections are intriguing and fundamental but might be out of the scope
        of the current paper.\_Our contribution lies in generalizing the Kolmogorov
        network to arbitrary widths and depths, revitalizing and contexualizing them
        in today\u2019s deep learning stream, as well as highlighting its potential
        role as a foundation model for AI + Science.</p>\n</div>\n<div id=\"S5.p2\"
        class=\"ltx_para\">\n<p id=\"S5.p2.1\" class=\"ltx_p\"><span id=\"S5.p2.1.1\"
        class=\"ltx_text ltx_font_bold\">Neural Scaling Laws (NSLs).</span> NSLs are
        the phenomena where test losses behave as power laws against model size, data,
        compute etc\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib73\"
        title=\"\" class=\"ltx_ref\">73</a>, <a href=\"#bib.bib74\" title=\"\" class=\"ltx_ref\">74</a>,
        <a href=\"#bib.bib75\" title=\"\" class=\"ltx_ref\">75</a>, <a href=\"#bib.bib76\"
        title=\"\" class=\"ltx_ref\">76</a>, <a href=\"#bib.bib24\" title=\"\" class=\"ltx_ref\">24</a>,
        <a href=\"#bib.bib77\" title=\"\" class=\"ltx_ref\">77</a>, <a href=\"#bib.bib78\"
        title=\"\" class=\"ltx_ref\">78</a>, <a href=\"#bib.bib79\" title=\"\" class=\"ltx_ref\">79</a>]</cite>.
        The origin of NSLs still remains mysterious, but competitive theories include
        intrinsic dimensionality\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib73\" title=\"\" class=\"ltx_ref\">73</a>]</cite>, quantization
        of tasks\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib78\"
        title=\"\" class=\"ltx_ref\">78</a>]</cite>, resource theory\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib79\" title=\"\" class=\"ltx_ref\">79</a>]</cite>,
        random features\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib77\"
        title=\"\" class=\"ltx_ref\">77</a>]</cite>, compositional sparsity\_<cite
        class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib66\" title=\"\" class=\"ltx_ref\">66</a>]</cite>,
        and maximu arity\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib25\"
        title=\"\" class=\"ltx_ref\">25</a>]</cite>. This paper contributes to this
        space by showing that a high-dimensional function can surprisingly scale as
        a 1D function (which is the best possible bound one can hope for) if it has
        a smooth Kolmogorov-Arnold representation. Our paper brings fresh optimism
        to neural scaling laws, since it promises the fastest scaling exponent ever.
        We have shown in our experiments that this fast neural scaling law can be
        achieved on synthetic datasets, but future research is required to address
        the question whether this fast scaling is achievable for more complicated
        tasks (e.g., language modeling): Do KA representations exist for general tasks?
        If so, does our training find these representations in practice?</p>\n</div>\n<div
        id=\"S5.p3\" class=\"ltx_para\">\n<p id=\"S5.p3.1\" class=\"ltx_p\"><span
        id=\"S5.p3.1.1\" class=\"ltx_text ltx_font_bold\">Mechanistic Interpretability
        (MI).</span> MI is an emerging field that aims to mechanistically understand
        the inner workings of neural networks\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib80\" title=\"\" class=\"ltx_ref\">80</a>, <a href=\"#bib.bib81\"
        title=\"\" class=\"ltx_ref\">81</a>, <a href=\"#bib.bib82\" title=\"\" class=\"ltx_ref\">82</a>,
        <a href=\"#bib.bib83\" title=\"\" class=\"ltx_ref\">83</a>, <a href=\"#bib.bib84\"
        title=\"\" class=\"ltx_ref\">84</a>, <a href=\"#bib.bib85\" title=\"\" class=\"ltx_ref\">85</a>,
        <a href=\"#bib.bib86\" title=\"\" class=\"ltx_ref\">86</a>, <a href=\"#bib.bib87\"
        title=\"\" class=\"ltx_ref\">87</a>, <a href=\"#bib.bib5\" title=\"\" class=\"ltx_ref\">5</a>]</cite>.
        MI research can be roughly divided into passive and active MI research. Most
        MI research is passive in focusing on understanding existing neural networks
        trained with standard methods. Active MI research attempts to achieve interpretability
        by designing intrinsically interpretable architectures or developing training
        methods to explicitly encourage interpretability\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib86\" title=\"\" class=\"ltx_ref\">86</a>, <a href=\"#bib.bib87\"
        title=\"\" class=\"ltx_ref\">87</a>]</cite>. Our work lies in the second category,
        where the model and training method are by design interpretable.</p>\n</div>\n<div
        id=\"S5.p4\" class=\"ltx_para\">\n<p id=\"S5.p4.1\" class=\"ltx_p\"><span
        id=\"S5.p4.1.1\" class=\"ltx_text ltx_font_bold\">Learnable activations.</span>
        The idea of learnable activations in neural networks is not new in machine
        learning. Trainable activations functions are learned in a differentiable
        way\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib88\" title=\"\"
        class=\"ltx_ref\">88</a>, <a href=\"#bib.bib14\" title=\"\" class=\"ltx_ref\">14</a>,
        <a href=\"#bib.bib89\" title=\"\" class=\"ltx_ref\">89</a>, <a href=\"#bib.bib90\"
        title=\"\" class=\"ltx_ref\">90</a>]</cite> or searched in a discrete way\_<cite
        class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib91\" title=\"\" class=\"ltx_ref\">91</a>]</cite>.
        Activation function are parametrized as polynomials\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib88\" title=\"\" class=\"ltx_ref\">88</a>]</cite>,
        splines\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib14\"
        title=\"\" class=\"ltx_ref\">14</a>, <a href=\"#bib.bib92\" title=\"\" class=\"ltx_ref\">92</a>,
        <a href=\"#bib.bib93\" title=\"\" class=\"ltx_ref\">93</a>]</cite>, sigmoid
        linear unit\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib89\"
        title=\"\" class=\"ltx_ref\">89</a>]</cite>, or neural networks\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib90\" title=\"\" class=\"ltx_ref\">90</a>]</cite>.
        KANs use B-splines to parametrize their activation functions. We also present
        our preliminary results on learnable activation networks (LANs), whose properties
        lie between KANs and MLPs and their results are deferred to Appendix\_<a href=\"#A2\"
        title=\"Appendix B Learnable activation networks (LANs) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">B</span></a>
        to focus on KANs in the main paper.</p>\n</div>\n<div id=\"S5.p5\" class=\"ltx_para\">\n<p
        id=\"S5.p5.1\" class=\"ltx_p\"><span id=\"S5.p5.1.1\" class=\"ltx_text ltx_font_bold\">Symbolic
        Regression.</span> There are many off-the-shelf symbolic regression methods
        based on genetic algorithms (Eureka\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib94\" title=\"\" class=\"ltx_ref\">94</a>]</cite>, GPLearn\_<cite
        class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib95\" title=\"\" class=\"ltx_ref\">95</a>]</cite>,
        PySR\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib96\"
        title=\"\" class=\"ltx_ref\">96</a>]</cite>), neural-network based methods
        (EQL\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib97\"
        title=\"\" class=\"ltx_ref\">97</a>]</cite>, OccamNet\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib98\" title=\"\" class=\"ltx_ref\">98</a>]</cite>),
        physics-inspired method (AI Feynman\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib36\" title=\"\" class=\"ltx_ref\">36</a>, <a href=\"#bib.bib37\"
        title=\"\" class=\"ltx_ref\">37</a>]</cite>), and reinforcement learning-based
        methods\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib99\"
        title=\"\" class=\"ltx_ref\">99</a>]</cite>. KANs are most similar to neural
        network-based methods, but differ from previous works in that our activation
        functions are continuously learned before symbolic snapping rather than manually
        fixed\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib94\"
        title=\"\" class=\"ltx_ref\">94</a>, <a href=\"#bib.bib98\" title=\"\" class=\"ltx_ref\">98</a>]</cite>.</p>\n</div>\n<div
        id=\"S5.p6\" class=\"ltx_para\">\n<p id=\"S5.p6.1\" class=\"ltx_p\"><span
        id=\"S5.p6.1.1\" class=\"ltx_text ltx_font_bold\">Physics-Informed Neural
        Networks (PINNs) and Physics-Informed Neural Operators (PINOs).</span>\nIn
        Subsection <a href=\"#S3.SS4\" title=\"3.4 Solving partial differential equations
        \u2023 3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">3.4</span></a>, we demonstrate that KANs can
        replace the paradigm of using MLPs for imposing PDE loss when solving PDEs.
        We refer to Deep Ritz Method <cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib100\" title=\"\" class=\"ltx_ref\">100</a>]</cite>, PINNs <cite
        class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib38\" title=\"\" class=\"ltx_ref\">38</a>,
        <a href=\"#bib.bib39\" title=\"\" class=\"ltx_ref\">39</a>, <a href=\"#bib.bib101\"
        title=\"\" class=\"ltx_ref\">101</a>]</cite> for PDE solving, and Fourier
        Neural operator <cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib102\"
        title=\"\" class=\"ltx_ref\">102</a>]</cite>, PINOs <cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib103\" title=\"\" class=\"ltx_ref\">103</a>,
        <a href=\"#bib.bib104\" title=\"\" class=\"ltx_ref\">104</a>, <a href=\"#bib.bib105\"
        title=\"\" class=\"ltx_ref\">105</a>]</cite>, DeepONet <cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib106\" title=\"\" class=\"ltx_ref\">106</a>]</cite>
        for operator learning methods learning the solution map. There is potential
        to replace MLPs with KANs in all the aforementioned networks.</p>\n</div>\n<div
        id=\"S5.p7\" class=\"ltx_para\">\n<p id=\"S5.p7.1\" class=\"ltx_p\"><span
        id=\"S5.p7.1.1\" class=\"ltx_text ltx_font_bold\">AI for Mathematics.</span>
        As we saw in Subsection\_<a href=\"#S4.SS3\" title=\"4.3 Application to Mathematics:
        Knot Theory \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.3</span></a>,
        AI has recently been applied to several problems in Knot theory, including
        detecting whether a knot is the unknot\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib107\" title=\"\" class=\"ltx_ref\">107</a>, <a href=\"#bib.bib108\"
        title=\"\" class=\"ltx_ref\">108</a>]</cite> or a ribbon knot\_<cite class=\"ltx_cite
        ltx_citemacro_cite\">[<a href=\"#bib.bib46\" title=\"\" class=\"ltx_ref\">46</a>]</cite>,
        and predicting knot invariants and uncovering relations among them\_<cite
        class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib109\" title=\"\"
        class=\"ltx_ref\">109</a>, <a href=\"#bib.bib110\" title=\"\" class=\"ltx_ref\">110</a>,
        <a href=\"#bib.bib111\" title=\"\" class=\"ltx_ref\">111</a>, <a href=\"#bib.bib45\"
        title=\"\" class=\"ltx_ref\">45</a>]</cite>. For a summary of data science
        applications to datasets in mathematics and theoretical physics see e.g.\_<cite
        class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib112\" title=\"\"
        class=\"ltx_ref\">112</a>, <a href=\"#bib.bib113\" title=\"\" class=\"ltx_ref\">113</a>]</cite>,
        and for ideas how to obtain rigorous results from ML techniques in these fields,
        see\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a href=\"#bib.bib114\"
        title=\"\" class=\"ltx_ref\">114</a>]</cite>.</p>\n</div>\n</section>\n<section
        id=\"S6\" class=\"ltx_section\">\n<h2 class=\"ltx_title ltx_title_section\">\n<span
        class=\"ltx_tag ltx_tag_section\">6 </span>Discussion</h2>\n\n<div id=\"S6.p1\"
        class=\"ltx_para\">\n<p id=\"S6.p1.1\" class=\"ltx_p\">In this section, we
        discuss KANs\u2019 limitations and future directions from the perspective
        of mathematical foundation, algorithms and applications.</p>\n</div>\n<div
        id=\"S6.p2\" class=\"ltx_para\">\n<p id=\"S6.p2.1\" class=\"ltx_p\"><span
        id=\"S6.p2.1.1\" class=\"ltx_text ltx_font_bold\">Mathematical aspects:</span>
        Although we have presented preliminary mathematical analysis of KANs (Theorem\_<a
        href=\"#S2.Thmtheorem1\" title=\"Theorem 2.1 (Approximation theory, KAT).
        \u2023 2.3 KAN\u2019s Approximation Abilities and Scaling Laws \u2023 2 Kolmogorov\u2013Arnold
        Networks (KAN) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">2.1</span></a>), our mathematical understanding
        of them is still very limited. The Kolmogorov-Arnold representation theorem
        has been studied thoroughly in mathematics, but the theorem corresponds to
        KANs with shape <math id=\"S6.p2.1.m1\" class=\"ltx_Math\" alttext=\"[n,2n+1,1]\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mo stretchy=\"false\">[</mo><mi>n</mi><mo>,</mo><mrow><mrow><mn>2</mn><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>n</mi></mrow><mo>+</mo><mn>1</mn></mrow><mo>,</mo><mn>1</mn><mo
        stretchy=\"false\">]</mo></mrow><annotation encoding=\"application/x-tex\">[n,2n+1,1]</annotation></semantics></math>,
        which is a very restricted subclass of KANs. Does our empirical success with
        deeper KANs imply something fundamental in mathematics? An appealing generalized
        Kolmogorov-Arnold theorem could define \u201Cdeeper\u201D Kolmogorov-Arnold
        representations beyond depth-2 compositions, and potentially relate smoothness
        of activation functions to depth. Hypothetically, there exist functions which
        cannot be represented smoothly in the original (depth-2) Kolmogorov-Arnold
        representations, but might be smoothly represented with depth-3 or beyond.
        Can we use this notion of \u201CKolmogorov-Arnold depth\u201D to characterize
        function classes?</p>\n</div>\n<div id=\"S6.p3\" class=\"ltx_para\">\n<p id=\"S6.p3.1\"
        class=\"ltx_p\"><span id=\"S6.p3.1.1\" class=\"ltx_text ltx_font_bold\">Algorithmic
        aspects:</span> We discuss the following:</p>\n<ol id=\"S6.I1\" class=\"ltx_enumerate\">\n<li
        id=\"S6.I1.i1\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(1)</span> \n<div id=\"S6.I1.i1.p1\" class=\"ltx_para\">\n<p
        id=\"S6.I1.i1.p1.1\" class=\"ltx_p\">Accuracy. Multiple choices in architecture
        design and training are not fully investigated so alternatives can potentially
        further improve accuracy. For example, spline activation functions might be
        replaced by radial basis functions or other local kernels. Adaptive grid strategies
        can be used.</p>\n</div>\n</li>\n<li id=\"S6.I1.i2\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(2)</span> \n<div id=\"S6.I1.i2.p1\" class=\"ltx_para\">\n<p
        id=\"S6.I1.i2.p1.1\" class=\"ltx_p\">Efficiency. One major reason why KANs
        run slowly is because different activation functions cannot leverage batch
        computation (large data through the same function). Actually, one can interpolate
        between activation functions being all the same (MLPs) and all different (KANs),
        by grouping activation functions into multiple groups (\u201Cmulti-head\u201D),
        where members within a group share the same activation function.</p>\n</div>\n</li>\n<li
        id=\"S6.I1.i3\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(3)</span> \n<div id=\"S6.I1.i3.p1\" class=\"ltx_para\">\n<p
        id=\"S6.I1.i3.p1.1\" class=\"ltx_p\">Hybrid of KANs and MLPs. KANs have two
        major differences compared to MLPs:</p>\n<ol id=\"S6.I1.i3.I1\" class=\"ltx_enumerate\">\n<li
        id=\"S6.I1.i3.I1.i1\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(i)</span> \n<div id=\"S6.I1.i3.I1.i1.p1\"
        class=\"ltx_para\">\n<p id=\"S6.I1.i3.I1.i1.p1.1\" class=\"ltx_p\">activation
        functions are on edges instead of on nodes,</p>\n</div>\n</li>\n<li id=\"S6.I1.i3.I1.i2\"
        class=\"ltx_item\" style=\"list-style-type:none;\">\n<span class=\"ltx_tag
        ltx_tag_item\">(ii)</span> \n<div id=\"S6.I1.i3.I1.i2.p1\" class=\"ltx_para\">\n<p
        id=\"S6.I1.i3.I1.i2.p1.1\" class=\"ltx_p\">activation functions are learnable
        instead of fixed.</p>\n</div>\n</li>\n</ol>\n<p id=\"S6.I1.i3.p1.2\" class=\"ltx_p\">Which
        change is more essential to explain KAN\u2019s advantage? We present our preliminary
        results in Appendix\_<a href=\"#A2\" title=\"Appendix B Learnable activation
        networks (LANs) \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">B</span></a> where we study a model which has
        (ii), i.e., activation functions are learnable (like KANs), but not (i), i.e.,
        activation functions are on nodes (like MLPs). Moreover, one can also construct
        another model with fixed activations (like MLPs) but on edges (like KANs).</p>\n</div>\n</li>\n<li
        id=\"S6.I1.i4\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(4)</span> \n<div id=\"S6.I1.i4.p1\" class=\"ltx_para\">\n<p
        id=\"S6.I1.i4.p1.1\" class=\"ltx_p\">Adaptivity. Thanks to the intrinsic locality
        of spline basis functions, we can introduce adaptivity in the design and training
        of KANs to enhance both accuracy and efficiency: see the idea of multi-level
        training like multigrid methods as in <cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib115\" title=\"\" class=\"ltx_ref\">115</a>, <a href=\"#bib.bib116\"
        title=\"\" class=\"ltx_ref\">116</a>]</cite>, or domain-dependent basis functions
        like multiscale methods as in <cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib117\" title=\"\" class=\"ltx_ref\">117</a>]</cite>.</p>\n</div>\n</li>\n</ol>\n</div>\n<div
        id=\"S6.p4\" class=\"ltx_para\">\n<p id=\"S6.p4.1\" class=\"ltx_p\"><span
        id=\"S6.p4.1.1\" class=\"ltx_text ltx_font_bold\">Application aspects:</span>
        We have presented some preliminary evidences that KANs are more effective
        than MLPs in science-related tasks, e.g., fitting physical equations and PDE
        solving. We would like to apply KANs to solve Navier-Stokes equations, density
        functional theory, or any other tasks that can be formulated as regression
        or PDE solving. We would also like to apply KANs to machine-learning-related
        tasks, which would require integrating KANs into current architectures, e.g.,
        transformers \u2013 one may propose \u201Ckansformers\u201D which replace
        MLPs by KANs in transformers.</p>\n</div>\n<div id=\"S6.p5\" class=\"ltx_para\">\n<p
        id=\"S6.p5.1\" class=\"ltx_p\"><span id=\"S6.p5.1.1\" class=\"ltx_text ltx_font_bold\">KAN
        as a \u201Clanguage model\u201D for AI + Science</span> The reason why large
        language models are so transformative is because they are useful to anyone
        who can speak natural language. The language of science is functions. KANs
        are composed of interpretable functions, so when a human user stares at a
        KAN, it is like communicating with it using the language of functions. This
        paragraph aims to promote the AI-Scientist-Collaboration paradigm rather than
        our specific tool KANs. Just like people use different languages to communicate,
        we expect that in the future KANs will be just one of the languages for AI
        + Science, although KANs will be one of the very first languages that would
        enable AI and human to communicate. However, enabled by KANs, the AI-Scientist-Collaboration
        paradigm has never been this easy and convenient, which leads us to rethink
        the paradigm of how we want to approach AI + Science: Do we want AI scientists,
        or do we want AI that helps scientists? The intrinsic difficulty of (fully
        automated) AI scientists is that it is hard to make human preferences quantitative,
        which would codify human preferences into AI objectives. In fact, scientists
        in different fields may feel differently about which functions are simple
        or interpretable. As a result, it is more desirable for scientists to have
        an AI that can speak the scientific language (functions) and can conveniently
        interact with inductive biases of individual scientist(s) to adapt to a specific
        scientific domain.</p>\n</div>\n<div id=\"S6.p6\" class=\"ltx_para\">\n<p
        id=\"S6.p6.1\" class=\"ltx_p\"><span id=\"S6.p6.1.1\" class=\"ltx_text ltx_font_bold\">Final
        takeaway: Should I use KANs or MLPs?</span></p>\n</div>\n<div id=\"S6.p7\"
        class=\"ltx_para\">\n<p id=\"S6.p7.1\" class=\"ltx_p\">Currently, the biggest
        bottleneck of KANs lies in its slow training. KANs are usually 10x slower
        than MLPs, given the same number of parameters. We should be honest that we
        did not try hard to optimize KANs\u2019 efficiency though, so we deem KANs\u2019
        slow training more as an engineering problem to be improved in the future
        rather than a fundamental limitation. If one wants to train a model fast,
        one should use MLPs. In other cases, however, KANs should be comparable or
        better than MLPs, which makes them worth trying. The decision tree in Figure\_<a
        href=\"#S6.F1\" title=\"Figure 6.1 \u2023 6 Discussion \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">6.1</span></a>
        can help decide when to use a KAN. In short, if you care about interpretability
        and/or accuracy, and slow training is not a major concern, we suggest trying
        KANs, at least for small-scale AI + Science problems.</p>\n</div>\n<figure
        id=\"S6.F1\" class=\"ltx_figure\"><img src=\"2404.19756v5/figs/decision_tree.png\"
        id=\"S6.F1.g1\" class=\"ltx_graphics ltx_centering ltx_img_landscape\" width=\"598\"
        height=\"243\" alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption
        ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure 6.1: </span>Should
        I use KANs or MLPs?</figcaption>\n</figure>\n</section>\n<section id=\"Sx1\"
        class=\"ltx_section\">\n<h2 class=\"ltx_title ltx_title_section\">Acknowledgement</h2>\n\n<div
        id=\"Sx1.p1\" class=\"ltx_para\">\n<p id=\"Sx1.p1.1\" class=\"ltx_p\">We would
        like to thank Mikail Khona, Tomaso Poggio, Pingchuan Ma, Rui Wang, Di Luo,
        Sara Beery, Catherine Liang, Yiping Lu, Nicholas H. Nelsen, Nikola Kovachki,
        Jonathan W. Siegel, Hongkai Zhao, Juncai He, Shi Lab (Humphrey Shi, Steven
        Walton, Chuanhao Yan) and Matthieu Darcy for fruitful discussion and constructive
        suggestions. Z.L., F.R., J.H., M.S. and M.T. are supported by IAIFI through
        NSF grant PHY-2019786. The work of FR is in addition supported by the NSF
        grant PHY-2210333 and by startup funding from Northeastern University. Y.W
        and T.H are supported by the NSF Grant DMS-2205590 and the Choi Family Gift
        Fund. S. V. and M. S. acknowledge support from the U.S. Office of Naval Research
        (ONR) Multidisciplinary University Research Initiative (MURI) under Grant
        No. N00014-20-1-2325 on Robust Photonic Materials with Higher-Order Topological
        Protection.</p>\n</div>\n</section>\n<section id=\"bib\" class=\"ltx_bibliography\">\n<h2
        class=\"ltx_title ltx_title_bibliography\">References</h2>\n\n<ul class=\"ltx_biblist\">\n<li
        id=\"bib.bib1\" class=\"ltx_bibitem\">\n<span class=\"ltx_tag ltx_tag_bibitem\">[1]</span>\n<span
        class=\"ltx_bibblock\">\nSimon Haykin.\n\n</span>\n<span class=\"ltx_bibblock\"><span
        id=\"bib.bib1.1.1\" class=\"ltx_text ltx_font_italic\">Neural networks: a
