        class=\"ltx_text ltx_font_typewriter\">model.symbolic_formula()</span></td>\n<td
        id=\"A1.T6.2.8.2\" class=\"ltx_td ltx_align_center ltx_border_b ltx_border_r
        ltx_border_t\">return the symbolic formula</td>\n</tr>\n</table>\n<figcaption
        class=\"ltx_caption ltx_centering\"><span class=\"ltx_tag ltx_tag_table\">Table
        6: </span>KAN functionalities</figcaption>\n</figure>\n</section>\n<section
        id=\"A2\" class=\"ltx_appendix\">\n<h2 class=\"ltx_title ltx_title_appendix\">\n<span
        class=\"ltx_tag ltx_tag_appendix\">Appendix B </span>Learnable activation
        networks (LANs)</h2>\n\n<section id=\"A2.SS1\" class=\"ltx_subsection\">\n<h3
        class=\"ltx_title ltx_title_subsection\">\n<span class=\"ltx_tag ltx_tag_subsection\">B.1
        </span>Architecture</h3>\n\n<div id=\"A2.SS1.p1\" class=\"ltx_para\">\n<p
        id=\"A2.SS1.p1.1\" class=\"ltx_p\">Besides KAN, we also proposed another type
        of learnable activation networks (LAN), which are almost MLPs but with learnable
        activation functions parametrized as splines. KANs have two main changes to
        standard MLPs: (1) the activation functions become learnable rather than being
        fixed; (2) the activation functions are placed on edges rather than nodes.
        To disentangle these two factors, we also propose learnable activation networks
        (LAN) which only has learnable activations but still on nodes, illustrated
        in Figure\_<a href=\"#A2.F1\" title=\"Figure B.1 \u2023 B.2 LAN interpretability
        results \u2023 Appendix B Learnable activation networks (LANs) \u2023 KAN:
        Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">B.1</span></a>.</p>\n</div>\n<div id=\"A2.SS1.p2\" class=\"ltx_para\">\n<p
        id=\"A2.SS1.p2.8\" class=\"ltx_p\">For a LAN with width <math id=\"A2.SS1.p2.1.m1\"
        class=\"ltx_Math\" alttext=\"N\" display=\"inline\" intent=\":literal\"><semantics><mi>N</mi><annotation
        encoding=\"application/x-tex\">N</annotation></semantics></math>, depth <math
        id=\"A2.SS1.p2.2.m2\" class=\"ltx_Math\" alttext=\"L\" display=\"inline\"
        intent=\":literal\"><semantics><mi>L</mi><annotation encoding=\"application/x-tex\">L</annotation></semantics></math>,
        and grid point number <math id=\"A2.SS1.p2.3.m3\" class=\"ltx_Math\" alttext=\"G\"
        display=\"inline\" intent=\":literal\"><semantics><mi>G</mi><annotation encoding=\"application/x-tex\">G</annotation></semantics></math>,
        the number of parameters is <math id=\"A2.SS1.p2.4.m4\" class=\"ltx_Math\"
        alttext=\"N^{2}L+NLG\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><msup><mi>N</mi><mn>2</mn></msup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>L</mi></mrow><mo>+</mo><mrow><mi>N</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>L</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>G</mi></mrow></mrow><annotation
        encoding=\"application/x-tex\">N^{2}L+NLG</annotation></semantics></math>
        where <math id=\"A2.SS1.p2.5.m5\" class=\"ltx_Math\" alttext=\"N^{2}L\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><msup><mi>N</mi><mn>2</mn></msup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>L</mi></mrow><annotation encoding=\"application/x-tex\">N^{2}L</annotation></semantics></math>
        is the number of parameters for weight matrices and <math id=\"A2.SS1.p2.6.m6\"
        class=\"ltx_Math\" alttext=\"NLG\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>N</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>L</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>G</mi></mrow><annotation
        encoding=\"application/x-tex\">NLG</annotation></semantics></math> is the
        number of parameters for spline activations, which causes little overhead
        in addition to MLP since usually <math id=\"A2.SS1.p2.7.m7\" class=\"ltx_Math\"
        alttext=\"G\\ll N\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>G</mi><mo>\u226A</mo><mi>N</mi></mrow><annotation
        encoding=\"application/x-tex\">G\\ll N</annotation></semantics></math> so
        <math id=\"A2.SS1.p2.8.m8\" class=\"ltx_Math\" alttext=\"NLG\\ll N^{2}L\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>N</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>L</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>G</mi></mrow><mo>\u226A</mo><mrow><msup><mi>N</mi><mn>2</mn></msup><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>L</mi></mrow></mrow><annotation
        encoding=\"application/x-tex\">NLG\\ll N^{2}L</annotation></semantics></math>.
        LANs are similar to MLPs so they can be initialized from pretrained MLPs and
        fine-tuned by allowing learnable activation functions. An example is to use
        LAN to improve SIREN, presented in Section \_<a href=\"#A2.SS3\" title=\"B.3
        Fitting Images (LAN) \u2023 Appendix B Learnable activation networks (LANs)
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">B.3</span></a>.</p>\n</div>\n<div id=\"A2.SS1.p3\" class=\"ltx_para\">\n<p
        id=\"A2.SS1.p3.1\" class=\"ltx_p\"><span id=\"A2.SS1.p3.1.1\" class=\"ltx_text
        ltx_font_bold\">Comparison of LAN and KAN.</span>\nPros of LANs:</p>\n<ol
        id=\"A2.I1\" class=\"ltx_enumerate\">\n<li id=\"A2.I1.i1\" class=\"ltx_item\"
        style=\"list-style-type:none;\">\n<span class=\"ltx_tag ltx_tag_item\">(1)</span>
        \n<div id=\"A2.I1.i1.p1\" class=\"ltx_para\">\n<p id=\"A2.I1.i1.p1.1\" class=\"ltx_p\">LANs
        are conceptually simpler than KANs. They are closer to standard MLPs (the
        only change is that activation functions become learnable).</p>\n</div>\n</li>\n<li
        id=\"A2.I1.i2\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(2)</span> \n<div id=\"A2.I1.i2.p1\" class=\"ltx_para\">\n<p
        id=\"A2.I1.i2.p1.3\" class=\"ltx_p\">LANs scale better than KANs. LANs/KANs
        have learnable activation functions on nodes/edges, respectively. So activation
        parameters in LANs/KANs scale as <math id=\"A2.I1.i2.p1.1.m1\" class=\"ltx_Math\"
        alttext=\"N\" display=\"inline\" intent=\":literal\"><semantics><mi>N</mi><annotation
        encoding=\"application/x-tex\">N</annotation></semantics></math>/<math id=\"A2.I1.i2.p1.2.m2\"
        class=\"ltx_Math\" alttext=\"N^{2}\" display=\"inline\" intent=\":literal\"><semantics><msup><mi>N</mi><mn>2</mn></msup><annotation
        encoding=\"application/x-tex\">N^{2}</annotation></semantics></math>, where
        <math id=\"A2.I1.i2.p1.3.m3\" class=\"ltx_Math\" alttext=\"N\" display=\"inline\"
        intent=\":literal\"><semantics><mi>N</mi><annotation encoding=\"application/x-tex\">N</annotation></semantics></math>
        is model width.</p>\n</div>\n</li>\n</ol>\n<p id=\"A2.SS1.p3.2\" class=\"ltx_p\">Cons
        of LANs:</p>\n<ol id=\"A2.I2\" class=\"ltx_enumerate\">\n<li id=\"A2.I2.i1\"
        class=\"ltx_item\" style=\"list-style-type:none;\">\n<span class=\"ltx_tag
        ltx_tag_item\">(1)</span> \n<div id=\"A2.I2.i1.p1\" class=\"ltx_para\">\n<p
        id=\"A2.I2.i1.p1.1\" class=\"ltx_p\">LANs seem to be less interpretable (weight
        matrices are hard to interpret, just like in MLPs);</p>\n</div>\n</li>\n<li
        id=\"A2.I2.i2\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(2)</span> \n<div id=\"A2.I2.i2.p1\" class=\"ltx_para\">\n<p
        id=\"A2.I2.i2.p1.1\" class=\"ltx_p\">LANs also seem to be less accurate than
        KANs, but still more accurate than MLPs. Like KANs, LANs also admit grid extension
        if theLANs\u2019 activation functions are parametrized by splines.</p>\n</div>\n</li>\n</ol>\n</div>\n</section>\n<section
        id=\"A2.SS2\" class=\"ltx_subsection\">\n<h3 class=\"ltx_title ltx_title_subsection\">\n<span
        class=\"ltx_tag ltx_tag_subsection\">B.2 </span>LAN interpretability results</h3>\n\n<figure
        id=\"A2.F1\" class=\"ltx_figure\"><img src=\"2404.19756v5/figs/lan_toy_interpretability_evolution.png\"
        id=\"A2.F1.g1\" class=\"ltx_graphics ltx_centering ltx_img_landscape\" width=\"598\"
        height=\"179\" alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption
        ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure B.1: </span>Training
        of a learnable activation network (LAN) on the toy example <math id=\"A2.F1.2.m1\"
        class=\"ltx_Math\" alttext=\"f(x,y)={\\rm exp}({\\rm sin}(\\pi x)+y^{2})\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo>,</mo><mi>y</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>exp</mi><mo lspace=\"0em\"
        rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mrow><mi>sin</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><msup><mi>y</mi><mn>2</mn></msup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">f(x,y)={\\rm
        exp}({\\rm sin}(\\pi x)+y^{2})</annotation></semantics></math>.</figcaption>\n</figure>\n<figure
        id=\"A2.F2\" class=\"ltx_figure\"><img src=\"2404.19756v5/figs/lan_interpretable_examples.png\"
        id=\"A2.F2.g1\" class=\"ltx_graphics ltx_centering ltx_img_landscape\" width=\"598\"
        height=\"372\" alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption
        ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure B.2: </span>LANs
        on synthetic examples. LANs do not appear to be very interpretable. We conjecture
        that the weight matrices leave too many degree of freedoms.</figcaption>\n</figure>\n<div
        id=\"A2.SS2.p1\" class=\"ltx_para\">\n<p id=\"A2.SS2.p1.1\" class=\"ltx_p\">We
        present preliminary interpretabilty results of LANs in Figure\_<a href=\"#A2.F2\"
        title=\"Figure B.2 \u2023 B.2 LAN interpretability results \u2023 Appendix
        B Learnable activation networks (LANs) \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">B.2</span></a>.
        With the same examples in Figure\_<a href=\"#S4.F1\" title=\"Figure 4.1 \u2023
        4.1 Supervised toy datasets \u2023 4 KANs are interpretable \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">4.1</span></a>
        for which KANs are perfectly interpretable, LANs seem much less interpretable
        due to the existence of weight matrices. First, weight matrices are less readily
        interpretable than learnable activation functions. Second, weight matrices
        bring in too many degrees of freedom, making learnable activation functions
        too unconstrained. Our preliminary results with LANs seem to imply that getting
        rid of linear weight matrices (by having learnable activations on edges, like
        KANs) is necessary for interpretability.</p>\n</div>\n</section>\n<section
        id=\"A2.SS3\" class=\"ltx_subsection\">\n<h3 class=\"ltx_title ltx_title_subsection\">\n<span
        class=\"ltx_tag ltx_tag_subsection\">B.3 </span>Fitting Images (LAN)</h3>\n\n<figure
        id=\"A2.F3\" class=\"ltx_figure\"><img src=\"2404.19756v5/figs/siren.png\"
        id=\"A2.F3.g1\" class=\"ltx_graphics ltx_centering ltx_img_landscape\" width=\"598\"
        height=\"209\" alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption
        ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure B.3: </span>A
        SIREN network (fixed sine activations) can be adapted to LANs (learnable activations)
        to improve image representations.</figcaption>\n</figure>\n<div id=\"A2.SS3.p1\"
        class=\"ltx_para\">\n<p id=\"A2.SS3.p1.13\" class=\"ltx_p\">Implicit neural
        representations view images as 2D functions <math id=\"A2.SS3.p1.1.m1\" class=\"ltx_Math\"
        alttext=\"f(x,y)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>f</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo>,</mo><mi>y</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">f(x,y)</annotation></semantics></math>,
        where the pixel value <math id=\"A2.SS3.p1.2.m2\" class=\"ltx_Math\" alttext=\"f\"
        display=\"inline\" intent=\":literal\"><semantics><mi>f</mi><annotation encoding=\"application/x-tex\">f</annotation></semantics></math>
        is a function of two coordinates of the pixel <math id=\"A2.SS3.p1.3.m3\"
        class=\"ltx_Math\" alttext=\"x\" display=\"inline\" intent=\":literal\"><semantics><mi>x</mi><annotation
        encoding=\"application/x-tex\">x</annotation></semantics></math> and <math
        id=\"A2.SS3.p1.4.m4\" class=\"ltx_Math\" alttext=\"y\" display=\"inline\"
        intent=\":literal\"><semantics><mi>y</mi><annotation encoding=\"application/x-tex\">y</annotation></semantics></math>.
        To compress an image, such an implicit neural representation (<math id=\"A2.SS3.p1.5.m5\"
        class=\"ltx_Math\" alttext=\"f\" display=\"inline\" intent=\":literal\"><semantics><mi>f</mi><annotation
        encoding=\"application/x-tex\">f</annotation></semantics></math> is a neural
        network) can achieve impressive compression of parameters while maintaining
        almost original image quality. SIREN\_<cite class=\"ltx_cite ltx_citemacro_cite\">[<a
        href=\"#bib.bib118\" title=\"\" class=\"ltx_ref\">118</a>]</cite> proposed
        to use MLPs with periodic activation functions to fit the function <math id=\"A2.SS3.p1.6.m6\"
        class=\"ltx_Math\" alttext=\"f\" display=\"inline\" intent=\":literal\"><semantics><mi>f</mi><annotation
        encoding=\"application/x-tex\">f</annotation></semantics></math>. It is natural
        to consider other activation functions, which are allowed in LANs. However,
        since we initialize LAN activations to be smooth but SIREN requires high-frequency
        features, LAN does not work immediately. Note that each activation function
        in LANs is a sum of the base function and the spline function, i.e., <math
        id=\"A2.SS3.p1.7.m7\" class=\"ltx_Math\" alttext=\"\\phi(x)=b(x)+{\\rm spline}(x)\"
        display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>\u03D5</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mrow><mi>b</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><mrow><mi>spline</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">\\phi(x)=b(x)+{\\rm
        spline}(x)</annotation></semantics></math>, we set <math id=\"A2.SS3.p1.8.m8\"
        class=\"ltx_Math\" alttext=\"b(x)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>b</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">b(x)</annotation></semantics></math>
        to sine functions, the same setup as in SIREN but let <math id=\"A2.SS3.p1.9.m9\"
        class=\"ltx_Math\" alttext=\"{\\rm spline}(x)\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>spline</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mi>x</mi><mo
        stretchy=\"false\">)</mo></mrow></mrow><annotation encoding=\"application/x-tex\">{\\rm
        spline}(x)</annotation></semantics></math> be trainable. For both MLP and
        LAN, the shape is [2,128,128,128,128,128,1]. We train them with the Adam optimizer,
        batch size 4096, for 5000 steps with learning rate <math id=\"A2.SS3.p1.10.m10\"
        class=\"ltx_Math\" alttext=\"10^{-3}\" display=\"inline\" intent=\":literal\"><semantics><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>3</mn></mrow></msup><annotation
        encoding=\"application/x-tex\">10^{-3}</annotation></semantics></math> and
        5000 steps with learning rate <math id=\"A2.SS3.p1.11.m11\" class=\"ltx_Math\"
        alttext=\"10^{-4}\" display=\"inline\" intent=\":literal\"><semantics><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>4</mn></mrow></msup><annotation
        encoding=\"application/x-tex\">10^{-4}</annotation></semantics></math>. As
        shown in Figure\_<a href=\"#A2.F3\" title=\"Figure B.3 \u2023 B.3 Fitting
        Images (LAN) \u2023 Appendix B Learnable activation networks (LANs) \u2023
        KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">B.3</span></a>, the LAN (orange) can achieve higher PSNR than
        the MLP (blue) due to the LAN\u2019s flexibility to fine tune activation functions.
        We show that it is also possible to initialize a LAN from an MLP and further
        fine tune the LAN (green) for better PSNR. We have chosen <math id=\"A2.SS3.p1.12.m12\"
        class=\"ltx_Math\" alttext=\"G=5\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi>G</mi><mo>=</mo><mn>5</mn></mrow><annotation
        encoding=\"application/x-tex\">G=5</annotation></semantics></math> in our
        experiments, so the additional parameter increase is roughly <math id=\"A2.SS3.p1.13.m13\"
        class=\"ltx_Math\" alttext=\"G/N=5/128\\approx 4\\%\" display=\"inline\" intent=\":literal\"><semantics><mrow><mrow><mi>G</mi><mo>/</mo><mi>N</mi></mrow><mo>=</mo><mrow><mn>5</mn><mo>/</mo><mn>128</mn></mrow><mo>\u2248</mo><mrow><mn>4</mn><mo>%</mo></mrow></mrow><annotation
        encoding=\"application/x-tex\">G/N=5/128\\approx 4\\%</annotation></semantics></math>
        over the original parameters.</p>\n</div>\n</section>\n</section>\n<section
        id=\"A3\" class=\"ltx_appendix\">\n<h2 class=\"ltx_title ltx_title_appendix\">\n<span
        class=\"ltx_tag ltx_tag_appendix\">Appendix C </span>Dependence on hyperparameters</h2>\n\n<div
        id=\"A3.p1\" class=\"ltx_para\">\n<p id=\"A3.p1.1\" class=\"ltx_p\">We show
        the effects of hyperparamters on the <math id=\"A3.p1.1.m1\" class=\"ltx_Math\"
        alttext=\"f(x,y)={\\rm exp}({\\rm sin}(\\pi x)+y^{2})\" display=\"inline\"
        intent=\":literal\"><semantics><mrow><mrow><mi>f</mi><mo lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo
        stretchy=\"false\">(</mo><mi>x</mi><mo>,</mo><mi>y</mi><mo stretchy=\"false\">)</mo></mrow></mrow><mo>=</mo><mrow><mi>exp</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mrow><mi>sin</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mrow><mo stretchy=\"false\">(</mo><mrow><mi>\u03C0</mi><mo
        lspace=\"0em\" rspace=\"0em\">\u200B</mo><mi>x</mi></mrow><mo stretchy=\"false\">)</mo></mrow></mrow><mo>+</mo><msup><mi>y</mi><mn>2</mn></msup></mrow><mo
        stretchy=\"false\">)</mo></mrow></mrow></mrow><annotation encoding=\"application/x-tex\">f(x,y)={\\rm
        exp}({\\rm sin}(\\pi x)+y^{2})</annotation></semantics></math> case in Figure\_<a
        href=\"#A3.F1\" title=\"Figure C.1 \u2023 Appendix C Dependence on hyperparameters
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">C.1</span></a>. To get an interpretable graph, we want the number
        of active activation functions to be as small (ideally 3) as possible.</p>\n<ol
        id=\"A3.I1\" class=\"ltx_enumerate\">\n<li id=\"A3.I1.i1\" class=\"ltx_item\"
        style=\"list-style-type:none;\">\n<span class=\"ltx_tag ltx_tag_item\">(1)</span>
        \n<div id=\"A3.I1.i1.p1\" class=\"ltx_para\">\n<p id=\"A3.I1.i1.p1.1\" class=\"ltx_p\">We
        need entropy penalty to reduce the number of active activation functions.
        Without entropy penalty, there are many duplicate functions.</p>\n</div>\n</li>\n<li
        id=\"A3.I1.i2\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(2)</span> \n<div id=\"A3.I1.i2.p1\" class=\"ltx_para\">\n<p
        id=\"A3.I1.i2.p1.1\" class=\"ltx_p\">Results can depend on random seeds. With
        some unlucky seed, the pruned network could be larger than needed.</p>\n</div>\n</li>\n<li
        id=\"A3.I1.i3\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(3)</span> \n<div id=\"A3.I1.i3.p1\" class=\"ltx_para\">\n<p
        id=\"A3.I1.i3.p1.1\" class=\"ltx_p\">The overall penalty strength <math id=\"A3.I1.i3.p1.1.m1\"
        class=\"ltx_Math\" alttext=\"\\lambda\" display=\"inline\" intent=\":literal\"><semantics><mi>\u03BB</mi><annotation
        encoding=\"application/x-tex\">\\lambda</annotation></semantics></math> effectively
        controls the sparsity.</p>\n</div>\n</li>\n<li id=\"A3.I1.i4\" class=\"ltx_item\"
        style=\"list-style-type:none;\">\n<span class=\"ltx_tag ltx_tag_item\">(4)</span>
        \n<div id=\"A3.I1.i4.p1\" class=\"ltx_para\">\n<p id=\"A3.I1.i4.p1.2\" class=\"ltx_p\">The
        grid number <math id=\"A3.I1.i4.p1.1.m1\" class=\"ltx_Math\" alttext=\"G\"
        display=\"inline\" intent=\":literal\"><semantics><mi>G</mi><annotation encoding=\"application/x-tex\">G</annotation></semantics></math>
        also has a subtle effect on interpretability. When <math id=\"A3.I1.i4.p1.2.m2\"
        class=\"ltx_Math\" alttext=\"G\" display=\"inline\" intent=\":literal\"><semantics><mi>G</mi><annotation
        encoding=\"application/x-tex\">G</annotation></semantics></math> is too small,
        because each one of activation function is not very expressive, the network
        tends to use the ensembling strategy, making interpretation harder.</p>\n</div>\n</li>\n<li
        id=\"A3.I1.i5\" class=\"ltx_item\" style=\"list-style-type:none;\">\n<span
        class=\"ltx_tag ltx_tag_item\">(5)</span> \n<div id=\"A3.I1.i5.p1\" class=\"ltx_para\">\n<p
        id=\"A3.I1.i5.p1.1\" class=\"ltx_p\">The piecewise polynomial order <math
        id=\"A3.I1.i5.p1.1.m1\" class=\"ltx_Math\" alttext=\"k\" display=\"inline\"
        intent=\":literal\"><semantics><mi>k</mi><annotation encoding=\"application/x-tex\">k</annotation></semantics></math>
        only has a subtle effect on interpretability. However, it behaves a bit like
        the random seeds which do not display any visible pattern in this toy example.</p>\n</div>\n</li>\n</ol>\n</div>\n<figure
        id=\"A3.F1\" class=\"ltx_figure\"><img src=\"2404.19756v5/figs/interpretability_hyperparameters.png\"
        id=\"A3.F1.g1\" class=\"ltx_graphics ltx_centering ltx_img_landscape\" width=\"598\"
        height=\"347\" alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption
        ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure C.1: </span>Effects
        of hyperparameters on interpretability results.</figcaption>\n</figure>\n</section>\n<section
        id=\"A4\" class=\"ltx_appendix\">\n<h2 class=\"ltx_title ltx_title_appendix\">\n<span
        class=\"ltx_tag ltx_tag_appendix\">Appendix D </span>Feynman KANs</h2>\n\n<div
        id=\"A4.p1\" class=\"ltx_para\">\n<p id=\"A4.p1.1\" class=\"ltx_p\">We include
        more results on the Feynman dataset (Section\_<a href=\"#S3.SS3\" title=\"3.3
        Feynman datasets \u2023 3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">3.3</span></a>).
        Figure\_<a href=\"#A4.F1\" title=\"Figure D.1 \u2023 Appendix D Feynman KANs
        \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span class=\"ltx_text
        ltx_ref_tag\">D.1</span></a> shows the pareto frontiers of KANs and MLPs for
        each Feynman dataset. Figure\_<a href=\"#A4.F3\" title=\"Figure D.3 \u2023
        Appendix D Feynman KANs \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">D.3</span></a> and\_<a href=\"#A4.F2\" title=\"Figure
        D.2 \u2023 Appendix D Feynman KANs \u2023 KAN: Kolmogorov\u2013Arnold Networks\"
        class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">D.2</span></a> visualize
        minimal KANs (under the constraint test RMSE <math id=\"A4.p1.1.m1\" class=\"ltx_Math\"
        alttext=\"&lt;10^{-2}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi></mi><mo>&lt;</mo><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>2</mn></mrow></msup></mrow><annotation
        encoding=\"application/x-tex\">&lt;10^{-2}</annotation></semantics></math>)
        and best KANs (with the lowest test RMSE loss) for each Feynman equation fitting
        task.</p>\n</div>\n<figure id=\"A4.F1\" class=\"ltx_figure\"><img src=\"2404.19756v5/x7.png\"
        id=\"A4.F1.g1\" class=\"ltx_graphics ltx_centering ltx_img_square\" width=\"830\"
        height=\"813\" alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption
        ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure D.1: </span>The
        Pareto Frontiers of KANs and MLPs for Feynman datasets.</figcaption>\n</figure>\n<figure
        id=\"A4.F2\" class=\"ltx_figure\"><img src=\"2404.19756v5/x8.png\" id=\"A4.F2.g1\"
        class=\"ltx_graphics ltx_centering ltx_img_portrait\" width=\"830\" height=\"1173\"
        alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption ltx_centering\"><span
        class=\"ltx_tag ltx_tag_figure\">Figure D.2: </span>Best Feynman KANs</figcaption>\n</figure>\n<figure
        id=\"A4.F3\" class=\"ltx_figure\"><img src=\"2404.19756v5/x9.png\" id=\"A4.F3.g1\"
        class=\"ltx_graphics ltx_centering ltx_img_portrait\" width=\"830\" height=\"1173\"
        alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption ltx_centering\"><span
        class=\"ltx_tag ltx_tag_figure\">Figure D.3: </span>Minimal Feynman KANs</figcaption>\n</figure>\n</section>\n<section
        id=\"A5\" class=\"ltx_appendix\">\n<h2 class=\"ltx_title ltx_title_appendix\">\n<span
        class=\"ltx_tag ltx_tag_appendix\">Appendix E </span>Remark on grid size</h2>\n\n<div
        id=\"A5.p1\" class=\"ltx_para\">\n<p id=\"A5.p1.1\" class=\"ltx_p\">For both
        PDE and regression tasks, when we choose the training data on uniform grids,
        we witness a sudden increase in training loss (i.e., sudden drop in performance)
        when the grid size is updated to a large level, comparable to the different
        training points in one spatial direction. This could be due to implementation
        of B-spline in higher dimensions and needs further investigation.</p>\n</div>\n</section>\n<section
        id=\"A6\" class=\"ltx_appendix\">\n<h2 class=\"ltx_title ltx_title_appendix\">\n<span
        class=\"ltx_tag ltx_tag_appendix\">Appendix F </span>KANs for special functions</h2>\n\n<div
        id=\"A6.p1\" class=\"ltx_para\">\n<p id=\"A6.p1.1\" class=\"ltx_p\">We include
        more results on the special function dataset (Section\_<a href=\"#S3.SS2\"
        title=\"3.2 Special functions \u2023 3 KANs are accurate \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">3.2</span></a>).
        Figure\_<a href=\"#A6.F2\" title=\"Figure F.2 \u2023 Appendix F KANs for special
        functions \u2023 KAN: Kolmogorov\u2013Arnold Networks\" class=\"ltx_ref\"><span
        class=\"ltx_text ltx_ref_tag\">F.2</span></a> and\_<a href=\"#A6.F1\" title=\"Figure
        F.1 \u2023 Appendix F KANs for special functions \u2023 KAN: Kolmogorov\u2013Arnold
        Networks\" class=\"ltx_ref\"><span class=\"ltx_text ltx_ref_tag\">F.1</span></a>
        visualize minimal KANs (under the constraint test RMSE <math id=\"A6.p1.1.m1\"
        class=\"ltx_Math\" alttext=\"&lt;10^{-2}\" display=\"inline\" intent=\":literal\"><semantics><mrow><mi></mi><mo>&lt;</mo><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>2</mn></mrow></msup></mrow><annotation
        encoding=\"application/x-tex\">&lt;10^{-2}</annotation></semantics></math>)
        and best KANs (with the lowest test RMSE loss) for each special function fitting
        task.</p>\n</div>\n<figure id=\"A6.F1\" class=\"ltx_figure\"><img src=\"2404.19756v5/x10.png\"
        id=\"A6.F1.g1\" class=\"ltx_graphics ltx_centering ltx_img_portrait\" width=\"830\"
        height=\"1173\" alt=\"Refer to caption\">\n<figcaption class=\"ltx_caption
        ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure F.1: </span>Best
        special KANs</figcaption>\n</figure>\n<figure id=\"A6.F2\" class=\"ltx_figure\"><img
        src=\"2404.19756v5/x11.png\" id=\"A6.F2.g1\" class=\"ltx_graphics ltx_centering
        ltx_img_portrait\" width=\"830\" height=\"1173\" alt=\"Refer to caption\">\n<figcaption
        class=\"ltx_caption ltx_centering\"><span class=\"ltx_tag ltx_tag_figure\">Figure
        F.2: </span>Minimal special KANs</figcaption>\n</figure>\n</section>\n</article>\n</div>\n</div>\n<footer
