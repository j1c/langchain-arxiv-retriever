# Release: push a tag like v1.0.0 to build, publish to PyPI, and create the
# GitHub Release with generated notes and the dist files attached.
#
# One-time setup on PyPI (no API tokens needed — trusted publishing):
#   pypi.org -> Account settings -> Publishing -> Add a new pending publisher:
#     project:     langchain-arxiv-retriever
#     owner/repo:  j1c/langchain-arxiv-retriever
#     workflow:    release.yml
#     environment: pypi
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.3.0
      - name: Check tag matches project version
        run: |
          project_version="$(uv version --short)"
          if [ "v${project_version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject version ${project_version}" >&2
            exit 1
          fi
      - name: Build sdist and wheel
        run: uv build
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/langchain-arxiv-retriever/
    permissions:
      id-token: write
    steps:
      - uses: astral-sh/setup-uv@v8.3.0
      - uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist
      - name: Publish to PyPI (trusted publishing)
        run: uv publish --trusted-publishing always

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
