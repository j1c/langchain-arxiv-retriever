site_name: langchain-arxiv-retriever
site_description: A lean LangChain retriever for the arXiv API
site_url: https://j1c.github.io/langchain-arxiv-retriever/
repo_url: https://github.com/j1c/langchain-arxiv-retriever
repo_name: j1c/langchain-arxiv-retriever

nav:
  - Home: index.md
  - API Reference: api.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            # The class docstring documents the pydantic fields as
            # constructor parameters; pydantic's real __init__ is (**data),
            # so griffe's params-vs-signature check can never match.
            docstring_options:
              warn_unknown_params: false
            extensions:
              - griffe_pydantic
            filters:
              - "!^_"
              - "!^model_"
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_root_heading: true
            show_signature_annotations: true
            show_source: true
